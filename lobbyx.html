<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOBBY.GG — Ana Sayfa</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db-helper.js"></script>
  <style>
    /* =====================
       CSS VARIABLES OVERRIDE
       ===================== */
    :root {
      --bg:          #0c0f1d;
      --bg-card:     rgba(18, 62, 103, 0.75);
      --bg-card2:    rgba(12, 42, 70, 0.85);
      --border-thin: rgba(0, 212, 255, 0.25);
      --border:      #000000;
      --border-hover:#000000;
      --accent:      #ffd13b;
      --accent-glow: rgba(255, 209, 59, 0.45);
      
      --text-1:      #ffffff !important;
      --text-2:      #e0e0e0 !important;
      --text-3:      #aaaaaa !important;
      --text-dim:    #777777 !important;
      
      --green:       #3c8527;
      --green-dark:  #2a5e1b;
    }

    body {
      background: #0c0f1d !important;
      color: #ffffff !important;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background: url('mc_bg.png') center/cover no-repeat;
      filter: blur(20px) brightness(0.35);
      transform: scale(1.1);
      pointer-events: none;
    }
    
    /* Header nav overrides to keep it dark & beautiful like Melonya's dark header */
    /* =====================
       VIBRANT GAMING HEADER NAV OVERRIDES
       ===================== */
    .nav {
      display: none !important;
    }
    
    .nav-links {
      gap: 8px !important;
    }

    .nav-link {
      color: #ffffff !important;
      background: rgba(18, 62, 103, 0.65) !important;
      border: 2px solid #000000 !important;
      border-radius: 0px !important;
      box-shadow: 2px 2px 0px #000000;
      padding: 8px 14px !important;
      font-weight: 800 !important;
      transition: all 0.1s ease !important;
      transform: translate(0, 0);
    }

    .nav-link:hover {
      color: #000000 !important;
      background: var(--accent) !important;
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0px #000000;
    }

    .nav-link:active {
      transform: translate(0px, 0px);
      box-shadow: 1px 1px 0px #000000;
    }

    .nav-link.active {
      color: #000000 !important;
      background: var(--accent) !important;
      box-shadow: 2px 2px 0px #000000 !important;
      transform: translate(0, 0) !important;
    }
    
    .nav-bell {
      background: rgba(18, 62, 103, 0.65) !important;
      border: 2px solid #000000 !important;
      border-radius: 0px !important;
      color: #ffffff !important;
      box-shadow: 2px 2px 0px #000000;
      transition: all 0.1s ease !important;
    }

    .nav-bell:hover {
      color: #000000 !important;
      background: var(--accent) !important;
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0px #000000;
      border-color: #000000 !important;
    }

    .nav-bell:active {
      transform: translate(0, 0);
      box-shadow: 1px 1px 0px #000000;
    }

    .nav-lcoin {
      background: linear-gradient(135deg, #ffd700, #facc15) !important;
      border: 2px solid #000000 !important;
      border-radius: 0px !important;
      color: #000000 !important;
      box-shadow: 2px 2px 0px #000000;
      transition: all 0.1s ease !important;
      font-weight: 900 !important;
    }

    .nav-lcoin:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0px #000000;
    }

    .nav-lcoin:active {
      transform: translate(0, 0);
      box-shadow: 1px 1px 0px #000000;
    }

    .nav-avatar img {
      border: 2px solid #000000 !important;
      border-radius: 0px !important;
    }
    
    .nav-user {
      border: 2px solid #000000 !important;
      background: rgba(18, 62, 103, 0.65) !important;
      padding: 4px 10px !important;
      border-radius: 0px !important;
      box-shadow: 2px 2px 0px #000000;
      transition: all 0.1s ease !important;
      cursor: pointer;
    }

    .nav-user:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0px #000000;
    }

    .nav-user:active {
      transform: translate(0, 0);
      box-shadow: 1px 1px 0px #000000;
    }
    
    /* Mobile bottom navigation overrides */
    .mobile-bottom-nav {
      background: #111111 !important;
      border-top: 2px solid #000000 !important;
    }
    .mobile-nav-item {
      color: #aaaaaa !important;
    }
    .mobile-nav-item:hover, .mobile-nav-item.active {
      color: var(--accent) !important;
    }

    /* =====================
       PAGE LAYOUT
       ===================== */
    .main-layout {
      display: flex;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 16px 80px;
      gap: 20px;
      align-items: flex-start;
    }

    /* =====================
       LEFT SIDEBAR
       ===================== */
    .left-sidebar {
      width: 240px;
      flex-shrink: 0;
      position: sticky;
      top: 20px;
      height: calc(100vh - 40px);
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .left-sidebar::-webkit-scrollbar {
      display: none;
    }

    .sidebar-nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 0px !important;
      font-size: 12.5px;
      font-weight: 900;
      color: var(--text-1) !important;
      cursor: pointer;
      transition: all 0.15s ease;
      background: var(--bg-card) !important;
      border: 2px solid #000000 !important;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.06), inset 0 -3px 0 rgba(0,0,0,0.4);
      text-decoration: none;
      transform: translate(0, 0);
    }
    .sidebar-nav-item:hover {
      background: var(--bg-card2) !important;
      color: var(--text-1) !important;
      transform: translate(-3px, -3px);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), inset 0 -3px 0 rgba(0,0,0,0.15), 3px 3px 0 #000000;
    }
    .sidebar-nav-item:active {
      transform: translate(0px, 0px);
      box-shadow: inset 0 2px 0 rgba(0,0,0,0.15), inset 0 -1px 0 rgba(0,0,0,0.1);
    }
    .sidebar-nav-item.active {
      background: var(--accent) !important;
      color: #000000 !important;
      border-color: #000000 !important;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.4), inset 0 -3px 0 rgba(0,0,0,0.3) !important;
      transform: translate(0, 0);
    }
    .sidebar-nav-icon { 
      font-size: 18px; 
      width: 24px; 
      text-align: center; 
      flex-shrink: 0; 
      transition: transform 0.2s, filter 0.2s;
    }
    .sidebar-nav-item:hover .sidebar-nav-icon {
      filter: drop-shadow(0 0 5px var(--accent));
      transform: scale(1.2);
    }
    .sidebar-nav-item.active .sidebar-nav-icon {
      filter: drop-shadow(0 0 6px var(--accent));
      transform: scale(1.1);
    }

    /* Brand Header Sync Animations */
    .brand-logo-anim {
      animation: brandLogoBreath 10s infinite ease-in-out;
      transform-origin: center;
    }
    .brand-text-anim {
      background: linear-gradient(120deg, #ffffff 35%, #ffd13b 48%, #ffffff 52%, #ffd13b 56%, #ffffff 68%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
      transform-origin: left center;
      filter: drop-shadow(2px 2px 0px #000000);
      animation: brandShine 10s infinite linear, brandTextBreath 10s infinite ease-in-out;
    }

    @keyframes brandShine {
      0% { background-position: 120% 0; }
      10% { background-position: -20% 0; }
      100% { background-position: -20% 0; }
    }

    @keyframes brandLogoBreath {
      0% {
        transform: scale(1);
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25));
      }
      3% {
        transform: scale(1.08);
        filter: drop-shadow(0 4px 10px rgba(0,212,255,0.45));
      }
      6% {
        transform: scale(1.08);
        filter: drop-shadow(0 4px 10px rgba(0,212,255,0.45));
      }
      10% {
        transform: scale(1);
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25));
      }
      100% {
        transform: scale(1);
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25));
      }
    }

    @keyframes brandTextBreath {
      0% {
        transform: scale(1);
        filter: drop-shadow(2px 2px 0px #000000);
      }
      3% {
        transform: scale(1.04);
        filter: drop-shadow(3px 3px 0px #000000) drop-shadow(0 0 6px rgba(255,209,59,0.3));
      }
      6% {
        transform: scale(1.04);
        filter: drop-shadow(3px 3px 0px #000000) drop-shadow(0 0 6px rgba(255,209,59,0.3));
      }
      10% {
        transform: scale(1);
        filter: drop-shadow(2px 2px 0px #000000);
      }
      100% {
        transform: scale(1);
        filter: drop-shadow(2px 2px 0px #000000);
      }
    }

    .lcoin-card {
      background: linear-gradient(135deg, #ffd700, #facc15) !important;
      border: 2px solid #000000 !important;
      border-radius: 0px !important;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.4), inset 0 -3px 0 rgba(0,0,0,0.3), 0px 0px 0px #000000;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .lcoin-card:hover {
      transform: translate(-5px, -5px);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.4), inset 0 -3px 0 rgba(0,0,0,0.3), 5px 5px 0 #000000;
    }
    .lcoin-card-icon { font-size: 28px; }
    .lcoin-card-label { font-size: 9px; font-weight: 900; text-transform: uppercase; color: #78350f !important; letter-spacing: 0.5px; }
    .lcoin-card-amount { font-size: 20px; font-weight: 900; color: #000000 !important; line-height: 1; text-shadow: none !important; }

    .sidebar-divider { height: 2px; background: #000000; margin: 8px 0; }

    .drop-share-btn {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      font-size: 11px;
    }

    /* =====================
       CENTER FEED
       ===================== */
    .feed-center {
      flex: 1;
      min-width: 0;
      max-width: 580px;
    }

    /* Feed Tabs */
    .feed-tabs {
      display: flex;
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 3px solid #000000;
      border-radius: 0px !important;
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.1), inset 0 -3px 0 rgba(0,0,0,0.2);
    }
    .feed-tab-btn {
      flex: 1;
      padding: 12px;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-2);
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
      border-bottom: 3px solid transparent;
    }
    .feed-tab-btn:hover { color: #000000; background: var(--bg-card2); }
    .feed-tab-btn.active {
      color: #000000 !important;
      background: var(--accent) !important;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.4), inset 0 -4px 0 rgba(0,0,0,0.4) !important;
      border-bottom: 3px solid #000000 !important;
    }

    /* New Drop Pill */
    .new-drops-pill {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--accent) !important;
      color: #000 !important;
      font-size: 11px;
      font-weight: 900;
      border-radius: 0px !important;
      border: 2px solid #000000 !important;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.4), inset 0 -3px 0 rgba(0,0,0,0.4) !important;
      padding: 8px 20px;
      cursor: pointer;
      margin: 0 auto 12px;
      width: fit-content;
      animation: pill-bounce 0.5s ease;
      transition: transform 0.2s ease;
      position: relative;
      z-index: 10;
    }
    .new-drops-pill:hover { transform: scale(1.05); }
    .new-drops-pill.visible { display: flex; }
    @keyframes pill-bounce {
      0% { transform: translateY(-10px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    /* =====================
       DROP COMPOSER
       ===================== */
    .composer-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 3px solid #000000;
      border-radius: 0px !important;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.06), inset 0 -3px 0 rgba(0,0,0,0.4), 0px 0px 0px #000000;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.2s;
    }
    .composer-card:hover {
      transform: translate(-5px, -5px);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.06), inset 0 -3px 0 rgba(0,0,0,0.4), 5px 5px 0px #000000;
    }
    .composer-card:focus-within { border-color: #000000 !important; }

    .composer-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .composer-avatar,
    .drop-avatar,
    .suggest-avatar,
    .comment-avatar,
    .nav-avatar img,
    .suggest-avatar-ph {
      border-radius: 0px !important;
      border: 2px solid #000000 !important;
    }
    .composer-avatar-placeholder {
      width: 40px;
      height: 40px;
      border-radius: 0px !important;
      background: var(--border-thin);
      border: 2px solid #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      color: var(--text-2);
      flex-shrink: 0;
    }
    .composer-body { flex: 1; min-width: 0; }

    .composer-textarea {
      width: 100%;
      background: var(--bg-card2);
      border: 2px solid #000000;
      box-shadow: inset 2px 2px 0 rgba(0,0,0,0.15);
      color: var(--text-1);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      min-height: 80px;
      padding: 10px;
      line-height: 1.5;
    }
    .composer-textarea::placeholder { color: var(--text-dim); }
    .composer-textarea:focus {
      border-color: #000000 !important;
      background: #2c2c2c;
      outline: none;
    }

    .composer-image-preview {
      position: relative;
      margin-top: 8px;
      display: none;
      border: 2px solid #000000;
    }
    .composer-image-preview.visible { display: block; }
    .composer-image-preview img {
      width: 100%;
      border-radius: 0px !important;
      max-height: 300px;
      object-fit: cover;
    }
    .composer-image-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      background: rgba(0,0,0,0.7);
      border: 2px solid #000000;
      border-radius: 0px !important;
      color: var(--text-1);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .composer-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 2px solid #000000;
    }
    .composer-actions { display: flex; gap: 8px; align-items: center; }
    .composer-action-btn {
      width: 32px;
      height: 32px;
      background: #313136 !important;
      border: 2px solid #000000 !important;
      border-radius: 0px !important;
      box-shadow: inset 0 2px 0 #4c4c54, inset 0 -3px 0 #18181b !important;
      color: var(--text-2);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.1s ease;
    }
    .composer-action-btn:hover { color: var(--accent); border-color: #000000 !important; background: #3e3e44 !important; }

    .composer-char-counter {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-3);
    }
    .composer-char-counter.warn { color: #ff8800; }
    .composer-char-counter.danger { color: var(--red); }

    .composer-right { display: flex; align-items: center; gap: 10px; }

    /* Login prompt overlay on composer */
    .composer-login-overlay {
      position: relative;
      overflow: hidden;
      border-radius: 0px !important;
      border: 3px solid #000000;
    }
    .composer-login-blur {
      filter: blur(3px);
      pointer-events: none;
      user-select: none;
    }
    .composer-login-cta {
      position: absolute;
      inset: 0;
      background: rgba(5,5,5,0.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 0px !important;
    }
    .composer-login-cta-text {
      font-size: 13px;
      font-weight: 800;
      color: var(--text-1);
    }

    /* =====================
       DROP CARDS
       ===================== */
    .drop-feed { display: flex; flex-direction: column; gap: 1px; }

    .drop-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 3px solid #000000 !important;
      border-radius: 0px !important;
      margin-bottom: 12px;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.06), inset 0 -3px 0 rgba(0,0,0,0.4), 0px 0px 0px #000000;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      animation: drop-in 0.3s ease;
      overflow: hidden;
    }
    .drop-card:hover {
      transform: translate(-5px, -5px);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.06), inset 0 -3px 0 rgba(0,0,0,0.4), 5px 5px 0px #000000;
    }
    @keyframes drop-in {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .drop-card.new-drop { animation: drop-new 0.5s ease; border-color: #000000 !important; }
    @keyframes drop-new {
      0% { opacity: 0; transform: translateY(-16px); box-shadow: 0 0 0 3px rgba(57,255,20,0.3); }
      60% { box-shadow: 0 0 20px rgba(57,255,20,0.2); }
      100% { opacity: 1; transform: translateY(0); box-shadow: none; }
    }

    .drop-card-inner { padding: 16px; }

    /* Drop header */
    .drop-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }
    .drop-avatar-wrap { position: relative; flex-shrink: 0; cursor: pointer; }
    .drop-avatar-placeholder {
      width: 40px;
      height: 40px;
      border-radius: 0px !important;
      border: 2px solid #000000;
      background: var(--border-thin);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      color: var(--text-2);
      cursor: pointer;
    }

    .drop-meta { flex: 1; min-width: 0; }
    .drop-nick-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .drop-nick {
      font-size: 13px;
      font-weight: 900;
      color: var(--text-1);
      cursor: pointer;
      text-decoration: none;
    }
    .drop-nick:hover { color: var(--accent); }
    .drop-verify { width: 14px; height: 14px; flex-shrink: 0; }
    .drop-time {
      font-size: 11px;
      color: var(--text-3);
      margin-left: auto;
      white-space: nowrap;
    }

    .drop-more-btn {
      width: 28px;
      height: 28px;
      background: none;
      border: 2px solid transparent;
      border-radius: 0px !important;
      color: var(--text-3);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .drop-more-btn:hover { background: var(--border-thin); border-color: #000000; color: var(--text-1); }

    /* Drop content */
    .drop-content {
      font-size: 14px;
      color: var(--text-1);
      line-height: 1.6;
      word-break: break-word;
    }
    .drop-content-collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .drop-readmore {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      cursor: pointer;
      margin-top: 4px;
      display: inline-block;
    }
    .drop-readmore:hover { text-decoration: underline; }

    .drop-image {
      width: 100%;
      border-radius: 0px !important;
      border: 2px solid #000000;
      margin-top: 10px;
      max-height: 400px;
      object-fit: cover;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .drop-image:hover { opacity: 0.9; }

    /* Drop actions */
    .drop-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 2px solid #000000;
    }
    .drop-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 0px !important;
      border: 2px solid #000000 !important;
      background: #313136;
      box-shadow: inset 0 2px 0 #4c4c54, inset 0 -3px 0 #18181b;
      font-size: 11px;
      font-weight: 900;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.1s ease;
    }
    .drop-action-btn:hover { background: #3e3e44; color: var(--text-1); }
    .drop-action-btn.liked {
      background: rgba(255,26,60,0.1);
      border-color: #ff1a3c !important;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.1), inset 0 -3px 0 rgba(255,26,60,0.3);
      color: #ff1a3c;
    }
    .drop-action-btn.liked:hover { background: rgba(255,26,60,0.15); }
    .drop-action-btn.comment-active {
      background: rgba(0,212,255,0.1);
      border-color: #00d4ff !important;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.1), inset 0 -3px 0 rgba(0,212,255,0.3);
      color: #00d4ff;
    }
    .drop-action-icon { font-size: 15px; }

    /* =====================
       COMMENTS
       ===================== */
    .drop-comments {
      background: var(--bg-card2);
      border-top: 3px solid #000000;
      padding: 12px 16px;
      display: none;
    }
    .drop-comments.open { display: block; }

    .comment-item {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      animation: comment-in 0.2s ease;
    }
    @keyframes comment-in {
      from { opacity: 0; transform: translateX(-6px); }
      to { opacity: 1; transform: none; }
    }

    .comment-avatar-placeholder {
      width: 28px;
      height: 28px;
      border-radius: 0px !important;
      border: 2px solid #000000;
      background: var(--border-thin);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 900;
      color: var(--text-2);
      flex-shrink: 0;
    }

    .comment-body {
      flex: 1;
      background: var(--bg-card2);
      border: 2px solid #000000;
      border-radius: 0px !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -2px 0 rgba(0,0,0,0.05);
      padding: 8px 12px;
    }
    .comment-nick {
      font-size: 11px;
      font-weight: 900;
      color: var(--text-2);
      margin-bottom: 2px;
    }
    .comment-text {
      font-size: 12px;
      color: var(--text-1);
      line-height: 1.4;
      word-break: break-word;
    }
    .comment-like-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-3);
      background: none;
      border: none;
      cursor: pointer;
      margin-top: 4px;
      padding: 0;
      transition: color 0.2s;
    }
    .comment-like-btn:hover { color: var(--red); }
    .comment-like-btn.liked { color: var(--red); }

    .comment-see-all {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      cursor: pointer;
      margin-bottom: 10px;
      display: block;
    }
    .comment-see-all:hover { text-decoration: underline; }

    .comment-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }
    .comment-input {
      flex: 1;
      background: var(--bg-card);
      border: 2px solid #000000;
      border-radius: 0px !important;
      box-shadow: inset 2px 2px 0 rgba(0,0,0,0.15);
      color: var(--text-1);
      font-family: var(--font);
      font-size: 12px;
      padding: 8px 14px;
      transition: border-color 0.2s;
    }
    .comment-input:focus { border-color: #000000 !important; background: #2c2c2c; outline: none; }
    .comment-input::placeholder { color: var(--text-dim); }

    .comment-send-btn {
      width: 32px;
      height: 32px;
      background: var(--accent) !important;
      border: 2px solid #000000 !important;
      border-radius: 0px !important;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.4), inset 0 -3px 0 rgba(0,0,0,0.4) !important;
      color: #000 !important;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.1s;
      flex-shrink: 0;
    }
    .comment-send-btn:hover { background: #5fff4a !important; transform: translateY(-1px); }
    .comment-send-btn:active { transform: translateY(1px); box-shadow: inset 0 2px 0 rgba(0,0,0,0.4), inset 0 -1px 0 rgba(0,0,0,0.2) !important; }

    /* =====================
       LOAD MORE BUTTON
       ===================== */
    .load-more-btn {
      width: 100%;
      padding: 14px;
      margin-top: 4px;
      background: var(--bg-card);
      border: 1px solid var(--border-thin);
      border-radius: var(--radius);
      color: var(--text-2);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .load-more-btn:hover { background: var(--border-thin); color: var(--text-1); border-color: var(--border); }

    /* =====================
       RIGHT SIDEBAR
       ===================== */
    .right-sidebar {
      width: 300px;
      flex-shrink: 0;
      position: sticky;
      top: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sidebar-box {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 3px solid #000000;
      border-radius: 0px !important;
      overflow: hidden;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.06), inset 0 -3px 0 rgba(0,0,0,0.4), 0px 0px 0px #000000;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .sidebar-box:hover {
      transform: translate(-5px, -5px);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.06), inset 0 -3px 0 rgba(0,0,0,0.4), 5px 5px 0px #000000;
    }
    .sidebar-box-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 3px solid #000000;
      background: linear-gradient(90deg, rgba(0, 212, 255, 0.15), transparent);
    }
    .sidebar-box-title {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-2);
    }
    .sidebar-box-link {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
    }
    .sidebar-box-link:hover { text-decoration: underline; }

    /* Suggested Users */
    .suggest-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-thin);
      transition: background 0.2s;
    }
    .suggest-item:hover { background: rgba(255,255,255,0.02); }
    .suggest-avatar-ph {
      width: 36px;
      height: 36px;
      border-radius: 0px !important;
      border: 2px solid #000000;
      background: var(--border-thin);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 900;
      color: var(--text-2);
      flex-shrink: 0;
    }
    .suggest-info { flex: 1; min-width: 0; }
    .suggest-nick {
      font-size: 12px;
      font-weight: 900;
      color: var(--text-1);
      truncate: true;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .suggest-follow-btn {
      font-size: 10px;
      font-weight: 900;
      padding: 5px 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Server Status */
    .server-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      transition: background 0.2s;
      border-bottom: 2px solid #000000;
    }
    .server-item:last-child { border-bottom: none; }
    .server-item:hover { background: rgba(255,255,255,0.02); }
    .server-logo {
      width: 36px;
      height: 36px;
      border-radius: 0px !important;
      border: 2px solid #000000 !important;
      object-fit: cover;
      background: var(--border-thin);
      flex-shrink: 0;
    }
    .server-info { flex: 1; min-width: 0; }
    .server-name { font-size: 12px; font-weight: 900; color: var(--text-1); }
    .server-players { font-size: 10px; color: var(--text-3); display: flex; align-items: center; gap: 4px; }
    .server-online-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .server-online-dot.offline { background: var(--text-dim); }

    /* Featured Listings */
    .ilan-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      transition: background 0.2s;
      border-bottom: 1px solid #1a1a24;
      cursor: pointer;
    }
    .ilan-item:last-child { border-bottom: none; }
    .ilan-item:hover { background: rgba(255,255,255,0.02); }
    .ilan-icon {
      width: 36px;
      height: 36px;
      border-radius: 0px !important;
      border: 2px solid #000000 !important;
      background: rgba(57,255,20,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .ilan-info { flex: 1; min-width: 0; }
    .ilan-title { font-size: 12px; font-weight: 900; color: var(--text-1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ilan-price { font-size: 11px; font-weight: 900; color: var(--accent); }

    /* =====================
       IMAGE ZOOM MODAL
       ===================== */
    .img-zoom-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      cursor: zoom-out;
    }
    .img-zoom-overlay img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 0px !important;
      border: 3px solid #000000;
      object-fit: contain;
    }

    /* =====================
       FOLLOWING EMPTY
       ===================== */
    .following-empty {
      background: var(--bg-card);
      border: 3px solid #000000;
      border-radius: 0px !important;
      box-shadow: inset 0 3px 0 #3e3e46, inset 0 -6px 0 #111114;
      padding: 40px 20px;
      text-align: center;
      display: none;
    }
    .following-empty.visible { display: block; }

    /* =====================
       LOADING STATE
       ===================== */
    .feed-loading {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .skeleton-card {
      background: var(--bg-card);
      border: 3px solid #000000;
      border-radius: 0px !important;
      box-shadow: inset 0 3px 0 #3e3e46, inset 0 -6px 0 #111114;
      padding: 16px;
      animation: skeleton-pulse 1.4s ease-in-out infinite;
    }
    .skeleton-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .skeleton-circle { border-radius: 0px !important; border: 2px solid #000000; background: var(--border-thin); flex-shrink: 0; }
    .skeleton-line { background: var(--border-thin); border-radius: 0px !important; height: 10px; }
    @keyframes skeleton-pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    /* =====================
       MOBILE BOTTOM NAV
       ===================== */
    .mobile-bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(5,5,5,0.96);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border-thin);
      z-index: 1000;
      align-items: stretch;
    }
    .mobile-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      color: var(--text-3);
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s;
    }
    .mobile-nav-item:hover, .mobile-nav-item.active { color: var(--accent); }
    .mobile-nav-icon { font-size: 20px; }
    .mobile-nav-drop {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #000;
      margin-top: -16px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }
    .mobile-nav-drop:hover { transform: scale(1.1); background: #5fff4a; }

    /* =====================
       RESPONSIVE
       ===================== */
    @media (max-width: 1100px) {
      .right-sidebar { display: none; }
      .feed-center { max-width: 680px; }
    }
    @media (max-width: 780px) {
      .left-sidebar { display: none; }
      .mobile-bottom-nav { display: flex; }
      .main-layout { padding-bottom: 80px; }
    }
    @media (max-width: 580px) {
      .main-layout { padding: calc(var(--nav-h) + 12px) 8px 80px; }
      .feed-center { max-width: 100%; }
    }

    /* =====================
       OVAL CORNERS UPGRADE (6px border-radius)
       ===================== */
    .sidebar-nav-item,
    .lcoin-card,
    .feed-tabs,
    .new-drops-pill,
    .composer-card,
    .composer-avatar,
    .drop-avatar,
    .suggest-avatar,
    .comment-avatar,
    .nav-avatar img,
    .suggest-avatar-ph,
    .composer-avatar-placeholder,
    .composer-image-preview,
    .composer-image-preview img,
    .composer-image-remove,
    .composer-action-btn,
    .composer-login-overlay,
    .composer-login-cta,
    .drop-card,
    .drop-avatar-placeholder,
    .drop-more-btn,
    .drop-image,
    .drop-action-btn,
    .comment-avatar-placeholder,
    .comment-body,
    .comment-input,
    .comment-send-btn,
    .sidebar-box,
    .server-logo,
    .nav-link,
    .nav-bell,
    .nav-lcoin,
    .nav-user,
    .nav-user img,
    .pp-img,
    .pp-wrap,
    .pp-wrap img,
    .drop-avatar-wrap img,
    .comment-item img,
    .suggest-item img,
    .sidebar-user-card img,
    .composer-row img,
    .following-empty,
    .skeleton-card,
    .skeleton-circle,
    .suggest-follow-btn,
    .btn,
    .mc-btn,
    .mc-btn,
    button,
    .load-more-btn {
      border-radius: 6px !important;
    }

    /* Minecraft Title Shadows */
    .sidebar-box-title {
      font-size: 11px !important;
      font-weight: 900 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.5px !important;
      color: #ffffff !important;
      text-shadow: 2px 2px 0px #000000 !important;
    }

    /* Sidebar Box Header Accents */
    .sidebar-box-header.header-social {
      background: linear-gradient(90deg, rgba(88, 101, 242, 0.25), transparent) !important;
      border-bottom: 3px solid #000000 !important;
    }
    .sidebar-box-header.header-server {
      background: linear-gradient(90deg, rgba(0, 212, 255, 0.25), transparent) !important;
      border-bottom: 3px solid #000000 !important;
    }
    .sidebar-box-header.header-market {
      background: linear-gradient(90deg, rgba(255, 215, 0, 0.25), transparent) !important;
      border-bottom: 3px solid #000000 !important;
    }

    /* Glow Effects on Hover / Cards */
    .sidebar-box, .composer-card, .drop-card, .feed-tabs {
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.06), inset 0 -3px 0 rgba(0,0,0,0.4), 0px 4px 15px rgba(0, 212, 255, 0.08) !important;
    }
    .sidebar-box:hover, .composer-card:hover, .drop-card:hover {
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.06), inset 0 -3px 0 rgba(0,0,0,0.4), 5px 5px 0px #000000, 0px 0px 20px rgba(0, 212, 255, 0.15) !important;
    }
    
    .nav-link:hover, .nav-bell:hover, .nav-lcoin:hover, .nav-user:hover {
      box-shadow: 4px 4px 0px #000000, 0px 0px 15px rgba(255, 209, 59, 0.45) !important;
    }

    /* High-contrast Vibrant User Role Badges */
    .badge {
      border: 1.5px solid #000000 !important;
      box-shadow: 1.5px 1.5px 0px #000000 !important;
      text-shadow: none !important;
      font-size: 8px !important;
      padding: 3px 8px !important;
      font-weight: 900 !important;
      border-radius: 4px !important;
    }
    .b-uye {
      background: rgba(255, 255, 255, 0.15) !important;
      color: #ffffff !important;
    }
    .b-abone {
      background: #39ff14 !important;
      color: #000000 !important;
    }
    .b-premium {
      background: #ffd700 !important;
      color: #000000 !important;
    }
    .b-admin {
      background: #b933ff !important;
      color: #ffffff !important;
    }
    .b-yonetici {
      background: #ff1a3c !important;
      color: #ffffff !important;
    }
    .b-rehber {
      background: #3c8527 !important;
      color: #ffffff !important;
    }
    .b-moderator {
      background: #00d4ff !important;
      color: #000000 !important;
    }
    .b-kurucu {
      background: linear-gradient(135deg, #ffd700, #ff8800) !important;
      color: #000000 !important;
      box-shadow: 1.5px 1.5px 0px #000000, 0px 0px 10px rgba(255, 215, 0, 0.4) !important;
    }

    /* Sidebar User Card (Twitter Style) */
    .sidebar-user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg-card) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 2px solid #000000;
      border-radius: 6px !important;
      box-shadow: 2px 2px 0px #000000;
      margin-top: auto;
      cursor: pointer;
      transition: all 0.1s ease;
    }
    .sidebar-user-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0px #000000;
    }
    .sidebar-settings-btn {
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .sidebar-settings-btn:hover {
      color: #ffffff;
      background: rgba(255,255,255,0.05);
    }

    /* =====================
       DETAIL VIEW (SPA)
       ===================== */
    .detail-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .detail-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 14px;
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 3px solid #000000;
      border-radius: 6px !important;
      box-shadow: 3px 3px 0px #000000;
      margin-bottom: 4px;
    }
    .detail-header .back-btn {
      border-radius: 6px !important;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      padding: 0;
      cursor: pointer;
      line-height: 1;
    }
    .detail-container .drop-card {
      border: 3px solid #000000 !important;
      box-shadow: 4px 4px 0px #000000 !important;
      margin-bottom: 0px !important;
    }
    .detail-container .drop-comments {
      display: block !important;
      border-top: 3px solid #000000 !important;
      background: var(--bg-card2) !important;
    }
    .detail-container .comment-input-row {
      border-bottom: 2px solid #000000;
      padding-bottom: 12px;
      margin-bottom: 12px;
    }

    /* =============================================
       COMMENT DETAIL VIEW (Twitter/X style)
       ============================================= */
    .comment-detail-container {
      display: none;
      flex-direction: column;
      gap: 0;
    }
    .comment-detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0 16px;
      border-bottom: 2px solid #000;
      margin-bottom: 0;
    }
    /* The focused comment shown big at top */
    .comment-detail-focus {
      background: var(--bg-card);
      border: 3px solid #000;
      box-shadow: 4px 4px 0 #000;
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 0;
    }
    .comment-detail-focus .cdf-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .comment-detail-focus .cdf-nick {
      font-size: 14px;
      font-weight: 900;
      color: var(--text-1);
      cursor: pointer;
    }
    .comment-detail-focus .cdf-nick:hover { color: var(--accent); }
    .comment-detail-focus .cdf-time {
      font-size: 10px;
      color: var(--text-dim);
      margin-left: auto;
    }
    .comment-detail-focus .cdf-text {
      font-size: 15px;
      color: var(--text-1);
      line-height: 1.6;
      word-break: break-word;
      margin-bottom: 12px;
    }
    .comment-detail-focus .cdf-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 10px;
      border-top: 1px solid var(--border-thin);
    }
    /* Separator between focused comment and replies */
    .replies-section-label {
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      padding: 10px 0 6px;
      border-bottom: 1px solid var(--border-thin);
      margin-bottom: 0;
    }
    /* Reply count badge on comment items */
    .comment-reply-count {
      font-size: 9px;
      font-weight: 800;
      color: var(--blue);
      display: flex;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .comment-reply-count:hover { color: var(--accent); }
    /* Make comment items look clickable */
    .comment-item.has-replies {
      cursor: pointer;
    }
    .comment-item.has-replies:hover .comment-body {
      background: rgba(57,255,20,0.03);
    }
    /* Reply input row in comment detail */
    .comment-detail-replies {
      background: rgba(0,0,0,0.15);
      border-top: 2px solid #000;
      padding: 12px 14px;
    }

// =============================================
// CANVAS ANIMATION
// =============================================
(function initCanvas() {
  const canvas = document.getElementById('canvas-bg');
  const ctx = canvas.getContext('2d');
  let w, h;
  const beams = [];
  const logos = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const particles = [];
  for (let i = 0; i < 35; i++) {
    particles.push({
      x: Math.random() * 1600,
      y: Math.random() * 1200,
      size: Math.random() * 3 + 2,
      speedY: -(Math.random() * 0.35 + 0.15),
      speedX: (Math.random() - 0.5) * 0.1,
      color: Math.random() > 0.6 ? '#ffd13b' : '#3c8527',
      opacity: Math.random() * 0.5 + 0.15
    });
  }

  const logoImg = new Image();
  logoImg.src = 'logo.png';
  for (let i = 0; i < 8; i++) {
    logos.push({
      x: Math.random() * 1600 - 100,
      y: Math.random() * 1200 - 100,
      size: Math.random() * 50 + 30,
      speedX: (Math.random() - 0.5) * 0.2,
      speedY: (Math.random() - 0.5) * 0.1,
      opacity: Math.random() * 0.04 + 0.02
    });
  }

  function animate() {
    ctx.clearRect(0, 0, w, h);

    // Draw floating Minecraft experience pixel particles
    particles.forEach(p => {
      p.y += p.speedY;
      p.x += p.speedX;
      if (p.y < -20) {
        p.y = h + 20;
        p.x = Math.random() * w;
      }
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.opacity;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    });

    logos.forEach(l => {
      l.x += l.speedX;
      l.y += l.speedY;
      if (l.x > w + 100) l.x = -100;
      if (l.x < -100) l.x = w + 100;
      if (l.y > h + 100) l.y = -100;
      if (l.y < -100) l.y = h + 100;

      if (logoImg.complete) {
        ctx.save();
        ctx.globalAlpha = l.opacity;
        ctx.drawImage(logoImg, l.x - l.size / 2, l.y - l.size / 2, l.size, l.size);
        ctx.restore();
      }
    });

    requestAnimationFrame(animate);
  }
  animate();
})();

// =============================================
// TIME RELATIVE
// =============================================
function relativeTime(dateStr) {
  const now = new Date();
  const date = new Date(dateStr);
  const diff = Math.floor((now - date) / 1000);
  if (diff < 60) return `${diff}s önce`;
  if (diff < 3600) return `${Math.floor(diff / 60)}dk önce`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}sa önce`;
  if (diff < 604800) return `${Math.floor(diff / 86400)}g önce`;
  return date.toLocaleDateString('tr-TR');
}

async function openServerDetailModal(srv, initialFavCount = 0) {
  const modalWrap = document.createElement('div');
  modalWrap.className = 'modal-overlay';
  modalWrap.id = 'server-detail-modal';
  
  modalWrap.addEventListener('click', (e) => {
    if (e.target === modalWrap) modalWrap.remove();
  });

  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.style.maxWidth = '400px';

  const header = document.createElement('div');
  header.className = 'modal-header';
  const title = document.createElement('div');
  title.className = 'modal-title';
  title.textContent = srv.name + ' - Sunucu Profili';
  const closeBtn = document.createElement('button');
  closeBtn.className = 'modal-close';
  closeBtn.textContent = '×';
  closeBtn.addEventListener('click', () => modalWrap.remove());
  header.appendChild(title);
  header.appendChild(closeBtn);
  modal.appendChild(header);

  const body = document.createElement('div');
  body.className = 'modal-body';
  body.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;color:var(--text-2);';

  const logo = document.createElement('img');
  logo.src = `https://api.mcsrvstat.us/icon/${srv.ip}`;
  logo.alt = srv.name;
  logo.style.cssText = 'width:64px;height:64px;border-radius:12px;border:2px solid var(--border);background:#1a1a1a;';
  logo.onerror = () => { logo.src = 'logo.png'; };

  const nameEl = document.createElement('div');
  nameEl.style.cssText = 'font-size:20px;font-weight:900;color:var(--text-1);text-transform:uppercase;';
  nameEl.textContent = srv.name;

  const ipWrap = document.createElement('div');
  ipWrap.style.cssText = 'display:flex;align-items:center;gap:8px;background:var(--border-thin);padding:8px 12px;border-radius:6px;border:1px solid var(--border);width:100%;justify-content:center;';
  const ipText = document.createElement('span');
  ipText.style.cssText = 'font-size:12px;font-weight:700;color:var(--text-2);font-family:monospace;';
  ipText.textContent = srv.ip;
  const copyBtn = document.createElement('button');
  copyBtn.className = 'btn mc-blue mc-sm';
  copyBtn.textContent = 'Kopyala';
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(srv.ip).then(() => showToast('IP Kopyalandı!', 'success'));
  });
  ipWrap.appendChild(ipText);
  ipWrap.appendChild(copyBtn);

  const statsBox = document.createElement('div');
  statsBox.style.cssText = 'width:100%;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;';

  const statPlayers = document.createElement('div');
  statPlayers.style.cssText = 'background:rgba(255,255,255,0.02);border:1px solid var(--border-thin);padding:10px;border-radius:6px;';
  const statPlayersLabel = document.createElement('div');
  statPlayersLabel.style.cssText = 'font-size:9px;font-weight:800;color:var(--text-3);text-transform:uppercase;';
  statPlayersLabel.textContent = 'Aktif Oyuncu';
  const statPlayersVal = document.createElement('div');
  statPlayersVal.style.cssText = 'font-size:14px;font-weight:900;color:var(--accent);margin-top:4px;';
  statPlayersVal.textContent = 'Yükleniyor...';
  statPlayers.appendChild(statPlayersLabel);
  statPlayers.appendChild(statPlayersVal);

  const statFavs = document.createElement('div');
  statFavs.style.cssText = 'background:rgba(255,255,255,0.02);border:1px solid var(--border-thin);padding:10px;border-radius:6px;';
  const statFavsLabel = document.createElement('div');
  statFavsLabel.style.cssText = 'font-size:9px;font-weight:800;color:var(--text-3);text-transform:uppercase;';
  statFavsLabel.textContent = 'Sitedeki Favori';
  const statFavsVal = document.createElement('div');
  statFavsVal.style.cssText = 'font-size:14px;font-weight:900;color:var(--gold);margin-top:4px;';
  statFavsVal.textContent = initialFavCount + ' kişi';
  statFavs.appendChild(statFavsLabel);
  statFavs.appendChild(statFavsVal);

  statsBox.appendChild(statPlayers);
  statsBox.appendChild(statFavs);

  // Favorite button
  const favBtn = document.createElement('button');
  favBtn.style.width = '100%';
  
  const isFav = currentProfile && Array.isArray(currentProfile.favori_sunucular) && currentProfile.favori_sunucular.includes(srv.ip);
  if (isFav) {
    favBtn.className = 'btn mc-gold mc-lg';
    favBtn.textContent = '★ Favorilerden Çıkar';
  } else {
    favBtn.className = 'btn mc-gray mc-lg';
    favBtn.textContent = '☆ Favorilere Ekle';
  }

  favBtn.addEventListener('click', async () => {
    if (!currentUser) { showToast('Favorilemek için giriş yapmalısın!', 'error'); return; }
    favBtn.disabled = true;
    let list = Array.isArray(currentProfile.favori_sunucular) ? [...currentProfile.favori_sunucular] : [];
    const idx = list.indexOf(srv.ip);
    if (idx > -1) {
      list.splice(idx, 1);
      favBtn.className = 'btn mc-gray mc-lg';
      favBtn.textContent = '☆ Favorilere Ekle';
      showToast('Favorilerden çıkarıldı.', 'info');
    } else {
      if (list.length >= 8) {
        showToast('En fazla 8 sunucu favorileyebilirsin!', 'error');
        favBtn.disabled = false;
        return;
      }
      list.push(srv.ip);
      favBtn.className = 'btn mc-gold mc-lg';
      favBtn.textContent = '★ Favorilerden Çıkar';
      showToast('Favorilere eklendi! ★', 'success');
    }
    currentProfile.favori_sunucular = list;
    const { error } = await sb.from('kullanicilar').update({ favori_sunucular: list }).eq('id', currentUser.id);
    if (error) {
      showToast('Güncellenemedi: ' + error.message, 'error');
    } else {
      await updateFavCount();
      // Refresh the sidebar fav counts
      buildRightSidebar();
    }
    favBtn.disabled = false;
  });

  body.appendChild(logo);
  body.appendChild(nameEl);
  body.appendChild(ipWrap);
  body.appendChild(statsBox);
  body.appendChild(favBtn);

  modal.appendChild(body);
  modalWrap.appendChild(modal);
  document.body.appendChild(modalWrap);

  // Fetch online count
  fetch(`https://api.mcsrvstat.us/2/${srv.ip}`)
    .then(r => r.json())
    .then(d => {
      if (d.online) {
        statPlayersVal.textContent = `${d.players?.online || 0} / ${d.players?.max || 0}`;
      } else {
        statPlayersVal.textContent = 'Çevrimdışı';
      }
    })
    .catch(() => {
      statPlayersVal.textContent = 'Bilinmiyor';
    });

  // Fetch fav count - handle both native array and JSON string formats
  async function updateFavCount() {
    try {
      const { data: usersWithFav, error } = await sb.from('kullanicilar').select('favori_sunucular');
      if (error) { statFavsVal.textContent = '? kişi'; return; }
      let count = 0;
      if (usersWithFav) {
        usersWithFav.forEach(u => {
          let favs = u.favori_sunucular;
          // Handle JSON string format
          if (typeof favs === 'string') {
            try { favs = JSON.parse(favs); } catch(e) { favs = []; }
          }
          if (Array.isArray(favs) && favs.includes(srv.ip)) {
            count++;
          }
        });
      }
      statFavsVal.textContent = count + ' kişi';
    } catch (e) {
      statFavsVal.textContent = '0 kişi';
    }
  }
  updateFavCount();
}

      cat.textContent = u.kategori || 'Oyuncu';

      info.appendChild(nickRow);
      info.appendChild(cat);

      const followBtn = document.createElement('button');
      followBtn.className = 'btn mc-green mc-sm suggest-follow-btn';
      followBtn.textContent = followedUsers.has(u.id) ? '✓ Takip' : 'Takip Et';
      if (followedUsers.has(u.id)) followBtn.classList.replace('mc-green', 'mc-gray');

      followBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!currentUser) { showToast('Takip etmek için giriş yap!', 'error'); return; }

      item.appendChild(followBtn);

    });
  } catch (e) {}

  sidebar.appendChild(followBox);

  // === SERVER STATUS ===
  const serverBox = document.createElement('div');
  serverBox.className = 'sidebar-box';

  const serverHeader = document.createElement('div');
  serverHeader.className = 'sidebar-box-header header-server';
  const serverTitle = document.createElement('div');
  serverTitle.className = 'sidebar-box-title';
  serverTitle.textContent = '🌐 Sunucu Durumu';
  serverHeader.appendChild(serverTitle);
  serverBox.appendChild(serverHeader);

  // Fetch all favs to sort
  let serverFavCount = {};
  SERVERS.forEach(s => serverFavCount[s.ip] = 0);
  try {
    const { data: usersWithFav } = await sb.from('kullanicilar').select('favori_sunucular');
    if (usersWithFav) {
      usersWithFav.forEach(u => {
        let favs = u.favori_sunucular;
        if (typeof favs === 'string') {

        if (Array.isArray(favs)) {
          favs.forEach(ip => {
            if (serverFavCount[ip] !== undefined) serverFavCount[ip]++;
            else serverFavCount[ip] = 1; // Count even unknown servers
          });
        }
      });
    }
  } catch (e) {}

  let sortedServers = [...SERVERS].sort((a, b) => serverFavCount[b.ip] - serverFavCount[a.ip]);

  ilanHeader.className = 'sidebar-box-header header-market';

  ilanLink.textContent = 'Tümü →';
  ilanHeader.appendChild(ilanTitle);
  ilanHeader.appendChild(ilanLink);
  ilanBox.appendChild(ilanHeader);

          .in('durum', ['onaylandi', 'aktif'])

        const { data, error } = await sb.from('ilanlar')
          .select('id, baslik, kategori, fiyat, one_cikan, banner_url, durum')

    if (!ilanlar || ilanlar.length === 0) {
      try {
        const local = localStorage.getItem('lobby_ilanlar');
        if (local) {
          const arr = JSON.parse(local);
          const activeList = arr.filter(i => ['aktif', 'onaylandi'].includes(i.durum));
          let featured = activeList.filter(i => i.one_cikan === true);
          if (featured.length === 0) {
            featured = activeList;
          }
          ilanlar = featured;
        }
      } catch (localErr) {
        console.warn("localStorage fallback failed:", localErr);
      }
    }

    let sortedIlanlar = [];
    if (ilanlar && ilanlar.length > 0) {
      try {
        const orderList = await dbHelper.getFeaturedOrder();
        sortedIlanlar = [...ilanlar];
        if (orderList && orderList.length > 0) {
          sortedIlanlar.sort((a, b) => {
            const idxA = orderList.indexOf(a.id);
            const idxB = orderList.indexOf(b.id);
            if (idxA === -1 && idxB === -1) return 0;
            if (idxA === -1) return 1;
            if (idxB === -1) return -1;
            return idxA - idxB;
          });
        }
      } catch(e) {
        sortedIlanlar = [...ilanlar];
      }
      sortedIlanlar = sortedIlanlar.slice(0, 5);
    }

    sortedIlanlar.forEach(ilan => {
      const item = document.createElement('div');
      item.style.cssText = 'position:relative;height:110px;margin:8px 12px;border-radius:10px;overflow:hidden;border:2px solid #000;box-shadow:3px 3px 0 #000;cursor:pointer;display:flex;flex-direction:column;justify-content:flex-end;transition:all 0.15s ease;background-color:var(--bg-card);';
      item.addEventListener('click', () => { window.location.href = `ilan-detay.html?id=${ilan.id}`; });

      // Hover card movement (neobrutalist 3D press feel)
      item.addEventListener('mouseenter', () => { 
        item.style.transform = 'translate(-2px, -2px)';
        item.style.boxShadow = '5px 5px 0 #000';
      });
      item.addEventListener('mouseleave', () => { 
        item.style.transform = 'translate(0, 0)';
        item.style.boxShadow = '3px 3px 0 #000';
      });

      // Banner background
      const bg = document.createElement('div');
      bg.style.cssText = 'position:absolute;inset:0;z-index:1;background-size:cover;background-position:center;transition:transform 0.35s ease;';
      if (ilan.banner_url) {
        bg.style.backgroundImage = `url('${ilan.banner_url}')`;
      } else {
        const gradients = {
          'PvP': 'linear-gradient(135deg, #3d0015, #1a0008)',
          'İçerik': 'linear-gradient(135deg, #2d0050, #140020)',
          'Developer': 'linear-gradient(135deg, #003040, #001a20)',
          'Builder': 'linear-gradient(135deg, #3d2800, #1a1000)'
        };
        bg.style.background = gradients[ilan.kategori] || 'linear-gradient(135deg, var(--bg-card), var(--bg-card2))';
      }
      item.appendChild(bg);

      // Dark overlay
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:absolute;inset:0;background:linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 70%);z-index:2;';
      item.appendChild(overlay);

      // Hover zoom for background
      item.addEventListener('mouseenter', () => { bg.style.transform = 'scale(1.06)'; });
      item.addEventListener('mouseleave', () => { bg.style.transform = 'scale(1)'; });

      // neobrutalist 3D "ÖNE ÇIKAN" gold badge
      if (ilan.one_cikan) {
        const ocBadge = document.createElement('div');
        ocBadge.style.cssText = 'position:absolute;top:8px;right:8px;z-index:4;font-size:7px;font-weight:900;color:#000;background:var(--accent);padding:3px 6px;border:1.5px solid #000;box-shadow:1px 1px 0 #000;text-transform:uppercase;letter-spacing:0.5px;font-family:inherit;';
        ocBadge.textContent = '⚡ ÖNE ÇIKAN';
        item.appendChild(ocBadge);
      }

      // Info
      const info = document.createElement('div');
      info.style.cssText = 'position:relative;z-index:3;padding:8px 10px;display:flex;flex-direction:column;gap:3px;';

      const catBadge = document.createElement('div');
      catBadge.style.cssText = 'font-size:8px;font-weight:900;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;';
      catBadge.textContent = ilan.kategori || 'İlan';

      const title = document.createElement('div');
      title.style.cssText = 'font-size:12px;font-weight:800;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
      title.textContent = ilan.baslik;

      const priceRow = document.createElement('div');
      priceRow.style.cssText = 'font-size:10px;font-weight:900;color:var(--gold);';
      priceRow.textContent = ilan.fiyat ? (typeof ilan.fiyat === 'number' ? `${ilan.fiyat} ₺` : ilan.fiyat) : 'Ücretsiz';

      info.appendChild(catBadge);
      info.appendChild(title);
      info.appendChild(priceRow);
      item.appendChild(info);
      ilanBox.appendChild(item);
    });

    if (sortedIlanlar.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'padding:16px;text-align:center;color:var(--text-dim);font-size:12px;';
      empty.textContent = 'Öne çıkan ilan yok';
      ilanBox.appendChild(empty);
    }
  } catch (e) {
    console.error("Error building featured listings in sidebar:", e);
  }

  sidebar.appendChild(ilanBox);
}

      previewImg.src = e.target.result;

  textarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      submitDrop(textarea, fileInput, imgPreview, previewImg);
    }
  });

  right.appendChild(sendBtn);
  footer.appendChild(right);
  card.appendChild(footer);
  container.appendChild(card);
}

// =============================================
// SUBMIT DROP
// =============================================
async function submitDrop(textarea, fileInput, imgPreview, previewImg) {
  const content = textarea.value.trim();
  if (!content && !fileInput.files[0]) {
    showToast('Bir şeyler yazman gerekiyor!', 'error');
    return;
  }
  if (content.length > 280) {
    showToast('Drop 280 karakteri geçemez!', 'error');
    return;
  }

  const sendBtn = document.querySelector('.composer-card .btn');
  if (sendBtn) { sendBtn.disabled = true; sendBtn.textContent = '⏳ Gönderiliyor...'; }

  try {
    let gorsel_url = null;

    // Upload image if exists
    if (fileInput.files[0]) {
      const file = fileInput.files[0];
      const ext = file.name.split('.').pop();
      const path = `drops/${currentUser.id}/${Date.now()}.${ext}`;
      const { data: uploadData, error: uploadErr } = await sb.storage
        .from('media')
        .upload(path, file);
      if (!uploadErr && uploadData) {
        const { data: { publicUrl } } = sb.storage.from('media').getPublicUrl(path);
        gorsel_url = publicUrl;
      }
    }

    const { data: newDrop, error } = await sb.from('droplar').insert({
      kullanici_id: currentUser.id,
      icerik: content || '',
      gorsel_url,
      begeni_sayisi: 0,
      yorum_sayisi: 0
    }).select().single();

    if (error) throw error;

    showToast('Drop başarıyla paylaşıldı! 🚀', 'success');

    // Reset composer
    textarea.value = '';
    imgPreview.classList.remove('visible');
    previewImg.src = '';
    fileInput.value = '';

    // Reload drops to sync feed
    await loadDrops(false);

  } catch (e) {
    console.error(e);
    showToast('Bir hata oluştu!', 'error');
  } finally {
    if (sendBtn) { sendBtn.disabled = false; sendBtn.textContent = '🚀 Gönder'; }
  }
}

// =============================================
// LOAD DROPS
// =============================================
async function loadDrops(append = false) {
  if (isLoadingDrops) return;
  isLoadingDrops = true;

  if (!append) {
    dropOffset = 0;
    hasMoreDrops = true;
    document.getElementById('drop-feed').innerHTML = '';
    buildSkeletons();
    document.getElementById('load-more-btn').style.display = 'none';
    document.getElementById('following-empty').classList.remove('visible');
  }

  try {
    let query = sb.from('droplar')
      .select('*')
      .order('created_at', { ascending: false })
      .range(dropOffset, dropOffset + DROP_LIMIT - 1);

    if (currentTab === 'klan') {
      if (!currentUser || !currentUser.klan_tag) {
        document.getElementById('feed-loading').innerHTML = '';
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = `
          <div class="empty-state-icon">🛡️</div>
          <div class="empty-state-title">Herhangi bir klana üye değilsin</div>
          <div class="empty-state-sub">Klan feed'ini görebilmek için bir klana katılmalı veya kendi klanını kurmalısın.</div>
          <button class="btn mc-green" style="margin-top:16px;" onclick="window.location.href='klanlar.html'">🛡️ Klanlara Göz At</button>
        `;
        document.getElementById('drop-feed').appendChild(empty);
        isLoadingDrops = false;
        return;
      }
      
      // Get clan members
      const { data: clanMembers } = await sb.from('kullanicilar').select('id').eq('klan_tag', currentUser.klan_tag);
      if (clanMembers && clanMembers.length > 0) {
        const clanMemberIds = clanMembers.map(m => m.id);
        query = query.in('kullanici_id', clanMemberIds);
      } else {
        query = query.eq('kullanici_id', currentUser.id); // fallback
      }
    } else if (currentTab === 'takip' && currentUser && followedUsers.size > 0) {
      query = query.in('kullanici_id', [...followedUsers]);
    } else if (currentTab === 'takip' && currentUser && followedUsers.size === 0) {
      // No follows yet
      document.getElementById('feed-loading').innerHTML = '';
      document.getElementById('following-empty').classList.add('visible');
      isLoadingDrops = false;
      return;
    }

    const { data: drops, error } = await query;
    if (error) throw error;

    if (drops && drops.length > 0) {
      const authorIds = [...new Set(drops.map(d => d.kullanici_id).filter(id => id !== null))];
      if (authorIds.length > 0) {
        const { data: authors, error: authorError } = await sb.from('kullanicilar')
          .select('id, kullanici_adi, avatar_url, abonelik, aktif_cerceve, dogrulama_rozeti')
          .in('id', authorIds);
        if (!authorError && authors) {
          const authorMap = {};
          authors.forEach(a => { authorMap[a.id] = a; });
          drops.forEach(d => {
            d.kullanicilar = authorMap[d.kullanici_id] || null;
          });
        }
      }
    }

    document.getElementById('feed-loading').innerHTML = '';
    document.getElementById('following-empty').classList.remove('visible');

    if (!drops || drops.length === 0) {
      if (!append) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = '';
        const icon = document.createElement('div');
        icon.className = 'empty-state-icon';
        icon.textContent = '🌐';
        const title = document.createElement('div');
        title.className = 'empty-state-title';
        title.textContent = 'Henüz drop yok';
        const sub = document.createElement('div');
        sub.className = 'empty-state-sub';
        sub.textContent = 'İlk dropu paylaşan sen ol!';
        empty.appendChild(icon);
        empty.appendChild(title);
        empty.appendChild(sub);
        document.getElementById('drop-feed').appendChild(empty);
      }
      hasMoreDrops = false;
    } else {
      const feed = document.getElementById('drop-feed');
      drops.forEach(drop => {
        const card = buildDropCard(drop);
        feed.appendChild(card);
      });
      dropOffset += drops.length;
      hasMoreDrops = drops.length === DROP_LIMIT;
    }

    document.getElementById('load-more-btn').style.display = hasMoreDrops ? 'block' : 'none';

    // Load liked state
    if (currentUser && drops && drops.length > 0) {
      const ids = drops.map(d => d.id);
      const { data: likes } = await sb.from('drop_begeniler')
        .select('drop_id')
        .eq('kullanici_id', currentUser.id)
        .in('drop_id', ids);
      (likes || []).forEach(l => {
        likedDrops.add(l.drop_id);
        const btn = document.querySelector(`[data-like-btn="${l.drop_id}"]`);
        if (btn) {
          btn.classList.add('liked');
          btn.querySelector('.like-icon').textContent = '❤️';
        }
      });
    }

  } catch (e) {
    console.error(e);
    document.getElementById('feed-loading').innerHTML = '';
    showToast('Droplar yüklenirken hata oluştu', 'error');
  } finally {
    isLoadingDrops = false;
  }
}
