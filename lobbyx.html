// =============================================
// BUILD DROP CARD
// =============================================
function buildDropCard(drop, isDetailView = false) {
  const user = drop.kullanicilar || {};
  const card = document.createElement('div');
  card.className = 'drop-card';
  card.dataset.dropId = drop.id;

  const inner = document.createElement('div');
  inner.className = 'drop-card-inner';

  // --- Header ---
  const header = document.createElement('div');
  header.className = 'drop-header';

  const avWrap = document.createElement('div');
  avWrap.className = 'drop-avatar-wrap';
  const av = createAvatar(user.avatar_url, user.kullanici_adi, 40);
  av.addEventListener('click', () => { window.location.href = `profil.html?id=${user.id}`; });
  avWrap.appendChild(av);
  header.appendChild(avWrap);

  const meta = document.createElement('div');
  meta.className = 'drop-meta';

  const nickRow = document.createElement('div');
  nickRow.className = 'drop-nick-row';

  const nick = document.createElement('a');
  nick.href = `profil.html?id=${user.id}`;
  nick.className = 'drop-nick';
  nick.textContent = user.kullanici_adi || 'Anonim';
  nickRow.appendChild(nick);

  if (user.dogrulama_rozeti) {
    const verify = document.createElement('img');
    verify.src = 'https://i.imgur.com/VDpHaPy.png';
    verify.alt = 'Doğrulanmış';
    verify.className = 'drop-verify';
    nickRow.appendChild(verify);
  }

  const badge = createBadge(user.abonelik);
  badge.style.fontSize = '8px';
  nickRow.appendChild(badge);

  const time = document.createElement('span');
  time.className = 'drop-time';
  let timeStr = relativeTime(drop.created_at);
  if (drop.is_edited) timeStr += ' (Düzenlendi)';
  time.textContent = timeStr;
  nickRow.appendChild(time);

  meta.appendChild(nickRow);
  header.appendChild(meta);

  // More button
  const moreBtn = document.createElement('button');
  moreBtn.className = 'drop-more-btn';
  moreBtn.textContent = '⋯';
  moreBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    showDropContextMenu(e, drop, card);
  });
  header.appendChild(moreBtn);

  inner.appendChild(header);

  // --- Content ---
  let isReDrop = false;
  let redropData = null;
  try {
    if (drop.icerik && drop.icerik.trim().startsWith('{') && drop.icerik.includes('"is_redrop"')) {
      redropData = JSON.parse(drop.icerik);
      if (redropData.is_redrop) {
        isReDrop = true;
      }
    }
  } catch (e) {}

  if (isReDrop && redropData) {
    // Show "ReDropladı" indicator
    const rdHeader = document.createElement('div');
    rdHeader.className = 'redrop-info-header';
    rdHeader.style.cssText = 'font-size:11px;color:var(--accent);font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:4px;';
    rdHeader.innerHTML = `🔁 <strong>${user.kullanici_adi || 'Anonim'}</strong> ReDropladı`;
    inner.appendChild(rdHeader);

    // Show quote comment if exists
    if (redropData.quote_comment) {
      const qc = document.createElement('div');
      qc.style.cssText = 'font-size:13px;color:var(--text-1);margin-bottom:10px;line-height:1.4;';
      qc.textContent = redropData.quote_comment;
      inner.appendChild(qc);
    }

    // Nested card container
    const nestedCard = document.createElement('div');
    nestedCard.className = 'nested-drop-card';
    nestedCard.style.cssText = 'border: 1px solid var(--border); background: rgba(255,255,255,0.015); border-radius: 8px; padding: 12px; margin-bottom: 10px; cursor: pointer; display: flex; flex-direction: column; gap: 8px;';
    nestedCard.addEventListener('click', (e) => {
      e.stopPropagation();
      const isProfileClick = e.target.closest('.pp-wrap, .orig-nick');
      if (isProfileClick) {
        window.location.href = `profil.html?id=${redropData.original_author_id}`;
      } else {
        showDropDetail(redropData.original_drop_id, true);
      }
    });

    // Original author header
    const origHeader = document.createElement('div');
    origHeader.className = 'orig-header';
    origHeader.style.cssText = 'display:flex;align-items:center;gap:8px;';

    const origAv = createAvatar(redropData.original_author_avatar, redropData.original_author_nick, 24);
    origAv.style.cursor = 'pointer';
    const origNick = document.createElement('span');
    origNick.className = 'orig-nick';
    origNick.style.cssText = 'font-size:12px;font-weight:800;color:var(--text-1);cursor:pointer;';
    origNick.textContent = redropData.original_author_nick;

    origHeader.appendChild(origAv);
    origHeader.appendChild(origNick);
    if (redropData.original_author_verify) {
      const origVerify = document.createElement('img');
      origVerify.src = 'https://i.imgur.com/VDpHaPy.png';
      origVerify.style.cssText = 'width:14px;height:14px;';
      origHeader.appendChild(origVerify);
    }
    
    const origTime = document.createElement('span');
    origTime.style.cssText = 'font-size:10px;color:var(--text-dim);margin-left:auto;';
    origTime.textContent = relativeTime(redropData.original_created_at);
    origHeader.appendChild(origTime);

    nestedCard.appendChild(origHeader);

    // Original content
    if (redropData.original_content) {
      const origContent = document.createElement('div');
      origContent.className = 'orig-content';
      origContent.style.cssText = 'font-size:12px;color:var(--text-2);line-height:1.4;';
      origContent.textContent = redropData.original_content;
      nestedCard.appendChild(origContent);
    }

    // Original image
    if (redropData.original_gorsel_url) {
      const origImg = document.createElement('img');
      origImg.src = redropData.original_gorsel_url;
      origImg.style.cssText = 'max-width:100%;max-height:200px;object-fit:cover;border-radius:6px;';
      nestedCard.appendChild(origImg);
    }

    inner.appendChild(nestedCard);
  } else {
    const content = document.createElement('div');
    content.className = 'drop-content';

    if (drop.icerik) {
      const isLong = !isDetailView && (drop.icerik.length > 200 || drop.icerik.split('\n').length > 3);
      if (isLong) {
        content.classList.add('drop-content-collapsed');
        content.textContent = drop.icerik;
        inner.appendChild(content);

        const readMore = document.createElement('span');
        readMore.className = 'drop-readmore';
        readMore.textContent = 'Devamını oku';
        readMore.addEventListener('click', () => {
          content.classList.remove('drop-content-collapsed');
          readMore.style.display = 'none';
        });
        inner.appendChild(readMore);
      } else {
        content.textContent = drop.icerik;
        inner.appendChild(content);
      }
    }

    // Image
    if (drop.gorsel_url) {
      const img = document.createElement('img');
      img.className = 'drop-image';
      img.src = drop.gorsel_url;
      img.alt = 'Drop görseli';
      img.loading = 'lazy';
      img.addEventListener('click', () => openImageZoom(drop.gorsel_url));
      inner.appendChild(img);
    }
  }

  // --- Actions ---
  const actions = document.createElement('div');
  actions.className = 'drop-actions';

  // Like button
  const likeBtn = document.createElement('button');
  likeBtn.className = 'drop-action-btn' + (likedDrops.has(drop.id) ? ' liked' : '');
  likeBtn.dataset.likeBtnId = drop.id;
  likeBtn.setAttribute('data-like-btn', drop.id);
  const likeIcon = document.createElement('span');
  likeIcon.className = 'drop-action-icon like-icon';
  likeIcon.textContent = likedDrops.has(drop.id) ? '❤️' : '🤍';
  const likeCount = document.createElement('span');
  likeCount.className = 'like-count';
  likeCount.textContent = drop.begeni_sayisi || 0;
  likeBtn.appendChild(likeIcon);
  likeBtn.appendChild(likeCount);
  likeBtn.addEventListener('click', () => toggleLike(drop.id, likeBtn, likeIcon, likeCount));
  actions.appendChild(likeBtn);

  // Comment button
  const commentBtn = document.createElement('button');
  commentBtn.className = 'drop-action-btn';
  const commentIcon = document.createElement('span');
  commentIcon.className = 'drop-action-icon';
  commentIcon.textContent = '💬';
  const commentCount = document.createElement('span');
  commentCount.className = 'comment-count';
  commentCount.textContent = drop.yorum_sayisi || 0;
  commentBtn.appendChild(commentIcon);
  commentBtn.appendChild(commentCount);

  commentBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (isDetailView) {
      const input = card.querySelector('.comment-input');
      if (input) input.focus();
      return;
    }
    showDropDetail(drop.id, true, true);
  });
  actions.appendChild(commentBtn);

  // ReDrop button
  const shareBtn = document.createElement('button');
  shareBtn.className = 'drop-action-btn';
  const shareIcon = document.createElement('span');
  shareIcon.className = 'drop-action-icon';
  shareIcon.textContent = '🔁';
  const shareLabel = document.createElement('span');
  shareLabel.textContent = 'ReDropla';
  shareBtn.appendChild(shareIcon);
  shareBtn.appendChild(shareLabel);
  shareBtn.addEventListener('click', async (e) => {
    e.stopPropagation();
    if (!currentUser) { showToast('ReDroplamak için giriş yap!', 'error'); return; }
    openReDropModal(drop, isReDrop ? redropData : null, user);
  });
  actions.appendChild(shareBtn);

  inner.appendChild(actions);

  // Navigate to drop details on card background click
  inner.style.cursor = 'pointer';
  inner.addEventListener('click', (e) => {
    const interactive = e.target.closest('button, a, img, input, .drop-readmore, .nested-drop-card');
    if (interactive) return;
    if (isDetailView) return;
    showDropDetail(drop.id, true);
  });

  card.appendChild(inner);

  // --- Comments Section ---
  const commentSection = document.createElement('div');
  commentSection.className = 'drop-comments';
  commentSection.dataset.ownerId = drop.kullanici_id;
  card.appendChild(commentSection);

  if (isDetailView) {
    commentSection.classList.add('open');
    commentBtn.classList.add('comment-active');
    loadComments(drop.id, commentSection, true);
  }

  return card;
}

// =============================================
// TOGGLE LIKE
// =============================================
async function toggleLike(dropId, btn, icon, countEl) {
  if (!currentUser) { showToast('Beğenmek için giriş yap!', 'error'); return; }

  const isLiked = likedDrops.has(dropId);
  const currentCount = parseInt(countEl.textContent) || 0;

  // Optimistic update
  if (isLiked) {
    likedDrops.delete(dropId);
    btn.classList.remove('liked');
    icon.textContent = '🤍';
    countEl.textContent = Math.max(0, currentCount - 1);
  } else {
    likedDrops.add(dropId);
    btn.classList.add('liked');
    icon.textContent = '❤️';
    countEl.textContent = currentCount + 1;
    // Heart burst animation
    btn.style.transform = 'scale(1.3)';
    setTimeout(() => { btn.style.transform = ''; }, 200);
  }

  try {
    if (isLiked) {
      await sb.from('drop_begeniler').delete()
        .eq('drop_id', dropId).eq('kullanici_id', currentUser.id);
      await sb.from('droplar').update({ begeni_sayisi: Math.max(0, currentCount - 1) }).eq('id', dropId);
    } else {
      await sb.from('drop_begeniler').insert({ drop_id: dropId, kullanici_id: currentUser.id });
      await sb.from('droplar').update({ begeni_sayisi: currentCount + 1 }).eq('id', dropId);
    }
  } catch (e) {
    // Revert
    if (isLiked) {
      likedDrops.add(dropId);
      btn.classList.add('liked');
      icon.textContent = '❤️';
      countEl.textContent = currentCount;
    } else {
      likedDrops.delete(dropId);
      btn.classList.remove('liked');
      icon.textContent = '🤍';
      countEl.textContent = currentCount;
    }
  }
}

// =============================================
// LOAD COMMENTS
// =============================================
async function loadComments(dropId, section, loadAll = false) {
  section.innerHTML = '';

  // Comment input row
  const inputRow = document.createElement('div');
  inputRow.className = 'comment-input-row';

  const av = createAvatar(currentProfile?.avatar_url, currentProfile?.kullanici_adi, 28);
  const input = document.createElement('input');
  input.className = 'comment-input';
  input.placeholder = currentUser ? (loadAll ? 'Yanıtını gönder... (Enter)' : 'Yorum yaz... (Enter)') : 'Yorum yapmak için giriş yap';
  input.disabled = !currentUser;

  const sendBtn = document.createElement('button');
  sendBtn.className = 'comment-send-btn';
  sendBtn.textContent = '↑';
  sendBtn.style.display = currentUser ? 'flex' : 'none';

  const sendComment = async (parentId = null) => {
    const text = input.value.trim();
    if (!text || !currentUser) return;
    input.value = '';
    try {
      const insertPayload = {
        drop_id: dropId,
        kullanici_id: currentUser.id,
        yorum: text,
        begeni_sayisi: 0
      };
      if (parentId) insertPayload.parent_id = parentId;
      const { data: newComment } = await sb.from('drop_yorumlar').insert(insertPayload).select().single();

      if (newComment) {
        const newCount = (parseInt(section.dataset.commentCount || 0) + 1);
        section.dataset.commentCount = newCount;
        const commentEl = buildCommentItem({ ...newComment, kullanicilar: currentProfile }, dropId, section, Number(section.dataset.ownerId));
        section.insertBefore(commentEl, inputRow);
        // Update count
        const countEl = document.querySelector(`[data-drop-id="${dropId}"] .comment-count`);
        if (countEl) countEl.textContent = newCount;
        // Update yorum_sayisi in DB
        await sb.from('droplar').update({ yorum_sayisi: newCount }).eq('id', dropId);
      }
    } catch (e) { showToast('Yorum gönderilemedi', 'error'); }
  };

  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendComment(); });
  sendBtn.addEventListener('click', sendComment);

  inputRow.appendChild(av);
  inputRow.appendChild(input);
  inputRow.appendChild(sendBtn);
  section.appendChild(inputRow);

  // Load comments from DB
  try {
    let commentsQuery = sb.from('drop_yorumlar')
      .select('*')
      .eq('drop_id', dropId);
    // Note: filter top-level only (parent_id IS NULL) client-side
    // to avoid 400 if column doesn't exist yet

    if (loadAll) {
      commentsQuery = commentsQuery.order('created_at', { ascending: true });
    } else {
      commentsQuery = commentsQuery.order('created_at', { ascending: false })
        .limit(20); // fetch more, we'll filter client-side
    }

    const { data: rawComments } = await commentsQuery;
    // Filter top-level only (no parent_id)
    const comments = rawComments ? rawComments.filter(c => !c.parent_id) : [];
    // Apply limit after filter for non-loadAll mode
    const displayComments = loadAll ? comments : comments.slice(0, 3);

    if (displayComments && displayComments.length > 0) {
      const userIds = [...new Set(displayComments.map(c => c.kullanici_id).filter(id => id !== null))];
      if (userIds.length > 0) {
        const { data: users } = await sb.from('kullanicilar')
          .select('id, kullanici_adi, avatar_url')
          .in('id', userIds);
        if (users) {
          const userMap = {};
          users.forEach(u => { userMap[u.id] = u; });
          displayComments.forEach(c => {
            c.kullanicilar = userMap[c.kullanici_id] || null;
          });
        }
      }
    }

    if (!displayComments || displayComments.length === 0) {
      const emptyEl = document.createElement('div');
      emptyEl.style.cssText = 'text-align:center;color:var(--text-dim);font-size:11px;padding:12px 0;';
      emptyEl.textContent = 'Henüz yorum yok. İlk yorumu sen yap!';
      section.insertBefore(emptyEl, inputRow);
      return;
    }

    section.dataset.commentCount = displayComments.length;

    // Check total count (only if not loading all at once)
    if (!loadAll) {
      const totalTopLevel = comments.length; // already filtered
      if (totalTopLevel > 3) {
        const seeAll = document.createElement('a');
        seeAll.className = 'comment-see-all';
        seeAll.textContent = `${totalTopLevel} yorumun tamamını gör →`;
        seeAll.addEventListener('click', async () => {
          seeAll.remove();
          const { data: rawAll } = await sb.from('drop_yorumlar')
            .select('*')
            .eq('drop_id', dropId)
            .order('created_at', { ascending: true });
          const allComments = (rawAll || []).filter(c => !c.parent_id);

          if (allComments && allComments.length > 0) {
            const userIds = [...new Set(allComments.map(c => c.kullanici_id).filter(id => id !== null))];
            if (userIds.length > 0) {
              const { data: users } = await sb.from('kullanicilar')
                .select('id, kullanici_adi, avatar_url')
                .in('id', userIds);
              if (users) {
                const userMap = {};
                users.forEach(u => { userMap[u.id] = u; });
                allComments.forEach(c => {
                  c.kullanicilar = userMap[c.kullanici_id] || null;
                });
              }
            }
          }

          section.innerHTML = '';
          section.appendChild(inputRow);
          const dropOwnerId = Number(section.dataset.ownerId);
          (allComments || []).forEach(c => {
            const el = buildCommentItem(c, dropId, section, dropOwnerId);
            section.insertBefore(el, inputRow);
          });
        });
        section.insertBefore(seeAll, inputRow);
      }
    }

    const dropOwnerId = Number(section.dataset.ownerId);
    
    if (loadAll) {
      displayComments.forEach(comment => {
        const el = buildCommentItem(comment, dropId, section, dropOwnerId);
        section.insertBefore(el, inputRow);
      });
    } else {
      displayComments.slice().reverse().forEach(comment => {
        const el = buildCommentItem(comment, dropId, section, dropOwnerId);
        section.insertBefore(el, inputRow);
      });
    }

  } catch (e) {
    console.error(e);
  }
}

// =============================================
// BUILD COMMENT ITEM
// =============================================
function buildCommentItem(comment, dropId, commentsList, dropOwnerId) {
  const user = comment.kullanicilar || {};
  const item = document.createElement('div');
  item.className = 'comment-item';

  const av = createAvatar(user.avatar_url, user.kullanici_adi, 28);
  if (user.id) {
    av.style.cursor = 'pointer';
    av.addEventListener('click', () => { window.location.href = `profil.html?id=${user.id}`; });
  }

  const body = document.createElement('div');
  body.className = 'comment-body';

  const nick = document.createElement('div');
  nick.className = 'comment-nick';
  nick.textContent = user.kullanici_adi || 'Anonim';
  if (user.id) {
    nick.style.cursor = 'pointer';
    nick.addEventListener('click', () => { window.location.href = `profil.html?id=${user.id}`; });
  }

  const text = document.createElement('div');
  text.className = 'comment-text';
  text.textContent = comment.yorum;

  const likeRow = document.createElement('div');
  likeRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-top:4px;';

  // --- Like Button logic using localStorage and DB update ---
  const likeBtn = document.createElement('button');
  likeBtn.className = 'comment-like-btn';

  const likeKey = `comment_liked_${comment.id}`;
  const countKey = `comment_like_count_${comment.id}`;

  let isLiked = localStorage.getItem(likeKey) === 'true';
  let likeCountVal = parseInt(localStorage.getItem(countKey));
  if (isNaN(likeCountVal)) {
    likeCountVal = comment.begeni_sayisi || 0;
    localStorage.setItem(countKey, likeCountVal);
  }

  if (isLiked) {
    likeBtn.classList.add('liked');
  }
  likeBtn.innerHTML = `❤️ ${likeCountVal}`;

  likeBtn.addEventListener('click', async () => {
    if (!currentUser) { showToast('Beğenmek için giriş yap!', 'error'); return; }
    isLiked = !isLiked;
    if (isLiked) {
      likeBtn.classList.add('liked');
      likeCountVal++;
      localStorage.setItem(likeKey, 'true');
    } else {
      likeBtn.classList.remove('liked');
      likeCountVal = Math.max(0, likeCountVal - 1);
      localStorage.removeItem(likeKey);
    }
    localStorage.setItem(countKey, likeCountVal);
    likeBtn.innerHTML = `❤️ ${likeCountVal}`;

    try {
      await sb.from('drop_yorumlar').update({ begeni_sayisi: likeCountVal }).eq('id', comment.id);
    } catch(e) { console.error(e); }
  });

  const timeEl = document.createElement('span');
  timeEl.style.cssText = 'font-size:10px;color:var(--text-dim);';
  timeEl.textContent = relativeTime(comment.created_at);

  likeRow.appendChild(likeBtn);
  likeRow.appendChild(timeEl);

  // Reply button (mentioning the user)
  if (currentUser) {
    const replyBtn = document.createElement('button');
    replyBtn.className = 'comment-del-btn'; // same style class for action buttons
    replyBtn.innerHTML = '💬 Yanıtla';
    replyBtn.addEventListener('click', () => {
      const inputEl = commentsList.querySelector('.comment-input');
      if (inputEl) {
        inputEl.value = `@${user.kullanici_adi || 'Anonim'} ` + inputEl.value;
        inputEl.focus();
      }
    });
    likeRow.appendChild(replyBtn);
  }

  // Delete button (own comments OR drop owner)
  if (currentUser && (comment.kullanici_id === currentUser.id || dropOwnerId === currentUser.id)) {
    const delBtn = document.createElement('button');
    delBtn.className = 'comment-del-btn';
    delBtn.innerHTML = '🗑️ Sil';
    delBtn.addEventListener('click', async () => {
      try {
        await sb.from('drop_yorumlar').delete().eq('id', comment.id);
        
        // Update count on delete
        const currentCount = parseInt(commentsList.dataset.commentCount || 0);
        const newCount = Math.max(0, currentCount - 1);
        commentsList.dataset.commentCount = newCount;
        
        // Update comment count element
        const countEl = document.querySelector(`[data-drop-id="${dropId}"] .comment-count`);
        if (countEl) countEl.textContent = newCount;
        
        // Update DB
        await sb.from('droplar').update({ yorum_sayisi: newCount }).eq('id', dropId);

        item.style.opacity = '0';
        item.style.transition = 'opacity 0.3s';
        setTimeout(() => item.remove(), 300);
        showToast('Yorum silindi', 'success');
      } catch(e) { showToast('Silinemedi', 'error'); }
    });
    likeRow.appendChild(delBtn);
  }

  body.appendChild(nick);
  body.appendChild(text);
  body.appendChild(likeRow);
  item.appendChild(av);
  item.appendChild(body);

  // Load reply count and make item clickable
  (async () => {
    try {
      const { count } = await sb.from('drop_yorumlar')
        .select('*', { count: 'exact', head: true })
        .eq('parent_id', comment.id);
      if (count > 0) {
        item.classList.add('has-replies');
        const replyCountEl = document.createElement('span');
        replyCountEl.className = 'comment-reply-count';
        replyCountEl.innerHTML = `💬 ${count} yanıt`;
        likeRow.appendChild(replyCountEl);
      }
    } catch (e) {}
  })();

  // Click on comment body/text → open comment detail (X/Twitter style)
  body.addEventListener('click', (e) => {
    const isBtn = e.target.closest('button, a');
    if (isBtn) return;
    showCommentDetail(comment, dropId);
  });
  text.style.cursor = 'pointer';
  nick.style.cursor = 'pointer';

  return item;
}

// =============================================
// SHOW COMMENT DETAIL (Twitter/X style)
// =============================================
let currentCommentDetailId = null;

async function showCommentDetail(comment, dropId, pushState = true) {
  currentCommentDetailId = comment.id;

  // Hide feed or drop detail
  const detailContainer = document.getElementById('detail-container');
  const commentDetailContainer = document.getElementById('comment-detail-container');

  // Save feed scroll if needed
  if (currentDetailDropId === null) {
    feedScrollPosition = window.scrollY;
  }

  // Hide drop detail card while keeping container visible
  // Instead, swap detail-container content with comment detail
  document.getElementById('feed-tabs').style.display = 'none';
  const pill = document.getElementById('new-drops-pill');
  if (pill) pill.style.display = 'none';
  document.getElementById('composer-container').style.display = 'none';
  document.getElementById('following-empty').style.display = 'none';
  document.getElementById('drop-feed').style.display = 'none';
  const loadMoreBtn = document.getElementById('load-more-btn');
  if (loadMoreBtn) loadMoreBtn.style.display = 'none';
  document.getElementById('feed-loading').style.display = 'none';
  detailContainer.style.display = 'none';

  commentDetailContainer.style.display = 'flex';
  commentDetailContainer.innerHTML = '';

  if (pushState) {
    history.pushState(
      { dropId: dropId, commentId: comment.id },
      '',
      '?drop=' + dropId + '&comment=' + comment.id
    );
  }

  // --- Header (back button) ---
  const header = document.createElement('div');
  header.className = 'comment-detail-header';

  const backBtn = document.createElement('button');
  backBtn.className = 'btn mc-gray mc-sm back-btn';
  backBtn.innerHTML = '←';
  backBtn.style.cssText = 'border-radius:6px!important;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;padding:0;cursor:pointer;';
  backBtn.addEventListener('click', () => {
    // Go back to drop detail
    currentCommentDetailId = null;
    commentDetailContainer.style.display = 'none';
    if (currentDetailDropId) {
      showDropDetail(currentDetailDropId, true);
    } else {
      showFeed();
    }
  });

  const headerTitle = document.createElement('span');
  headerTitle.style.cssText = 'font-size:16px;font-weight:900;color:#fff;font-family:var(--font);text-shadow:1px 1px 0 #000;';
  headerTitle.textContent = 'Yorum';

  header.appendChild(backBtn);
  header.appendChild(headerTitle);
  commentDetailContainer.appendChild(header);

  // --- Focused comment (shown big, like a post) ---
  const user = comment.kullanicilar || {};
  const focusBox = document.createElement('div');
  focusBox.className = 'comment-detail-focus';

  const cdfHeader = document.createElement('div');
  cdfHeader.className = 'cdf-header';

  const cdfAv = createAvatar(user.avatar_url, user.kullanici_adi, 40);
  if (user.id) {
    cdfAv.style.cursor = 'pointer';
    cdfAv.addEventListener('click', () => { window.location.href = `profil.html?id=${user.id}`; });
  }

  const cdfNick = document.createElement('span');
  cdfNick.className = 'cdf-nick';
  cdfNick.textContent = user.kullanici_adi || 'Anonim';
  if (user.id) {
    cdfNick.addEventListener('click', () => { window.location.href = `profil.html?id=${user.id}`; });
  }

  const cdfTime = document.createElement('span');
  cdfTime.className = 'cdf-time';
  cdfTime.textContent = relativeTime(comment.created_at);

  cdfHeader.appendChild(cdfAv);
  cdfHeader.appendChild(cdfNick);
  cdfHeader.appendChild(cdfTime);
  focusBox.appendChild(cdfHeader);

  // Show what drop this is replying to (context)
  if (comment.yorum) {
    // If it's a reply, also show parent context
    if (comment.parent_id) {
      const contextDiv = document.createElement('div');
      contextDiv.style.cssText = 'font-size:12px;color:var(--accent);margin-bottom:8px;cursor:pointer;font-weight:700;';
      contextDiv.textContent = '↩ Yanıtlıyor';
      focusBox.appendChild(contextDiv);
    }
  }

  const cdfText = document.createElement('div');
  cdfText.className = 'cdf-text';
  cdfText.textContent = comment.yorum;
  focusBox.appendChild(cdfText);

  // Actions on focused comment
  const cdfActions = document.createElement('div');
  cdfActions.className = 'cdf-actions';

  // Like button
  const likeKey = `comment_liked_${comment.id}`;
  const countKey = `comment_like_count_${comment.id}`;
  let isLiked = localStorage.getItem(likeKey) === 'true';
  let likeCountVal = parseInt(localStorage.getItem(countKey));
  if (isNaN(likeCountVal)) likeCountVal = comment.begeni_sayisi || 0;

  const cdfLike = document.createElement('button');
  cdfLike.className = 'comment-like-btn' + (isLiked ? ' liked' : '');
  cdfLike.innerHTML = `❤️ ${likeCountVal}`;
  cdfLike.addEventListener('click', async () => {
    if (!currentUser) { showToast('Giriş yap!', 'error'); return; }
    isLiked = !isLiked;
    if (isLiked) {
      cdfLike.classList.add('liked'); likeCountVal++;
      localStorage.setItem(likeKey, 'true');
    } else {
      cdfLike.classList.remove('liked'); likeCountVal = Math.max(0, likeCountVal - 1);
      localStorage.removeItem(likeKey);
    }
    localStorage.setItem(countKey, likeCountVal);
    cdfLike.innerHTML = `❤️ ${likeCountVal}`;
    try { await sb.from('drop_yorumlar').update({ begeni_sayisi: likeCountVal }).eq('id', comment.id); } catch(e) {}
  });
  cdfActions.appendChild(cdfLike);

  focusBox.appendChild(cdfActions);
  commentDetailContainer.appendChild(focusBox);

  // --- Replies section label ---
  const repliesLabel = document.createElement('div');
  repliesLabel.className = 'replies-section-label';
  repliesLabel.textContent = 'Yanıtlar';
  commentDetailContainer.appendChild(repliesLabel);

  // --- Replies list ---
  const repliesSection = document.createElement('div');
  repliesSection.className = 'drop-comments comment-detail-replies open';
  repliesSection.dataset.commentCount = '0';
  repliesSection.dataset.ownerId = comment.kullanici_id || '';
  commentDetailContainer.appendChild(repliesSection);

  // --- Reply input ---
  const replyInputRow = document.createElement('div');
  replyInputRow.className = 'comment-input-row';
  replyInputRow.style.cssText = 'border-bottom:2px solid #000;padding-bottom:12px;margin-bottom:12px;';

  const replyAv = createAvatar(currentProfile?.avatar_url, currentProfile?.kullanici_adi, 28);
  const replyInput = document.createElement('input');
  replyInput.className = 'comment-input';
  replyInput.placeholder = currentUser ? 'Yanıtını yaz... (Enter)' : 'Yanıtlamak için giriş yap';
  replyInput.disabled = !currentUser;

  const replySendBtn = document.createElement('button');
  replySendBtn.className = 'comment-send-btn';
  replySendBtn.textContent = '↑';
  replySendBtn.style.display = currentUser ? 'flex' : 'none';

  const sendReply = async () => {
    const text = replyInput.value.trim();
    if (!text || !currentUser) return;
    replyInput.value = '';
    try {
      const { data: newReply } = await sb.from('drop_yorumlar').insert({
        drop_id: dropId,
        kullanici_id: currentUser.id,
        yorum: text,
        begeni_sayisi: 0,
        parent_id: comment.id
      }).select().single();
      if (newReply) {
        newReply.kullanicilar = currentProfile;
        const replyEl = buildCommentItem(newReply, dropId, repliesSection, Number(comment.kullanici_id));
        repliesSection.insertBefore(replyEl, replyInputRow);
        // Update reply count badge on parent
        const parentBadges = document.querySelectorAll('.comment-reply-count');
        // Update DB yorum_sayisi
        const currentCount = parseInt(repliesSection.dataset.commentCount || 0) + 1;
        repliesSection.dataset.commentCount = currentCount;
        showToast('Yanıt gönderildi!', 'success');
      }
    } catch (e) { showToast('Yanıt gönderilemedi', 'error'); }
  };

  replyInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendReply(); });
  replySendBtn.addEventListener('click', sendReply);

  replyInputRow.appendChild(replyAv);
  replyInputRow.appendChild(replyInput);
  replyInputRow.appendChild(replySendBtn);
  repliesSection.appendChild(replyInputRow);

  // --- Load existing replies ---
  try {
    const { data: replies } = await sb.from('drop_yorumlar')
      .select('*')
      .eq('parent_id', comment.id)
      .order('created_at', { ascending: true });

    if (replies && replies.length > 0) {
      const userIds = [...new Set(replies.map(r => r.kullanici_id).filter(Boolean))];
      if (userIds.length > 0) {
        const { data: users } = await sb.from('kullanicilar')
          .select('id, kullanici_adi, avatar_url')
          .in('id', userIds);
        if (users) {
          const userMap = {};
          users.forEach(u => { userMap[u.id] = u; });
          replies.forEach(r => { r.kullanicilar = userMap[r.kullanici_id] || null; });
        }
      }
      const dropOwnerId = Number(comment.kullanici_id);
      replies.forEach(reply => {
        const el = buildCommentItem(reply, dropId, repliesSection, dropOwnerId);
        repliesSection.insertBefore(el, replyInputRow);
      });
      repliesSection.dataset.commentCount = replies.length;
    } else {
      const emptyEl = document.createElement('div');
      emptyEl.style.cssText = 'text-align:center;color:var(--text-dim);font-size:11px;padding:12px 0;';
      emptyEl.textContent = 'Henüz yanıt yok. İlk yanıtı sen gönder!';
      repliesSection.insertBefore(emptyEl, replyInputRow);
    }
  } catch(e) { console.error(e); }

  window.scrollTo({ top: 0, behavior: 'instant' });
}

function showDropContextMenu(e, drop, card) {
  const menu = document.getElementById('ctx-menu');
  menu.innerHTML = '';

  const isOwn = currentUser && drop.kullanici_id === currentUser.id;

  if (isOwn) {
    const editItem = document.createElement('div');
    editItem.className = 'ctx-item';
    editItem.textContent = '✏️ Dropu Düzenle';
    editItem.addEventListener('click', () => {
      menu.style.display = 'none';
      openEditDropModal(drop, card);
    });
    menu.appendChild(editItem);

    const deleteItem = document.createElement('div');
    deleteItem.className = 'ctx-item danger';
    deleteItem.textContent = '🗑️ Dropu Sil';
    deleteItem.addEventListener('click', async () => {
      menu.style.display = 'none';
      try {
        await sb.from('droplar').delete().eq('id', drop.id);
        card.style.opacity = '0';
        card.style.transform = 'scale(0.95)';
        card.style.transition = 'all 0.3s ease';
        setTimeout(() => card.remove(), 300);
        showToast('Drop silindi', 'success');
      } catch (err) { showToast('Silinemedi!', 'error'); }
    });
    menu.appendChild(deleteItem);
    const div = document.createElement('div');
    div.className = 'ctx-divider';
    menu.appendChild(div);
  }

  const copyLink = document.createElement('div');
  copyLink.className = 'ctx-item';
  copyLink.textContent = '🔗 Linki Kopyala';
  copyLink.addEventListener('click', () => {
    const dropUrl = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/drop.html') + '?id=' + drop.id;
    navigator.clipboard.writeText(dropUrl);
    showToast('Link kopyalandı!', 'success');
    menu.style.display = 'none';
  });
  menu.appendChild(copyLink);

  if (!isOwn) {
    const report = document.createElement('div');
    report.className = 'ctx-item danger';
    report.textContent = '⚠️ Raporla';
    report.addEventListener('click', async () => {
      menu.style.display = 'none';
      if (!currentUser) { showToast('Giriş yapmalısın', 'error'); return; }
      try {
        await sb.from('raporlar').insert({ drop_id: drop.id, raporlayan_id: currentUser.id, tur: 'drop_rapor' });
      } catch (e) {}
      showToast('Rapor gönderildi', 'info');
    });
    menu.appendChild(report);
  }



  menu.style.display = 'block';
  const x = Math.min(e.clientX, window.innerWidth - 180);
  const y = Math.min(e.clientY, window.innerHeight - 120);
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
}

async function toggleFollow(userId, btn, nick) {
  const isFollowing = followedUsers.has(userId);
  try {
    if (isFollowing) {
      await sb.from('takipler').delete()
        .eq('takip_eden_id', currentUser.id)
        .eq('takip_edilen_id', userId);
      followedUsers.delete(userId);
      btn.textContent = 'Takip Et';
      btn.classList.replace('mc-gray', 'mc-green');
    } else {
      await sb.from('takipler').insert({ takip_eden_id: currentUser.id, takip_edilen_id: userId });

      btn.textContent = '✓ Takip';
      btn.classList.replace('mc-green', 'mc-gray');
      showToast(`${nick} takip edildi!`, 'success');
    }
  } catch (e) { showToast('Hata oluştu!', 'error'); }
}

// =============================================
// REALTIME SUBSCRIPTION
// =============================================
function setupRealtime() {
  realtimeSub = sb
    .channel('droplar-feed')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'droplar' }, payload => {
      const newDrop = payload.new;
      if (!newDrop) return;
      // Don't show own drops (already shown)
      if (currentUser && newDrop.kullanici_id === currentUser.id) return;

      pendingNewDropIds.unshift(newDrop.id);
      const pill = document.getElementById('new-drops-pill');
      const countEl = document.getElementById('new-drops-count');
      countEl.textContent = pendingNewDropIds.length;
      pill.classList.add('visible');
    })
    .subscribe();
}

// =============================================
document.getElementById('new-drops-pill').addEventListener('click', async () => {
  const pill = document.getElementById('new-drops-pill');
  pill.classList.remove('visible');

  if (pendingNewDropIds.length === 0) return;

  const ids = [...pendingNewDropIds];
  pendingNewDropIds = [];

  try {
    const { data: newDrops } = await sb.from('droplar')
      .select('*')
      .in('id', ids)
      .order('created_at', { ascending: false });

    if (newDrops && newDrops.length > 0) {
      const authorIds = [...new Set(newDrops.map(d => d.kullanici_id).filter(id => id !== null))];
      if (authorIds.length > 0) {
        const { data: authors } = await sb.from('kullanicilar')
          .select('id, kullanici_adi, avatar_url, abonelik, aktif_cerceve, dogrulama_rozeti')
          .in('id', authorIds);
        if (authors) {
          const authorMap = {};
          authors.forEach(a => { authorMap[a.id] = a; });
          newDrops.forEach(d => {
            d.kullanicilar = authorMap[d.kullanici_id] || null;
          });
        }
      }
    }

    const feed = document.getElementById('drop-feed');
    (newDrops || []).forEach(drop => {
      const card = buildDropCard(drop);
      card.classList.add('new-drop');
      feed.insertBefore(card, feed.firstChild);
    });

    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (e) {}
});

// =============================================
// SPA NAV AND DETAIL VIEWS
// =============================================
async function showDropDetail(dropId, pushState = true, focusComment = false) {
  if (!dropId) return;
  
  // If we were in feed view, save scroll position
  if (currentDetailDropId === null) {
    feedScrollPosition = window.scrollY;
  }
  
  currentDetailDropId = dropId;
  
  // Hide feed elements
  document.getElementById('feed-tabs').style.display = 'none';
  const pill = document.getElementById('new-drops-pill');
  if (pill) pill.style.display = 'none';
  document.getElementById('composer-container').style.display = 'none';
  document.getElementById('following-empty').style.display = 'none';
  document.getElementById('drop-feed').style.display = 'none';
  const loadMoreBtn = document.getElementById('load-more-btn');
  if (loadMoreBtn) loadMoreBtn.style.display = 'none';
  document.getElementById('feed-loading').style.display = 'none';

  // Show and render detail view
  const detailContainer = document.getElementById('detail-container');
  detailContainer.style.display = 'flex';
  detailContainer.innerHTML = '';

  // Back button and header
  const header = document.createElement('div');
  header.className = 'detail-header';
  
  const backBtn = document.createElement('button');
  backBtn.className = 'btn mc-gray mc-sm back-btn';
  backBtn.innerHTML = '←';
  backBtn.addEventListener('click', () => {
    showFeed();
  });
  
  const title = document.createElement('span');
  title.style.cssText = 'font-size: 16px; font-weight: 900; color: #fff; font-family: var(--font); text-shadow: 1px 1px 0 #000;';
  title.textContent = 'Gönderi';
  
  header.appendChild(backBtn);
  header.appendChild(title);
  detailContainer.appendChild(header);

  // Skeleton loading state
  const loading = document.createElement('div');
  loading.className = 'feed-loading';
  loading.style.display = 'block';
  
  // Build single skeleton card inside detail view
  const skCard = document.createElement('div');
  skCard.className = 'skeleton-card';
  skCard.style.cssText = 'margin-bottom: 0; border: 3px solid #000000; box-shadow: 4px 4px 0px #000000; padding: 14px;';
  const skRow = document.createElement('div');
  skRow.className = 'skeleton-row';
  const skCircle = document.createElement('div');
  skCircle.className = 'skeleton-circle';
  skCircle.style.cssText = 'width:40px;height:40px;';
  const skLines = document.createElement('div');
  skLines.style.cssText = 'flex:1;display:flex;flex-direction:column;gap:6px;';
  const skL1 = document.createElement('div');
  skL1.className = 'skeleton-line';
  skL1.style.width = '40%';
  const skL2 = document.createElement('div');
  skL2.className = 'skeleton-line';
  skL2.style.width = '80%';
  skLines.appendChild(skL1);
  skLines.appendChild(skL2);
  skRow.appendChild(skCircle);
  skRow.appendChild(skLines);
  skCard.appendChild(skRow);
  loading.appendChild(skCard);
  detailContainer.appendChild(loading);

  if (pushState) {
    history.pushState({ dropId: dropId }, '', '?drop=' + dropId);
  }

  // Fetch the drop details
  try {
    const { data: drops, error } = await sb.from('droplar').select('*').eq('id', dropId);
    if (error) throw error;

    loading.remove();

    if (!drops || drops.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = `
        <div class="empty-state-icon">🗑️</div>
        <div class="empty-state-title">Drop Bulunamadı</div>
        <div class="empty-state-sub">Bu drop silinmiş veya hiç var olmamış olabilir.</div>
      `;
      detailContainer.appendChild(empty);
      return;
    }

    const drop = drops[0];
    
    // Fetch author details
    if (drop.kullanici_id) {
      const { data: author } = await sb.from('kullanicilar')
        .select('id, kullanici_adi, avatar_url, abonelik, aktif_cerceve, dogrulama_rozeti')
        .eq('id', drop.kullanici_id)
        .maybeSingle();
      if (author) {
        drop.kullanicilar = author;
      }
    }

    const card = buildDropCard(drop, true);
    detailContainer.appendChild(card);

    if (focusComment) {
      setTimeout(() => {
        const input = card.querySelector('.comment-input');
        if (input) input.focus();
      }, 50);
    }

    // Sync liked state for this card
    if (currentUser) {
      const { data: likes } = await sb.from('drop_begeniler')
        .select('drop_id')
        .eq('kullanici_id', currentUser.id)
        .eq('drop_id', dropId);
      if (likes && likes.length > 0) {
        likedDrops.add(dropId);
        const likeBtn = card.querySelector(`[data-like-btn="${dropId}"]`);
        if (likeBtn) {
          likeBtn.classList.add('liked');
          likeBtn.querySelector('.like-icon').textContent = '❤️';
        }
      }
    }
    
    window.scrollTo({ top: 0, behavior: 'instant' });
  } catch (e) {
    if (loading) loading.remove();
    showToast('Drop yüklenirken hata oluştu', 'error');
  }
}

function showFeed() {
  currentDetailDropId = null;
  currentCommentDetailId = null;
  exploreActive = false;
  
  // Hide detail containers and explore
  document.getElementById('detail-container').style.display = 'none';
  document.getElementById('comment-detail-container').style.display = 'none';
  document.getElementById('explore-container').style.display = 'none';

  // Restore feed elements display
  document.getElementById('feed-tabs').style.display = 'flex';
  const pill = document.getElementById('new-drops-pill');
  if (pill && pendingNewDropIds.length > 0) pill.style.display = 'block';
  document.getElementById('composer-container').style.display = 'block';
  document.getElementById('drop-feed').style.display = 'block';
  
  if (document.getElementById('drop-feed').children.length === 0) {
    document.getElementById('following-empty').style.display = 'block';
  }
  
  const loadMoreBtn = document.getElementById('load-more-btn');
  if (loadMoreBtn && hasMoreDrops) loadMoreBtn.style.display = 'block';

  // Clean URL parameters
  history.pushState(null, '', window.location.pathname);

  // Restore scroll position
  window.scrollTo({ top: feedScrollPosition, behavior: 'instant' });
  
  updateActiveNav('home');
}

// Listen to browser popstate to handle back/forward correctly
window.addEventListener('popstate', (e) => {
  if (e.state && e.state.commentId) {
    // Navigating back/forward within a comment detail
    // Rebuild the comment from scratch
    sb.from('drop_yorumlar').select('*, kullanicilar:kullanici_id(id, kullanici_adi, avatar_url)')
      .eq('id', e.state.commentId).maybeSingle().then(({ data: comment }) => {
        if (comment) {
          // Flatten join
          if (comment.kullanicilar && !Array.isArray(comment.kullanicilar)) {
            // already single object
          }
          showCommentDetail(comment, e.state.dropId, false);
        }
      });
  } else if (e.state && e.state.dropId) {
    showDropDetail(e.state.dropId, false);
  } else if (e.state && e.state.explore) {
    showExploreView(false);
  } else {
    // Show main feed if no drop state
    currentCommentDetailId = null;
    document.getElementById('comment-detail-container').style.display = 'none';
    document.getElementById('explore-container').style.display = 'none';
    exploreActive = false;
    if (currentDetailDropId !== null || exploreActive) {
      showFeed();
    }
  }
});

// =============================================
// INIT
// =============================================
async function init() {
  try {
    SERVERS = await dbHelper.getGlobalServers();
  } catch (e) {
    console.warn("Could not load global servers:", e);
  }

  // Check session
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const { data: profile } = await sb.from('kullanicilar')
      .select('*')
      .eq('email', session.user.email)
      .maybeSingle();
    if (profile) {
      currentUser = { ...session.user, id: profile.id };
      currentProfile = profile;
      if (typeof currentProfile.favori_sunucular === 'string') {
        try {
          currentProfile.favori_sunucular = JSON.parse(currentProfile.favori_sunucular);
        } catch (e) {
          currentProfile.favori_sunucular = [];
        }
      }
      if (!currentProfile.favori_sunucular) {
        currentProfile.favori_sunucular = [];
      }
      await loadFollowedUsers();
    } else {
      window.location.href = 'giris.html';
      return;
    }
  }

  buildNav();
  buildLeftSidebar();
  buildComposer();
  buildMobileNav();
  buildCarkWidget();

  // Default tab: if logged in with follows → takip, else kesif
  if (!currentUser || followedUsers.size === 0) {
    currentTab = 'kesif';
    document.getElementById('tab-takip').classList.remove('active');
    document.getElementById('tab-kesif').classList.add('active');
  }

  await loadDrops();

  }
}

async function openEditDropModal(drop, card) {
  const modalId = 'modal-edit-drop';
  let overlay = document.getElementById(modalId);
  if (overlay) overlay.remove();

  overlay = document.createElement('div');
  overlay.id = modalId;
  overlay.className = 'modal-overlay';
  
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.style.width = '400px';

  const header = document.createElement('div');
  header.className = 'modal-header';
  header.innerHTML = `
    <h3 class="modal-title">Dropu Düzenle</h3>
    <button class="modal-close">✖</button>
  `;

  const body = document.createElement('div');
  body.className = 'modal-body';
  
  const textarea = document.createElement('textarea');
  textarea.className = 'input-field';
  textarea.style.minHeight = '100px';
  textarea.style.marginBottom = '15px';
  textarea.style.resize = 'none';
  
  let content = drop.icerik || '';
  let cleanText = '';
  let isRedrop = false;
  let parsedPayload = null;

  try {
    const payload = JSON.parse(content);
    if (payload.is_redrop) {
      isRedrop = true;
      parsedPayload = payload;
      cleanText = payload.quote_comment || '';
    } else {
      cleanText = content.replace(/\n\n\(Düzenlendi: .*\)$/, '');
    }
  } catch (e) {
    cleanText = content.replace(/\n\n\(Düzenlendi: .*\)$/, '');
  }
  
  textarea.value = cleanText;

  const btnRow = document.createElement('div');
  btnRow.style.display = 'flex';
  btnRow.style.justifyContent = 'flex-end';
  btnRow.style.gap = '10px';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn mc-gray';
  cancelBtn.textContent = 'İptal';
  
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn mc-green';
  saveBtn.textContent = 'Kaydet';

  btnRow.appendChild(cancelBtn);
  btnRow.appendChild(saveBtn);

  body.appendChild(textarea);
  body.appendChild(btnRow);

  modal.appendChild(header);
  modal.appendChild(body);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  const close = () => overlay.remove();
  header.querySelector('.modal-close').onclick = close;
  cancelBtn.onclick = close;

  saveBtn.onclick = async () => {
    const newText = textarea.value.trim();
    if (!newText) return;
    saveBtn.disabled = true;
    saveBtn.textContent = 'Kaydediliyor...';
    try {
      const now = new Date();
      const dateStr = now.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
      let finalContent = newText;

      if (isRedrop && parsedPayload) {
        parsedPayload.quote_comment = newText;
        finalContent = JSON.stringify(parsedPayload);
      } else {
        finalContent = newText + `\n\n(Düzenlendi: ${dateStr})`;
      }

      const { error } = await sb.from('droplar').update({ icerik: finalContent }).eq('id', drop.id);
      if (error) throw error;
      showToast('Drop güncellendi', 'success');
      loadDrops();
      close();
    } catch (e) {
      console.error(e);
      showToast('Güncellenirken hata oluştu', 'error');
      saveBtn.disabled = false;
      saveBtn.textContent = 'Kaydet';
    }
  };
}

function initExploreBannerCanvas(canvas) {
  const ctx = canvas.getContext('2d');
  let w = canvas.width = canvas.offsetWidth || 280;
  let h = canvas.height = 90;
  
  let beams = Array.from({length: 3}, () => ({
    x: Math.random() * w,
    speed: 0.15 + Math.random() * 0.2,
    width: 15 + Math.random() * 25,
    alpha: 0.04 + Math.random() * 0.05
  }));
  
  function draw() {
    if (!canvas.isConnected) return;
    ctx.fillStyle = '#050c05';
    ctx.fillRect(0, 0, w, h);
    
    beams.forEach(b => {
      ctx.save();
      const g = ctx.createLinearGradient(b.x - b.width/2, 0, b.x + b.width/2, 0);
      g.addColorStop(0, 'transparent');
      g.addColorStop(0.5, `rgba(57,255,20,${b.alpha})`);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(b.x - b.width/2, 0, b.width, h);
      ctx.restore();
      
      b.x += b.speed;
      if (b.x > w + b.width) b.x = -b.width;
    });
    
    requestAnimationFrame(draw);
  }
  draw();
}

function initExploreEvents() {

      renderExploreGrid();
    });
  }
}

function updateActiveNav(pageKey) {
  document.querySelectorAll('.sidebar-nav-item, .nav-link, .mobile-nav-item').forEach(el => {
    const text = el.textContent.trim();
    const isHome = text.includes('Ana Sayfa') || el.getAttribute('href') === 'lobbyx.html';
    const isExplore = text.includes('Keşfet') || el.getAttribute('href') === 'kesfet.html';

    if (pageKey === 'home') {
      if (isHome) el.classList.add('active');
      else if (isExplore) el.classList.remove('active');
    } else if (pageKey === 'explore') {
      if (isExplore) el.classList.add('active');
      else if (isHome) el.classList.remove('active');
    }
  });
}

  const text = link.textContent.trim();
  if (text.includes('Keşfet') || link.getAttribute('href') === 'kesfet.html') {
    e.preventDefault();
    showExploreView(true);
  } else if (text.includes('Ana Sayfa') || link.getAttribute('href') === 'lobbyx.html') {
    if (exploreActive || currentDetailDropId !== null || currentCommentDetailId !== null) {
      e.preventDefault();
      showFeed();
    }
  }
});

// Update init to check for explore param and bind events
const originalInit = init;
init = async function() {
  await originalInit();
  initExploreEvents();
  
  // Check for deep-linked explore page
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('page') === 'explore') {
    showExploreView(false);
  }
};

init();
</script>
