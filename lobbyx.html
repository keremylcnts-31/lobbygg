<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27><text y=%27.9em%27 font-size=%2790%27>🎮</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LobbyX - LOBBY.GG</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;color:#ccc;font-family:'Montserrat',sans-serif;min-height:100vh;}
.nav{background:#050505;border-bottom:2px solid #111;padding:0 5%;display:flex;justify-content:space-between;align-items:center;height:56px;position:sticky;top:0;z-index:100;}
.nav-logo{font-size:20px;font-weight:900;color:#fff;text-decoration:none;}
.nav-logo span{color:#39ff14;}
.mc-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:#3a3a3a;color:#ccc!important;padding:9px 16px;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:900;text-transform:uppercase;cursor:pointer;border-top:2px solid #555;border-left:2px solid #555;border-right:2px solid #111;border-bottom:3px solid #111;text-decoration:none;transition:0.1s;}
.mc-btn:hover{filter:brightness(1.15);}
.mc-btn-green{background:#3a7d1e;color:#fff!important;border-top-color:#5cb832;border-left-color:#4a9e25;border-right-color:#1e4a09;border-bottom-color:#1e4a09;}
.wrap{max-width:900px;margin:0 auto;padding:24px 20px;display:grid;grid-template-columns:1fr 280px;gap:18px;align-items:start;}
.feed{min-width:0;}
.sidebar{position:sticky;top:74px;}
.drop-yaz{background:#111;border-top:2px solid #1a1a1a;border-left:2px solid #1a1a1a;border-right:2px solid #050505;border-bottom:3px solid #050505;border-radius:2px;padding:16px;margin-bottom:14px;}
.drop-kart{background:#111;border-top:2px solid #1a1a1a;border-left:2px solid #1a1a1a;border-right:2px solid #050505;border-bottom:2px solid #050505;border-radius:2px;padding:16px;margin-bottom:10px;transition:0.15s;}
.drop-kart:hover{background:#131313;}
.drop-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;cursor:pointer;}
.drop-av{width:40px;height:40px;border-radius:3px;overflow:hidden;flex-shrink:0;border:2px solid #2a2a2a;}
.drop-av img{width:100%;height:100%;object-fit:cover;}
.drop-nick{font-size:12px;font-weight:900;color:#fff;}
.drop-meta{font-size:9px;color:#444;margin-top:2px;}
.drop-icerik{font-size:13px;color:#ccc;line-height:1.8;margin-bottom:12px;word-break:break-word;}
.drop-gorsel{width:100%;border-radius:2px;max-height:400px;object-fit:cover;margin-bottom:12px;border:1px solid #1a1a1a;cursor:pointer;}
.drop-aksiyonlar{display:flex;gap:20px;border-top:1px solid #0d0d0d;padding-top:12px;}
.drop-btn{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:800;color:#444;cursor:pointer;background:none;border:none;font-family:'Montserrat',sans-serif;text-transform:uppercase;transition:0.15s;}
.drop-btn:hover{color:#ccc;}
.drop-btn.begendi{color:#ff1493;}
.textarea{width:100%;background:#0d0d0d;border-top:2px solid #080808;border-left:2px solid #080808;border-right:2px solid #1e1e1e;border-bottom:2px solid #1e1e1e;color:#ccc;padding:12px;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;outline:none;resize:none;min-height:80px;margin-bottom:10px;}
.textarea::placeholder{color:#1e1e1e;}
.box{background:#111;border-top:2px solid #1a1a1a;border-left:2px solid #1a1a1a;border-right:2px solid #050505;border-bottom:3px solid #050505;border-radius:2px;padding:16px;margin-bottom:12px;}
.box-title{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#444;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.box-title::before{content:'';display:block;width:3px;height:12px;background:#39ff14;border-radius:2px;}
.trend-item{padding:10px 0;border-bottom:1px solid #0d0d0d;cursor:pointer;transition:0.15s;}
.trend-item:last-child{border-bottom:none;}
.trend-item:hover{opacity:0.8;}
.trend-num{font-size:9px;color:#444;font-weight:700;text-transform:uppercase;}
.trend-tag{font-size:12px;font-weight:900;color:#fff;margin:2px 0;}
.trend-sayi{font-size:9px;color:#444;}
.kul-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #0d0d0d;cursor:pointer;transition:0.15s;}
.kul-item:last-child{border-bottom:none;}
.kul-item:hover{opacity:0.8;}
.kul-av{width:34px;height:34px;border-radius:2px;overflow:hidden;flex-shrink:0;border:2px solid #2a2a2a;}
.kul-av img{width:100%;height:100%;object-fit:cover;}
.tabs{display:flex;gap:0;border-bottom:2px solid #1a1a1a;margin-bottom:14px;}
.tab{padding:12px 16px;font-size:10px;font-weight:900;color:#444;text-transform:uppercase;cursor:pointer;border-bottom:3px solid transparent;transition:0.15s;}
.tab:hover{color:#888;}
.tab.active{color:#39ff14;border-bottom-color:#39ff14;}
.yorum-wrap{margin-top:12px;border-top:1px solid #0d0d0d;padding-top:12px;display:none;}
.gorsel-modal{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:999;cursor:pointer;}
.gorsel-modal.active{display:flex;}
.gorsel-modal img{max-width:95vw;max-height:95vh;object-fit:contain;}
#loading{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;}
.ld-logo{font-size:26px;font-weight:900;color:#fff;}
.ld-logo span{color:#39ff14;}
.ld-bar{width:180px;height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden;}
.ld-fill{height:100%;background:#39ff14;animation:ld 1.5s ease infinite;}
@keyframes ld{0%{width:0%}50%{width:70%}100%{width:100%}}
@media(max-width:768px){.wrap{grid-template-columns:1fr;}.sidebar{display:none;}}
</style>
</head>
<body>
<div id="loading"><div class="ld-logo">LOBBY<span>.GG</span></div><div class="ld-bar"><div class="ld-fill"></div></div></div>

<div class="gorsel-modal" id="gorsel-modal" onclick="this.classList.remove('active')"><img id="gorsel-modal-img" src=""></div>

<nav class="nav">
  <a href="/lobbygg/index.html" class="nav-logo">LOBBY<span>.GG</span></a>
  <div style="display:flex;gap:8px;align-items:center;">
    <a href="/lobbygg/index.html" class="mc-btn"><i class="fa-solid fa-house"></i></a>
    <a href="/lobbygg/panel.html" class="mc-btn mc-btn-green"><i class="fa-solid fa-gauge-high"></i> Panel</a>
  </div>
</nav>

<div class="wrap">
  <div class="feed">
    <div class="tabs">
      <div class="tab active" onclick="tabSec('hepsi',this)">🔥 Tüm Droplar</div>
      <div class="tab" onclick="tabSec('takip',this)">👥 Takip Ettiklerim</div>
    </div>

    <div id="drop-yaz-wrap" style="display:none;">
      <div class="drop-yaz">
        <div style="display:flex;gap:10px;">
          <div class="drop-av"><img id="yazar-pp" src="" onerror="this.src='https://minotar.net/helm/Steve/40.png'"></div>
          <textarea class="textarea" id="drop-yazi" placeholder="Ne düşünüyorsun? Bir şeyler paylaş..." rows="2" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        </div>
        <div id="gorsel-onizleme" style="display:none;margin:8px 0;"><img id="onizleme-img" style="max-width:100%;max-height:150px;border-radius:2px;border:1px solid #2a2a2a;"><br><button onclick="gorselTemizle()" style="font-size:9px;color:#ff4444;background:none;border:none;cursor:pointer;font-family:Montserrat,sans-serif;margin-top:4px;">✕ Kaldır</button></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;">
          <div style="display:flex;gap:6px;">
            <input type="file" id="gorsel-input" accept="image/*" style="display:none;" onchange="gorselSec(this)">
            <button class="mc-btn" onclick="document.getElementById('gorsel-input').click()" style="padding:6px 10px;font-size:9px;"><i class="fa-solid fa-image"></i></button>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:9px;color:#333;" id="karakter-sayac">0/280</span>
            <button class="mc-btn mc-btn-green" onclick="dropPaylas()" style="padding:8px 20px;"><i class="fa-solid fa-paper-plane"></i> Drop</button>
          </div>
        </div>
      </div>
    </div>

    <div id="dogrulama-uyari" style="display:none;" class="box" style="text-align:center;">
      <div style="font-size:12px;color:#555;text-align:center;padding:8px 0;">Drop paylaşmak için <strong style="color:#1da1f2;">Gmail doğrulaması</strong> gereklidir. <a href="/lobbygg/panel.html" style="color:#39ff14;">Başvur →</a></div>
    </div>

    <div id="giris-uyari" style="display:none;" class="box">
      <div style="font-size:12px;color:#555;text-align:center;padding:8px 0;">Paylaşım yapmak ve beğenmek için <a href="/lobbygg/giris.html" style="color:#39ff14;">giriş yap →</a></div>
    </div>

    <div id="feed-wrap"><div style="text-align:center;padding:40px;color:#333;font-size:11px;">Yükleniyor...</div></div>
  </div>

  <div class="sidebar">
    <div class="box">
      <div class="box-title">Aktif Kullanıcılar</div>
      <div id="aktif-kullanicilar"><div style="text-align:center;padding:16px;color:#333;font-size:11px;">Yükleniyor...</div></div>
    </div>
    <div class="box">
      <div class="box-title">Popüler İlanlar</div>
      <div id="pop-ilanlar"><div style="text-align:center;padding:16px;color:#333;font-size:11px;">Yükleniyor...</div></div>
    </div>
  </div>
</div>

<script>
const SB=window.supabase.createClient('https://hmkeedyqmzblnmkhdste.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhta2VlZHlxbXpibG5ta2hkc3RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODE3MzYsImV4cCI6MjA5NDM1NzczNn0.5HUInmQs_LsXYovJgI7Ir9q8M9aPlQW6jM5C43aYmqA');
let benKim=null,gorselBase64=null,aktifTab='hepsi';

async function init(){
  const{data:{session}}=await SB.auth.getSession();
  if(session){
    const{data}=await SB.from('kullanicilar').select('*').eq('email',session.user.email);
    if(data&&data.length>0){
      benKim=data[0];
      const pp=document.getElementById('yazar-pp');
      pp.src=benKim.avatar_url||`https://minotar.net/helm/${benKim.kullanici_adi||'Steve'}/40.png`;
      if(benKim.dogrulama_rozeti){document.getElementById('drop-yaz-wrap').style.display='block';}
      else{document.getElementById('dogrulama-uyari').style.display='block';}
    }
  }else{document.getElementById('giris-uyari').style.display='block';}
  document.getElementById('drop-yazi')?.addEventListener('input',e=>{document.getElementById('karakter-sayac').textContent=e.target.value.length+'/280';});
  await Promise.allSettled([feedYukle(),sidebariYukle()]);
  document.getElementById('loading').style.display='none';
}

async function feedYukle(){
  let droplar=[];
  if(aktifTab==='hepsi'){
    const{data}=await SB.from('droplar').select('*').order('created_at',{ascending:false}).limit(50);
    droplar=data||[];
  }else if(benKim){
    const{data:takipler}=await SB.from('takipler').select('takip_edilen_id').eq('takip_eden_id',benKim.id);
    if(takipler&&takipler.length){
      const ids=takipler.map(t=>t.takip_edilen_id);
      const{data}=await SB.from('droplar').select('*').in('kullanici_id',ids).order('created_at',{ascending:false}).limit(50);
      droplar=data||[];
    }
  }
  if(!droplar.length){document.getElementById('feed-wrap').innerHTML='<div style="text-align:center;padding:60px;color:#333;"><div style="font-size:40px;margin-bottom:14px;">💬</div><div style="font-size:12px;font-weight:800;text-transform:uppercase;">'+(aktifTab==='takip'&&benKim?'Takip ettiğin kimse drop paylaşmamış':'Henüz drop yok')+'</div></div>';return;}
  const kulIds=[...new Set(droplar.map(d=>d.kullanici_id))];
  const{data:kullar}=await SB.from('kullanicilar').select('id,kullanici_adi,avatar_url,dogrulama_rozeti,aktif_cerceve').in('id',kulIds);
  const kulMap={};(kullar||[]).forEach(k=>kulMap[k.id]=k);
  let begeniMap={};
  if(benKim){
    const{data:begeniler}=await SB.from('drop_begeniler').select('drop_id').eq('kullanici_id',benKim.id).in('drop_id',droplar.map(d=>d.id));
    (begeniler||[]).forEach(b=>begeniMap[b.drop_id]=true);
  }
  document.getElementById('feed-wrap').innerHTML=droplar.map(d=>{
    const k=kulMap[d.kullanici_id]||{};
    const nick=k.kullanici_adi||'?';
    const av=k.avatar_url||`https://minotar.net/helm/${nick}/40.png`;
    const begendi=!!begeniMap[d.id];
    return`<div class="drop-kart" id="drop-${d.id}">
      <div class="drop-header" onclick="window.location.href='/lobbygg/profil.html?id=${d.kullanici_id}'">
        <div class="drop-av"><img src="${av}" onerror="this.src='https://minotar.net/helm/Steve/40.png'"></div>
        <div>
          <div class="drop-nick">${escHtml(nick)} ${k.dogrulama_rozeti?'<span style="background:#1da1f2;border-radius:50%;width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:900;">✓</span>':''}</div>
          <div class="drop-meta">${zaman(d.created_at)}</div>
        </div>
      </div>
      ${d.icerik?`<div class="drop-icerik">${escHtml(d.icerik)}</div>`:''}
      ${d.gorsel_url?`<img src="${d.gorsel_url}" class="drop-gorsel" onclick="gorselBuyut('${d.gorsel_url}')">`:''}
      <div class="drop-aksiyonlar">
        <button class="drop-btn ${begendi?'begendi':''}" id="beg-btn-${d.id}" onclick="begen(${d.id})">
          <i class="fa-${begendi?'solid':'regular'} fa-heart"></i> <span id="beg-sayi-${d.id}">${d.begeni_sayisi||0}</span>
        </button>
        <button class="drop-btn" onclick="yorumToggle(${d.id})"><i class="fa-regular fa-comment"></i> ${d.yorum_sayisi||0}</button>
        ${benKim&&benKim.id===d.kullanici_id?`<button class="drop-btn" onclick="dropSil(${d.id})" style="margin-left:auto;color:#333;"><i class="fa-solid fa-trash"></i></button>`:''}
      </div>
      <div class="yorum-wrap" id="yorum-${d.id}"></div>
    </div>`;
  }).join('');
}

async function sidebariYukle(){
  // Aktif kullanıcılar
  const{data:kullar}=await SB.from('kullanicilar').select('id,kullanici_adi,avatar_url,takipci_sayisi').order('takipci_sayisi',{ascending:false}).limit(6);
  document.getElementById('aktif-kullanicilar').innerHTML=(kullar||[]).map(k=>`
    <div class="kul-item" onclick="window.location.href='/lobbygg/profil.html?id=${k.id}'">
      <div class="kul-av"><img src="${k.avatar_url||`https://minotar.net/helm/${k.kullanici_adi||'Steve'}/34.png`}" onerror="this.src='https://minotar.net/helm/Steve/34.png'"></div>
      <div style="flex:1;min-width:0;"><div style="font-size:11px;font-weight:900;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(k.kullanici_adi||'?')}</div><div style="font-size:9px;color:#444;">${k.takipci_sayisi||0} takipçi</div></div>
      <i class="fa-solid fa-chevron-right" style="font-size:9px;color:#333;"></i>
    </div>`).join('');

  // Popüler ilanlar
  const{data:ilanlar}=await SB.from('ilanlar').select('*').eq('durum','aktif').eq('one_cikan',true).limit(4);
  const tagRenk={is:'#39ff14',yetkili:'#6bb3ff',medya:'#d966ff',reklam:'#FFD700'};
  document.getElementById('pop-ilanlar').innerHTML=(ilanlar&&ilanlar.length)?(ilanlar.map(i=>`
    <div class="kul-item" onclick="window.location.href='/lobbygg/profil.html?id=${i.kullanici_id}'">
      <div style="flex:1;min-width:0;">
        <div style="font-size:9px;color:${tagRenk[i.kategori]||'#aaa'};font-weight:900;text-transform:uppercase;margin-bottom:2px;">${i.kategori}</div>
        <div style="font-size:11px;font-weight:900;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(i.kullanici_nick||i.alt_kategori||'?')}</div>
        <div style="font-size:10px;color:#39ff14;">${i.fiyat&&i.fiyat>0?i.fiyat+' TL':'Görüşülür'}</div>
      </div>
    </div>`).join('')
  ):'<div style="font-size:10px;color:#333;text-align:center;padding:12px;">Öne çıkan ilan yok</div>';
}

function tabSec(tab,el){
  aktifTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('feed-wrap').innerHTML='<div style="text-align:center;padding:30px;color:#333;font-size:11px;">Yükleniyor...</div>';
  feedYukle();
}

function gorselSec(input){
  const f=input.files[0];if(!f)return;
  if(f.size>2*1024*1024){alert('Dosya 2MB\'dan büyük olamaz!');return;}
  const r=new FileReader();r.onload=e=>{gorselBase64=e.target.result;document.getElementById('onizleme-img').src=e.target.result;document.getElementById('gorsel-onizleme').style.display='block';};r.readAsDataURL(f);
}

function gorselTemizle(){gorselBase64=null;document.getElementById('gorsel-onizleme').style.display='none';document.getElementById('gorsel-input').value='';}

function gorselBuyut(src){document.getElementById('gorsel-modal-img').src=src;document.getElementById('gorsel-modal').classList.add('active');}

async function dropPaylas(){
  if(!benKim||!benKim.dogrulama_rozeti)return;
  const icerik=document.getElementById('drop-yazi').value.trim();
  if(!icerik&&!gorselBase64){alert('Bir şeyler yaz!');return;}
  if(icerik.length>280){alert('Maksimum 280 karakter!');return;}
  await SB.from('droplar').insert({kullanici_id:benKim.id,icerik,gorsel_url:gorselBase64||null,begeni_sayisi:0,yorum_sayisi:0});
  document.getElementById('drop-yazi').value='';
  gorselTemizle();
  document.getElementById('karakter-sayac').textContent='0/280';
  feedYukle();
}

async function begen(id){
  if(!benKim){window.location.href='/lobbygg/giris.html';return;}
  if(!benKim.dogrulama_rozeti){alert('Beğenmek için Gmail doğrulaması gerekli!');return;}
  const{data:mevcut}=await SB.from('drop_begeniler').select('id').eq('drop_id',id).eq('kullanici_id',benKim.id);
  const btn=document.getElementById('beg-btn-'+id);
  const sayiEl=document.getElementById('beg-sayi-'+id);
  const s=parseInt(sayiEl?.textContent)||0;
  if(mevcut&&mevcut.length){
    await SB.from('drop_begeniler').delete().eq('drop_id',id).eq('kullanici_id',benKim.id);
    await SB.from('droplar').update({begeni_sayisi:Math.max(0,s-1)}).eq('id',id);
    if(sayiEl)sayiEl.textContent=Math.max(0,s-1);
    if(btn){btn.className='drop-btn';btn.innerHTML=`<i class="fa-regular fa-heart"></i> ${Math.max(0,s-1)}`;}
  }else{
    await SB.from('drop_begeniler').insert({drop_id:id,kullanici_id:benKim.id});
    await SB.from('droplar').update({begeni_sayisi:s+1}).eq('id',id);
    if(sayiEl)sayiEl.textContent=s+1;
    if(btn){btn.className='drop-btn begendi';btn.innerHTML=`<i class="fa-solid fa-heart"></i> ${s+1}`;}
  }
}

async function yorumToggle(dropId){
  const wrap=document.getElementById('yorum-'+dropId);
  if(wrap.style.display==='block'){wrap.style.display='none';return;}
  wrap.style.display='block';
  if(wrap.dataset.loaded){return;}
  wrap.dataset.loaded='1';
  const{data:yorumlar}=await SB.from('drop_yorumlar').select('*').eq('drop_id',dropId).order('created_at',{ascending:true}).limit(20);
  const{data:kullar}=yorumlar?.length?await SB.from('kullanicilar').select('id,kullanici_adi,avatar_url').in('id',yorumlar.map(y=>y.kullanici_id)):{data:[]};
  const km={};(kullar||[]).forEach(k=>km[k.id]=k);
  wrap.innerHTML=`<div id="yorum-liste-${dropId}">${yorumlar&&yorumlar.length?yorumlar.map(y=>{const k=km[y.kullanici_id]||{};return`<div style="display:flex;gap:8px;margin-bottom:8px;"><img src="${k.avatar_url||`https://minotar.net/helm/${k.kullanici_adi||'Steve'}/28.png`}" style="width:28px;height:28px;border-radius:2px;flex-shrink:0;" onerror="this.src='https://minotar.net/helm/Steve/28.png'"><div style="background:#1a1a1a;padding:8px 10px;border-radius:2px;flex:1;"><div style="font-size:10px;font-weight:900;color:#ccc;margin-bottom:3px;cursor:pointer;" onclick="window.location.href='/lobbygg/profil.html?id=${k.id}'">${escHtml(k.kullanici_adi||'?')}</div><div style="font-size:11px;color:#555;">${escHtml(y.yorum)}</div></div></div>`;}).join(''):'<div style="font-size:10px;color:#333;text-align:center;padding:8px;">Henüz yorum yok</div>'}</div>
  ${benKim&&benKim.dogrulama_rozeti?`<div style="display:flex;gap:8px;margin-top:8px;"><input type="text" id="y-input-${dropId}" placeholder="Yorumunu yaz..." style="flex:1;background:#1a1a1a;border:1px solid #2a2a2a;color:#ccc;padding:8px 10px;border-radius:2px;font-family:Montserrat,sans-serif;font-size:11px;outline:none;" onkeydown="if(event.key==='Enter')yorumGonder(${dropId})"><button class="mc-btn mc-btn-green" onclick="yorumGonder(${dropId})" style="padding:8px 12px;font-size:9px;"><i class="fa-solid fa-paper-plane"></i></button></div>`:'<div style="font-size:9px;color:#333;text-align:center;padding:6px;">Yorum için Gmail doğrulaması gerekli.</div>'}`;
}

async function yorumGonder(dropId){
  if(!benKim||!benKim.dogrulama_rozeti)return;
  const input=document.getElementById('y-input-'+dropId);
  const yorum=input?.value?.trim()||'';if(!yorum)return;
  await SB.from('drop_yorumlar').insert({drop_id:dropId,kullanici_id:benKim.id,yorum});
  const{data:d}=await SB.from('droplar').select('yorum_sayisi').eq('id',dropId).single();
  await SB.from('droplar').update({yorum_sayisi:(d?.yorum_sayisi||0)+1}).eq('id',dropId);
  if(input)input.value='';
  const wrap=document.getElementById('yorum-'+dropId);
  delete wrap.dataset.loaded;
  yorumToggle(dropId);yorumToggle(dropId);
}

async function dropSil(id){
  await SB.from('droplar').delete().eq('id',id);
  document.getElementById('drop-'+id)?.remove();
}

function zaman(ts){
  const d=Date.now()-new Date(ts).getTime();
  if(d<60000)return 'Az önce';
  if(d<3600000)return Math.floor(d/60000)+'dk önce';
  if(d<86400000)return Math.floor(d/3600000)+'sa önce';
  return Math.floor(d/86400000)+'g önce';
}

function escHtml(t){return t?.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')||'';}

init();
</script>
