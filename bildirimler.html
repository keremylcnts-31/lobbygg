<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="https://i.imgur.com/6l08Y4k.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bildirimler — LOBBY.GG</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050505;color:#ccc;font-family:'Montserrat',sans-serif;min-height:100vh;}

.nav{background:#050505;border-bottom:1px solid #111;padding:0 5%;display:flex;justify-content:space-between;align-items:center;height:52px;position:sticky;top:0;z-index:100;}
.nav a img{height:36px;object-fit:contain;}
.mc-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:900;text-transform:uppercase;cursor:pointer;text-decoration:none;border:none;transition:.1s;}
.mc-gray{background:#3c3c3c;color:#ddd;border-top:2px solid #6b6b6b;border-left:2px solid #555;border-right:2px solid #111;border-bottom:3px solid #111;}
.mc-green{background:#3a7d1e;color:#fff;border-top:2px solid #5cb832;border-left:2px solid #4a9e25;border-right:2px solid #1e4a09;border-bottom:3px solid #1e4a09;}
.mc-red{background:#7d1e1e;color:#ffaaaa;border-top:2px solid #b83232;border-left:2px solid #9e2525;border-right:2px solid #3a0909;border-bottom:3px solid #3a0909;}

.wrap{max-width:640px;margin:0 auto;padding:20px 16px;}

/* TABS */
.tabs{display:flex;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;margin-bottom:14px;overflow:hidden;}
.tab{flex:1;padding:11px;text-align:center;font-size:10px;font-weight:900;text-transform:uppercase;color:#444;cursor:pointer;transition:.15s;border-bottom:2px solid transparent;}
.tab:hover{color:#ccc;background:#111;}
.tab.active{color:#39ff14;border-bottom-color:#39ff14;background:#0d0d0d;}

/* HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.page-title{font-size:18px;font-weight:900;color:#fff;}
.hepsini-oku{font-size:10px;color:#39ff14;cursor:pointer;font-weight:700;background:none;border:none;font-family:'Montserrat',sans-serif;}
.hepsini-oku:hover{text-decoration:underline;}

/* BİLDİRİM KARTI */
.bildirim-kart{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;margin-bottom:6px;cursor:pointer;transition:.15s;position:relative;}
.bildirim-kart:hover{border-color:#2a2a2a;background:#111;}
.bildirim-kart.okunmamis{border-left:3px solid #39ff14;background:#0d1a0d;}
.bildirim-kart.okunmamis:hover{background:#0f1f0f;}
.bildirim-av{width:42px;height:42px;border-radius:50%;overflow:hidden;border:2px solid #1a1a1a;flex-shrink:0;}
.bildirim-av img{width:100%;height:100%;object-fit:cover;}
.bildirim-ikon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.bildirim-body{flex:1;min-width:0;}
.bildirim-txt{font-size:12px;color:#ccc;line-height:1.6;margin-bottom:3px;}
.bildirim-txt strong{color:#fff;font-weight:900;}
.bildirim-zaman{font-size:9px;color:#444;font-weight:700;}
.bildirim-dot{position:absolute;top:14px;right:14px;width:8px;height:8px;border-radius:50%;background:#39ff14;}

/* TİP RENKLERİ */
.ikon-takip{background:rgba(57,255,20,.1);color:#39ff14;}
.ikon-begeni{background:rgba(255,20,100,.1);color:#ff1464;}
.ikon-yorum{background:rgba(100,150,255,.1);color:#6bb3ff;}
.ikon-mesaj{background:rgba(100,200,255,.1);color:#00d4ff;}
.ikon-sistem{background:rgba(255,215,0,.1);color:#FFD700;}

/* AYARLAR */
.ayar-satir{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;margin-bottom:6px;}
.ayar-sol{display:flex;align-items:center;gap:12px;}
.ayar-ikon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;}
.ayar-bilgi{}
.ayar-lbl{font-size:12px;font-weight:800;color:#fff;}
.ayar-alt{font-size:10px;color:#444;margin-top:1px;}
/* Toggle */
.toggle{position:relative;display:inline-block;width:42px;height:22px;cursor:pointer;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-track{position:absolute;inset:0;background:#2a2a2a;border-radius:22px;transition:.3s;}
.toggle input:checked + .toggle-track{background:#39ff14;}
.toggle-knob{position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:.3s;}
.toggle input:checked ~ .toggle-knob{left:23px;}

/* BOŞ */
.bos{text-align:center;padding:60px 20px;color:#333;}
.bos i{font-size:48px;display:block;margin-bottom:14px;}
.bos p{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}

/* TAKİP İSTEĞİ */
.istek-kart{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;margin-bottom:6px;}
.istek-av{width:42px;height:42px;border-radius:50%;overflow:hidden;border:2px solid #1a1a1a;flex-shrink:0;cursor:pointer;}
.istek-av img{width:100%;height:100%;object-fit:cover;}

/* BİLDİRİM ZİLİ */
.nav-zil{position:relative;cursor:pointer;color:#555;font-size:18px;transition:.15s;text-decoration:none;display:flex;align-items:center;padding:6px;}
.nav-zil:hover{color:#ccc;}
.nav-zil .badge{position:absolute;top:0;right:0;background:#39ff14;color:#000;font-size:8px;font-weight:900;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px;}
.nav-zil .badge.var{display:flex;}
</style>
</head>
<body>
<nav class="nav">
  <a href="/lobbygg/index.html"><img src="https://i.imgur.com/6l08Y4k.png" alt="LOBBY.GG"></a>
  <a href="/lobbygg/index.html" class="mc-btn mc-gray"><i class="fa-solid fa-house"></i> Ana Sayfa</a>
</nav>

<div class="wrap">
  <div class="page-header">
    <div class="page-title">🔔 Bildirimler</div>
    <button class="hepsini-oku" onclick="hepsiniOku()">Tümünü okundu işaretle</button>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-hepsi" onclick="tabDegis('hepsi')">Tümü</div>
    <div class="tab" id="tab-takip" onclick="tabDegis('takip')">👥 Takip</div>
    <div class="tab" id="tab-etkilesim" onclick="tabDegis('etkilesim')">❤️ Etkileşim</div>
    <div class="tab" id="tab-istekler" onclick="tabDegis('istekler')">📬 İstekler</div>
    <div class="tab" id="tab-ayarlar" onclick="tabDegis('ayarlar')">⚙️ Ayarlar</div>
  </div>

  <div id="bildirim-icerik">
    <div class="bos"><i class="fa-solid fa-spinner fa-spin"></i><p>Yükleniyor...</p></div>
  </div>
</div>

<script>
const SB=window.supabase.createClient('https://geegligfkjppvooulstax.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlZWdsaWdma2pwcHZvb3VsdGF4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDE5NzUsImV4cCI6MjA5NDg3Nzk3NX0.CFM-9yBBDLGfWV9qmZ3oixywNq_db-ROA5QI0hcV-74');
let ben=null,aktifTab='hepsi',bildirimler=[],ayarlar={};

const TIP_BILGI={
  takip:{ikon:'fa-user-plus',renk:'ikon-takip',metin:'seni takip etmeye başladı'},
  takip_istegi:{ikon:'fa-user-clock',renk:'ikon-takip',metin:'sana takip isteği gönderdi'},
  takip_kabul:{ikon:'fa-user-check',renk:'ikon-takip',metin:'takip isteğini kabul etti'},
  begeni:{ikon:'fa-heart',renk:'ikon-begeni',metin:'dropunu beğendi'},
  yorum:{ikon:'fa-comment',renk:'ikon-yorum',metin:'dropuna yorum yaptı'},
  yorum_begeni:{ikon:'fa-heart',renk:'ikon-begeni',metin:'yorumunu beğendi'},
  mesaj:{ikon:'fa-envelope',renk:'ikon-mesaj',metin:'sana mesaj gönderdi'},
  sistem:{ikon:'fa-bell',renk:'ikon-sistem',metin:''},
};

async function init(){
  const{data:{session}}=await Promise.race([SB.auth.getSession(),new Promise(r=>setTimeout(()=>r({data:{session:null}}),3000))]);
  if(!session){
    document.getElementById('bildirim-icerik').innerHTML='<div class="bos"><i class="fa-solid fa-lock"></i><p>Giriş yapman gerekiyor</p><a href="/lobbygg/giris.html" class="mc-btn mc-green" style="margin-top:14px;">Giriş Yap</a></div>';
    return;
  }
  const{data}=await SB.from('kullanicilar').select('*').eq('email',session.user.email);
  if(!data?.length)return;
  ben=data[0];

  // Ayarları yükle
  const{data:a}=await SB.from('bildirim_ayarlari').select('*').eq('kullanici_id',Number(ben.id));
  ayarlar=a?.[0]||{takip_bildirimi:true,begeni_bildirimi:true,yorum_bildirimi:true,mesaj_bildirimi:true};

  await bildirimleriYukle();
  realtimeBaslat();
}

async function bildirimleriYukle(){
  const{data}=await SB.from('bildirimler').select('*')
    .eq('alici_id',Number(ben.id))
    .order('created_at',{ascending:false})
    .limit(60);
  bildirimler=data||[];
  render();
}

function render(){
  const el=document.getElementById('bildirim-icerik');

  if(aktifTab==='ayarlar'){
    renderAyarlar();return;
  }
  if(aktifTab==='istekler'){
    renderIstekler();return;
  }

  let liste=bildirimler;
  if(aktifTab==='takip') liste=bildirimler.filter(b=>['takip','takip_istegi','takip_kabul'].includes(b.tip));
  if(aktifTab==='etkilesim') liste=bildirimler.filter(b=>['begeni','yorum','yorum_begeni'].includes(b.tip));

  if(!liste.length){
    el.innerHTML='<div class="bos"><i class="fa-solid fa-bell-slash"></i><p>Bildirim yok</p></div>';
    return;
  }

  // Gonderen bilgilerini çek
  const gIds=[...new Set(liste.filter(b=>b.gonderen_id).map(b=>b.gonderen_id))];
  SB.from('kullanicilar').select('id,kullanici_adi,avatar_url,dogrulama_rozeti').in('id',gIds).then(({data:kullar})=>{
    const km={};(kullar||[]).forEach(k=>km[k.id]=k);
    el.innerHTML=liste.map(b=>{
      const g=km[b.gonderen_id]||null;
      const tb=TIP_BILGI[b.tip]||TIP_BILGI.sistem;
      const avHTML=g
        ?'<div class="bildirim-av"><img src="'+(g.avatar_url||'https://minotar.net/helm/'+(g.kullanici_adi||'Steve')+'/42.png')+'" onerror="this.src=\'https://minotar.net/helm/Steve/42.png\'"></div>'
        :'<div class="bildirim-ikon '+tb.renk+'"><i class="fa-solid '+tb.ikon+'"></i></div>';
      const txt=g
        ?'<strong>'+(g.kullanici_adi||'?')+'</strong> '+(b.icerik||tb.metin)
        :(b.icerik||'Yeni bildirim');
      return'<div class="bildirim-kart'+(b.okundu?'':' okunmamis')+'" onclick="bildirimAc('+b.id+',\''+( b.link||'')+'\')">'+
        avHTML+
        '<div class="bildirim-body">'+
          '<div class="bildirim-txt">'+txt+'</div>'+
          '<div class="bildirim-zaman"><i class="fa-regular fa-clock"></i> '+zaman(b.created_at)+'</div>'+
        '</div>'+
        (!b.okundu?'<div class="bildirim-dot"></div>':'')+
      '</div>';
    }).join('');
  });
}

async function renderIstekler(){
  const el=document.getElementById('bildirim-icerik');
  const{data:istekler}=await SB.from('takip_istekleri').select('*').eq('alici_id',Number(ben.id)).eq('durum','beklemede').limit(30);
  if(!istekler?.length){
    el.innerHTML='<div class="bos"><i class="fa-solid fa-user-clock"></i><p>Bekleyen istek yok</p></div>';
    return;
  }
  const ids=istekler.map(i=>i.gonderen_id);
  const{data:kullar}=await SB.from('kullanicilar').select('id,kullanici_adi,avatar_url').in('id',ids);
  const km={};(kullar||[]).forEach(k=>km[k.id]=k);
  el.innerHTML=istekler.map(istek=>{
    const k=km[istek.gonderen_id]||{};
    return'<div class="istek-kart" id="istek-'+istek.id+'">'+
      '<div class="istek-av" onclick="location.href=\'/lobbygg/profil.html?id='+k.id+'\'"><img src="'+(k.avatar_url||'https://minotar.net/helm/'+(k.kullanici_adi||'Steve')+'/42.png')+'" onerror="this.src=\'https://minotar.net/helm/Steve/42.png\'"></div>'+
      '<div style="flex:1;"><div style="font-size:12px;font-weight:900;color:#fff;cursor:pointer;" onclick="location.href=\'/lobbygg/profil.html?id='+k.id+'\'">'+( k.kullanici_adi||'?')+'</div>'+
      '<div style="font-size:10px;color:#444;margin-top:2px;">Takip isteği gönderdi</div></div>'+
      '<div style="display:flex;gap:7px;">'+
      '<button class="mc-btn mc-green" onclick="istekKabul('+istek.id+','+istek.gonderen_id+')" style="padding:6px 12px;font-size:9px;">✓ Kabul</button>'+
      '<button class="mc-btn mc-red" onclick="istekReddet('+istek.id+')" style="padding:6px 12px;font-size:9px;">✕ Reddet</button>'+
      '</div></div>';
  }).join('');
}

function renderAyarlar(){
  const el=document.getElementById('bildirim-icerik');
  const ayarListesi=[
    {key:'takip_bildirimi',ikon:'fa-user-plus',renk:'ikon-takip',lbl:'Takip Bildirimleri',alt:'Biri seni takip ettiğinde'},
    {key:'begeni_bildirimi',ikon:'fa-heart',renk:'ikon-begeni',lbl:'Beğeni Bildirimleri',alt:'Biri dropunu beğendiğinde'},
    {key:'yorum_bildirimi',ikon:'fa-comment',renk:'ikon-yorum',lbl:'Yorum Bildirimleri',alt:'Biri dropuna yorum yaptığında'},
    {key:'mesaj_bildirimi',ikon:'fa-envelope',renk:'ikon-mesaj',lbl:'Mesaj Bildirimleri',alt:'Biri sana mesaj gönderdiğinde'},
  ];
  el.innerHTML=ayarListesi.map(a=>'<div class="ayar-satir">'+
    '<div class="ayar-sol">'+
      '<div class="ayar-ikon '+a.renk+'"><i class="fa-solid '+a.ikon+'"></i></div>'+
      '<div class="ayar-bilgi"><div class="ayar-lbl">'+a.lbl+'</div><div class="ayar-alt">'+a.alt+'</div></div>'+
    '</div>'+
    '<label class="toggle">'+
      '<input type="checkbox" '+(ayarlar[a.key]!==false?'checked':'')+' onchange="ayarDegis(\''+a.key+'\',this.checked)">'+
      '<div class="toggle-track"></div>'+
      '<div class="toggle-knob"></div>'+
    '</label>'+
  '</div>').join('')+
  '<button class="mc-btn mc-green" onclick="ayarKaydet()" style="width:100%;justify-content:center;padding:13px;margin-top:10px;font-size:12px;"><i class="fa-solid fa-floppy-disk"></i> Kaydet</button>'+
  '<div id="ayar-msg" style="display:none;text-align:center;padding:10px;font-size:11px;font-weight:800;margin-top:8px;border-radius:4px;"></div>';
}

function ayarDegis(key,val){ayarlar[key]=val;}
async function ayarKaydet(){
  const msg=document.getElementById('ayar-msg');
  const guncel={kullanici_id:Number(ben.id),...ayarlar};
  const{error}=await SB.from('bildirim_ayarlari').upsert(guncel,{onConflict:'kullanici_id'});
  if(msg){msg.style.display='block';msg.style.color=error?'#f85149':'#39ff14';msg.style.background=error?'rgba(255,50,50,.08)':'rgba(57,255,20,.08)';msg.style.border='1px solid '+(error?'rgba(255,50,50,.2)':'rgba(57,255,20,.2)');msg.textContent=error?'❌ Hata: '+error.message:'✅ Kaydedildi!';}
}

async function bildirimAc(id,link){
  await SB.from('bildirimler').update({okundu:true}).eq('id',id);
  bildirimler=bildirimler.map(b=>b.id===id?{...b,okundu:true}:b);
  if(link)location.href=link;else render();
}

async function hepsiniOku(){
  await SB.from('bildirimler').update({okundu:true}).eq('alici_id',Number(ben.id)).eq('okundu',false);
  bildirimler=bildirimler.map(b=>({...b,okundu:true}));
  render();
}

async function istekKabul(istekId,gondId){
  await SB.from('takip_istekleri').update({durum:'kabul'}).eq('id',istekId);
  // Takipler tablosuna ekle
  const{data:benProfil}=await SB.from('kullanicilar').select('takipci_sayisi').eq('id',Number(ben.id)).single();
  await SB.from('takipler').insert({takip_eden_id:gondId,takip_edilen_id:Number(ben.id)});
  await SB.from('kullanicilar').update({takipci_sayisi:(benProfil?.takipci_sayisi||0)+1}).eq('id',Number(ben.id));
  // Kabul bildirimi
  await SB.from('bildirimler').insert({alici_id:gondId,gonderen_id:Number(ben.id),tip:'takip_kabul',icerik:'Takip isteğini kabul etti.',link:'/lobbygg/profil.html?id='+ben.id,okundu:false});
  document.getElementById('istek-'+istekId)?.remove();
}

async function istekReddet(istekId){
  await SB.from('takip_istekleri').update({durum:'red'}).eq('id',istekId);
  document.getElementById('istek-'+istekId)?.remove();
}

function tabDegis(tab){
  aktifTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab)?.classList.add('active');
  render();
  if(tab==='istekler')renderIstekler();
}

function realtimeBaslat(){
  SB.channel('bildirim-rt-'+Date.now())
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'bildirimler',filter:'alici_id=eq.'+Number(ben.id)},
      async()=>await bildirimleriYukle())
    .subscribe();
}

function zaman(ts){if(!ts)return'';const d=Date.now()-new Date(ts).getTime();if(d<60000)return'Az önce';if(d<3600000)return Math.floor(d/60000)+'dk önce';if(d<86400000)return Math.floor(d/3600000)+'sa önce';if(d<604800000)return Math.floor(d/86400000)+'g önce';return new Date(ts).toLocaleDateString('tr-TR',{day:'numeric',month:'short'});}


// NAV ZİL
async function navZilYukle(){
  try{
    const{data:{session}}=await SB.auth.getSession();
    if(!session)return;
    const{data:kul}=await SB.from('kullanicilar').select('id').eq('email',session.user.email);
    if(!kul?.length)return;
    const{count}=await SB.from('bildirimler').select('*',{count:'exact',head:true}).eq('alici_id',Number(kul[0].id)).eq('okundu',false);
    const badge=document.getElementById('nav-zil-badge');
    if(badge&&count>0){badge.textContent=count>9?'9+':count;badge.classList.add('var');}
  }catch(e){}
}
navZilYukle();

init();
</script>
</body>
</html>
