<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="https://i.imgur.com/6l08Y4k.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesajlar — LOBBY.GG</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050505;color:#ccc;font-family:'Montserrat',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.nav{background:#050505;border-bottom:1px solid #111;padding:0 5%;display:flex;justify-content:space-between;align-items:center;height:52px;flex-shrink:0;}
.nav a img{height:36px;object-fit:contain;}
.mc-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:900;text-transform:uppercase;cursor:pointer;text-decoration:none;border:none;transition:.1s;}
.mc-gray{background:#3c3c3c;color:#ddd;border-top:2px solid #6b6b6b;border-left:2px solid #555;border-right:2px solid #111;border-bottom:3px solid #111;}
.mc-green{background:#3a7d1e;color:#fff;border-top:2px solid #5cb832;border-left:2px solid #4a9e25;border-right:2px solid #1e4a09;border-bottom:3px solid #1e4a09;}
.mc-green:hover{filter:brightness(1.1);}
.mc-red{background:#7d1e1e;color:#ffaaaa;border-top:2px solid #b83232;border-left:2px solid #9e2525;border-right:2px solid #3a0909;border-bottom:3px solid #3a0909;}

.dm-wrap{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px);}

/* SOL */
.sol{width:300px;flex-shrink:0;border-right:1px solid #111;display:flex;flex-direction:column;background:#080808;}
.sol-baslik{padding:14px 16px 10px;border-bottom:1px solid #111;display:flex;align-items:center;justify-content:space-between;}
.sol-baslik span{font-size:13px;font-weight:900;color:#fff;}
.sol-tabs{display:flex;border-bottom:1px solid #111;}
.sol-tab{flex:1;padding:10px;text-align:center;font-size:9px;font-weight:900;text-transform:uppercase;color:#444;cursor:pointer;border-bottom:2px solid transparent;transition:.15s;}
.sol-tab.active{color:#39ff14;border-bottom-color:#39ff14;}
.sol-ara{padding:8px 12px;border-bottom:1px solid #111;}
.sol-ara input{width:100%;background:#111;border:1px solid #1a1a1a;color:#ccc;padding:8px 12px;border-radius:16px;font-family:'Montserrat',sans-serif;font-size:11px;outline:none;}
.sol-ara input::placeholder{color:#333;}
.sol-liste{flex:1;overflow-y:auto;}
.sol-liste::-webkit-scrollbar{width:3px;}
.sol-liste::-webkit-scrollbar-thumb{background:#1a1a1a;}

/* SOHBET KARTI */
.sohbet-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid #0d0d0d;transition:.15s;position:relative;user-select:none;}
.sohbet-item:hover{background:#0d0d0d;}
.sohbet-item.active{background:#0f1a0f;border-left:3px solid #39ff14;}
.sohbet-item.sabitli::before{content:'📌';position:absolute;top:6px;right:8px;font-size:9px;}
.sav{width:42px;height:42px;border-radius:50%;overflow:hidden;border:2px solid #1a1a1a;flex-shrink:0;}
.sav img{width:100%;height:100%;object-fit:cover;}
.sinfo{flex:1;min-width:0;}
.snick{font-size:11px;font-weight:900;color:#fff;display:flex;align-items:center;gap:4px;}
.sson{font-size:10px;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.szaman{font-size:8px;color:#333;flex-shrink:0;}
.sbadge{background:#39ff14;color:#000;font-size:8px;font-weight:900;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bos-mesaj{padding:32px 16px;text-align:center;color:#333;font-size:11px;}

/* SAĞ */
.sag{flex:1;display:flex;flex-direction:column;background:#050505;}
.bos-ekran{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#222;gap:12px;}
.bos-ekran i{font-size:48px;}
.bos-ekran p{font-size:12px;font-weight:700;text-transform:uppercase;}

/* SOHBET HEADER */
.chat-header{padding:12px 18px;border-bottom:1px solid #111;display:flex;align-items:center;gap:12px;flex-shrink:0;background:#080808;}
.chat-header-av{width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid #1a1a1a;cursor:pointer;}
.chat-header-av img{width:100%;height:100%;object-fit:cover;}
.chat-header-nick{font-size:13px;font-weight:900;color:#fff;cursor:pointer;}
.chat-header-nick:hover{color:#39ff14;}

/* MESAJLAR */
.chat-alan{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:6px;}
.chat-alan::-webkit-scrollbar{width:4px;}
.chat-alan::-webkit-scrollbar-thumb{background:#1a1a1a;}
.msg-wrap{display:flex;gap:8px;max-width:68%;align-items:flex-end;}
.msg-wrap.ben{align-self:flex-end;flex-direction:row-reverse;}
.msg-wrap.karsi{align-self:flex-start;}
.msg-av{width:26px;height:26px;border-radius:50%;overflow:hidden;flex-shrink:0;}
.msg-av img{width:100%;height:100%;object-fit:cover;}
.msg-buble{padding:8px 12px;max-width:100%;word-break:break-word;}
.msg-buble.ben{background:#1a4a0a;border:1px solid #2a7010;border-radius:14px 14px 2px 14px;}
.msg-buble.karsi{background:#111;border:1px solid #1a1a1a;border-radius:14px 14px 14px 2px;}
.msg-txt{font-size:13px;color:#ddd;line-height:1.5;}
.msg-zaman{font-size:8px;color:rgba(255,255,255,.4);margin-top:3px;text-align:right;}
.msg-wrap.karsi .msg-zaman{color:#444;text-align:left;}
.msg-img{max-width:200px;border-radius:8px;cursor:pointer;display:block;margin-bottom:4px;}
.tarih-sep{text-align:center;font-size:9px;color:#2a2a2a;font-weight:700;padding:8px 0;text-transform:uppercase;letter-spacing:1px;}

/* YAZI */
.chat-yaz{padding:10px 14px;border-top:1px solid #111;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:#080808;}
.yaz-in{flex:1;background:#111;border:1px solid #1a1a1a;color:#ccc;padding:9px 13px;border-radius:18px;font-family:'Montserrat',sans-serif;font-size:13px;outline:none;resize:none;max-height:100px;overflow-y:auto;transition:.15s;line-height:1.4;}
.yaz-in:focus{border-color:#39ff14;}
.yaz-in::placeholder{color:#333;}
.yaz-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none;transition:.15s;}
.yaz-dosya{background:#1a1a1a;color:#555;}
.yaz-dosya:hover{background:#2a2a2a;color:#ccc;}
.yaz-gonder{background:#3a7d1e;color:#fff;}
.yaz-gonder:hover{filter:brightness(1.1);}
.gorsel-oniz-bar{display:none;padding:8px 14px;background:#080808;border-top:1px solid #111;flex-shrink:0;}

/* CONTEXT MENÜ */
.ctx{position:fixed;background:#111;border:1px solid #222;border-radius:6px;padding:4px 0;z-index:9000;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,.8);}
.ctx-item{padding:9px 14px;font-size:11px;font-weight:700;color:#ccc;cursor:pointer;display:flex;align-items:center;gap:8px;}
.ctx-item:hover{background:#1a1a1a;color:#fff;}
.ctx-item.kirmizi{color:#f85149;}
.ctx-item.kirmizi:hover{background:#2a0a0a;}
.ctx-sep{height:1px;background:#1a1a1a;margin:3px 0;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:500;}
.modal-bg.active{display:flex;}
.modal{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:20px;max-width:380px;width:100%;margin:20px;}
.modal-title{font-size:12px;font-weight:900;color:#fff;text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;}
.modal-x{background:none;border:none;color:#444;font-size:18px;cursor:pointer;}
.modal-in{width:100%;background:#111;border:1px solid #1a1a1a;color:#ccc;padding:10px 12px;border-radius:4px;font-family:'Montserrat',sans-serif;font-size:12px;outline:none;margin-bottom:10px;transition:.15s;}
.modal-in:focus{border-color:#39ff14;}
.modal-in::placeholder{color:#333;}
.ara-sonuc{max-height:200px;overflow-y:auto;}
.ara-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:4px;cursor:pointer;}
.ara-item:hover{background:#111;}
.ara-av{width:30px;height:30px;border-radius:50%;overflow:hidden;flex-shrink:0;}
.ara-av img{width:100%;height:100%;object-fit:cover;}

/* ZOOM */
.zoom{position:fixed;inset:0;background:rgba(0,0,0,.97);display:none;align-items:center;justify-content:center;z-index:9999;cursor:zoom-out;}
.zoom.active{display:flex;}
.zoom img{max-width:95vw;max-height:95vh;object-fit:contain;}
.zoom-x{position:fixed;top:16px;right:20px;background:rgba(0,0,0,.7);border:1px solid #333;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:#fff;z-index:10001;}

@media(max-width:700px){.sol{width:100%;}.sag{display:none;}.sol.gizle{display:none;}.sag.goster{display:flex;}}

/* BİLDİRİM ZİLİ */
.nav-zil{position:relative;cursor:pointer;color:#555;font-size:18px;transition:.15s;text-decoration:none;display:flex;align-items:center;padding:6px;}
.nav-zil:hover{color:#ccc;}
.nav-zil .badge{position:absolute;top:0;right:0;background:#39ff14;color:#000;font-size:8px;font-weight:900;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px;}
.nav-zil .badge.var{display:flex;}
</style>
</head>
<body>
<div class="zoom" id="zoom" onclick="this.classList.remove('active')">
  <div class="zoom-x" onclick="document.getElementById('zoom').classList.remove('active')">✕</div>
  <img id="zoom-img" src="">
</div>
<div class="modal-bg" id="yeni-modal" onclick="if(event.target===this)this.classList.remove('active')">
  <div class="modal">
    <div class="modal-title"><span>Yeni Mesaj</span><button class="modal-x" onclick="document.getElementById('yeni-modal').classList.remove('active')">✕</button></div>
    <input class="modal-in" id="ara-in" placeholder="Kullanıcı adı ara..." oninput="kulAra(this.value)">
    <div class="ara-sonuc" id="ara-sonuc"></div>
  </div>
</div>

<nav class="nav">
  <a href="/lobbygg/index.html"><img src="https://i.imgur.com/6l08Y4k.png" alt="LOBBY.GG"></a>
  <div style="display:flex;gap:7px;">
    <a href="/lobbygg/index.html" class="mc-btn mc-gray"><i class="fa-solid fa-house"></i> Ana Sayfa</a>
  </div>
</nav>

<div class="dm-wrap">
  <div class="sol" id="sol">
    <div class="sol-baslik">
      <span>💬 Mesajlar</span>
      <button class="mc-btn mc-green" onclick="yeniMesaj()" style="padding:5px 10px;font-size:9px;"><i class="fa-solid fa-plus"></i> Yeni</button>
    </div>
    <div class="sol-tabs">
      <div class="sol-tab active" id="tab-aktif" onclick="tabDegis('aktif')">Mesajlar</div>
      <div class="sol-tab" id="tab-arsiv" onclick="tabDegis('arsiv')">📦 Arşiv</div>
      <div class="sol-tab" id="tab-engel" onclick="tabDegis('engel')">🚫 Engel</div>
    </div>
    <div class="sol-ara"><input placeholder="Ara..." id="ara-fil" oninput="filtrele(this.value)"></div>
    <div class="sol-liste" id="sol-liste">
      <div class="bos-mesaj"><i class="fa-solid fa-spinner fa-spin" style="font-size:20px;margin-bottom:8px;display:block;"></i>Yükleniyor...</div>
    </div>
  </div>

  <div class="sag" id="sag">
    <div class="bos-ekran">
      <i class="fa-solid fa-comments"></i>
      <p>Bir sohbet seç</p>
      <div style="font-size:11px;color:#1a1a1a;">veya yeni mesaj başlat</div>
    </div>
  </div>
</div>

<script>
const SB=window.supabase.createClient('https://hmkeedyqmzblnmkhdste.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhta2VlZHlxbXpibG5ta2hkc3RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODE3MzYsImV4cCI6MjA5NDM1NzczNn0.5HUInmQs_LsXYovJgI7Ir9q8M9aPlQW6jM5C43aYmqA');
let ben=null,aktifKisi=null,aktifTab='aktif',rtSub=null,gorselB64=null;
let sabitler=new Set(JSON.parse(localStorage.getItem('sabit')||'[]'));
let arsivler=new Set(JSON.parse(localStorage.getItem('arsiv')||'[]'));
let sonMesajId=null;

async function init(){
  const{data:{session}}=await Promise.race([SB.auth.getSession(),new Promise(r=>setTimeout(()=>r({data:{session:null}}),3000))]);
  if(!session){
    document.getElementById('sol-liste').innerHTML='<div class="bos-mesaj">Giriş yapman gerekiyor</div>';
    document.getElementById('sag').innerHTML='<div class="bos-ekran"><i class="fa-solid fa-lock"></i><p>Giriş Yap</p><a href="/lobbygg/giris.html" class="mc-btn mc-green" style="margin-top:12px;">Giriş Yap</a></div>';
    return;
  }
  const{data}=await SB.from('kullanicilar').select('*').eq('email',session.user.email);
  if(!data?.length)return;
  ben=data[0];

  const hedefId=new URLSearchParams(location.search).get('hedef');
  if(hedefId){
    const{data:h}=await SB.from('kullanicilar').select('id,kullanici_adi,avatar_url,dogrulama_rozeti').eq('id',parseInt(hedefId));
    if(h?.length)sohbetAc(h[0]);
  }

  await listeYukle();
  realtimeBaslat();
}

async function listeYukle(){
  const el=document.getElementById('sol-liste');
  const pid=Number(ben.id);

  // Engelleme listesi
  const{data:engeller}=await SB.from('engellemeler').select('engellenen_id').eq('engelleyen_id',pid);
  const engelIds=new Set((engeller||[]).map(e=>e.engellenen_id));

  const{data:gelen}=await SB.from('mesajlar').select('*').eq('alici_id',pid).order('created_at',{ascending:false});
  const{data:giden}=await SB.from('mesajlar').select('*').eq('gonderen_id',pid).order('created_at',{ascending:false});
  const tumMesajlar=[...(gelen||[]),...(giden||[])].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));

  const kisiler=new Map();
  tumMesajlar.forEach(m=>{
    const kid=m.gonderen_id===pid?m.alici_id:m.gonderen_id;
    if(!kisiler.has(kid))kisiler.set(kid,m);
  });

  if(!kisiler.size){el.innerHTML='<div class="bos-mesaj"><i class="fa-solid fa-comment-slash" style="font-size:24px;margin-bottom:8px;display:block;"></i>Henüz mesaj yok</div>';return;}

  const ids=[...kisiler.keys()];
  const{data:kullar}=await SB.from('kullanicilar').select('id,kullanici_adi,avatar_url,dogrulama_rozeti').in('id',ids);
  const km={};(kullar||[]).forEach(k=>km[k.id]=k);

  const sohbetler=[...kisiler.entries()].map(([kid,m])=>({
    kisi:km[kid]||{id:kid,kullanici_adi:'?'},
    sonMesaj:m,
    okunmamis:!m.okundu&&m.alici_id===pid,
    sabitli:sabitler.has(kid),
    arsivli:arsivler.has(kid),
    engelli:engelIds.has(kid)
  }));

  // Sekmeye göre filtrele
  let gosterilecek=sohbetler.filter(s=>{
    if(aktifTab==='arsiv')return s.arsivli;
    if(aktifTab==='engel')return s.engelli;
    return !s.arsivli&&!s.engelli;
  });

  // Sabitleri üste al
  gosterilecek.sort((a,b)=>(b.sabitli?1:0)-(a.sabitli?1:0));

  if(!gosterilecek.length){
    const mesajlar={aktif:'Henüz mesaj yok',arsiv:'Arşivlenmiş mesaj yok',engel:'Engellenen kullanıcı yok'};
    el.innerHTML=`<div class="bos-mesaj">${mesajlar[aktifTab]}</div>`;return;
  }

  el.innerHTML=gosterilecek.map(s=>{
    const k=s.kisi;const m=s.sonMesaj;
    const av=k.avatar_url||`https://minotar.net/helm/${k.kullanici_adi||'Steve'}/42.png`;
    const aktif=aktifKisi?.id===k.id;
    const benMi=m.gonderen_id===pid;
    return`<div class="sohbet-item${aktif?' active':''}${s.sabitli?' sabitli':''}" id="si-${k.id}"
      onclick="sohbetAc(${JSON.stringify(k).replace(/"/g,'&quot;')})"
      oncontextmenu="ctxMenu(event,${JSON.stringify(s).replace(/"/g,'&quot;')});return false;">
      <div class="sav"><img src="${av}" onerror="this.src='https://minotar.net/helm/Steve/42.png'"></div>
      <div class="sinfo">
        <div class="snick">${k.kullanici_adi||'?'} ${k.dogrulama_rozeti?'<img src="https://i.imgur.com/VDpHaPy.png" style="width:12px;height:12px;">':''}</div>
        <div class="sson">${benMi?'Sen: ':''}${m.mesaj?m.mesaj.substring(0,32)+(m.mesaj.length>32?'…':''):'📷 Görsel'}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        <div class="szaman">${zaman(m.created_at)}</div>
        ${s.okunmamis?'<div class="sbadge">!</div>':''}
      </div>
    </div>`;
  }).join('');
}

function tabDegis(tab){
  aktifTab=tab;
  document.querySelectorAll('.sol-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab)?.classList.add('active');
  listeYukle();
}

function filtrele(q){
  document.querySelectorAll('.sohbet-item').forEach(el=>{
    const nick=el.querySelector('.snick')?.textContent?.toLowerCase()||'';
    el.style.display=nick.includes(q.toLowerCase())?'flex':'none';
  });
}

async function sohbetAc(kisi){
  // Engel kontrolü
  const{data:engel}=await SB.from('engellemeler').select('id')
    .or(`and(engelleyen_id.eq.${Number(ben.id)},engellenen_id.eq.${Number(kisi.id)}),and(engelleyen_id.eq.${Number(kisi.id)},engellenen_id.eq.${Number(ben.id)})`);
  if(engel?.length){alert('Bu kullanıcıyla mesajlaşamazsınız.');return;}

  aktifKisi=kisi;
  document.querySelectorAll('.sohbet-item').forEach(e=>e.classList.remove('active'));
  document.getElementById('si-'+kisi.id)?.classList.add('active');

  const av=kisi.avatar_url||`https://minotar.net/helm/${kisi.kullanici_adi||'Steve'}/36.png`;
  document.getElementById('sag').innerHTML=`
    <div class="chat-header">
      <div class="chat-header-av" onclick="location.href='/lobbygg/profil.html?id=${kisi.id}'">
        <img src="${av}" onerror="this.src='https://minotar.net/helm/Steve/36.png'">
      </div>
      <div style="flex:1;">
        <div class="chat-header-nick" onclick="location.href='/lobbygg/profil.html?id=${kisi.id}'">${kisi.kullanici_adi||'?'}</div>
      </div>
      <button class="mc-btn mc-gray" onclick="location.href='/lobbygg/profil.html?id=${kisi.id}'" style="padding:6px 12px;font-size:9px;"><i class="fa-solid fa-user"></i> Profil</button>
    </div>
    <div class="chat-alan" id="chat-alan"></div>
    <div class="gorsel-oniz-bar" id="gorsel-oniz-bar">
      <div style="display:flex;align-items:center;gap:10px;">
        <img id="gorsel-oniz-img" style="height:56px;border-radius:4px;">
        <span style="font-size:11px;color:#666;">Görsel eklenecek</span>
        <button onclick="gorselTemizle()" style="background:none;border:none;color:#f85149;cursor:pointer;font-size:16px;">✕</button>
      </div>
    </div>
    <div class="chat-yaz">
      <input type="file" id="dosya-in" accept="image/*" style="display:none;" onchange="gorselSec(this)">
      <button class="yaz-btn yaz-dosya" onclick="document.getElementById('dosya-in').click()"><i class="fa-solid fa-image"></i></button>
      <textarea class="yaz-in" id="yaz-in" placeholder="Mesaj yaz..." rows="1"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();gonder();}"></textarea>
      <button class="yaz-btn yaz-gonder" onclick="gonder()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>`;
  await mesajlariYukle(true);
  okunduIsaretle();
}

async function mesajlariYukle(scrollDown=false){
  const el=document.getElementById('chat-alan');
  if(!el||!aktifKisi||!ben)return;

  const{data}=await SB.from('mesajlar').select('*')
    .or(`and(gonderen_id.eq.${Number(ben.id)},alici_id.eq.${Number(aktifKisi.id)}),and(gonderen_id.eq.${Number(aktifKisi.id)},alici_id.eq.${Number(ben.id)})`)
    .order('created_at',{ascending:true}).limit(100);

  if(!data?.length){
    el.innerHTML='<div style="text-align:center;padding:40px;color:#333;font-size:11px;"><i class="fa-solid fa-comment-dots" style="font-size:28px;display:block;margin-bottom:8px;"></i>İlk mesajı gönder!</div>';
    return;
  }

  const yeniSonId=data[data.length-1]?.id;
  if(!scrollDown&&yeniSonId===sonMesajId)return; // Değişiklik yoksa render etme
  sonMesajId=yeniSonId;

  let sonTarih='';
  const eskiScroll=el.scrollTop;
  const eskiYuksek=el.scrollHeight;
  const asagidaMiydi=eskiYuksek-eskiScroll-el.clientHeight<50;

  el.innerHTML=data.map(m=>{
    const benim=m.gonderen_id===Number(ben.id);
    const tarih=new Date(m.created_at).toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'});
    let sep='';if(tarih!==sonTarih){sonTarih=tarih;sep=`<div class="tarih-sep">${tarih}</div>`;}
    const avSrc=benim?(ben.avatar_url||`https://minotar.net/helm/${ben.kullanici_adi||'Steve'}/26.png`):(aktifKisi.avatar_url||`https://minotar.net/helm/${aktifKisi.kullanici_adi||'Steve'}/26.png`);
    return`${sep}<div class="msg-wrap ${benim?'ben':'karsi'}">
      <div class="msg-av"><img src="${avSrc}" onerror="this.src='https://minotar.net/helm/Steve/26.png'"></div>
      <div>
        ${m.gorsel_url?`<img src="${m.gorsel_url}" class="msg-img" onclick="document.getElementById('zoom-img').src='${m.gorsel_url.replace(/'/g,"\\'")}';document.getElementById('zoom').classList.add('active')" alt="">`:''}
        ${m.mesaj?`<div class="msg-buble ${benim?'ben':'karsi'}"><div class="msg-txt">${esc(m.mesaj)}</div><div class="msg-zaman">${saat(m.created_at)}${benim?(m.okundu?' ✓✓':' ✓'):''}</div></div>`:''}
      </div>
    </div>`;
  }).join('');

  if(scrollDown||asagidaMiydi)el.scrollTop=el.scrollHeight;
}

async function gonder(){
  const inp=document.getElementById('yaz-in');
  const metin=inp?.value?.trim()||'';
  if(!metin&&!gorselB64)return;
  const{error}=await SB.from('mesajlar').insert({
    gonderen_id:Number(ben.id),alici_id:Number(aktifKisi.id),
    mesaj:metin||null,gorsel_url:gorselB64||null,okundu:false
  });
  if(error){alert('Gönderilemedi: '+error.message);return;}
  if(inp){inp.value='';inp.style.height='auto';}
  gorselTemizle();
  await mesajlariYukle(true);
  await listeYukle();
}

async function okunduIsaretle(){
  if(!aktifKisi||!ben)return;
  await SB.from('mesajlar').update({okundu:true})
    .eq('alici_id',Number(ben.id)).eq('gonderen_id',Number(aktifKisi.id)).eq('okundu',false);
}

// REALTIME
function realtimeBaslat(){
  if(rtSub)SB.removeChannel(rtSub);
  // Hem gelen hem giden mesajlar için iki kanal
  rtSub=SB.channel('dm-kanal-'+Date.now())
    .on('postgres_changes',
      {event:'INSERT',schema:'public',table:'mesajlar',filter:`alici_id=eq.${Number(ben.id)}`},
      async(payload)=>{
        const m=payload.new;
        if(aktifKisi&&Number(m.gonderen_id)===Number(aktifKisi.id)){
          await mesajlariYukle(true);
          await okunduIsaretle();
        }
        await listeYukle();
      }
    )
    .on('postgres_changes',
      {event:'INSERT',schema:'public',table:'mesajlar',filter:`gonderen_id=eq.${Number(ben.id)}`},
      async(payload)=>{
        const m=payload.new;
        if(aktifKisi&&Number(m.alici_id)===Number(aktifKisi.id)){
          await mesajlariYukle(true);
        }
        await listeYukle();
      }
    )
    .subscribe((status)=>{
      if(status==='SUBSCRIBED'){
        console.log('Realtime bağlandı ✓');
      }
    });
}

// GÖRSEL
function gorselSec(inp){
  const f=inp.files[0];if(!f||f.size>3145728){alert('Maks 3MB!');return;}
  const r=new FileReader();r.onload=e=>{
    gorselB64=e.target.result;
    document.getElementById('gorsel-oniz-img').src=e.target.result;
    document.getElementById('gorsel-oniz-bar').style.display='block';
  };r.readAsDataURL(f);
}
function gorselTemizle(){gorselB64=null;document.getElementById('gorsel-oniz-bar').style.display='none';document.getElementById('dosya-in').value='';}

// YENİ MESAJ
function yeniMesaj(){document.getElementById('yeni-modal').classList.add('active');document.getElementById('ara-in').value='';document.getElementById('ara-sonuc').innerHTML='';}
let araT;
async function kulAra(q){
  clearTimeout(araT);const el=document.getElementById('ara-sonuc');
  if(q.length<2){el.innerHTML='';return;}
  araT=setTimeout(async()=>{
    const{data}=await SB.from('kullanicilar').select('id,kullanici_adi,avatar_url').ilike('kullanici_adi','%'+q+'%').neq('id',Number(ben.id)).limit(8);
    if(!data?.length){el.innerHTML='<div style="text-align:center;padding:14px;color:#444;font-size:11px;">Bulunamadı</div>';return;}
    el.innerHTML=data.map(k=>`
      <div class="ara-item" onclick="document.getElementById('yeni-modal').classList.remove('active');sohbetAc(${JSON.stringify(k).replace(/"/g,'&quot;')})">
        <div class="ara-av"><img src="${k.avatar_url||`https://minotar.net/helm/${k.kullanici_adi||'Steve'}/30.png`}" onerror="this.src='https://minotar.net/helm/Steve/30.png'"></div>
        <div style="font-size:12px;font-weight:900;color:#fff;">${k.kullanici_adi}</div>
      </div>`).join('');
  },400);
}

// CONTEXT MENÜ
function ctxMenu(e,s){
  e.preventDefault();
  document.querySelectorAll('.ctx').forEach(m=>m.remove());
  const kisi=s.kisi;const kid=kisi.id;
  const isSabitli=sabitler.has(kid);const isArsivli=arsivler.has(kid);
  const menu=document.createElement('div');menu.className='ctx';
  menu.innerHTML=`
    <div class="ctx-item" onclick="ctxSabitle(${kid})"><i class="fa-solid fa-thumbtack"></i> ${isSabitli?'Sabiti Kaldır':'Sohbeti Sabitle'}</div>
    <div class="ctx-item" onclick="ctxArsiv(${kid})"><i class="fa-solid fa-box-archive"></i> ${isArsivli?'Arşivden Çıkar':'Arşivle'}</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item kirmizi" onclick="ctxSil(${kid})"><i class="fa-solid fa-trash"></i> Sohbeti Sil</div>
    <div class="ctx-item kirmizi" onclick="ctxEngelle(${kid},'${(kisi.kullanici_adi||'').replace(/'/g,"\\'")}')"><i class="fa-solid fa-ban"></i> Engelle</div>`;
  menu.style.left=Math.min(e.clientX,window.innerWidth-200)+'px';
  menu.style.top=Math.min(e.clientY,window.innerHeight-200)+'px';
  document.body.appendChild(menu);
  setTimeout(()=>document.addEventListener('click',()=>menu.remove(),{once:true}),10);
}

function ctxSabitle(kid){
  if(sabitler.has(kid))sabitler.delete(kid);else sabitler.add(kid);
  localStorage.setItem('sabit',JSON.stringify([...sabitler]));listeYukle();
}
function ctxArsiv(kid){
  if(arsivler.has(kid))arsivler.delete(kid);else arsivler.add(kid);
  localStorage.setItem('arsiv',JSON.stringify([...arsivler]));
  if(aktifKisi?.id===kid){aktifKisi=null;document.getElementById('sag').innerHTML='<div class="bos-ekran"><i class="fa-solid fa-comments"></i><p>Bir sohbet seç</p></div>';}
  listeYukle();
}
async function ctxSil(kid){
  if(!confirm('Kendi mesajlarını silmek istediğine emin misin?'))return;
  await SB.from('mesajlar').delete().eq('gonderen_id',Number(ben.id)).eq('alici_id',kid);
  if(aktifKisi?.id===kid){aktifKisi=null;document.getElementById('sag').innerHTML='<div class="bos-ekran"><i class="fa-solid fa-comments"></i><p>Bir sohbet seç</p></div>';}
  await listeYukle();
}
async function ctxEngelle(kid,nick){
  if(!confirm(nick+' kullanıcısını engellemek istediğine emin misin?'))return;
  await SB.from('engellemeler').upsert({engelleyen_id:Number(ben.id),engellenen_id:kid});
  if(aktifKisi?.id===kid){aktifKisi=null;document.getElementById('sag').innerHTML='<div class="bos-ekran"><i class="fa-solid fa-comments"></i><p>Bir sohbet seç</p></div>';}
  await listeYukle();
}

function zaman(ts){if(!ts)return'';const d=Date.now()-new Date(ts).getTime();if(d<60000)return'Az önce';if(d<3600000)return Math.floor(d/60000)+'dk';if(d<86400000)return Math.floor(d/3600000)+'sa';if(d<604800000)return Math.floor(d/86400000)+'g';return new Date(ts).toLocaleDateString('tr-TR',{day:'numeric',month:'short'});}
function saat(ts){if(!ts)return'';const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function esc(t){return t?.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')||'';}


// NAV ZİL
async function navZilYukle(){
  try{
    const{data:{session}}=await SB.auth.getSession();
    if(!session)return;
    const{data:kul}=await SB.from('kullanicilar').select('id').eq('email',session.user.email);
    if(!kul?.length)return;
    const{count}=await SB.from('bildirimler').select('*',{count:'exact',head:true}).eq('alici_id',Number(kul[0].id)).eq('okundu',false);
    const badge=document.getElementById('nav-zil-badge');
    if(badge&&count>0){badge.textContent=count>9?'9+':count;badge.classList.add('var');}
  }catch(e){}
}
navZilYukle();

init();
</script>
