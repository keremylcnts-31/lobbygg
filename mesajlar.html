<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mesajlar — LOBBY.GG</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── Page shell ────────────────────────────────── */
    body { overflow: hidden; }

    .msg-shell {
      position: fixed;
      inset: 0;
      top: var(--nav-h);
      display: flex;
      background: var(--bg);
    }

    /* ── Left sidebar ──────────────────────────────── */
    .msg-sidebar {
      width: 320px;
      min-width: 280px;
      max-width: 320px;
      background: var(--bg-card);
      border-right: 1px solid var(--border-thin);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border-thin);
    }

    .sidebar-title {
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0.3px;
    }

    .sidebar-new-btn {
      width: 32px; height: 32px;
      background: rgba(57,255,20,0.08);
      border: 1px solid rgba(57,255,20,0.25);
      border-radius: var(--radius-sm);
      color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      cursor: pointer;
      transition: all var(--transition);
    }
    .sidebar-new-btn:hover {
      background: rgba(57,255,20,0.16);
      border-color: var(--accent);
    }

    .sidebar-search {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-thin);
    }

    .search-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-icon {
      position: absolute;
      left: 10px;
      color: var(--text-dim);
      font-size: 13px;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-1);
      font-family: var(--font);
      font-size: 12px;
      padding: 7px 12px 7px 32px;
      transition: border-color var(--transition);
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-dim); }

    /* ── Tabs ────────────────────────────────────── */
    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--border-thin);
      flex-shrink: 0;
    }
    .stab {
      flex: 1;
      padding: 9px 4px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-3);
      font-family: var(--font);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
    }
    .stab:hover { color: var(--text-2); }
    .stab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Conv list ───────────────────────────────── */
    .conv-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background var(--transition);
      border-bottom: 1px solid var(--border-thin);
      position: relative;
      user-select: none;
    }
    .conv-item:hover { background: rgba(255,255,255,0.03); }
    .conv-item.active { background: rgba(57,255,20,0.05); }
    .conv-item.unread .conv-nick { font-weight: 900; color: var(--text-1); }
    .conv-item.unread .conv-preview { font-weight: 700; color: var(--text-2); }

    .conv-avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .conv-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
      background: var(--border);
    }
    .conv-online {
      position: absolute;
      bottom: 1px; right: 1px;
      width: 10px; height: 10px;
      background: #3ddc84;
      border: 2px solid var(--bg-card);
      border-radius: 50%;
    }
    .conv-online.offline { background: var(--text-dim); }

    .conv-body { flex: 1; min-width: 0; }
    .conv-row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      margin-bottom: 2px;
    }
    .conv-nick {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-pin { font-size: 10px; margin-right: 2px; }
    .conv-time {
      font-size: 10px;
      color: var(--text-dim);
      flex-shrink: 0;
      white-space: nowrap;
    }
    .conv-row2 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }
    .conv-preview {
      font-size: 11px;
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .conv-badge {
      min-width: 18px; height: 18px;
      background: var(--accent);
      color: #050505;
      font-size: 9px;
      font-weight: 900;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px;
      flex-shrink: 0;
    }

    /* ── Right panel ─────────────────────────────── */
    .msg-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Empty state */
    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-dim);
    }
    .chat-empty-icon {
      width: 72px; height: 72px;
      background: rgba(57,255,20,0.06);
      border: 1px solid rgba(57,255,20,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
    }
    .chat-empty-title {
      font-size: 15px;
      font-weight: 900;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .chat-empty-sub { font-size: 12px; color: var(--text-dim); }

    /* Chat header */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-thin);
      flex-shrink: 0;
    }

    .chat-back-btn {
      display: none;
      width: 32px; height: 32px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-2);
      font-size: 14px;
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
    }
    .chat-back-btn:hover { color: var(--text-1); border-color: var(--border-hover); }

    .chat-hdr-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
    }
    .chat-hdr-info { flex: 1; min-width: 0; }
    .chat-hdr-nick {
      font-size: 13px;
      font-weight: 900;
      color: var(--text-1);
      cursor: pointer;
    }
    .chat-hdr-nick:hover { color: var(--accent); }
    .chat-hdr-status {
      font-size: 10px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 1px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3ddc84;
      flex-shrink: 0;
    }
    .status-dot.offline { background: var(--text-dim); }

    .chat-hdr-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hdr-action-btn {
      height: 30px;
      padding: 0 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-2);
      font-family: var(--font);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex; align-items: center; gap: 4px;
    }
    .hdr-action-btn:hover { color: var(--text-1); border-color: var(--border-hover); }
    .hdr-action-btn.danger:hover { color: var(--red); border-color: var(--red); }
    .hdr-dots-btn {
      width: 30px; height: 30px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-2);
      font-size: 16px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex; align-items: center; justify-content: center;
    }
    .hdr-dots-btn:hover { color: var(--text-1); border-color: var(--border-hover); }

    /* Messages area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }

    /* Load more trigger */
    .load-trigger {
      height: 1px;
      flex-shrink: 0;
    }

    /* Date separator */
    .date-sep {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
      flex-shrink: 0;
    }
    .date-sep-line {
      flex: 1;
      height: 1px;
      background: var(--border-thin);
    }
    .date-sep-label {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* Unread divider */
    .unread-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
      flex-shrink: 0;
    }
    .unread-divider-line {
      flex: 1;
      height: 1px;
      background: rgba(57,255,20,0.3);
    }
    .unread-divider-label {
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent);
      white-space: nowrap;
    }

    /* Message row */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
      position: relative;
    }
    .msg-row.sent { flex-direction: row-reverse; }
    .msg-row.recv { flex-direction: row; }

    .msg-small-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--border);
    }
    .msg-avatar-spacer { width: 26px; flex-shrink: 0; }

    .msg-bubble {
      max-width: 65%;
      padding: 8px 12px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.45;
      position: relative;
      word-break: break-word;
      cursor: default;
      animation: bubble-in 0.2s ease;
      transition: filter var(--transition);
    }
    @keyframes bubble-in {
      from { opacity: 0; transform: translateY(6px) scale(0.97); }
      to { opacity: 1; transform: none; }
    }

    .msg-row.sent .msg-bubble {
      background: rgba(57,255,20,0.18);
      border: 1px solid rgba(57,255,20,0.25);
      color: var(--text-1);
      border-bottom-right-radius: 4px;
    }
    .msg-row.recv .msg-bubble {
      background: var(--bg-card2);
      border: 1px solid var(--border-thin);
      color: var(--text-1);
      border-bottom-left-radius: 4px;
    }

    /* consecutive bubbles */
    .msg-row.sent.seq .msg-bubble  { border-top-right-radius: 4px; }
    .msg-row.recv.seq .msg-bubble  { border-top-left-radius: 4px; }

    .msg-bubble:hover { filter: brightness(1.08); }

    /* Timestamp on hover */
    .msg-ts {
      position: absolute;
      bottom: -18px;
      font-size: 9px;
      color: var(--text-dim);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .msg-row.sent .msg-ts { right: 4px; }
    .msg-row.recv .msg-ts { left: 4px; }
    .msg-row:hover .msg-ts { opacity: 1; }

    /* Image messages */
    .msg-img {
      max-width: 220px;
      max-height: 200px;
      border-radius: 10px;
      object-fit: cover;
      cursor: zoom-in;
      display: block;
      border: 1px solid var(--border);
    }

    /* Spacer to account for hovered timestamps */
    .msg-spacer { height: 6px; flex-shrink: 0; }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0 4px;
      flex-shrink: 0;
    }
    .typing-dots {
      display: flex;
      gap: 3px;
      background: var(--bg-card2);
      border: 1px solid var(--border-thin);
      border-radius: 12px;
      padding: 6px 10px;
    }
    .typing-dot {
      width: 6px; height: 6px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: bounce-dot 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce-dot {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }
    .typing-text {
      font-size: 10px;
      color: var(--text-dim);
      font-style: italic;
    }

    /* Input area */
    .chat-input-area {
      background: var(--bg-card);
      border-top: 1px solid var(--border-thin);
      padding: 10px 14px;
      flex-shrink: 0;
    }

    /* Image preview row */
    .img-preview-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .img-preview-item {
      position: relative;
      display: inline-block;
    }
    .img-preview-thumb {
      width: 60px; height: 60px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
      display: block;
    }
    .img-preview-remove {
      position: absolute;
      top: -6px; right: -6px;
      width: 18px; height: 18px;
      background: var(--red);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .msg-textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-1);
      font-family: var(--font);
      font-size: 13px;
      padding: 9px 14px;
      resize: none;
      max-height: 88px;
      min-height: 38px;
      line-height: 1.4;
      transition: border-color var(--transition);
      overflow-y: auto;
    }
    .msg-textarea:focus { border-color: var(--accent); outline: none; }
    .msg-textarea::placeholder { color: var(--text-dim); }

    .input-action-btn {
      width: 36px; height: 36px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text-3);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .input-action-btn:hover { color: var(--text-1); border-color: var(--border-hover); }

    .send-btn {
      width: 36px; height: 36px;
      background: rgba(57,255,20,0.12);
      border: 1px solid rgba(57,255,20,0.3);
      border-radius: 50%;
      color: var(--accent);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .send-btn:hover { background: rgba(57,255,20,0.22); border-color: var(--accent); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-hint {
      margin-top: 5px;
      font-size: 9px;
      color: var(--text-dim);
      text-align: center;
    }

    /* ── Emoji picker ────────────────────────────── */
    .emoji-picker {
      position: absolute;
      bottom: 60px;
      right: 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 10px;
      display: none;
      flex-wrap: wrap;
      gap: 4px;
      width: 260px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .emoji-picker.open { display: flex; }
    .emoji-btn-item {
      width: 34px; height: 34px;
      background: none;
      border: none;
      border-radius: 6px;
      font-size: 20px;
      cursor: pointer;
      transition: background var(--transition);
      display: flex; align-items: center; justify-content: center;
    }
    .emoji-btn-item:hover { background: var(--border-thin); }

    /* ── New Message Modal ───────────────────────── */
    #new-msg-modal .modal { max-width: 420px; }
    .new-msg-result-list { display: flex; flex-direction: column; gap: 4px; margin-top: 10px; max-height: 280px; overflow-y: auto; }
    .new-msg-user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition);
    }
    .new-msg-user-item:hover { background: var(--border-thin); }
    .new-msg-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
    .new-msg-nick { font-size: 12px; font-weight: 700; }
    .new-msg-sub  { font-size: 10px; color: var(--text-dim); }

    /* ── Image lightbox ──────────────────────────── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      animation: fade-in 0.2s ease;
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: var(--radius);
      box-shadow: 0 20px 80px rgba(0,0,0,0.8);
    }

    /* ── Blocked / restricted banner ─────────────── */
    .chat-restricted {
      background: rgba(255,26,60,0.07);
      border-top: 1px solid rgba(255,26,60,0.2);
      padding: 12px 16px;
      font-size: 11px;
      color: var(--red);
      font-weight: 700;
      text-align: center;
      flex-shrink: 0;
    }

    /* ── Mobile ──────────────────────────────────── */
    @media (max-width: 680px) {
      .msg-sidebar {
        position: absolute;
        inset: 0;
        width: 100%;
        max-width: 100%;
        z-index: 10;
        transform: translateX(0);
      }
      .msg-sidebar.hidden {
        transform: translateX(-100%);
        pointer-events: none;
      }
      .msg-chat {
        position: absolute;
        inset: 0;
      }
      .chat-back-btn { display: flex !important; }
    }

    /* ── Loading overlay for sidebar ─────────────── */
    .conv-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px 20px;
      color: var(--text-dim);
      font-size: 11px;
    }
  </style>
</head>
<body>
<canvas id="canvas-bg"></canvas>

<!-- ──── NAV ──────────────────────────────────────────────── -->
<nav class="nav" id="main-nav"></nav>

<!-- ──── PAGE SHELL ───────────────────────────────────────── -->
<div class="msg-shell">

  <!-- LEFT SIDEBAR -->
  <aside class="msg-sidebar" id="msg-sidebar">
    <div class="sidebar-head">
      <span class="sidebar-title">Mesajlar</span>
      <button class="sidebar-new-btn" id="btn-new-msg" title="Yeni mesaj">✏</button>
    </div>

    <div class="sidebar-search">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="conv-search" type="text" placeholder="Sohbet ara..." autocomplete="off" />
      </div>
    </div>

    <div class="sidebar-tabs">
      <button class="stab active" data-tab="mesajlar">Mesajlar</button>
      <button class="stab" data-tab="arsiv">Arşiv</button>
      <button class="stab" data-tab="engellenenenler">Engellenenler</button>
    </div>

    <div class="conv-list" id="conv-list">
      <div class="conv-loading">
        <div class="spinner"></div>
        <span>Yükleniyor…</span>
      </div>
    </div>
  </aside>

  <!-- RIGHT CHAT -->
  <main class="msg-chat" id="msg-chat">
    <!-- Empty state (default) -->
    <div class="chat-empty" id="chat-empty">
      <div class="chat-empty-icon">💬</div>
      <div class="chat-empty-title">Bir sohbet seç</div>
      <div class="chat-empty-sub">Sol panelden bir konuşma seçerek mesajlaşmaya başla.</div>
    </div>
  </main>
</div>

<!-- ──── NEW MSG MODAL ──────────────────────────────────────── -->
<div class="modal-overlay" id="new-msg-modal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Yeni Mesaj</span>
      <button class="modal-close" id="close-new-msg">✕</button>
    </div>
    <div class="modal-body">
      <div class="input-group">
        <label class="input-label">Kullanıcı Ara</label>

// ── Relative time ─────────────────────────────────────────────
function relTime(dateStr) {
  if (!dateStr) return '';
  const now = Date.now();
  const d = new Date(dateStr).getTime();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'şimdi';
  if (diff < 3600) return Math.floor(diff / 60) + 'd';
  if (diff < 86400) return Math.floor(diff / 3600) + 'sa';
  const days = Math.floor(diff / 86400);
  if (days === 1) return 'dün';
  if (days < 7) return days + 'g';
  return new Date(dateStr).toLocaleDateString('tr-TR', { day:'numeric', month:'short' });
}

function formatMsgTime(dateStr) {
  if (!dateStr) return '';
  return new Date(dateStr).toLocaleTimeString('tr-TR', { hour:'2-digit', minute:'2-digit' });
}

function formatDateSep(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const now = new Date();
  const yesterday = new Date(now);
  yesterday.setDate(now.getDate() - 1);
  if (d.toDateString() === now.toDateString()) return 'Bugün';
  if (d.toDateString() === yesterday.toDateString()) return 'Dün';
  return d.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long' });
}

function isSameDay(a, b) {
  const da = new Date(a), db = new Date(b);
  return da.getFullYear() === db.getFullYear() &&
         da.getMonth() === db.getMonth() &&
         da.getDate() === db.getDate();
}

// ── Canvas BG ─────────────────────────────────────────────────
(function initCanvas() {
  const canvas = document.getElementById('canvas-bg');
  const ctx = canvas.getContext('2d');
  let W, H;
  const beams = [];
  const logos = [];
  const IMG = new Image();
  IMG.src = 'https://i.imgur.com/6l08Y4k.png';
  IMG.crossOrigin = 'anonymous';

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function mkBeam() {
    return { x: Math.random() * W, y: -200, len: 120 + Math.random() * 200,
             speed: 0.4 + Math.random() * 0.8, alpha: 0.03 + Math.random() * 0.06,
             w: 1 + Math.random() * 2 };
  }
  function mkLogo() {
    return { x: Math.random() * W, y: Math.random() * H,
             vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2,
             alpha: 0.025 + Math.random() * 0.035, size: 60 + Math.random() * 60 };
  }

  resize();
  for (let i = 0; i < 12; i++) { const b = mkBeam(); b.y = Math.random() * H; beams.push(b); }
  for (let i = 0; i < 5; i++) logos.push(mkLogo());
  window.addEventListener('resize', resize);

  function loop() {
    ctx.clearRect(0, 0, W, H);
    beams.forEach((b, i) => {
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(Math.PI / 4);
      const g = ctx.createLinearGradient(0, 0, 0, b.len);
      g.addColorStop(0, 'rgba(57,255,20,0)');
      g.addColorStop(0.5, `rgba(57,255,20,${b.alpha})`);
      g.addColorStop(1, 'rgba(57,255,20,0)');
      ctx.fillStyle = g;
      ctx.fillRect(-b.w / 2, 0, b.w, b.len);
      ctx.restore();
      b.y += b.speed;
      if (b.y > H + 200) { beams[i] = mkBeam(); beams[i].y = -200; }
    });
    if (IMG.complete && IMG.naturalWidth) {
      logos.forEach(l => {
        ctx.save();
        ctx.globalAlpha = l.alpha;
        ctx.drawImage(IMG, l.x - l.size / 2, l.y - l.size / 4, l.size, l.size / 2.5);
        ctx.restore();
        l.x += l.vx; l.y += l.vy;
        if (l.x < -l.size) l.x = W + l.size;
        if (l.x > W + l.size) l.x = -l.size;
        if (l.y < -l.size) l.y = H + l.size;
        if (l.y > H + l.size) l.y = -l.size;
      });
    }
    requestAnimationFrame(loop);
  }
  loop();
})();

// ── Conversations ─────────────────────────────────────────────
async function loadConversations() {
  if (!currentUser) { renderConvList([]); return; }
  // Get all distinct users we've messaged with
  const { data: sent } = await sb.from('mesajlar').select('alici_id').eq('gonderen_id', currentUser.id);
  const { data: recv } = await sb.from('mesajlar').select('gonderen_id').eq('alici_id', currentUser.id);
  const userIds = new Set();
  (sent || []).forEach(r => userIds.add(r.alici_id));
  (recv || []).forEach(r => userIds.add(r.gonderen_id));
  const ids = [...userIds];
  if (!ids.length) { renderConvList([]); return; }

  // Fetch user data
  const { data: users } = await sb.from('kullanicilar').select('id,kullanici_adi,avatar_url,aktif_cerceve,abonelik').in('id', ids);
  const userMap = {};
  (users || []).forEach(u => userMap[u.id] = u);

  // Build conv items with last message + unread count
  const convItems = [];
  for (const uid of ids) {
    const u = userMap[uid];
    if (!u) continue;
    // Last message
    const { data: msgs } = await sb.from('mesajlar')
      .select('mesaj,gorsel_url,created_at,okundu,gonderen_id')
      .or(`and(gonderen_id.eq.${currentUser.id},alici_id.eq.${uid}),and(gonderen_id.eq.${uid},alici_id.eq.${currentUser.id})`)
      .order('created_at', { ascending: false })
      .limit(1);
    // Unread count
    const { count } = await sb.from('mesajlar')
      .select('id', { count: 'exact', head: true })
      .eq('gonderen_id', uid)
      .eq('alici_id', currentUser.id)
      .eq('okundu', false);

    const last = (msgs || [])[0];
    convItems.push({
      userId: uid,
      nick: u.kullanici_adi,
      avatar: u.avatar_url,
      frame: u.aktif_cerceve,
      abonelik: u.abonelik,
      lastMsg: last ? (last.gorsel_url ? '📷 Görsel' : last.mesaj) : '',
      lastTime: last ? last.created_at : null,
      unread: count || 0,
      pinned: pinnedConvs.includes(uid),
      archived: archivedConvs.includes(uid),
    });
  }
  // Sort: pinned first, then by time
  convItems.sort((a, b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    return new Date(b.lastTime || 0) - new Date(a.lastTime || 0);
  });
  conversations = convItems;
  renderConvList(conversations);
}

// ── Context menu ──────────────────────────────────────────────
function setupContextMenu() {
  document.addEventListener('click', () => {
    document.getElementById('ctx-menu').style.display = 'none';
  });
}

function showCtxMenu(e, conv) {
  const menu = document.getElementById('ctx-menu');
  menu.innerHTML = '';

  const actions = [
    { icon: '📌', label: conv.pinned ? 'Sabitlemeyi kaldır' : 'Sabitle', fn: () => togglePin(conv) },
    { icon: '🗂️', label: conv.archived ? 'Arşivden çıkar' : 'Arşivle', fn: () => toggleArchive(conv) },
    { divider: true },
    { icon: '🗑️', label: 'Sohbeti sil', fn: () => deleteConv(conv), danger: true },
    { icon: '🚫', label: 'Engelle', fn: () => blockUser(conv.userId, conv.nick), danger: true },
  ];

  actions.forEach(a => {
    if (a.divider) {
      const div = document.createElement('div');
      div.className = 'ctx-divider';
      menu.appendChild(div);
      return;
    }
    const item = document.createElement('div');
    item.className = 'ctx-item' + (a.danger ? ' danger' : '');
    item.textContent = a.icon + ' ' + a.label;
    item.addEventListener('click', () => { menu.style.display = 'none'; a.fn(); });
    menu.appendChild(item);
  });

  menu.style.display = 'block';
  const x = Math.min(e.clientX, window.innerWidth - 180);
  const y = Math.min(e.clientY, window.innerHeight - menu.scrollHeight - 10);
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
}

function togglePin(conv) {
  const idx = pinnedConvs.indexOf(conv.userId);
  if (idx > -1) pinnedConvs.splice(idx, 1);
  else pinnedConvs.unshift(conv.userId);
  localStorage.setItem('pinnedConvs', JSON.stringify(pinnedConvs));
  conv.pinned = !conv.pinned;
  renderConvList(conversations);
  toast(conv.pinned ? '📌 Sohbet sabitlendi' : 'Sabitleme kaldırıldı', 'info');
}

function toggleArchive(conv) {
  const idx = archivedConvs.indexOf(conv.userId);
  if (idx > -1) archivedConvs.splice(idx, 1);
  else archivedConvs.push(conv.userId);
  localStorage.setItem('archivedConvs', JSON.stringify(archivedConvs));
  conv.archived = !conv.archived;
  renderConvList(conversations);
  toast(conv.archived ? '🗂️ Arşivlendi' : 'Arşivden çıkarıldı', 'info');
}

async function deleteConv(conv) {
  if (!confirm(`${conv.nick} ile tüm mesajlar silinsin mi?`)) return;
  await sb.from('mesajlar').delete()
    .or(`and(gonderen_id.eq.${currentUser.id},alici_id.eq.${conv.userId}),and(gonderen_id.eq.${conv.userId},alici_id.eq.${currentUser.id})`);
  conversations = conversations.filter(c => c.userId !== conv.userId);
  if (activeConvUserId === conv.userId) showEmptyState();
  renderConvList(conversations);
  toast('Sohbet silindi', 'error');
}

async function blockUser(uid, nick) {
  if (!confirm(`${nick} engellensin mi?`)) return;
  await sb.from('engellemeler').insert({ engelleyen_id: currentUser.id, engellened_id: uid });
  blockedByMe.push(uid);
  if (activeConvUserId === uid) showEmptyState();
  renderConvList(conversations);
  toast(`🚫 ${nick} engellendi`, 'error');
}

// ── Privacy check ─────────────────────────────────────────────
async function checkPrivacy(targetId) {
  // Check if target blocked me
  const { data: blockedMe } = await sb.from('engellemeler')
    .select('id').eq('engelleyen_id', targetId).eq('engellened_id', currentUser.id).maybeSingle();
  if (blockedMe) return { blocked: true, reason: 'Bu kullanıcı seni engellemiş.' };

  // Check if I blocked them
  if (blockedByMe.includes(targetId)) return { blocked: true, reason: 'Bu kullanıcıyı engelledin.' };

  // Check target's mesaj_ayar
  const { data: targetUser } = await sb.from('kullanicilar').select('mesaj_ayar').eq('id', targetId).single();
  if (targetUser) {
    const ayar = targetUser.mesaj_ayar;
    if (ayar === 'hic') return { blocked: true, reason: 'Bu kullanıcı mesajlara kapalı.' };
    if (ayar === 'takipciler') {
      // Check if I follow them
      const { data: followRec } = await sb.from('takipler')
        .select('id').eq('takip_eden_id', currentUser.id).eq('takip_edilen_id', targetId).maybeSingle();
      if (!followRec) return { blocked: true, reason: 'Bu kullanıcı sadece takipçilerinden mesaj alıyor.' };
    }
  }
  return { blocked: false };
}

  statusTxt.id = 'chat-status-txt';
  statusTxt.textContent = 'Çevrimdışı';
  statusEl.appendChild(dot);
  statusEl.appendChild(statusTxt);
  info.appendChild(statusEl);
  header.appendChild(info);

  // Actions
  const actions = document.createElement('div');
  actions.className = 'chat-hdr-actions';
  const profilBtn = document.createElement('button');
  profilBtn.className = 'hdr-action-btn';
  profilBtn.innerHTML = '👤 Profil';
  profilBtn.addEventListener('click', () => { window.location.href = `profil.html?user=${conv.nick}`; });
  actions.appendChild(profilBtn);

  const blockBtn = document.createElement('button');
  blockBtn.className = 'hdr-action-btn danger';
  blockBtn.innerHTML = blockedByMe.includes(conv.userId) ? '✅ Engeli Kaldır' : '🚫 Engelle';
  blockBtn.addEventListener('click', async () => {
    if (blockedByMe.includes(conv.userId)) {
      await sb.from('engellemeler').delete().eq('engelleyen_id', currentUser.id).eq('engellened_id', conv.userId);
      blockedByMe = blockedByMe.filter(id => id !== conv.userId);
      blockBtn.innerHTML = '🚫 Engelle';
      toast('Engel kaldırıldı', 'info');
    } else {
      await blockUser(conv.userId, conv.nick);
      blockBtn.innerHTML = '✅ Engeli Kaldır';
    }
  });
  actions.appendChild(blockBtn);

  const dotsBtn = document.createElement('button');
  dotsBtn.className = 'hdr-dots-btn';
  dotsBtn.textContent = '⋯';
  dotsBtn.addEventListener('click', (e) => {
    showCtxMenu(e, conv);
  });
  actions.appendChild(dotsBtn);

  header.appendChild(actions);
  chat.appendChild(header);

  // Messages container
  const msgArea = document.createElement('div');
  msgArea.className = 'chat-messages';
  msgArea.id = 'chat-messages';

  // Scroll up → load older
  const loadTrigger = document.createElement('div');
  loadTrigger.className = 'load-trigger';
  loadTrigger.id = 'load-trigger';
  msgArea.appendChild(loadTrigger);

  const obs = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && !isLoadingMessages && hasMoreMessages) {
      loadMoreMessages(conv.userId);
    }
  }, { root: msgArea, threshold: 1 });
  obs.observe(loadTrigger);

  chat.appendChild(msgArea);

  // Restricted banner or input
  if (isRestricted) {
    const banner = document.createElement('div');
    banner.className = 'chat-restricted';
    banner.textContent = '⛔ ' + restricted.reason;
    chat.appendChild(banner);
  } else {
    chat.appendChild(buildInputArea(conv));
  }
}

// ── Build input area ──────────────────────────────────────────
function buildInputArea(conv) {
  const wrap = document.createElement('div');
  wrap.className = 'chat-input-area';
  wrap.style.position = 'relative';

  // Image preview row
  const prevRow = document.createElement('div');
  prevRow.className = 'img-preview-row';
  prevRow.id = 'img-preview-row';
  prevRow.style.display = 'none';
  wrap.appendChild(prevRow);

  const inputRow = document.createElement('div');
  inputRow.className = 'input-row';

  // Emoji
  const emojiBtn = document.createElement('button');
  emojiBtn.className = 'input-action-btn';
  emojiBtn.title = 'Emoji';
  emojiBtn.textContent = '😊';
  emojiBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('emoji-picker').classList.toggle('open');
  });
  inputRow.appendChild(emojiBtn);

  // Textarea
  const ta = document.createElement('textarea');
  ta.className = 'msg-textarea';
  ta.id = 'msg-input';
  ta.placeholder = 'Mesaj yaz…';
  ta.rows = 1;
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 88) + 'px';
    sendTypingIndicator(conv.userId);
  });
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(conv.userId);
    }
  });
  inputRow.appendChild(ta);

  // Image upload
  const imgBtn = document.createElement('button');
  imgBtn.className = 'input-action-btn';
  imgBtn.title = 'Görsel ekle';
  imgBtn.textContent = '🖼️';
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/*';
  fileInput.style.display = 'none';
  fileInput.addEventListener('change', handleImageSelect);
  imgBtn.addEventListener('click', () => fileInput.click());
  inputRow.appendChild(fileInput);
  inputRow.appendChild(imgBtn);

  // Send btn
  const sendBtn = document.createElement('button');
  sendBtn.className = 'send-btn';
  sendBtn.id = 'send-btn';
  sendBtn.title = 'Gönder';
  sendBtn.innerHTML = '➤';
  sendBtn.addEventListener('click', () => sendMessage(conv.userId));
  inputRow.appendChild(sendBtn);

  wrap.appendChild(inputRow);

  const hint = document.createElement('div');
  hint.className = 'input-hint';
  hint.textContent = 'Enter: gönder   •   Shift+Enter: yeni satır';
  wrap.appendChild(hint);

  // Emoji picker
  const picker = document.createElement('div');
  picker.className = 'emoji-picker';
  picker.id = 'emoji-picker';
  EMOJIS.forEach(em => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn-item';
    btn.textContent = em;
    btn.addEventListener('click', () => {
      const input = document.getElementById('msg-input');
      if (input) { input.value += em; input.focus(); }
      picker.classList.remove('open');
    });
    picker.appendChild(btn);
  });
  wrap.appendChild(picker);

  document.addEventListener('click', (e) => {
    if (!picker.contains(e.target) && e.target !== emojiBtn) {
      picker.classList.remove('open');
    }
  });

  return wrap;
}

function setupEmojiPicker() {} // placeholder; actual setup in buildInputArea

function handleImageSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast('Görsel 5MB\'dan büyük olamaz', 'error'); return; }
  const reader = new FileReader();
  reader.onload = (ev) => {
    pendingImages.push({ file, dataUrl: ev.target.result });
    renderImgPreviews();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function renderImgPreviews() {
  const row = document.getElementById('img-preview-row');
  if (!row) return;
  row.innerHTML = '';
  if (!pendingImages.length) { row.style.display = 'none'; return; }
  row.style.display = 'flex';
  pendingImages.forEach((img, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'img-preview-item';
    const thumb = document.createElement('img');
    thumb.className = 'img-preview-thumb';
    thumb.src = img.dataUrl;
    wrap.appendChild(thumb);
    const rm = document.createElement('button');
    rm.className = 'img-preview-remove';
    rm.textContent = '✕';
    rm.addEventListener('click', () => { pendingImages.splice(idx, 1); renderImgPreviews(); });
    wrap.appendChild(rm);
    row.appendChild(wrap);
  });
}

// ── Send message ──────────────────────────────────────────────
async function sendMessage(toId) {
  if (!currentUser || isRestricted) return;
  const ta = document.getElementById('msg-input');
  const text = ta ? ta.value.trim() : '';
  if (!text && !pendingImages.length) return;

  const btn = document.getElementById('send-btn');
  if (btn) btn.disabled = true;

  try {
    if (pendingImages.length) {
      for (const img of pendingImages) {
        // Upload to Supabase Storage (mesajlar bucket)
        const fname = `${currentUser.id}/${Date.now()}_${img.file.name}`;
        let imgUrl = null;
        const { data: upData, error: upErr } = await sb.storage.from('mesajlar').upload(fname, img.file, { upsert: false });
        if (!upErr && upData) {
          const { data: urlData } = sb.storage.from('mesajlar').getPublicUrl(fname);
          imgUrl = urlData.publicUrl;
        } else {
          imgUrl = img.dataUrl; // fallback data URL
        }
        await sb.from('mesajlar').insert({
          gonderen_id: currentUser.id,
          alici_id: toId,
          mesaj: text || null,
          gorsel_url: imgUrl,
          okundu: false,
        });
      }
      pendingImages = [];
      renderImgPreviews();
    }

    if (text) {
      await sb.from('mesajlar').insert({
        gonderen_id: currentUser.id,
        alici_id: toId,
        mesaj: text,
        gorsel_url: null,
        okundu: false,
      });
    }

    if (ta) { ta.value = ''; ta.style.height = 'auto'; }
    updateConvPreview(toId, text || '📷 Görsel', new Date().toISOString());
  } catch (err) {
    toast('Mesaj gönderilemedi', 'error');
    console.error(err);
  }

  if (btn) btn.disabled = false;
}

// ── Load messages ─────────────────────────────────────────────
async function loadMessages(toId, fresh = false) {
  if (!currentUser) return;
  if (fresh) {
    messageOffset = 0;
    hasMoreMessages = true;
    messagesCache[toId] = [];
    const area = document.getElementById('chat-messages');
    if (area) {
      // keep load trigger
      const trig = document.getElementById('load-trigger');
      while (area.firstChild && area.firstChild !== trig) area.removeChild(area.firstChild);
    }
  }

  isLoadingMessages = true;
  const { data } = await sb.from('mesajlar')
    .select('*')
    .or(`and(gonderen_id.eq.${currentUser.id},alici_id.eq.${toId}),and(gonderen_id.eq.${toId},alici_id.eq.${currentUser.id})`)
    .order('created_at', { ascending: false })
    .range(messageOffset, messageOffset + MSG_PAGE - 1);

  const msgs = (data || []).reverse();
  if (msgs.length < MSG_PAGE) hasMoreMessages = false;
  messageOffset += msgs.length;

  if (!messagesCache[toId]) messagesCache[toId] = [];
  messagesCache[toId] = [...msgs, ...messagesCache[toId]];

  renderMessages(toId, msgs, fresh);
  isLoadingMessages = false;
}

async function loadMoreMessages(toId) {
  const area = document.getElementById('chat-messages');
  if (!area) return;
  const prevHeight = area.scrollHeight;
  await loadMessages(toId, false);
  // Restore scroll position
  area.scrollTop = area.scrollHeight - prevHeight;
}

function renderMessages(toId, msgs, scrollToBottom) {
  const area = document.getElementById('chat-messages');
  if (!area) return;

  const allMsgs = messagesCache[toId] || [];
  // Re-render everything fresh on first load
  if (scrollToBottom) {
    const trig = document.getElementById('load-trigger');
    // Remove everything except trigger
    while (area.lastChild && area.lastChild !== trig) area.removeChild(area.lastChild);

    let prevDate = null;
    let prevSender = null;
    let unreadInserted = false;

    allMsgs.forEach((msg, idx) => {
      // Date separator
      if (!prevDate || !isSameDay(prevDate, msg.created_at)) {
        area.appendChild(makeDateSep(formatDateSep(msg.created_at)));
        prevDate = msg.created_at;
        prevSender = null;
      }

      // Unread divider
      if (!unreadInserted && msg.alici_id === currentUser.id && !msg.okundu) {
        area.appendChild(makeUnreadDivider());
        unreadInserted = true;
      }

      const isSent = msg.gonderen_id === currentUser.id;
      const isSeq = prevSender === msg.gonderen_id;
      area.appendChild(makeMsgRow(msg, isSent, isSeq, toId));
      area.appendChild(makeSpacer());
      prevSender = msg.gonderen_id;
    });

    area.scrollTop = area.scrollHeight;
  } else {
    // Prepend older messages
    const trig = document.getElementById('load-trigger');
    let prevSender = null;
    let prevDate = null;

    const frag = document.createDocumentFragment();
    msgs.forEach(msg => {
      if (!prevDate || !isSameDay(prevDate, msg.created_at)) {
        frag.appendChild(makeDateSep(formatDateSep(msg.created_at)));
        prevDate = msg.created_at;
      }
      const isSent = msg.gonderen_id === currentUser.id;
      const isSeq = prevSender === msg.gonderen_id;
      frag.appendChild(makeMsgRow(msg, isSent, isSeq, toId));
      frag.appendChild(makeSpacer());
      prevSender = msg.gonderen_id;
    });
    area.insertBefore(frag, trig.nextSibling);
  }
}

function makeDateSep(label) {
  const sep = document.createElement('div');
  sep.className = 'date-sep';
  const l = document.createElement('div'); l.className = 'date-sep-line';
  const t = document.createElement('div'); t.className = 'date-sep-label'; t.textContent = label;
  const r = document.createElement('div'); r.className = 'date-sep-line';
  sep.appendChild(l); sep.appendChild(t); sep.appendChild(r);
  return sep;
}

function makeUnreadDivider() {
  const div = document.createElement('div');
  div.className = 'unread-divider';
  const l = document.createElement('div'); l.className = 'unread-divider-line';
  const t = document.createElement('div'); t.className = 'unread-divider-label'; t.textContent = 'Okunmamış Mesajlar';
  const r = document.createElement('div'); r.className = 'unread-divider-line';
  div.appendChild(l); div.appendChild(t); div.appendChild(r);
  return div;
}

function makeSpacer() {
  const s = document.createElement('div');
  s.className = 'msg-spacer';
  return s;
}

function makeMsgRow(msg, isSent, isSeq, toId) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + (isSent ? 'sent' : 'recv') + (isSeq ? ' seq' : '');
  row.dataset.msgId = msg.id;

  // Avatar (only on received, first in sequence)
  if (!isSent) {
    if (!isSeq) {
      const av = document.createElement('img');
      av.className = 'msg-small-avatar';
      av.src = avatarSrc(activeConvUser ? activeConvUser.avatar : null, activeConvUser ? activeConvUser.nick : '?');
      av.alt = '';
      row.appendChild(av);
    } else {
      const spacer = document.createElement('div');
      spacer.className = 'msg-avatar-spacer';
      row.appendChild(spacer);
    }
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (msg.gorsel_url) {
    if (msg.mesaj) {
      const textNode = document.createElement('p');
      textNode.style.marginBottom = '6px';
      textNode.textContent = msg.mesaj;
      bubble.appendChild(textNode);
    }
    const imgEl = document.createElement('img');
    imgEl.className = 'msg-img';
    imgEl.src = msg.gorsel_url;
    imgEl.alt = 'görsel';
    imgEl.addEventListener('click', () => openLightbox(msg.gorsel_url));
    bubble.appendChild(imgEl);
  } else {
    bubble.textContent = msg.mesaj || '';
  }

  // Timestamp hover
  const ts = document.createElement('span');
  ts.className = 'msg-ts';
  ts.textContent = formatMsgTime(msg.created_at) + (isSent ? (msg.okundu ? ' ✓✓' : ' ✓') : '');
  bubble.appendChild(ts);

  row.appendChild(bubble);
  return row;
}

// ── Append single new message ─────────────────────────────────
function appendNewMessage(msg) {
  const area = document.getElementById('chat-messages');
  if (!area) return;

  const allMsgs = messagesCache[msg.gonderen_id === currentUser.id ? msg.alici_id : msg.gonderen_id] || [];
  const prevMsg = allMsgs[allMsgs.length - 1];
  const isSent = msg.gonderen_id === currentUser.id;
  const isSeq = prevMsg && prevMsg.gonderen_id === msg.gonderen_id;

  // Date sep if new day
  if (!prevMsg || !isSameDay(prevMsg.created_at, msg.created_at)) {
    area.appendChild(makeDateSep(formatDateSep(msg.created_at)));
  }
  area.appendChild(makeMsgRow(msg, isSent, isSeq, msg.alici_id));
  area.appendChild(makeSpacer());
  allMsgs.push(msg);

  // Scroll to bottom
  area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
}

// ── Mark as read ──────────────────────────────────────────────
async function markAsRead(fromId) {
  if (!currentUser) return;
  await sb.from('mesajlar').update({ okundu: true })
    .eq('alici_id', currentUser.id)
    .eq('gonderen_id', fromId)
    .eq('okundu', false);
}

function updateUnreadBadge(userId, count) {
  const conv = conversations.find(c => c.userId === userId);
  if (conv) conv.unread = count;
  const item = document.querySelector(`.conv-item[data-uid="${userId}"]`);
  if (!item) return;
  const badge = item.querySelector('.conv-badge');
  if (count > 0) {
    if (badge) badge.textContent = count > 99 ? '99+' : count;
    else {
      const b = document.createElement('span');
      b.className = 'conv-badge';
      b.textContent = count > 99 ? '99+' : count;
      item.querySelector('.conv-row2').appendChild(b);
    }
  } else {
    if (badge) badge.remove();
    item.classList.remove('unread');
  }
}

function updateConvPreview(userId, text, time) {
  const conv = conversations.find(c => c.userId === userId);
  if (conv) { conv.lastMsg = text; conv.lastTime = time; }
  const item = document.querySelector(`.conv-item[data-uid="${userId}"]`);
  if (!item) return;
  const prev = item.querySelector('.conv-preview');
  if (prev) prev.textContent = text;
  const t = item.querySelector('.conv-time');
  if (t) t.textContent = relTime(time);
}

// ── Realtime subscription ─────────────────────────────────────
function subscribeRealtime(toId) {
  if (realtimeChannel) sb.removeChannel(realtimeChannel);

  realtimeChannel = sb.channel('mesajlar-' + toId)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'mesajlar',
    }, (payload) => {
      const msg = payload.new;
      const mine = msg.gonderen_id === currentUser.id;
      const theirs = msg.gonderen_id === toId && msg.alici_id === currentUser.id;
      if (!mine && !theirs) return;

      const otherId = mine ? msg.alici_id : msg.gonderen_id;
      if (!messagesCache[otherId]) messagesCache[otherId] = [];
      messagesCache[otherId].push(msg);

      if (activeConvUserId === toId) {
        appendNewMessage(msg);
        if (!mine) markAsRead(toId);
        updateConvPreview(toId, msg.gorsel_url ? '📷 Görsel' : msg.mesaj, msg.created_at);
      } else {
        // Update unread badge for other conv
        const conv = conversations.find(c => c.userId === msg.gonderen_id);
        if (conv) {
          conv.unread = (conv.unread || 0) + 1;
          conv.lastMsg = msg.gorsel_url ? '📷 Görsel' : msg.mesaj;
          conv.lastTime = msg.created_at;
          renderConvList(conversations);
        } else {
          // New conversation from unknown user
          loadConversations();
        }
      }
    })
    .subscribe();
}

// ── Typing indicator ──────────────────────────────────────────
function sendTypingIndicator(toId) {
  // Broadcast via Supabase Realtime presence
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => {}, 1500);
}

// ── Lightbox ──────────────────────────────────────────────────
function openLightbox(src) {
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  const img = document.createElement('img');
  img.src = src;
  lb.appendChild(img);
  lb.addEventListener('click', () => lb.remove());
  document.body.appendChild(lb);
}

// ── Empty state ───────────────────────────────────────────────
function showEmptyState() {
  const chat = document.getElementById('msg-chat');
  chat.innerHTML = '';
  const empty = document.createElement('div');
  empty.className = 'chat-empty';
  empty.id = 'chat-empty';
  const icon = document.createElement('div');
  icon.className = 'chat-empty-icon';
  icon.textContent = '💬';
  const title = document.createElement('div');
  title.className = 'chat-empty-title';
  title.textContent = 'Bir sohbet seç';
  const sub = document.createElement('div');
  sub.className = 'chat-empty-sub';
  sub.textContent = 'Sol panelden bir konuşma seçerek mesajlaşmaya başla.';
  empty.appendChild(icon);
  empty.appendChild(title);
  empty.appendChild(sub);
  chat.appendChild(empty);
}

// ── New message modal ─────────────────────────────────────────
function setupNewMsgModal() {
  const modal = document.getElementById('new-msg-modal');
  document.getElementById('btn-new-msg').addEventListener('click', () => {
    modal.style.display = 'flex';
    document.getElementById('new-msg-search').value = '';
    document.getElementById('new-msg-results').innerHTML = '';
    setTimeout(() => document.getElementById('new-msg-search').focus(), 100);
  });
  document.getElementById('close-new-msg').addEventListener('click', () => {
    modal.style.display = 'none';
  });
  modal.addEventListener('click', (e) => {
    if (e.target === modal) modal.style.display = 'none';
  });

  let searchTimer;
  document.getElementById('new-msg-search').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    const q = e.target.value.trim();
    if (!q) { document.getElementById('new-msg-results').innerHTML = ''; return; }
    searchTimer = setTimeout(() => searchUsers(q), 300);
  });
}

async function searchUsers(q) {
  const { data } = await sb.from('kullanicilar')
    .select('id,kullanici_adi,avatar_url,abonelik')
    .ilike('kullanici_adi', `%${q}%`)
    .limit(10);
  const list = document.getElementById('new-msg-results');
  list.innerHTML = '';
  if (!data || !data.length) {
    const em = document.createElement('div');
    em.style.cssText = 'font-size:11px;color:var(--text-dim);padding:10px 0;text-align:center;';
    em.textContent = 'Kullanıcı bulunamadı';
    list.appendChild(em);
    return;
  }
  data.forEach(u => {
    if (u.id === currentUser.id) return;
    const item = document.createElement('div');
    item.className = 'new-msg-user-item';
    const av = document.createElement('img');
    av.className = 'new-msg-avatar';
    av.src = avatarSrc(u.avatar_url, u.kullanici_adi);
    av.alt = u.kullanici_adi;
    const textWrap = document.createElement('div');
    const nick = document.createElement('div');
    nick.className = 'new-msg-nick';
    nick.textContent = u.kullanici_adi;
    const sub = document.createElement('div');
    sub.className = 'new-msg-sub';
    sub.textContent = u.abonelik || 'Üye';
    textWrap.appendChild(nick);
    textWrap.appendChild(sub);
    item.appendChild(av);
    item.appendChild(textWrap);
    item.addEventListener('click', () => {
      document.getElementById('new-msg-modal').style.display = 'none';
      const conv = {
        userId: u.id,
        nick: u.kullanici_adi,
        avatar: u.avatar_url,
        frame: u.aktif_cerceve,
        unread: 0,
        pinned: false,
        archived: false,
      };
      // Add to conversations if not already there
      if (!conversations.find(c => c.userId === u.id)) {
        conversations.unshift(conv);
      }
      openConv(conv);
      renderConvList(conversations);
    });
    list.appendChild(item);
  });
}

init();
