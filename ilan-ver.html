    /* LOGIN GATE */

    /* CAT BADGE for preview */
    .cat-badge { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }

    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; background: #0d0d0d; border: 1px solid #39ff14; border-radius: 12px; padding: 14px 20px; font-size: 14px; font-weight: 700; color: #39ff14; box-shadow: 0 8px 32px rgba(57,255,20,0.2); transform: translateY(80px); opacity: 0; transition: all 0.35s; max-width: 320px; }

  </style>

<script>
  const SUPABASE_URL = 'https://hmkeedyqmzblnmkhdste.supabase.co';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ─── CANVAS ───────────────────────────────────────────────────────────────
  (function() {
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, beams = [], logos = [], logoImg = new Image();
    logoImg.src = 'https://i.imgur.com/6l08Y4k.png';
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    function makeBeam() { return { x: Math.random() * W, y: -200, len: 150 + Math.random() * 200, speed: 0.4 + Math.random() * 0.6, alpha: 0.03 + Math.random() * 0.06, width: 1 + Math.random() * 2 }; }
    function makeLogo() { return { x: Math.random() * W, y: Math.random() * H, vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3, alpha: 0.02 + Math.random() * 0.04, size: 60 + Math.random() * 80 }; }
    function init() { resize(); beams = Array.from({length: 10}, makeBeam); logos = Array.from({length: 5}, makeLogo); }
    function draw() {
      ctx.clearRect(0, 0, W, H);
      beams.forEach(b => {
        ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(Math.PI / 4);
        const g = ctx.createLinearGradient(0, 0, 0, b.len);
        g.addColorStop(0, `rgba(57,255,20,0)`); g.addColorStop(0.5, `rgba(57,255,20,${b.alpha})`); g.addColorStop(1, `rgba(57,255,20,0)`);
        ctx.fillStyle = g; ctx.fillRect(-b.width / 2, 0, b.width, b.len); ctx.restore();
        b.y += b.speed; if (b.y > H + 300) { Object.assign(b, makeBeam()); b.y = -200; }
      });
      logos.forEach(l => {
        if (logoImg.complete) { ctx.save(); ctx.globalAlpha = l.alpha; ctx.drawImage(logoImg, l.x - l.size/2, l.y - l.size/4, l.size, l.size/2); ctx.restore(); }
        l.x += l.vx; l.y += l.vy;
        if (l.x < -100) l.x = W + 100; if (l.x > W + 100) l.x = -100;
        if (l.y < -100) l.y = H + 100; if (l.y > H + 100) l.y = -100;
      });
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize', () => { resize(); beams = Array.from({length: 10}, makeBeam); });
    init(); draw();
  })();

  const CAT_GRADIENT = {
    PvP: 'linear-gradient(135deg, #1a0008, #3d0015)',
    'İçerik': 'linear-gradient(135deg, #140020, #2d0050)',
    Developer: 'linear-gradient(135deg, #001a20, #003040)',
    Builder: 'linear-gradient(135deg, #1a1000, #3d2800)',
    'Yönetici': 'linear-gradient(135deg, #1a1500, #3d3000)',
  };

  // ─── STATE ────────────────────────────────────────────────────────────────
  let currentUser = null;
  let userProfile = null;
  let currentStep = 1;
  const TOTAL_STEPS = 6;

  const formData = {
    kategori: '',
    alt_kategori: '',
    baslik: '',
    aciklama: '',
    fiyat: '',
    fiyatTuru: 'free', // free | paid | anlasmali
    discord: '',

  // ─── NAV ──────────────────────────────────────────────────────────────────
  async function buildNav() {
    const { data: { session } } = await sb.auth.getSession();
    currentUser = session ? session.user : null;
    if (currentUser) {
      const { data: ku } = await sb.from('kullanicilar').select('id, lcoin, avatar_url, kullanici_adi, email, discord, abonelik').eq('email', currentUser.email).maybeSingle();

    }

    const navRight = document.getElementById('navRight');
    navRight.innerHTML = '';

  function showToast(msg, isError = false) {

  // ─── PROGRESS BAR ─────────────────────────────────────────────────────────
  const STEP_LABELS = ['Kategori', 'Alt Kat.', 'Detaylar', 'İletişim', 'Görsel', 'Yayınla'];

  function buildProgressBar(container) {
    const wrap = document.createElement('div');
    wrap.className = 'progress-wrap';
    wrap.id = 'progressWrap';

    for (let i = 1; i <= TOTAL_STEPS; i++) {
      const stepEl = document.createElement('div');
      stepEl.className = 'progress-step';

      const dot = document.createElement('div');
      dot.className = 'progress-dot';
      dot.id = 'pdot' + i;
      dot.style.position = 'relative';

      const numSpan = document.createElement('span');
      numSpan.textContent = i < currentStep ? '✓' : i;
      dot.appendChild(numSpan);

      const lbl = document.createElement('div');
      lbl.className = 'progress-label';
      lbl.textContent = STEP_LABELS[i - 1];
      dot.appendChild(lbl);

      stepEl.appendChild(dot);

      if (i < TOTAL_STEPS) {
        const line = document.createElement('div');
        line.className = 'progress-line';
        line.id = 'pline' + i;
        stepEl.appendChild(line);
      }

      wrap.appendChild(stepEl);
    }

    container.appendChild(wrap);
  }

  function updateProgress() {
    for (let i = 1; i <= TOTAL_STEPS; i++) {
      const dot = document.getElementById('pdot' + i);
      if (!dot) continue;
      dot.className = 'progress-dot';
      if (i < currentStep) { dot.className = 'progress-dot done'; dot.querySelector('span').textContent = '✓'; }
      else if (i === currentStep) { dot.className = 'progress-dot active'; dot.querySelector('span').textContent = i; }
      else { dot.querySelector('span').textContent = i; }

      if (i < TOTAL_STEPS) {
        const line = document.getElementById('pline' + i);
        if (line) line.className = 'progress-line' + (i < currentStep ? ' done' : '');
      }
    }
  }

  // ─── CHECK LISTING LIMITS ──────────────────────────────────────────────────
  async function checkListingLimits() {
    if (!currentUser) return true;
    const settings = await window.dbHelper.getSiteSettings();
    const role = (userProfile && userProfile.abonelik) ? userProfile.abonelik : 'uye';
    
    let limit = settings.limit_uye || 3;
    if (role === 'abone') limit = settings.limit_abone || 10;
    else if (['premium', 'yonetici', 'admin', 'moderator', 'rehber'].includes(role)) {
      limit = settings.limit_premium || 9999;
    }

    let activeCount = 0;
    if (sb) {
      try {
        const { data, error } = await sb.from('ilanlar')
          .select('id, durum')
          .eq('kullanici_id', currentUser.id);
        if (!error && data) {
          activeCount = data.filter(i => ['onaylandi', 'aktif', 'beklemede'].includes(i.durum)).length;
        }
      } catch (err) {
        console.warn("Supabase active listings query failed, using localStorage fallback.");
      }
    }
    
    try {
      const local = localStorage.getItem('lobby_ilanlar');
      if (local) {
        const arr = JSON.parse(local);
        const localCount = arr.filter(i => i.kullanici_id === currentUser.id && ['onaylandi', 'aktif', 'beklemede'].includes(i.durum)).length;
        if (localCount > activeCount) activeCount = localCount;
      }
    } catch(e) {}

    if (activeCount >= limit) {
      renderLimitGate(limit, activeCount);
      return false;
    }
    return true;
  }

    emailInput.value = formData.email || '';
    emailInput.addEventListener('input', () => { formData.email = emailInput.value.trim(); });
    emailWrap.appendChild(emailInput);
    emailGroup.appendChild(emailWrap);
    panel.appendChild(emailGroup);

    const btnRow = document.createElement('div');
    btnRow.className = 'btn-row';
    const backBtn = document.createElement('button');
    backBtn.className = 'btn-back';
    backBtn.textContent = '← Geri';
    backBtn.addEventListener('click', goPrev);
    const nextBtn = document.createElement('button');
    nextBtn.className = 'btn-next';
    nextBtn.textContent = 'Devam Et →';
    nextBtn.addEventListener('click', () => {
      const disc = discordInput.value.trim();
      const mail = emailInput.value.trim();
      if (!disc && !mail) {
        discordError.classList.add('show');
        discordInput.classList.add('error');
        emailInput.classList.add('error');
        showToast('En az bir iletişim bilgisi gir!', true);
        return;
      }
      formData.discord = disc;
      formData.email = mail;
      goNext();
    });
    btnRow.appendChild(backBtn);
    btnRow.appendChild(nextBtn);
    panel.appendChild(btnRow);
    card.appendChild(panel);
  }

  // ─── STEP 5 — BANNER ──────────────────────────────────────────────────────
  function renderStep5(card) {
    const panel = document.createElement('div');
    panel.className = 'step-panel active';

    const title = document.createElement('div');
    title.className = 'step-title';
    title.textContent = '🖼️ Banner Görsel';
    const sub = document.createElement('div');
    sub.className = 'step-subtitle';
    sub.textContent = 'İlanın için bir banner görseli yükle. (isteğe bağlı)';
    panel.appendChild(title);
    panel.appendChild(sub);

    const uploadZone = document.createElement('div');
    uploadZone.className = 'upload-zone';

    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    uploadZone.appendChild(fileInput);

    const uploadContent = document.createElement('div');
    uploadContent.id = 'uploadContent';

    const uploadIco = document.createElement('div');
    uploadIco.className = 'upload-icon';
    uploadIco.textContent = '📁';
    const uploadTitle = document.createElement('div');
    uploadTitle.className = 'upload-title';
    uploadTitle.textContent = 'Dosya sürükle & bırak';
    const uploadSub = document.createElement('div');
    uploadSub.className = 'upload-sub';
    uploadSub.textContent = 'veya tıkla — PNG, JPG (max 5MB)';
    uploadContent.appendChild(uploadIco);
    uploadContent.appendChild(uploadTitle);
    uploadContent.appendChild(uploadSub);
    uploadZone.appendChild(uploadContent);

    const preview = document.createElement('img');
    preview.className = 'upload-preview';
    preview.alt = 'Banner önizleme';
    if (formData.bannerUrl) {
      preview.src = formData.bannerUrl;
      preview.classList.add('show');
      uploadContent.style.display = 'none';
    }
    uploadZone.appendChild(preview);

    uploadZone.addEventListener('click', () => fileInput.click());
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      if (file.size > 5 * 1024 * 1024) { showToast('Dosya 5MB\'dan büyük olamaz!', true); return; }
      formData.bannerFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        formData.bannerUrl = e.target.result;
        preview.src = e.target.result;
        preview.classList.add('show');
        uploadContent.style.display = 'none';
        removeBtn.classList.add('show');
      };
      reader.readAsDataURL(file);
    }

    panel.appendChild(uploadZone);

    const removeBtn = document.createElement('div');
    removeBtn.className = 'upload-remove' + (formData.bannerFile ? ' show' : '');
    const removeBtnEl = document.createElement('button');
    removeBtnEl.className = 'btn-back';
    removeBtnEl.style.width = '100%';
    removeBtnEl.textContent = '🗑️ Görseli Kaldır';
    removeBtnEl.addEventListener('click', () => {
      formData.bannerFile = null;
      formData.bannerUrl = '';
      preview.src = '';
      preview.classList.remove('show');
      uploadContent.style.display = 'block';
      removeBtn.classList.remove('show');
    });
    removeBtn.appendChild(removeBtnEl);
    panel.appendChild(removeBtn);

    const skipLink = document.createElement('div');
    skipLink.className = 'skip-link';
    const skipA = document.createElement('a');
    skipA.textContent = 'Görsel eklemeden devam et →';
    skipA.addEventListener('click', () => {
      formData.bannerFile = null;
      formData.bannerUrl = '';
      goNext();
    });
    skipLink.appendChild(skipA);
    panel.appendChild(skipLink);

    const btnRow = document.createElement('div');
    btnRow.className = 'btn-row';
    const backBtn = document.createElement('button');
    backBtn.className = 'btn-back';
    backBtn.textContent = '← Geri';
    backBtn.addEventListener('click', goPrev);
    const nextBtn = document.createElement('button');
    nextBtn.className = 'btn-next';
    nextBtn.textContent = 'Önizle →';
    nextBtn.addEventListener('click', () => { goNext(); });
    btnRow.appendChild(backBtn);
    btnRow.appendChild(nextBtn);
    panel.appendChild(btnRow);
    card.appendChild(panel);
  }

  // ─── STEP 6 — ÖNİZLEME ───────────────────────────────────────────────────
  function renderStep6(card) {
    const panel = document.createElement('div');
    panel.className = 'step-panel active';

    const title = document.createElement('div');
    title.className = 'step-title';
    title.textContent = '🚀 Önizleme & Yayınla';
    const sub = document.createElement('div');
    sub.className = 'step-subtitle';
    sub.textContent = 'İlanın yayınlanmadan önce admin onayına gönderilecek.';
    panel.appendChild(title);
    panel.appendChild(sub);

    // Preview card
    const previewContainer = document.createElement('div');
    previewContainer.className = 'preview-container';
    const previewLbl = document.createElement('div');
    previewLbl.className = 'preview-label';
    previewLbl.textContent = '📋 İlan Önizleme';
    previewContainer.appendChild(previewLbl);

    const previewCard = document.createElement('div');
    previewCard.className = 'preview-card';

    const catDef = CATEGORIES.find(c => c.id === formData.kategori);

    // Banner
    const pvBanner = document.createElement('div');
    pvBanner.className = 'preview-banner';
    pvBanner.style.position = 'relative';

    if (formData.bannerUrl) {
      const pvImg = document.createElement('img');
      pvImg.src = formData.bannerUrl;
      pvImg.style.width = '100%'; pvImg.style.height = '100%'; pvImg.style.objectFit = 'cover'; pvImg.style.position = 'absolute'; pvImg.style.inset = '0';
      pvBanner.appendChild(pvImg);
    } else {
      pvBanner.style.background = CAT_GRADIENT[formData.kategori] || '#111';
      const pvIco = document.createElement('span');
      pvIco.textContent = catDef ? catDef.icon : '📋';
      pvIco.style.fontSize = '40px'; pvIco.style.opacity = '0.4';
      pvBanner.appendChild(pvIco);
    }

    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(17,17,17,0.85) 100%)';
    pvBanner.appendChild(overlay);

    const pvBadges = document.createElement('div');
    pvBadges.className = 'preview-badges';
    const pvCatBadge = document.createElement('span');
    const catMap = { PvP: 'pvp', 'İçerik': 'icerik', Developer: 'developer', Builder: 'builder', 'Yönetici': 'yonetici' };
    pvCatBadge.className = 'cat-badge ' + (catMap[formData.kategori] || '');
    pvCatBadge.textContent = (catDef ? catDef.icon + ' ' : '') + formData.kategori;
    pvBadges.appendChild(pvCatBadge);
    pvBanner.appendChild(pvBadges);
    previewCard.appendChild(pvBanner);

    // Body
    const pvBody = document.createElement('div');
    pvBody.className = 'preview-body';
    const pvTitle = document.createElement('div');
    pvTitle.className = 'preview-title-el';
    pvTitle.textContent = formData.baslik || 'İlan Başlığı';
    pvBody.appendChild(pvTitle);
    const pvDesc = document.createElement('div');
    pvDesc.className = 'preview-desc-el';
    pvDesc.textContent = formData.aciklama || 'Açıklama burada görünecek.';
    pvBody.appendChild(pvDesc);

    const pvPriceBadge = document.createElement('span');
    if (!formData.fiyat || formData.fiyat == '0' || formData.fiyat === 'Ücretsiz') {
      pvPriceBadge.className = 'price-badge free'; pvPriceBadge.textContent = '✅ Ücretsiz';
    } else if (formData.fiyat === 'Anlaşmalı') {
      pvPriceBadge.className = 'price-badge anlasmali'; pvPriceBadge.textContent = '🤝 Anlaşmalı';
    } else {
      pvPriceBadge.className = 'price-badge paid'; pvPriceBadge.textContent = '💰 ' + formData.fiyat + ' ₺';
    }
    pvBody.appendChild(pvPriceBadge);
    previewCard.appendChild(pvBody);

    // Footer
    const pvFooter = document.createElement('div');
    pvFooter.className = 'preview-footer';
    const pvNick = document.createElement('div');
    pvNick.className = 'preview-nick';
    pvNick.textContent = (userProfile ? userProfile.kullanici_adi : (currentUser ? currentUser.email : 'Sen'));
    pvFooter.appendChild(pvNick);
    const pvContact = document.createElement('div');
    pvContact.style.cssText = 'display:flex;gap:6px;';
    if (formData.discord) {
      const pvD = document.createElement('span');
      pvD.style.cssText = 'font-size:16px;';
      pvD.textContent = '💬';
      pvContact.appendChild(pvD);
    }
    if (formData.email) {
      const pvE = document.createElement('span');
      pvE.style.cssText = 'font-size:16px;';
      pvE.textContent = '✉️';
      pvContact.appendChild(pvE);
    }
    pvFooter.appendChild(pvContact);
    previewCard.appendChild(pvFooter);
    previewContainer.appendChild(previewCard);
    panel.appendChild(previewContainer);

    // Pending note
    const pendingNote = document.createElement('div');
    pendingNote.className = 'pending-note';
    const pendingIcon = document.createElement('div');
    pendingIcon.className = 'pending-note-icon';
    pendingIcon.textContent = '⏳';
    const pendingText = document.createElement('div');
    pendingText.className = 'pending-note-text';
    const pendingStrong = document.createElement('strong');
    pendingStrong.textContent = 'Admin onayı gerekiyor.';
    pendingText.appendChild(pendingStrong);
    pendingText.appendChild(document.createTextNode(' İlanın yayınlanmadan önce ekibimiz tarafından incelenecek. Genellikle 24 saat içinde onaylanır.'));
    pendingNote.appendChild(pendingIcon);
    pendingNote.appendChild(pendingText);
    panel.appendChild(pendingNote);

    // Publish button
    const btnRow = document.createElement('div');
    btnRow.className = 'btn-row';
    const backBtn = document.createElement('button');
    backBtn.className = 'btn-back';
    backBtn.textContent = '← Geri';
    backBtn.addEventListener('click', goPrev);
    const publishBtn = document.createElement('button');
    publishBtn.className = 'btn-next';
    publishBtn.textContent = '🚀 Yayınla';
    publishBtn.addEventListener('click', () => submitIlan(publishBtn));
    btnRow.appendChild(backBtn);
    btnRow.appendChild(publishBtn);
    panel.appendChild(btnRow);
    card.appendChild(panel);
  }

  // ─── SUBMIT ───────────────────────────────────────────────────────────────
  async function submitIlan(btn) {
    if (!currentUser) { showToast('Giriş yapman gerekiyor!', true); return; }

    btn.disabled = true;
    btn.innerHTML = '';
    const spinner = document.createElement('span');
    spinner.className = 'spinner';
    btn.appendChild(spinner);
    btn.appendChild(document.createTextNode(' Yayınlanıyor...'));

    let bannerUrl = '';

    // Upload image if exists
    if (formData.bannerFile) {
      const ext = formData.bannerFile.name.split('.').pop();
      const fileName = `ilanlar/${currentUser.id}_${Date.now()}.${ext}`;
      const { data: upData, error: upErr } = await sb.storage.from('images').upload(fileName, formData.bannerFile, { upsert: true });
      if (upErr) { console.error(upErr); showToast('Görsel yüklenemedi, devam ediliyor...', true); }
      else {
        const { data: urlData } = sb.storage.from('images').getPublicUrl(fileName);
        bannerUrl = urlData.publicUrl;
      }
    }

    const nick = userProfile ? userProfile.kullanici_adi : (currentUser.email ? currentUser.email.split('@')[0] : 'kullanici');
    const fiyatValue = formData.fiyatTuru === 'free' ? 0 : (formData.fiyatTuru === 'anlasmali' ? 'Anlaşmalı' : formData.fiyat);

    const { error } = await sb.from('ilanlar').insert({
      kullanici_id: currentUser.id,
      kullanici_nick: nick,
      baslik: formData.baslik,
      kategori: formData.kategori,
      alt_kategori: formData.alt_kategori,
      aciklama: formData.aciklama,
      fiyat: fiyatValue,
      discord: formData.discord || null,
      email: formData.email || null,
      durum: 'beklemede',
      one_cikan: false,
      banner_url: bannerUrl || null,
    });

    if (error) {
      console.error(error);
      btn.disabled = false;
      btn.textContent = '🚀 Yayınla';
      showToast('Hata: ' + (error.message || 'İlan gönderilemedi'), true);
      return;
    }

    // Success
    btn.textContent = '✅ Gönderildi!';
    showToast('✅ İlanın admin onayı bekliyor!');
    setTimeout(() => {
      window.location.href = 'ilanlar.html?success=1';
    }, 1800);
  }

  // ─── NAVIGATION ───────────────────────────────────────────────────────────
  function goNext() {
    if (currentStep < TOTAL_STEPS) {
      currentStep++;
      updateProgress();
      renderStep(document.getElementById('formCard'));
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  function goPrev() {
    if (currentStep > 1) {
      currentStep--;
      updateProgress();
      renderStep(document.getElementById('formCard'));
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  // ─── INIT ─────────────────────────────────────────────────────────────────
  async function init() {
    await buildNav();
    await renderPage();
  }

  init();
</script>
</body>
</html>
