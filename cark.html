<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LOBBY.GG - Şans Çarkı</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .cark-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: calc(var(--nav-h) + 40px) 20px 80px;
      display: flex;
      gap: 40px;
      align-items: flex-start;
      animation: fade-in-up 0.5s ease-out;
    }
    
    @media (max-width: 800px) {
      .cark-page { flex-direction: column; }
    }

    /* Left Side: The Wheel */
    .cark-container {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 100px rgba(255,215,0,0.05);
    }

    .cark-container::before {
      content: '';
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    .cark-title {
      font-size: 36px;
      font-weight: 900;
      color: var(--gold);
      text-transform: uppercase;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.8), 0 0 20px rgba(255,215,0,0.5);
      margin-bottom: 5px;
      z-index: 1;
    }

    .cark-subtitle {
      font-size: 14px;
      color: var(--text-2);
      margin-bottom: 40px;
      z-index: 1;
    }

    /* The Wheel */
    .wheel-wrapper {
      position: relative;
      width: 320px;
      height: 320px;
      z-index: 2;
      filter: drop-shadow(0 15px 30px rgba(0,0,0,0.7));
    }

    .wheel-pointer {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 50px;
      background: var(--red);
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      z-index: 10;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 8px solid #222;
      position: relative;
      overflow: hidden;
      transition: transform 5s cubic-bezier(0.1, 1.2, 0.2, 1); /* Spining easing */
      box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 0 4px #b8860b;
      background: #111;
    }

    .wheel-segment {
      position: absolute;
      top: 0;
      left: 50%;
      width: 50%;
      height: 50%;
      transform-origin: 0% 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      border-left: 2px solid rgba(0,0,0,0.5);
    }
    
    .segment-content {
      position: absolute;
      left: 20px;
      bottom: 20px;
      transform: rotate(22.5deg); /* Half of segment angle (45) */
      font-weight: 900;
      font-size: 14px;
      color: #000;
      white-space: nowrap;
      text-shadow: 1px 1px 0px rgba(255,255,255,0.3);
    }

    /* Segment Colors */
    .seg-0 { background: #FFD700; transform: rotate(0deg) skewY(-45deg); }
    .seg-1 { background: #DAA520; transform: rotate(45deg) skewY(-45deg); }
    .seg-2 { background: #FFD700; transform: rotate(90deg) skewY(-45deg); }
    .seg-3 { background: #DAA520; transform: rotate(135deg) skewY(-45deg); }
    .seg-4 { background: #FFD700; transform: rotate(180deg) skewY(-45deg); }
    .seg-5 { background: #DAA520; transform: rotate(225deg) skewY(-45deg); }
    .seg-6 { background: #FFD700; transform: rotate(270deg) skewY(-45deg); }
    .seg-7 { background: #DAA520; transform: rotate(315deg) skewY(-45deg); }

    .wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      background: #222;
      border: 4px solid var(--gold);
      border-radius: 50%;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .spin-actions {
      margin-top: 50px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      max-width: 320px;
      z-index: 2;
    }

    .hak-text {
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-1);
    }
    
    .hak-text span {
      color: var(--gold);
      font-size: 18px;
    }

    /* Right Side: Leaderboard */
    .leaderboard-container {
      width: 350px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    @media (max-width: 800px) {
      .leaderboard-container { width: 100%; }
    }

    .lb-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-thin);
    }
    .lb-header h2 {
      font-size: 18px;
      font-weight: 900;
      color: var(--text-1);
      margin: 0;
    }
    
    .lb-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .lb-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card2);
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border-thin);
      transition: all 0.2s;
    }
    .lb-item:hover {
      border-color: var(--border-hover);
      background: rgba(255,255,255,0.03);
    }

    .lb-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
    }

    .lb-info {
      flex: 1;
    }
    .lb-name {
      font-size: 13px;
      font-weight: 800;
      color: var(--text-1);
      margin-bottom: 2px;
    }
    .lb-reward {
      font-size: 11px;
      color: var(--gold);
      font-weight: 700;
    }
    .lb-time {
      font-size: 10px;
      color: var(--text-3);
    }
  </style>
</head>
<body>
  <canvas id="canvas-bg"></canvas>
  
  <div class="page-wrapper">
    <nav class="nav" id="nav"></nav>

    <div class="cark-page">
      
      <!-- WHEEL SECTION -->
      <div class="cark-container">
        <div class="cark-title">Şans Çarkı</div>
        <div class="cark-subtitle">Efsanevi ödüller seni bekliyor!</div>

        <div class="wheel-wrapper">
          <div class="wheel-pointer"></div>
          <div class="wheel" id="wheel">
            <!-- 8 Segments (45 deg each) -->
            <div class="wheel-segment seg-0"><div class="segment-content">10 LCoin</div></div>
            <div class="wheel-segment seg-1"><div class="segment-content">Öne Çıkarma</div></div>
            <div class="wheel-segment seg-2"><div class="segment-content">20 LCoin</div></div>
            <div class="wheel-segment seg-3"><div class="segment-content">Öne Çıkarma</div></div>
            <div class="wheel-segment seg-4"><div class="segment-content">50 LCoin</div></div>
            <div class="wheel-segment seg-5"><div class="segment-content">Öne Çıkarma</div></div>
            <div class="wheel-segment seg-6"><div class="segment-content">100 LCoin</div></div>
            <div class="wheel-segment seg-7"><div class="segment-content">Öne Çıkarma</div></div>
          </div>
          <div class="wheel-center">🎡</div>
        </div>

        <div class="spin-actions">
          <div class="hak-text">Kalan Çevirme Hakkı: <span id="spinCount">1</span></div>
          <button class="btn mc-gold mc-xl" id="btnSpin" style="width: 100%;">ÇARK'I ÇEVİR</button>
          <button class="btn mc-gray" id="btnBuySpins" style="width: 100%;">
            <span class="lcoin-icon" style="width:14px;height:14px;font-size:10px;">L</span> 50 Karşılığında +5 Hak Al
          </button>
        </div>
      </div>

      <!-- LEADERBOARD SECTION -->
      <div class="leaderboard-container">
        <div class="lb-header">
          <span style="font-size:20px;">🏆</span>
          <h2>En Çok Kazananlar</h2>
        </div>
        <div class="lb-list" id="lbList">
          <!-- Populated by JS -->
        </div>
      </div>

    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://hmkeedyqmzblnmkhdste.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhta2VlZHlxbXpibG5ta2hkc3RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODE3MzYsImV4cCI6MjA5NDM1NzczNn0.5HUInmQs_LsXYovJgI7Ir9q8M9aPlQW6jM5C43aYmqA';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentProfile = null;
    let spinRights = 1;
    let isSpinning = false;
    let currentRotation = 0;

    // The segments
    // Angle ranges from top center (pointer). Segment 0 is at 0-45 deg.
    const segments = [
      { name: "10 LCoin", type: "lcoin", val: 10 },
      { name: "1 Gün Öne Çıkarma", type: "item", val: 1 },
      { name: "20 LCoin", type: "lcoin", val: 20 },
      { name: "1 Gün Öne Çıkarma", type: "item", val: 1 },
      { name: "50 LCoin", type: "lcoin", val: 50 },
      { name: "1 Gün Öne Çıkarma", type: "item", val: 1 },
      { name: "100 LCoin", type: "lcoin", val: 100 },
      { name: "2 Gün Öne Çıkarma", type: "item", val: 2 }
    ];

    async function buildNav() {
      const nav = document.getElementById('nav');
      nav.innerHTML = `
        <a href="lobbyx.html"><img src="https://i.hizliresim.com/6c4wdx4.png" alt="LOBBY.GG Logo" class="nav-logo"></a>
        <div class="nav-links">
          <a href="lobbyx.html" class="nav-link">🏠 Ana Sayfa</a>
          <a href="ilanlar.html" class="nav-link">📜 İlanlar</a>
          <a href="kesfet.html" class="nav-link">🌍 Keşfet</a>
          <a href="market.html" class="nav-link">💎 Mağaza</a>
        </div>
        <div class="nav-right" id="navRight">
          <a href="giris.html" class="btn mc-green mc-sm">Giriş Yap</a>
        </div>
      `;

      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        const { data: profile } = await sb.from('kullanicilar').select('*').eq('email', session.user.email).maybeSingle();
        if (profile) {
          currentProfile = profile;
          document.getElementById('navRight').innerHTML = `
            <a href="profil.html" class="nav-lcoin"><span class="lcoin-icon">L</span> ${profile.lcoin || 0}</a>
            <a href="profil.html" class="nav-avatar pp-wrap" data-frame="${profile.aktif_cerceve || 'none'}">
              <img src="${profile.avatar_url || 'https://api.dicebear.com/7.x/minecraft/svg?seed='+profile.kullanici_adi}" class="pp-img shape-rounded" alt="Avatar">
            </a>
          `;
        }
      }
    }

    function initCanvas() {
      const cvs = document.getElementById('canvas-bg');
      const ctx = cvs.getContext('2d');
      let w, h;
      let beams = [];
      function resize() {
        w = cvs.width = window.innerWidth;
        h = cvs.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();
      
      class Beam {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random() * w;
          this.y = h + Math.random() * 100;
          this.len = Math.random() * 200 + 100;
          this.speed = Math.random() * 2 + 0.5;
          this.width = Math.random() * 3 + 1;
          this.opacity = Math.random() * 0.5 + 0.1;
        }
        update() {
          this.y -= this.speed;
          if (this.y + this.len < 0) this.reset();
        }
        draw() {
          const grad = ctx.createLinearGradient(0, this.y, 0, this.y + this.len);
          grad.addColorStop(0, `rgba(57,255,20,0)`);
          grad.addColorStop(0.5, `rgba(57,255,20,${this.opacity})`);
          grad.addColorStop(1, `rgba(57,255,20,0)`);
          ctx.beginPath();
          ctx.moveTo(this.x, this.y);
          ctx.lineTo(this.x, this.y + this.len);
          ctx.lineWidth = this.width;
          ctx.strokeStyle = grad;
          ctx.stroke();
        }
      }
      for (let i=0; i<15; i++) beams.push(new Beam());
      function animate() {
        ctx.clearRect(0,0,w,h);
        beams.forEach(b => { b.update(); b.draw(); });
        requestAnimationFrame(animate);
      }
      animate();
    }

    function generateLeaderboard() {
      // Mock leaderboard for visual presentation
      const list = document.getElementById('lbList');
      const winners = [
        { name: 'ProGamer_99', win: '100 LCoin', time: '10 dk önce', color: 'gold' },
        { name: 'CraftMaster', win: '2 Gün Öne Çıkarma', time: '1 saat önce', color: 'text-1' },
        { name: 'SlayerX', win: '50 LCoin', time: '2 saat önce', color: 'gold' },
        { name: 'Yusuf_TR', win: '1 Gün Öne Çıkarma', time: '5 saat önce', color: 'text-1' },
        { name: 'Ayse_Girl', win: '20 LCoin', time: '8 saat önce', color: 'gold' }
      ];

      list.innerHTML = winners.map(w => `
        <div class="lb-item">
          <img src="https://api.dicebear.com/7.x/minecraft/svg?seed=${w.name}" class="lb-avatar">
          <div class="lb-info">
            <div class="lb-name">${w.name}</div>
            <div class="lb-reward" style="color:var(--${w.color})">${w.win}</div>
          </div>
          <div class="lb-time">${w.time}</div>
        </div>
      `).join('');
    }

    document.getElementById('btnBuySpins').addEventListener('click', () => {
      if (!currentProfile) return alert('Lütfen giriş yapın!');
      if (currentProfile.lcoin < 50) return alert('Yetersiz LCoin!');
      // In real scenario, subtract from DB.
      spinRights += 5;
      document.getElementById('spinCount').textContent = spinRights;
      alert('5 Hak satın alındı!');
    });

    document.getElementById('btnSpin').addEventListener('click', () => {
      if (!currentProfile) return alert('Lütfen giriş yapın!');
      if (spinRights <= 0) return alert('Çevirme hakkınız kalmadı! Satın alabilirsiniz.');
      if (isSpinning) return;

      isSpinning = true;
      spinRights--;
      document.getElementById('spinCount').textContent = spinRights;

      // Random segment (0 to 7)
      const targetSegment = Math.floor(Math.random() * 8);
      // Segment 0 is at 0-45deg. To land pointer in middle of segment 0, we need to rotate 
      // wheel such that segment 0 is at top. Actually segment 0 is top-right (0-45deg from top center)
      // To bring segment center to top (-22.5 deg relative to its own start).
      
      const spins = 5; // number of full rotations
      const baseRotation = spins * 360;
      // segment angle size
      const segAngle = 360 / 8;
      // offset to put pointer in middle of segment
      const offset = (targetSegment * segAngle) + (segAngle / 2);
      
      // We want to rotate backwards (or forwards) so that `offset` aligns with top (which is 0deg).
      // If wheel rotates clockwise, segment N moves right. To bring it to top, we subtract offset.
      const totalRotation = currentRotation + baseRotation + (360 - offset) - (currentRotation % 360);
      
      const wheel = document.getElementById('wheel');
      wheel.style.transform = `rotate(${totalRotation}deg)`;

      setTimeout(() => {
        isSpinning = false;
        currentRotation = totalRotation;
        const reward = segments[targetSegment];
        alert(`Tebrikler! ${reward.name} kazandınız! Ödülünüz "Hediyelerim" sekmesine eklendi.`);
      }, 5000);
    });

    buildNav();
    initCanvas();
    generateLeaderboard();
  </script>
</body>
</html>
