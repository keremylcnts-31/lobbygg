<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LOBBY.GG - Şans Çarkı</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .cark-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: calc(var(--nav-h) + 40px) 20px 80px;
      display: flex;
      gap: 40px;
      align-items: flex-start;
      animation: fade-in-up 0.5s ease-out;
    }
    
    @media (max-width: 850px) {
      .cark-page { flex-direction: column; }
    }

    /* Left Side: The Wheel */
    .cark-container {
      flex: 1.2;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 100px rgba(255,215,0,0.03);
    }

    .cark-title {
      font-size: 32px;
      font-weight: 900;
      color: var(--gold);
      text-transform: uppercase;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.8), 0 0 20px rgba(255,215,0,0.4);
      margin-bottom: 5px;
      z-index: 1;
    }

    .cark-subtitle {
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 30px;
      z-index: 1;
    }

    /* The Wheel Wrapper */
    .wheel-wrapper {
      position: relative;
      width: 360px;
      height: 360px;
      z-index: 2;
      filter: drop-shadow(0 15px 30px rgba(0,0,0,0.7));
      margin-bottom: 20px;
    }

    .wheel-pointer {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 36px;
      height: 44px;
      background: var(--red);
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      z-index: 10;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
    }

    #wheelCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .spin-actions {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      max-width: 320px;
      z-index: 2;
    }

    .hak-text {
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-1);
    }
    
    .hak-text span {
      color: var(--gold);
      font-size: 18px;
    }

    /* Right Side: Leaderboard & Recent Wins */
    .right-sidebar {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 100%;
    }

    .leaderboard-container, .recent-wins-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    .lb-header, .rw-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-thin);
    }
    .lb-header h2, .rw-header h2 {
      font-size: 16px;
      font-weight: 900;
      color: var(--text-1);
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .lb-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 15px;
    }
    
    .lb-tab {
      flex: 1;
      padding: 6px;
      font-size: 10px;
      font-weight: 800;
      text-align: center;
    }

    .lb-list, .rw-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 380px;
      overflow-y: auto;
      padding-right: 4px;
    }
    /* Scrollbar */
    .lb-list::-webkit-scrollbar, .rw-list::-webkit-scrollbar { width: 4px; }
    .lb-list::-webkit-scrollbar-thumb, .rw-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .lb-item, .rw-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card2);
      padding: 10px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border-thin);
      transition: all 0.2s;
    }
    .lb-item:hover, .rw-item:hover {
      border-color: var(--border-hover);
      background: rgba(255,255,255,0.02);
    }

    .lb-rank {
      font-size: 14px;
      font-weight: 900;
      width: 24px;
      color: var(--text-3);
      text-align: center;
    }
    .rank-1 { color: #ffd700; font-size: 18px; }
    .rank-2 { color: #c0c0c0; font-size: 16px; }
    .rank-3 { color: #cd7f32; font-size: 15px; }

    .lb-avatar, .rw-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
    }

    .lb-info, .rw-info {
      flex: 1;
      min-width: 0;
    }
    .lb-name, .rw-name {
      font-size: 12px;
      font-weight: 800;
      color: var(--text-1);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lb-reward, .rw-reward {
      font-size: 11px;
      color: var(--gold);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .lb-time, .rw-time {
      font-size: 10px;
      color: var(--text-dim);
    }
  </style>
</head>

  <script>
    const SUPABASE_URL = 'https://hmkeedyqmzblnmkhdste.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhta2VlZHlxbXpibG5ta2hkc3RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODE3MzYsImV4cCI6MjA5NDM1NzczNn0.5HUInmQs_LsXYovJgI7Ir9q8M9aPlQW6jM5C43aYmqA';

    // Toast Notification
    function toast(msg, type='success') {
      const c = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      const icons = {success:'✅', error:'❌', info:'ℹ️', gold:'⭐'};
      const ico = document.createElement('span');
      ico.textContent = icons[type] || '✅';
      const txt = document.createElement('span');
      txt.textContent = msg;
      t.appendChild(ico);
      t.appendChild(txt);
      c.appendChild(t);
      setTimeout(() => {
        t.style.transition = 'opacity 0.3s';
        t.style.opacity = '0';
        setTimeout(() => t.remove(), 320);
      }, 3500);
    }

    // Time Ago
    function timeAgo(str) {
      if (!str) return '';
      const diff = (Date.now() - new Date(str).getTime()) / 1000;
      if (diff < 60) return 'az önce';
      if (diff < 3600) return Math.floor(diff/60) + ' dk önce';
      if (diff < 86400) return Math.floor(diff/3600) + ' saat önce';
      return Math.floor(diff/86400) + ' gün önce';
    }

    // ==========================================

    // ==========================================
    // CHECK SPIN ELIGIBILITY
    // ==========================================
    async function checkSpinRights() {
      if (!currentProfile) return;
      
      try {
        // Query last spin in the past 24 hours
        const limitTime = new Date(Date.now() - 24*60*60*1000).toISOString();
        const { data, error } = await sb.from('bildirimler')
          .select('created_at')
          .eq('alici_id', currentProfile.id)
          .eq('tip', 'cark_hediyesi')
          .gte('created_at', limitTime)
          .order('created_at', { ascending: false })
          .limit(1);

        hasFreeSpin = !data || data.length === 0;
        paidSpins = currentProfile.ggcoin || 0;
        
        const countEl = document.getElementById('spinCount');
        const btnSpin = document.getElementById('btnSpin');
        
        let labelText = '';
        if (hasFreeSpin) {
          labelText = '1 Ücretsiz';
          if (paidSpins > 0) labelText += ` + ${paidSpins} Ücretli`;
        } else {
          labelText = `${paidSpins} Ücretli`;
        }
        
        countEl.textContent = labelText;
        btnSpin.disabled = false;
        
        if (hasFreeSpin) {
          btnSpin.textContent = 'ÜCRETSİZ ÇEVİR';
          btnSpin.className = 'btn mc-gold mc-xl';
        } else if (paidSpins > 0) {
          btnSpin.textContent = 'HAKKINI KULLAN';
          btnSpin.className = 'btn mc-green mc-xl';
        } else {
          btnSpin.textContent = 'HAKKINIZ KALMADI';
          btnSpin.className = 'btn mc-gray mc-xl';
          btnSpin.disabled = true;
        }
      } catch (err) {
        console.error(err);
      }
    }

    // ==========================================
    // CANVAS DRAWING (THE WHEEL)
    // ==========================================
    function drawWheel() {
      const canvas = document.getElementById('wheelCanvas');
      const ctx = canvas.getContext('2d');
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const r = canvas.width / 2 - 15;
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      const numSegs = carkItems.length;
      const angle = 2 * Math.PI / numSegs;
      
      for (let i = 0; i < numSegs; i++) {
        const segAngle = startAngle + i * angle;
        
        // Alternating nice themed dark/gold slices
        ctx.fillStyle = i % 2 === 0 ? 'var(--gold)' : '#c88c0c';
        ctx.strokeStyle = '#050505';
        ctx.lineWidth = 2.5;
        
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, segAngle, segAngle + angle);
        ctx.lineTo(cx, cy);
        ctx.fill();
        ctx.stroke();
        
        // Render text
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(segAngle + angle / 2);
        
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#050505';
        ctx.font = '900 11px Montserrat, sans-serif';
        // Display values like '50 L'
        const labelVal = carkItems[i].val + ' L';
        ctx.fillText(labelVal, r - 22, 0);
        ctx.restore();
      }
      
      // Draw outer gold ring with bulb lights
      ctx.strokeStyle = 'var(--gold)';
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 2 * Math.PI);
      ctx.stroke();
      
      // Draw center golden circle
      ctx.fillStyle = '#111';
      ctx.strokeStyle = 'var(--gold)';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(cx, cy, 32, 0, 2 * Math.PI);
      ctx.fill();
      ctx.stroke();
      
      // Center 'L' Logo Text
      ctx.fillStyle = 'var(--gold)';
      ctx.font = '900 20px Montserrat, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('L', cx, cy);
      
      // Draw blinking bulb lights on the ring
      const numBulbs = 16;
      for (let i = 0; i < numBulbs; i++) {
        const bulbAngle = i * (2 * Math.PI / numBulbs) + (isSpinning ? Date.now() / 150 : 0);
        const bx = cx + (r - 2) * Math.cos(bulbAngle);
        const by = cy + (r - 2) * Math.sin(bulbAngle);
        
        ctx.fillStyle = (Math.floor(Date.now() / 250) + i) % 2 === 0 ? '#fff' : 'var(--gold)';
        ctx.beginPath();
        ctx.arc(bx, by, 4.5, 0, 2 * Math.PI);
        ctx.fill();
      }
    }

    function animateWheelLoop() {
      if (isSpinning) {
        startAngle += spinSpeed;
        drawWheel();
        requestAnimationFrame(animateWheelLoop);
      }
    }

    // ==========================================
    // SPIN WHEEL TRIGGER
    // ==========================================
    document.getElementById('btnSpin').addEventListener('click', async () => {
      if (!currentProfile) return;
      if (isSpinning) return;
      
      // Re-verify spin counts
      const limitTime = new Date(Date.now() - 24*60*60*1000).toISOString();
      const { data: lastSpins } = await sb.from('bildirimler')
        .select('created_at')
        .eq('alici_id', currentProfile.id)
        .eq('tip', 'cark_hediyesi')
        .gte('created_at', limitTime);

      hasFreeSpin = !lastSpins || lastSpins.length === 0;
      paidSpins = currentProfile.ggcoin || 0;
      
      if (!hasFreeSpin && paidSpins <= 0) {
        toast('Çevirme hakkınız kalmadı!', 'error');
        return;
      }

      isSpinning = true;
      document.getElementById('btnSpin').disabled = true;
      document.getElementById('btnBuySpins').disabled = true;

      // Weighted random selection
      const totalWeight = carkItems.reduce((s, item) => s + (item.prob || 0), 0);
      let randomVal = Math.random() * totalWeight;
      let winningIndex = carkItems.length - 1;
      
      for (let i = 0; i < carkItems.length; i++) {
        if (randomVal < carkItems[i].prob) {
          winningIndex = i;
          break;
        }
        randomVal -= carkItems[i].prob;
      }
      
      const winningItem = carkItems[winningIndex];

      // Easing-based spin animation
      let duration = 6000; // 6 seconds spin
      let startTime = null;
      
      // Calculate target angle to align pointer (top center, i.e., 3 * Math.PI / 2) with winner
      const numSegs = carkItems.length;
      const segAngle = 2 * Math.PI / numSegs;
      
      // The slice is drawn at: startAngle + winningIndex * segAngle
      // We want: startAngle + winningIndex * segAngle + segAngle / 2 = 3 * Math.PI / 2 (pointer)
      // So target startAngle = 3 * Math.PI / 2 - (winningIndex * segAngle + segAngle / 2)
      const targetStartAngle = (3 * Math.PI / 2) - (winningIndex * segAngle + segAngle / 2) + (2 * Math.PI * 8); // +8 full rotations

      const initialStartAngle = startAngle;
      const totalDiff = targetStartAngle - initialStartAngle;

      function easeOutBack(t, b, c, d) {
        let s = 1.20;
        return c * ((t = t / d - 1) * t * ((s + 1) * t + s) + 1) + b;
      }

      function spinAnim(timestamp) {
        if (!startTime) startTime = timestamp;
        let elapsed = timestamp - startTime;
        
        if (elapsed < duration) {
          // Animate start angle using easing
          startAngle = easeOutBack(elapsed, initialStartAngle, totalDiff, duration);
          drawWheel();
          requestAnimationFrame(spinAnim);
        } else {
          // Finalize spin
          isSpinning = false;
          startAngle = targetStartAngle % (2 * Math.PI);
          drawWheel();
          
          processSpinResult(winningItem);
        }
      }

      requestAnimationFrame(spinAnim);
    });

    async function processSpinResult(item) {
      try {
        // 1. Insert won LCoin as unclaimed gift notification
        await sb.from('bildirimler').insert({
          alici_id: currentProfile.id,
          gonderen_id: currentProfile.id,
          tip: 'cark_hediyesi',
          icerik: item.val.toString(),
          link: 'cark.html',
          okundu: false
        });

        // 2. Update paid spins (ggcoin) in database if free spin was already used
        if (!hasFreeSpin) {
          paidSpins--;
          await sb.from('kullanicilar').update({ ggcoin: paidSpins }).eq('id', currentProfile.id);
          currentProfile.ggcoin = paidSpins;
        }

        toast(`Tebrikler! Çarktan ${item.name} kazandınız!`, 'gold');
        
        // Refresh local displays
        checkSpinRights();
        document.getElementById('btnBuySpins').disabled = false;
        
        // Reload Leaderboards
        loadLeaderboardAndRecent();
      } catch (err) {
        console.error(err);
        toast('Ödül kaydedilemedi!', 'error');
        isSpinning = false;
        document.getElementById('btnSpin').disabled = false;
        document.getElementById('btnBuySpins').disabled = false;
      }
    }

    // ==========================================
    // BUY SPINS
    // ==========================================
    document.getElementById('btnBuySpins').addEventListener('click', async () => {
      if (!currentProfile) return;
      if (currentProfile.lcoin < 50) {
        toast('Yetersiz LCoin! 5 Hak almak için 50 LCoin gerekir.', 'error');
        return;
      }

      document.getElementById('btnBuySpins').disabled = true;

      try {
        const newLcoin = currentProfile.lcoin - 50;
        const newGgcoin = (currentProfile.ggcoin || 0) + 5;

        // Update database
        const { error } = await sb.from('kullanicilar')
          .update({ lcoin: newLcoin, ggcoin: newGgcoin })
          .eq('id', currentProfile.id);

        if (error) throw error;

        currentProfile.lcoin = newLcoin;
        currentProfile.ggcoin = newGgcoin;

        // Update navbar lcoin
        const navL = document.getElementById('nav-lcoin-amount');
        if (navL) navL.textContent = newLcoin.toLocaleString();

        toast('Başarıyla 5 Çevirme Hakkı satın aldınız! 🪙 -50', 'success');
        checkSpinRights();
      } catch (err) {
        console.error(err);
        toast('Satın alma işlemi başarısız!', 'error');
      } finally {
        document.getElementById('btnBuySpins').disabled = false;
      }
    });

    // ==========================================
    // LEADERBOARD & RECENT WINS LOADING
    // ==========================================
    async function loadLeaderboardAndRecent() {
      try {
        // Query cark rewards from last 30 days
        const { data, error } = await sb.from('bildirimler')
          .select('created_at, icerik, alici_id, kullanicilar:alici_id(kullanici_adi, avatar_url)')
          .eq('tip', 'cark_hediyesi')
          .order('created_at', { ascending: false });

        if (error) throw error;
        allSpinHistory = data || [];
        
        renderLeaderboard();
        renderRecentWins();
      } catch (err) {
        console.error(err);
      }
    }

    function setLeaderboardRange(range, btn) {
      activeRange = range;
      document.querySelectorAll('.lb-tabs .lb-tab').forEach(b => {
        b.classList.remove('mc-green');
        b.classList.add('mc-gray');
      });
      btn.classList.remove('mc-gray');
      btn.classList.add('mc-green');
      renderLeaderboard();
    }

    function renderLeaderboard() {
      const list = document.getElementById('lbList');
      list.innerHTML = '';

      let timeLimit = 0;
      if (activeRange === 'day') {
        timeLimit = Date.now() - 24 * 60 * 60 * 1000;
      } else if (activeRange === 'week') {
        timeLimit = Date.now() - 7 * 24 * 60 * 60 * 1000;
      } else {
        timeLimit = Date.now() - 30 * 24 * 60 * 60 * 1000;
      }

      // Filter and aggregate total LCoin won per user
      const userWins = {};
      allSpinHistory.forEach(item => {
        const itemTime = new Date(item.created_at).getTime();
        if (itemTime >= timeLimit) {
          const uId = item.alici_id;
          const uNick = item.kullanicilar?.kullanici_adi || 'Anonim';
          const uAvatar = item.kullanicilar?.avatar_url || `https://api.dicebear.com/7.x/minecraft/svg?seed=${uNick}`;
          const amount = parseInt(item.icerik) || 0;

          if (!userWins[uId]) {
            userWins[uId] = {
              name: uNick,
              avatar: uAvatar,
              total: 0
            };
          }
          userWins[uId].total += amount;
        }
      });

      // Sort by total desc
      const sorted = Object.values(userWins).sort((a, b) => b.total - a.total).slice(0, 10);

      if (sorted.length === 0) {
        list.innerHTML = '<div style="color:var(--text-3); font-size:12px; text-align:center; padding: 20px 0;">Bu dönemde kazanan yok.</div>';
        return;
      }

      sorted.forEach((w, idx) => {
        const rank = idx + 1;
        const item = document.createElement('div');
        item.className = 'lb-item';
        
        let rankCls = 'lb-rank';
        if (rank === 1) rankCls += ' rank-1';
        if (rank === 2) rankCls += ' rank-2';
        if (rank === 3) rankCls += ' rank-3';

        item.innerHTML = `
          <div class="${rankCls}">${rank <= 3 ? '★' : rank}</div>
          <img src="${w.avatar}" class="lb-avatar" alt="Avatar">
          <div class="lb-info">
            <div class="lb-name">${w.name}</div>
            <div class="lb-reward"><span class="nav-lcoin-icon" style="transform: scale(0.85);"></span> ${w.total} LCoin</div>
          </div>
        `;
        list.appendChild(item);
      });
    }

    function renderRecentWins() {
      const list = document.getElementById('rwList');
      list.innerHTML = '';

      // Take latest 5 spins globally
      const latest = allSpinHistory.slice(0, 5);

      if (latest.length === 0) {
        list.innerHTML = '<div style="color:var(--text-3); font-size:12px; text-align:center; padding: 20px 0;">Henüz çeviren olmadı.</div>';
        return;
      }

      latest.forEach(w => {
        const uNick = w.kullanicilar?.kullanici_adi || 'Anonim';
        const uAvatar = w.kullanicilar?.avatar_url || `https://api.dicebear.com/7.x/minecraft/svg?seed=${uNick}`;
        const amount = parseInt(w.icerik) || 0;

        const item = document.createElement('div');
        item.className = 'rw-item';
        item.innerHTML = `
          <img src="${uAvatar}" class="rw-avatar" alt="Avatar">
          <div class="rw-info">
            <div class="rw-name">${uNick}</div>
            <div class="rw-reward"><span class="nav-lcoin-icon" style="transform: scale(0.85);"></span> ${amount} LCoin çıkardı!</div>
          </div>
          <div class="rw-time">${timeAgo(w.created_at)}</div>
        `;
        list.appendChild(item);
      });
    }

    // ==========================================
    // LOAD COG WHEEL CONFIG FROM DB
    // ==========================================
    async function loadWheelSettings() {
      try {
        const { data, error } = await sb.from('cark_ayarlari').select('*').limit(1).maybeSingle();
        if (!error && data && data.config && data.config.items && data.config.items.length > 0) {
          // Filter to make sure it only has LCoin type
          carkItems = data.config.items.filter(i => i.type === 'lcoin');
          if (carkItems.length === 0) carkItems = defaultItems;
        }
      } catch (err) {
        console.warn('Could not load cark_ayarlari, using defaults.');
      }
      
      // Render initial static wheel
      drawWheel();
      
      // Run continuous drawing to animate bulb lights blinking
      setInterval(drawWheel, 250);
    }

    // ==========================================
    // CANVAS BACKGROUND ANIMATION
    // ==========================================
    function initCanvasBg() {
      const canvas = document.getElementById('canvas-bg');
      const ctx = canvas.getContext('2d');
      let W, H, beams=[], logos=[];

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      for(let i=0;i<6;i++) beams.push({
        x: Math.random()*W, y: Math.random()*H,
        angle: Math.PI/4 + (Math.random()-0.5)*0.3,
        speed: 0.3+Math.random()*0.4,
        width: 60+Math.random()*80,
        alpha: 0.03+Math.random()*0.04
      });

      for(let i=0;i<5;i++) logos.push({
        x: Math.random()*W, y: Math.random()*H,
        vx: (Math.random()-0.5)*0.2,
        vy: (Math.random()-0.5)*0.2,
        alpha: 0.02+Math.random()*0.03,
        size: 22+Math.random()*28,
        rot: Math.random()*Math.PI*2,
        rotSpeed: (Math.random()-0.5)*0.002
      });

      function animate() {
        ctx.clearRect(0,0,W,H);
        ctx.fillStyle='#050505';
        ctx.fillRect(0,0,W,H);

        beams.forEach(b => {
          ctx.save();
          ctx.translate(b.x, b.y);
          ctx.rotate(b.angle);
          const grad = ctx.createLinearGradient(-b.width/2,0,b.width/2,0);
          grad.addColorStop(0,'transparent');
          grad.addColorStop(0.5,`rgba(57,255,20,${b.alpha})`);
          grad.addColorStop(1,'transparent');
          ctx.fillStyle=grad;
          ctx.fillRect(-b.width/2,-2000,b.width,4000);
          ctx.restore();
          b.x += Math.cos(b.angle)*b.speed;
          b.y += Math.sin(b.angle)*b.speed;
          if(b.x>W+200) b.x=-200;
          if(b.y>H+200) b.y=-200;
        });

        logos.forEach(l => {
          ctx.save();
          ctx.translate(l.x, l.y);
          ctx.rotate(l.rot);
          ctx.globalAlpha = l.opacity;
          ctx.font = `900 ${l.size}px Montserrat, sans-serif`;
          ctx.fillStyle = '#39ff14';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('LOBBY.GG', 0, 0);
          ctx.restore();
          l.x += l.vx; l.y += l.vy; l.rot += l.rotSpeed;
          if(l.x<-100) l.x=W+100;
          if(l.x>W+100) l.x=-100;
          if(l.y<-50) l.y=H+50;
          if(l.y>H+50) l.y=-50;
        });

        requestAnimationFrame(animate);
      }
      animate();
    }

    // ==========================================
    // INITIALIZATION
    // ==========================================
    async function init() {
      await buildNav();
      initCanvasBg();
      await loadWheelSettings();
      await loadLeaderboardAndRecent();
    }

    init();
  </script>
