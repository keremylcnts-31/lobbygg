<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LOBBY.GG - Keşfet</title>
  
  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* =========================================
       KESFET SPECIFIC STYLES
       ========================================= */
    .kesfet-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: calc(var(--nav-h) + 40px) 20px 80px;
      animation: fade-in-up 0.6s ease-out;
    }

    .kesfet-header {
      margin-bottom: 30px;
    }

    .kesfet-title {
      font-size: 32px;
      font-weight: 900;
      color: var(--text-1);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 2px 2px 0 #000;
      margin-bottom: 10px;
    }

    .kesfet-subtitle {
      font-size: 14px;
      color: var(--text-2);
      font-weight: 500;
    }

    /* Filters & Search */
    .kesfet-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 30px;
      align-items: center;
      justify-content: space-between;
    }

    .kesfet-search {
      flex: 1;
      min-width: 250px;
      max-width: 400px;
      position: relative;
    }

    .kesfet-search input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px 12px 40px;
      color: var(--text-1);
      font-size: 13px;
      font-weight: 500;
      transition: all var(--transition);
    }
    
    .kesfet-search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(57,255,20,0.2);
    }

    .kesfet-search::before {
      content: '🔍';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: 0.7;
    }

    .kesfet-filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-chip {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 20px;
      color: var(--text-2);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      transition: all var(--transition);
    }

    .filter-chip:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--border-hover);
    }

    .filter-chip.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    /* Grid */
    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    /* Premium Player Card */
    .player-card {
      background: var(--bg-card);
      border: 1px solid var(--border-thin);
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: relative;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      text-decoration: none;
      display: flex;
      flex-direction: column;
    }

    .player-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5), 0 0 15px rgba(57,255,20,0.1);
    }

    .pc-banner-wrap {
      position: relative;
      height: 110px;
      background: #111;
      border-bottom: 1px solid var(--border-thin);
    }

    .pc-banner {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .pc-banner-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.6));
    }

    .pc-server-logo {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.2);
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      background: #000;
      object-fit: cover;
      transition: transform 0.2s;
    }
    .player-card:hover .pc-server-logo {
      transform: scale(1.1) rotate(5deg);
      border-color: var(--accent);
    }

    .pc-avatar-wrap {
      position: absolute;
      bottom: -35px;
      left: 15px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      padding: 3px;
      background: var(--bg-card);
      z-index: 2;
    }

    .pc-avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
    }

    [data-frame="neon-green"] .pc-avatar { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
    [data-frame="gold"] .pc-avatar { border-color: var(--gold); }
    [data-frame="purple"] .pc-avatar { border-color: var(--purple); }

    .pc-body {
      padding: 45px 15px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .pc-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .pc-name {
      font-size: 18px;
      font-weight: 900;
      color: var(--text-1);
    }

    .verified-icon {
      color: var(--blue);
      font-size: 14px;
    }

    .pc-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 15px;
    }

    .pc-stats {
      margin-top: auto;
      display: flex;
      gap: 15px;
      border-top: 1px dashed var(--border);
      padding-top: 15px;
    }
    
    .pc-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .pc-stat-val {
      font-size: 14px;
      font-weight: 900;
      color: var(--text-1);
    }
    .pc-stat-lbl {
      font-size: 10px;
      color: var(--text-3);
      text-transform: uppercase;
    }

  </style>
</head>
<body>
  <!-- Canvas Background -->
  <canvas id="canvas-bg"></canvas>

  <div class="page-wrapper">
    <!-- Top Nav -->
    <nav class="nav" id="nav"></nav>

    <div class="kesfet-container">
      <div class="kesfet-header">
        <h1 class="kesfet-title">Keşfet</h1>
        <div class="kesfet-subtitle">LOBBY.GG'de premium oyuncuları, yayıncıları ve klanları bulun.</div>
      </div>

      <div class="kesfet-toolbar">
        <div class="kesfet-search">
          <input type="text" id="searchInput" placeholder="Oyuncu, klan veya yetenek ara..." onkeyup="filterCards()">
        </div>
        <div class="kesfet-filters">
          <div class="filter-chip active" onclick="setFilter('Tümü', this)">Tümü</div>
          <div class="filter-chip" onclick="setFilter('PvP', this)">PvP</div>
          <div class="filter-chip" onclick="setFilter('Builder', this)">Builder</div>
          <div class="filter-chip" onclick="setFilter('İçerik', this)">Yayıncı</div>
          <div class="filter-chip" onclick="setFilter('Developer', this)">Geliştirici</div>
        </div>
      </div>

      <div class="player-grid" id="playerGrid">
        <!-- Cards injected here -->
      </div>
    </div>
  </div>

  <script>
    // Supabase Setup
    const SUPABASE_URL = 'https://hmkeedyqmzblnmkhdste.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhta2VlZHlxbXpibG5ta2hkc3RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODE3MzYsImV4cCI6MjA5NDM1NzczNn0.5HUInmQs_LsXYovJgI7Ir9q8M9aPlQW6jM5C43aYmqA';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentFilter = 'Tümü';
    let allUsers = [];

    // ==========================================
    // NAV BUILDER (From main theme)
    // ==========================================
    async function buildNav() {
      const nav = document.getElementById('nav');
      nav.innerHTML = `
        <a href="lobbyx.html"><img src="https://i.hizliresim.com/6c4wdx4.png" alt="LOBBY.GG Logo" class="nav-logo"></a>
        <div class="nav-links">
          <a href="lobbyx.html" class="nav-link">🏠 Ana Sayfa</a>
          <a href="ilanlar.html" class="nav-link">📜 İlanlar</a>
          <a href="kesfet.html" class="nav-link active">🌍 Keşfet</a>
          <a href="market.html" class="nav-link">💎 Mağaza</a>
        </div>
        <div class="nav-right" id="navRight">
          <a href="giris.html" class="btn mc-green mc-sm">Giriş Yap</a>
        </div>
      `;

      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        const { data: profile } = await sb.from('kullanicilar').select('*').eq('email', session.user.email).maybeSingle();
        if (profile) {
          document.getElementById('navRight').innerHTML = `
            <a href="profil.html" class="nav-lcoin"><span class="lcoin-icon">L</span> ${profile.lcoin || 0}</a>
            <a href="profil.html" class="nav-avatar pp-wrap" data-frame="${profile.aktif_cerceve || 'none'}">
              <img src="${profile.avatar_url || 'https://api.dicebear.com/7.x/minecraft/svg?seed='+profile.kullanici_adi}" class="pp-img shape-rounded" alt="Avatar">
            </a>
          `;
        }
      }
    }

    // ==========================================
    // DATA FETCH
    // ==========================================
    async function loadPlayers() {
      try {
        const { data, error } = await sb.from('kullanicilar').select('*').order('kayit_tarihi', { ascending: false });
        if (data) {
          allUsers = data;
          renderGrid();
        }
      } catch (e) { console.error(e); }
    }

    // ==========================================
    // RENDER GRID
    // ==========================================
    function renderGrid() {
      const grid = document.getElementById('playerGrid');
      grid.innerHTML = '';
      
      const searchQ = document.getElementById('searchInput').value.toLowerCase();
      
      const filtered = allUsers.filter(u => {
        const matchSearch = (u.kullanici_adi || '').toLowerCase().includes(searchQ) || (u.kategori || '').toLowerCase().includes(searchQ);
        const matchFilter = currentFilter === 'Tümü' || u.kategori === currentFilter;
        return matchSearch && matchFilter;
      });

      if (filtered.length === 0) {
        grid.innerHTML = '<div style="color:var(--text-3); font-size:14px; grid-column:1/-1;">Sonuç bulunamadı.</div>';
        return;
      }

      filtered.forEach(u => {
        const avatarSrc = u.avatar_url || \`https://api.dicebear.com/7.x/minecraft/svg?seed=\${u.kullanici_adi}\`;
        const bannerSrc = u.banner_url || 'https://images.unsplash.com/photo-1627856013091-fed6e4e30025?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80';
        
        let subBadge = '';
        if (u.kategori) {
          let bClass = 'b-diger';
          if (u.kategori === 'PvP') bClass = 'b-pvp';
          if (u.kategori === 'İçerik') bClass = 'b-icerik';
          if (u.kategori === 'Developer') bClass = 'b-developer';
          if (u.kategori === 'Builder') bClass = 'b-builder';
          if (u.kategori === 'Yönetici') bClass = 'b-yonetici-cat';
          subBadge = \`<span class="badge \${bClass}">\${u.kategori}</span>\`;
        }

        let roleBadge = '';
        if (u.abonelik === 'premium') roleBadge = '<span class="badge b-premium">Premium</span>';
        if (u.abonelik === 'abone') roleBadge = '<span class="badge b-abone">Abone</span>';
        
        // Random stats for visual
        const followers = Math.floor(Math.random() * 500) + 10;
        const posts = Math.floor(Math.random() * 50) + 1;

        const card = document.createElement('a');
        card.href = \`profil.html?id=\${u.id}\`;
        card.className = 'player-card';
        card.innerHTML = \`
          <div class="pc-banner-wrap">
            <img src="\${bannerSrc}" class="pc-banner" alt="Banner">
            <div class="pc-banner-overlay"></div>
            \${u.desteklened_sunucu ? \`<img src="https://api.mcsrvstat.us/icon/\${u.desteklened_sunucu}" class="pc-server-logo" title="Oynadığı Sunucu">\` : ''}
            <div class="pc-avatar-wrap" data-frame="\${u.aktif_cerceve || 'none'}">
              <img src="\${avatarSrc}" class="pc-avatar" alt="Avatar">
            </div>
          </div>
          <div class="pc-body">
            <div class="pc-name-row">
              <span class="pc-name">\${u.kullanici_adi || 'Anonim'}</span>
              \${u.dogrulama_rozeti ? '<span class="verified-icon" title="Doğrulanmış">✔</span>' : ''}
            </div>
            <div class="pc-badges">
              \${roleBadge}
              \${subBadge}
            </div>
            <div class="pc-stats">
              <div class="pc-stat">
                <span class="pc-stat-val">\${followers}</span>
                <span class="pc-stat-lbl">Takipçi</span>
              </div>
              <div class="pc-stat">
                <span class="pc-stat-val">\${posts}</span>
                <span class="pc-stat-lbl">Drop</span>
              </div>
            </div>
          </div>
        \`;
        grid.appendChild(card);
      });
    }

    function setFilter(f, el) {
      currentFilter = f;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      renderGrid();
    }

    function filterCards() {
      renderGrid();
    }

    // ==========================================
    // CANVAS BACKGROUND
    // ==========================================
    function initCanvas() {
      const cvs = document.getElementById('canvas-bg');
      const ctx = cvs.getContext('2d');
      let w, h;
      let beams = [];
      function resize() {
        w = cvs.width = window.innerWidth;
        h = cvs.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();
      
      class Beam {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random() * w;
          this.y = h + Math.random() * 100;
          this.len = Math.random() * 200 + 100;
          this.speed = Math.random() * 2 + 0.5;
          this.width = Math.random() * 3 + 1;
          this.opacity = Math.random() * 0.5 + 0.1;
        }
        update() {
          this.y -= this.speed;
          if (this.y + this.len < 0) this.reset();
        }
        draw() {
          const grad = ctx.createLinearGradient(0, this.y, 0, this.y + this.len);
          grad.addColorStop(0, \`rgba(57,255,20,0)\`);
          grad.addColorStop(0.5, \`rgba(57,255,20,\${this.opacity})\`);
          grad.addColorStop(1, \`rgba(57,255,20,0)\`);
          ctx.beginPath();
          ctx.moveTo(this.x, this.y);
          ctx.lineTo(this.x, this.y + this.len);
          ctx.lineWidth = this.width;
          ctx.strokeStyle = grad;
          ctx.stroke();
        }
      }
      for (let i=0; i<15; i++) beams.push(new Beam());
      function animate() {
        ctx.clearRect(0,0,w,h);
        beams.forEach(b => { b.update(); b.draw(); });
        requestAnimationFrame(animate);
      }
      animate();
    }

    // ==========================================
    // INIT
    // ==========================================
    buildNav();
    initCanvas();
    loadPlayers();
  </script>
</body>
</html>
