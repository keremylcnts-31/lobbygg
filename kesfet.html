<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LOBBY.GG - Oyuncuları Keşfet</title>
  
  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* =========================================
       KESFET SPECIFIC STYLES
       ========================================= */
    .kesfet-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: calc(var(--nav-h) + 40px) 20px 80px;
      animation: fade-in-up 0.6s ease-out;
    }

    .kesfet-header {
      margin-bottom: 30px;
    }

    .kesfet-title {
      font-size: 32px;
      font-weight: 900;
      color: var(--text-1);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 2px 2px 0 #000;
      margin-bottom: 10px;
    }

    .kesfet-subtitle {
      font-size: 14px;
      color: var(--text-2);
      font-weight: 500;
    }

    /* Filters & Search */
    .kesfet-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 30px;
      align-items: center;
      justify-content: space-between;
    }

    .kesfet-search {
      flex: 1;
      min-width: 250px;
      max-width: 400px;
      position: relative;
    }

    .kesfet-search input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px 12px 40px;
      color: var(--text-1);
      font-size: 13px;
      font-weight: 500;
      transition: all var(--transition);
    }
    
    .kesfet-search input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(57,255,20,0.2);
    }

    .kesfet-search::before {
      content: '🔍';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: 0.7;
    }

    .kesfet-filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* Player Cards Grid */
    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 24px;
    }

    /* Premium Player Card */
    .player-card {
      background: var(--bg-card);
      border: 1px solid var(--border-thin);
      border-radius: var(--radius-lg);
      overflow: hidden;
      position: relative;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
    }

    .player-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5), 0 0 15px rgba(57,255,20,0.1);
    }

    .pc-banner-wrap {
      position: relative;
      height: 90px;
      background: #111;
      border-bottom: 1px solid var(--border-thin);
    }

    .pc-banner {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .pc-banner-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.6));
    }

    .pc-avatar-wrap {
      position: absolute;
      top: 50px;
      left: 16px;
      width: 72px;
      height: 72px;
      border-radius: 6px;
      padding: 3px;
      background: var(--bg-card);
      z-index: 2;
    }

    .pc-avatar {
      width: 100%;
      height: 100%;
      border-radius: 6px;
      object-fit: cover;
      border: 2px solid var(--border);
    }
    .pc-avatar.shape-rounded {
      border-radius: 12px;
    }

    [data-frame="neon-green"] .pc-avatar { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
    [data-frame="gold"] .pc-avatar { border-color: var(--gold); }
    [data-frame="purple"] .pc-avatar { border-color: var(--purple); }

    .pc-body {
      padding: 40px 16px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .pc-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pc-name {
      font-size: 16px;
      font-weight: 900;
      color: var(--text-1);
    }

    .profile-verify-badge {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .pc-clan-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-2);
      background: rgba(255,255,255,0.02);
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-thin);
    }
    .pc-clan-logo {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      object-fit: cover;
    }
    .pc-clan-name {
      font-weight: 700;
      color: var(--text-1);
    }
    .pc-clan-tag {
      color: var(--accent);
      font-weight: 800;
    }

    .pc-server-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-2);
      background: rgba(255,255,255,0.02);
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-thin);
    }
    .pc-server-logo-img {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      object-fit: cover;
    }
    .pc-server-name {
      font-weight: 700;
      color: var(--text-1);
    }

    .pc-bio {
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 34px;
    }

    .pc-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: auto;
    }
  </style>
</head>
<body>

  <div class="page-wrapper">
    <!-- Top Nav -->

    <div class="kesfet-container">

  <script>

    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhta2VlZHlxbXpibG5ta2hkc3RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODE3MzYsImV4cCI6MjA5NDM1NzczNn0.5HUInmQs_LsXYovJgI7Ir9q8M9aPlQW6jM5C43aYmqA';

    // ==========================================
    // DATA FETCH
    // ==========================================
    async function loadPlayers() {
      try {
        const { data: usersData, error: uErr } = await sb.from('kullanicilar').select('*').order('kayit_tarihi', { ascending: false });
        const { data: clansData, error: cErr } = await sb.from('klanlar').select('*');
        
        if (usersData) {
          allUsers = usersData;
        }
        if (clansData) {
          allClans = clansData;
        }
        renderGrid();
      } catch (e) { console.error(e); }
    }

    // ==========================================
    // RENDER GRID
    // ==========================================
    function renderGrid() {
      const grid = document.getElementById('playerGrid');
      grid.innerHTML = '';
      
      const searchQ = document.getElementById('searchInput').value.toLowerCase();
      
      const clanMap = {};
      allClans.forEach(c => clanMap[c.tag] = c);

      const filtered = allUsers.filter(u => {
        const matchSearch = (u.kullanici_adi || '').toLowerCase().includes(searchQ) || 
                            (u.kategori || '').toLowerCase().includes(searchQ) || 
                            (u.alt_kategori || '').toLowerCase().includes(searchQ) || 
                            (u.klan_tag || '').toLowerCase().includes(searchQ);
        
        const matchFilter = currentFilter === 'Tümü' || u.kategori === currentFilter;
        return matchSearch && matchFilter;
      });

      // Sort verified players and boosted profiles
      const now = Date.now();
      filtered.sort((a, b) => {
        const aVerify = a.dogrulama_rozeti ? 1 : 0;
        const bVerify = b.dogrulama_rozeti ? 1 : 0;
        if (aVerify !== bVerify) return bVerify - aVerify;
        
        const aBoost = (a.profil_one_cikan_bitis && new Date(a.profil_one_cikan_bitis).getTime() > now) ? 1 : 0;
        const bBoost = (b.profil_one_cikan_bitis && new Date(b.profil_one_cikan_bitis).getTime() > now) ? 1 : 0;
        return bBoost - aBoost;
      });

      if (filtered.length === 0) {
        grid.innerHTML = '<div style="color:var(--text-3); font-size:14px; grid-column:1/-1; text-align:center; padding: 40px 0;">Sonuç bulunamadı.</div>';
        return;
      }

      filtered.forEach(u => {
        const avatarSrc = u.avatar_url || `https://api.dicebear.com/7.x/minecraft/svg?seed=${u.kullanici_adi}`;
        let bannerHtml = '';
        if (u.banner_url) {
          bannerHtml = `<img src="${u.banner_url}" class="pc-banner" alt="Banner">`;
        } else {
          bannerHtml = `<canvas class="pc-banner-canvas" style="width: 100%; height: 100%; display: block;"></canvas>`;
        }
        
        let subBadge = '';
        if (u.kategori) {
          let bClass = 'b-diger';
          if (u.kategori === 'PvP') bClass = 'b-pvp';
          if (u.kategori === 'İçerik Üretici' || u.kategori === 'İçerik') bClass = 'b-icerik';
          if (u.kategori === 'Developer') bClass = 'b-developer';
          if (u.kategori === 'Builder') bClass = 'b-builder';
          if (u.kategori === 'Yönetici') bClass = 'b-yonetici-cat';
          subBadge = `<span class="badge ${bClass}">${u.kategori}</span>`;
        }

        const abMapped = u.abonelik || 'uye';
        const abClassMap = { uye: 'b-uye', abone: 'b-abone', premium: 'b-premium', admin: 'b-admin', yonetici: 'b-yonetici', kurucu: 'b-yonetici' };
        const abLabelMap = { uye: 'Üye', abone: 'Abone', premium: 'Premium', admin: 'Admin', yonetici: 'Yönetici', kurucu: 'Yönetici' };
        let roleBadge = `<span class="badge ${abClassMap[abMapped] || 'b-uye'}">${abLabelMap[abMapped] || 'Üye'}</span>`;
        
        // Clan HTML
        let clanHtml = '';
        if (u.klan_tag && clanMap[u.klan_tag]) {
          const klan = clanMap[u.klan_tag];
          const klanLogo = klan.logo_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(klan.isim)}&background=1a1a1a&color=39ff14`;
          clanHtml = `
            <div class="pc-clan-row">
              <img src="${klanLogo}" class="pc-clan-logo" alt="${klan.isim}">
              <div>
                <span class="pc-clan-name">${klan.isim}</span>
                <span class="pc-clan-tag">[${klan.tag}]</span>
              </div>
            </div>
          `;
        }

        // Server HTML
        let serverHtml = '';
        if (u.desteklenen_sunucu) {
          const srv = SERVERS.find(s => s.ip === u.desteklenen_sunucu);
          const srvName = srv ? srv.name : u.desteklenen_sunucu;
          const srvLogo = `https://api.mcsrvstat.us/icon/${u.desteklenen_sunucu}`;
          serverHtml = `
            <div class="pc-server-row">
              <img src="${srvLogo}" class="pc-server-logo-img" onerror="this.src='https://ui-avatars.com/api/?name=MC&background=1a1a1a&color=39ff14&size=24'" alt="Server">
              <span class="pc-server-name">${srvName}</span>
            </div>
          `;
        }

        // Discord Button HTML
        let discordBtnHtml = '';
        if (u.discord) {
          discordBtnHtml = `
            <button class="btn mc-discord" style="width: 100%; justify-content: center; font-size: 11px;" onclick="event.preventDefault(); event.stopPropagation(); navigator.clipboard.writeText('${u.discord}'); showToast('Discord kullanıcı adı kopyalandı: ${u.discord}')">
              <svg width="14" height="14" viewBox="0 0 127.14 96.36" fill="currentColor" style="vertical-align: middle; display: inline-block; margin-right: 6px;"><path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a77.7,77.7,0,0,0,6.63-10.85,68.43,68.43,0,0,1-10.5-5c1-.73,2-1.5,2.92-2.3a75.46,75.46,0,0,0,75.12,0c.91.8,1.91,1.57,2.92,2.3a68.43,68.43,0,0,1-10.5,5,77.7,77.7,0,0,0,6.63,10.85,105.73,105.73,0,0,0,31-18.83C129.87,50.7,123.82,27.82,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/></svg> ${u.discord}
            </button>
          `;
        }

        const card = document.createElement('a');
        card.href = `profil.html?id=${u.id}`;
        card.className = 'player-card';
        card.innerHTML = `
          <div class="pc-banner-wrap">
            ${bannerHtml}

            <img src="${avatarSrc}" class="pc-avatar ${u.pp_sekil === 'rounded' ? 'shape-rounded' : ''}" alt="Avatar">
          </div>
          <div class="pc-body">
            <div class="pc-name-row">
              <span class="pc-name">${u.kullanici_adi || 'Anonim'}</span>
              ${u.dogrulama_rozeti ? '<img src="https://i.imgur.com/VDpHaPy.png" class="profile-verify-badge" title="Doğrulanmış">' : ''}

            </div>
            ${clanHtml}
            ${serverHtml}

              ${u.bio || 'Henüz bir açıklama yazılmamış.'}
            </div>
            <div class="pc-actions">
              <span class="btn mc-gold" style="width: 100%; justify-content: center; font-size: 11px;">PROFİLİ ZİYARET ET</span>

        `;
        grid.appendChild(card);
      });

      // Initialize canvas animations for cards without banners
      grid.querySelectorAll('.pc-banner-canvas').forEach(canvas => {
        initBannerCanvas(canvas);
      });
    }

    function initBannerCanvas(canvas) {
      const ctx = canvas.getContext('2d');
      let w = canvas.width = canvas.offsetWidth || 290;
      let h = canvas.height = 90;
      
      let beams = Array.from({length: 3}, () => ({
        x: Math.random() * w,
        speed: 0.15 + Math.random() * 0.2,
        width: 15 + Math.random() * 25,
        alpha: 0.04 + Math.random() * 0.05
      }));
      
      function draw() {
        if (!canvas.isConnected) return;
        ctx.fillStyle = '#050c05';
        ctx.fillRect(0, 0, w, h);
        
        beams.forEach(b => {
          ctx.save();
          const g = ctx.createLinearGradient(b.x - b.width/2, 0, b.x + b.width/2, 0);
          g.addColorStop(0, 'transparent');
          g.addColorStop(0.5, `rgba(57,255,20,${b.alpha})`);
          g.addColorStop(1, 'transparent');
          ctx.fillStyle = g;
          ctx.fillRect(b.x - b.width/2, 0, b.width, h);
          ctx.restore();
          
          b.x += b.speed;
          if (b.x > w + b.width) b.x = -b.width;
        });
        
        requestAnimationFrame(draw);
      }
      draw();
    }

    function showToast(msg) {
      let container = document.getElementById('toast-container');
      if (!container) {
        container = document.createElement('div');
        container.id = 'toast-container';
        container.className = 'toast-container';
        document.body.appendChild(container);
      }
      const t = document.createElement('div');
      t.className = 'toast success';
      t.innerHTML = `<span>✅</span> ${msg}`;
      container.appendChild(t);
      setTimeout(() => {
        t.style.opacity = '0';
        t.style.transform = 'translateY(-20px)';
        t.style.transition = 'all 0.3s ease';
        setTimeout(() => t.remove(), 300);
      }, 3000);
    }

    function setFilter(f, el) {
      currentFilter = f;
      document.querySelectorAll('.kesfet-filters .btn').forEach(c => {
        c.classList.remove('mc-green');
        c.classList.add('mc-gray');
      });
      el.classList.remove('mc-gray');
      el.classList.add('mc-green');
      renderGrid();
    }

    function filterCards() {
      renderGrid();
    }

    // ==========================================
    // CANVAS BACKGROUND
    // ==========================================
    function initCanvas() {
      const cvs = document.getElementById('canvas-bg');
      const ctx = cvs.getContext('2d');
      let W, H, beams=[], logos=[];

      function resize() {
        W = cvs.width = window.innerWidth;
        H = cvs.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      for(let i=0;i<6;i++) beams.push({
        x: Math.random()*W, y: Math.random()*H,
        angle: Math.PI/4 + (Math.random()-0.5)*0.3,
        speed: 0.3+Math.random()*0.4,
        width: 60+Math.random()*80,
        alpha: 0.03+Math.random()*0.04
      });

      for(let i=0;i<5;i++) logos.push({
        x: Math.random()*W, y: Math.random()*H,
        vx: (Math.random()-0.5)*0.2,
        vy: (Math.random()-0.5)*0.2,
        alpha: 0.02+Math.random()*0.03,
        size: 22+Math.random()*28,
        rot: Math.random()*Math.PI*2,
        rotSpeed: (Math.random()-0.5)*0.002
      });

      function animate() {
        ctx.clearRect(0,0,W,H);
        ctx.fillStyle='#050505';
        ctx.fillRect(0,0,W,H);

        beams.forEach(b => {
          ctx.save();
          ctx.translate(b.x, b.y);
          ctx.rotate(b.angle);
          const grad = ctx.createLinearGradient(-b.width/2,0,b.width/2,0);
          grad.addColorStop(0,'transparent');
          grad.addColorStop(0.5,`rgba(57,255,20,${b.alpha})`);
          grad.addColorStop(1,'transparent');
          ctx.fillStyle=grad;
          ctx.fillRect(-b.width/2,-2000,b.width,4000);
          ctx.restore();
          b.x += Math.cos(b.angle)*b.speed;
          b.y += Math.sin(b.angle)*b.speed;
          if(b.x>W+200) b.x=-200;
          if(b.y>H+200) b.y=-200;
        });

        logos.forEach(l => {
          ctx.save();
          ctx.translate(l.x, l.y);
          ctx.rotate(l.rot);
          ctx.globalAlpha = l.alpha;
          ctx.font = `900 ${l.size}px Montserrat, sans-serif`;
          ctx.fillStyle = '#39ff14';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('LOBBY.GG', 0, 0);
          ctx.restore();
          l.x += l.vx; l.y += l.vy; l.rot += l.rotSpeed;
          if(l.x<-100) l.x=W+100;
          if(l.x>W+100) l.x=-100;
          if(l.y<-50) l.y=H+50;
          if(l.y>H+50) l.y=-50;
        });

        requestAnimationFrame(animate);
      }
      animate();
    }

    // ==========================================
    // INIT
    // ==========================================
    buildNav();
    initCanvas();
    loadPlayers();
  </script>
</body>
</html>
