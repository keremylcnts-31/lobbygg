<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İlan Panosu — LOBBY.GG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=2.8" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text-2); min-height: 100vh; overflow-x: hidden; }

    /* CANVAS */
    #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

    /* NAV */
    .card-remaining {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(20, 20, 20, 0.85);
      border: 1.5px solid #000000;
      padding: 4px 8px;
      border-radius: 0px !important;
      font-size: 10px;
      font-weight: 800;
      color: #aaa;
      box-shadow: 1px 1px 0 #000000;
      z-index: 5;
    }
    .profile-verify-badge {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      vertical-align: middle;
    }

    /* MAIN WRAPPER */
    .main-content { position: relative; z-index: 1; padding-top: 64px; }

    /* HERO */
    .hero { padding: 60px 32px 40px; text-align: center; }
    .hero-eyebrow { font-size: 11px; font-weight: 900; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
    .hero-title { font-size: clamp(36px, 5vw, 64px); font-weight: 900; line-height: 1; color: #fff; margin-bottom: 16px; text-transform: uppercase; }
    .hero-title span { color: var(--accent); }
    .hero-subtitle { font-size: 15px; color: #888; max-width: 520px; margin: 0 auto 28px; line-height: 1.6; }
    
    .hero-stats { display: flex; align-items: center; justify-content: center; gap: 32px; margin-top: 32px; }
    .hero-stat { text-align: center; }
    .hero-stat-num { font-size: 24px; font-weight: 900; color: var(--accent); }
    .hero-stat-label { font-size: 11px; color: #666; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

    /* FILTER BAR */
    .filter-bar { max-width: 1200px; margin: 0 auto 32px; padding: 0 24px; }
    .filter-section {
      background: var(--bg-card);
      border: 3px solid #000000;
      box-shadow: inset 0 2px 0 #5a5a5a, inset 0 -4px 0 #181818, 3px 3px 0 #000000;
      border-radius: 0px !important;
      padding: 20px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }
    .filter-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .filter-label { font-size: 11px; font-weight: 800; color: #777; letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; }
    .filter-divider { width: 3px; height: 28px; background: #000000; }
    
    .filter-tab {
      background: #313131;
      border: 2px solid #000000;
      box-shadow: inset 0 1.5px 0 #5a5a5a, inset 0 -3px 0 #181818;
      color: #aaaaaa;
      border-radius: 0px !important;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.15s ease;
      text-transform: uppercase;
      font-family: inherit;
    }
    .filter-tab:hover {
      color: #ffffff;
      background: #444444;
    }
    .filter-tab.active {
      color: #000000 !important;
      background: var(--accent) !important;
      box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.4), inset 0 -3px 0 rgba(0,0,0,0.4) !important;
    }
    .filter-tab.cat-pvp.active {
      color: #ffffff !important;
      background: #b02e26 !important;
      box-shadow: inset 0 1.5px 0 #d94141, inset 0 -3px 0 #5e0d0d !important;
    }
    .filter-tab.cat-icerik.active {
      color: #ffffff !important;
      background: #b933ff !important;
      box-shadow: inset 0 1.5px 0 #d780ff, inset 0 -3px 0 #5d0f8d !important;
    }
    .filter-tab.cat-dev.active {
      color: #ffffff !important;
      background: #1d4d8c !important;
      box-shadow: inset 0 1.5px 0 #3a6fb3, inset 0 -3px 0 #0d274a !important;
    }
    .filter-tab.cat-builder.active {
      color: #ffffff !important;
      background: #3c8527 !important;
      box-shadow: inset 0 1.5px 0 #5cae44, inset 0 -3px 0 #1a4d0f !important;
    }
    .filter-tab.cat-sunucu.active {
      color: #000000 !important;
      background: #ffd13b !important;
      box-shadow: inset 0 1.5px 0 #ffe566, inset 0 -3px 0 #cc9900 !important;
    }

    .filter-search, .sort-select {
      background: #1b1b1b;
      border: 2px solid #000000;
      box-shadow: inset 0 2px 0 #101010;
      color: #ffffff;
      border-radius: 0px !important;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 800;
      outline: none;
      transition: all 0.15s ease;
      font-family: inherit;
    }
    .filter-search:focus, .sort-select:focus {
      border-color: var(--accent);
    }
    .filter-search::placeholder { color: #555; }

    /* CONTENT */
    .content-wrapper { max-width: 1200px; margin: 0 auto; padding: 0 24px 80px; }

    /* SECTION TITLE */
    .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .section-title { font-size: 18px; font-weight: 900; color: #fff; text-transform: uppercase; }
    .section-count {
      background: #000000;
      border: 1.5px solid #333333;
      border-radius: 0px !important;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 900;
      color: var(--accent);
    }
    .section-line { flex: 1; height: 3px; background: #000000; }

    /* FEATURED */
    .featured-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; margin-bottom: 48px; }

    /* MAIN GRID */
    .listings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 80px 24px; }
    .empty-state-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.4; }
    .empty-state-title { font-size: 20px; font-weight: 800; color: #555; margin-bottom: 8px; }
    .empty-state-text { font-size: 14px; color: #444; }

    /* LOAD MORE */
    .load-more-wrap { text-align: center; margin-top: 40px; }
    .load-more-btn {
      background: #313131;
      border: 3px solid #000000;
      box-shadow: inset 0 2px 0 #5a5a5a, inset 0 -6px 0 #181818, 3px 3px 0 #000000;
      color: #ffffff;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 0px !important;
      padding: 14px 36px;
      font-size: 13px;
      transition: all 0.15s ease;
      font-family: inherit;
    }
    .load-more-btn:hover {
      background: #444444;
      transform: translate(-1px, -1px);
      box-shadow: inset 0 2px 0 #6a6a6a, inset 0 -6px 0 #202020, 4px 4px 0 #000000;
      color: #ffffff;
    }
    .load-more-btn:active {
      transform: translate(2px, 2px);
      box-shadow: inset 0 2px 0 #2a2a2a, inset 0 -2px 0 #101010, 1px 1px 0 #000000;
    }
    .load-more-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .results-count { font-size: 13px; color: #555; margin-bottom: 16px; }

    /* LOADING */
    .skeleton-card { background: #313131; border: 3px solid #000000; border-radius: 0px !important; overflow: hidden; box-shadow: inset 0 3px 0 #5a5a5a, inset 0 -6px 0 #181818; }
    .skeleton { background: linear-gradient(90deg, #222 25%, #2a2a2a 50%, #222 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 0px !important; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skeleton-banner { height: 140px; border-radius: 0px !important; border-bottom: 3px solid #000000; }
    .skeleton-body { padding: 60px 24px 20px; }
    .skeleton-line { height: 12px; margin-bottom: 10px; }
    .skeleton-line.short { width: 60%; }
    .skeleton-line.medium { width: 80%; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      background: #0d0d0d;
      border: 3px solid var(--accent);
      box-shadow: 3px 3px 0 #000000;
      border-radius: 0px !important;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 800;
      color: var(--accent);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.35s;
      max-width: 320px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-color: #b02e26; color: #b02e26; }

    /* SCROLL ANIMATION */
    .fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>

<script>
  const SUPABASE_URL = 'https://hmkeedyqmzblnmkhdste.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhta2VlZHlxbXpibG5ta2hkc3RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODE3MzYsImV4cCI6MjA5NDM1NzczNn0.5HUInmQs_LsXYovJgI7Ir9q8M9aPlQW6jM5C43aYmqA';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ─── CANVAS (Minecraft XP/Enchantment Particles & Logos) ──────────────────
  (function() {
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    const particles = [];
    const logos = [];
    const logoImg = new Image();
    logoImg.src = 'https://i.imgur.com/6l08Y4k.png';

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Build 35 experience pixel square particles
    for (let i = 0; i < 35; i++) {
      particles.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        size: Math.random() * 3 + 2,
        speedY: -(Math.random() * 0.35 + 0.15),
        speedX: (Math.random() - 0.5) * 0.1,
        color: Math.random() > 0.6 ? '#ffd13b' : '#3c8527',
        opacity: Math.random() * 0.5 + 0.15
      });
    }

    // Build 6 floating logos
    for (let i = 0; i < 6; i++) {
      logos.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        size: Math.random() * 50 + 30,
        speedX: (Math.random() - 0.5) * 0.2,
        speedY: (Math.random() - 0.5) * 0.1,
        opacity: Math.random() * 0.04 + 0.02
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Draw pixel square particles
      particles.forEach(p => {
        p.y += p.speedY;
        p.x += p.speedX;
        if (p.y < -20) {
          p.y = H + 20;
          p.x = Math.random() * W;
        }
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.opacity;
        ctx.fillRect(p.x, p.y, p.size, p.size);
      });

      // Draw floating logos
      logos.forEach(l => {
        l.x += l.speedX;
        l.y += l.speedY;
        if (l.x > W + 100) l.x = -100;
        if (l.x < -100) l.x = W + 100;
        if (l.y > H + 100) l.y = -100;
        if (l.y < -100) l.y = H + 100;

        if (logoImg.complete) {
          ctx.save();
          ctx.globalAlpha = l.opacity;
          ctx.drawImage(logoImg, l.x - l.size / 2, l.y - l.size / 4, l.size, l.size / 2.5);
          ctx.restore();
        }
      });

      requestAnimationFrame(draw);
    }

    draw();
  })();

  // ─── STATE ────────────────────────────────────────────────────────────────
  let currentUser = null;
  let allListings = [];
  let featuredListings = [];
  let displayedCount = 12;
  let activeCategory = 'all';
  let activePrice = 'all';
  let activeSort = 'yeni';
  let searchQuery = '';

  const CATS = [
    { id: 'all', label: 'Tümü', cls: '' },
    { id: 'PvP', label: '⚔️ PvP', cls: 'cat-pvp' },
    { id: 'İçerik', label: '🎬 İçerik', cls: 'cat-icerik' },
    { id: 'Developer', label: '💻 Developer', cls: 'cat-dev' },
    { id: 'Builder', label: '🏗️ Builder', cls: 'cat-builder' },
    { id: 'Sunucu', label: '👑 Sunucu', cls: 'cat-sunucu' },
  ];
  const PRICES = [
    { id: 'all', label: 'Tümü' },
    { id: 'free', label: '🟢 Ücretsiz' },
    { id: 'paid', label: '🟡 Ücretli' },
  ];

  const CAT_COLORS = { PvP: '#ff1a3c', 'İçerik': '#b933ff', Developer: '#00d4ff', Builder: '#ffa500', Sunucu: '#FFD700' };
  const CAT_ICONS = { PvP: '⚔️', 'İçerik': '🎬', Developer: '💻', Builder: '🏗️', Sunucu: '👑' };
  const CAT_GRADIENT = {
    PvP: 'linear-gradient(135deg, #1a0008, #3d0015)',
    'İçerik': 'linear-gradient(135deg, #140020, #2d0050)',
    Developer: 'linear-gradient(135deg, #001a20, #003040)',
    Builder: 'linear-gradient(135deg, #1a1000, #3d2800)',
    Sunucu: 'linear-gradient(135deg, #1a1500, #3d3000)',
  };

  // ─── NAV ──────────────────────────────────────────────────────────────────
  async function buildNav() {
    const { data: { session } } = await sb.auth.getSession();
    currentUser = session ? session.user : null;
    let kuProfile = null;
    if (currentUser) {
      const { data: ku } = await sb.from('kullanicilar').select('id, lcoin, avatar_url, aktif_cerceve, abonelik, kullanici_adi').eq('email', currentUser.email).maybeSingle();
      if (ku) {
        currentUser = { ...session.user, id: ku.id };
        kuProfile = ku;
      }
    }

    const navRight = document.getElementById('navRight');
    navRight.innerHTML = '';

    const bell = document.createElement('a');
    bell.href = 'bildirimler.html';
    bell.title = 'Bildirimler';
    bell.className = 'nav-bell';
    bell.textContent = '🔔';
    const dot = document.createElement('span');
    dot.className = 'notif-dot';
    bell.appendChild(dot);
    navRight.appendChild(bell);

    if (currentUser) {
      const lcoin = document.createElement('div');
      lcoin.className = 'nav-lcoin';
      const coinSpan = document.createElement('span');
      coinSpan.className = 'nav-lcoin-icon';
      lcoin.appendChild(coinSpan);
      const coinText = document.createTextNode(kuProfile ? (kuProfile.lcoin || 0).toLocaleString('tr-TR') : '—');
      lcoin.appendChild(coinText);
      navRight.appendChild(lcoin);

      const avatarLink = document.createElement('a');
      avatarLink.href = 'profil.html';
      avatarLink.className = 'nav-avatar pp-wrap';
      avatarLink.dataset.frame = kuProfile ? (kuProfile.aktif_cerceve || 'none') : 'none';
      
      const avatarImg = document.createElement('img');
      avatarImg.className = 'pp-img shape-rounded';
      avatarImg.src = (kuProfile && kuProfile.avatar_url) ? kuProfile.avatar_url : (currentUser.user_metadata?.avatar_url || 'https://api.dicebear.com/7.x/minecraft/svg?seed=' + currentUser.id);
      avatarImg.alt = 'Profil';
      
      avatarLink.appendChild(avatarImg);

      const userWrap = document.createElement('div');
      userWrap.className = 'nav-user';
      userWrap.appendChild(avatarLink);

      if (kuProfile) {
        const info = document.createElement('div');
        info.className = 'nav-user-info';
        const nickEl = document.createElement('div');
        nickEl.className = 'nav-nick';
        nickEl.textContent = kuProfile.kullanici_adi || 'Kullanıcı';
        const roleEl = document.createElement('div');
        roleEl.className = 'nav-role';
        const roleNames = {yonetici:'👑 Yönetici', admin:'🔑 Admin', moderator:'🛡️ Moderatör', rehber:'📞 Rehber', kurucu:'🚀 Kurucu', premium:'⭐ Premium', abone:'💎 Abone', uye:'👤 Üye'};
        roleEl.textContent = roleNames[kuProfile.abonelik] || '👤 Üye';
        info.appendChild(nickEl);
        info.appendChild(roleEl);
        userWrap.appendChild(info);
      }
      navRight.appendChild(userWrap);

      // Check if user is staff to show admin/management panel
      if (kuProfile && ['admin', 'yonetici', 'moderator', 'rehber', 'kurucu'].includes(kuProfile.abonelik)) {
        const adminBtn = document.createElement('a');
        adminBtn.href = 'admin.html';
        adminBtn.className = 'nav-link';
        adminBtn.style.color = 'var(--gold)';
        adminBtn.textContent = '🛠️ Panel';
        document.querySelector('.nav-links').appendChild(adminBtn);
      }
    } else {
      const loginBtn = document.createElement('a');
      loginBtn.className = 'btn mc-green mc-sm';
      loginBtn.textContent = 'Giriş Yap';
      loginBtn.href = 'giris.html?next=ilanlar.html';
      navRight.appendChild(loginBtn);
    }
  }

  // ─── FILTER TABS ──────────────────────────────────────────────────────────
  function buildFilters() {
    const catTabs = document.getElementById('catTabs');
    CATS.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-tab ' + cat.cls + (cat.id === activeCategory ? ' active' : '');
      btn.dataset.cat = cat.id;
      btn.textContent = cat.label;
      btn.addEventListener('click', () => {
        activeCategory = cat.id;
        document.querySelectorAll('#catTabs .filter-tab').forEach(b => {
          b.classList.remove('active');
          if (b.dataset.cat === activeCategory) b.classList.add('active');
        });
        displayedCount = 12;
        renderListings();
      });
      catTabs.appendChild(btn);
    });

    const priceTabs = document.getElementById('priceTabs');
    PRICES.forEach(pr => {
      const btn = document.createElement('button');
      btn.className = 'filter-tab' + (pr.id === activePrice ? ' active' : '');
      btn.dataset.price = pr.id;
      btn.textContent = pr.label;
      btn.addEventListener('click', () => {
        activePrice = pr.id;
        document.querySelectorAll('#priceTabs .filter-tab').forEach(b => {
          b.classList.remove('active');
          if (b.dataset.price === activePrice) b.classList.add('active');
        });
        displayedCount = 12;
        renderListings();
      });
      priceTabs.appendChild(btn);
    });

    document.getElementById('sortSelect').addEventListener('change', e => {
      activeSort = e.target.value;
      displayedCount = 12;
      renderListings();
    });

    let searchTimer;
    document.getElementById('searchInput').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        searchQuery = e.target.value.toLowerCase().trim();
        displayedCount = 12;
        renderListings();
      }, 300);
    });
  }

  // ─── FETCH ────────────────────────────────────────────────────────────────
  let usersMap = {};

  async function fetchListings() {
    showSkeletons();
    const { data, error } = await sb.from('ilanlar').select('*').eq('durum', 'onaylandi').order('id', { ascending: false });
    if (error) { console.error(error); showToast('İlanlar yüklenemedi', true); return; }
    allListings = data || [];
    
    // Fetch real user avatars & badges
    const userIds = [...new Set(allListings.map(i => i.kullanici_id).filter(id => id))];
    if (userIds.length > 0) {
      const { data: users, error: usersErr } = await sb.from('kullanicilar')
        .select('id, avatar_url, kullanici_adi, dogrulama_rozeti')
        .in('id', userIds);
      if (!usersErr && users) {
        users.forEach(u => {
          usersMap[u.id] = u;
        });
      }
    }

    featuredListings = allListings.filter(i => i.one_cikan);

    document.getElementById('totalCount').textContent = allListings.length;
    document.getElementById('featuredCount').textContent = featuredListings.length;
    document.getElementById('freeCount').textContent = allListings.filter(i => !i.fiyat || i.fiyat == 0 || i.fiyat === 'Ücretsiz').length;

    renderFeatured();
    renderListings();
  }

  // ─── FILTER & SORT ────────────────────────────────────────────────────────
  function getFiltered() {
    let list = [...allListings];

    if (activeCategory !== 'all') list = list.filter(i => i.kategori === activeCategory);
    if (activePrice === 'free') list = list.filter(i => !i.fiyat || i.fiyat == 0 || i.fiyat === 'Ücretsiz');
    if (activePrice === 'paid') list = list.filter(i => i.fiyat && i.fiyat != 0 && i.fiyat !== 'Ücretsiz');
    if (searchQuery) list = list.filter(i =>
      (i.baslik || '').toLowerCase().includes(searchQuery) ||
      (i.aciklama || '').toLowerCase().includes(searchQuery) ||
      (i.kullanici_nick || '').toLowerCase().includes(searchQuery)
    );

    if (activeSort === 'yeni') list.sort((a, b) => b.id - a.id);
    else if (activeSort === 'eski') list.sort((a, b) => a.id - b.id);
    else if (activeSort === 'one_cikan') list.sort((a, b) => (b.one_cikan ? 1 : 0) - (a.one_cikan ? 1 : 0));

    return list;
  }

  // ─── RENDER CARD ──────────────────────────────────────────────────────────
  function createCard(ilan, isFeatured = false) {
    const wrapper = document.createElement('div');
    wrapper.className = 'ilan-card-wrapper' + (isFeatured ? ' featured' : '');

    const card = document.createElement('div');
    card.className = 'ilan-card' + (isFeatured ? ' featured' : '');

    // Banner
    const banner = document.createElement('div');
    banner.className = 'card-banner';

    const bannerSrc = ilan.banner_url || ilan.gorsel_url || ilan.resim_url;
    if (bannerSrc) {
      const img = document.createElement('img');
      img.src = bannerSrc;
      img.alt = ilan.baslik;
      img.loading = 'lazy';
      banner.appendChild(img);
    } else {
      const grad = document.createElement('div');
      grad.className = 'card-banner-gradient';
      grad.style.background = CAT_GRADIENT[ilan.kategori] || 'linear-gradient(135deg, #0d0d0d, #1a1a1a)';
      const ico = document.createElement('div');
      ico.className = 'card-banner-icon';
      ico.textContent = CAT_ICONS[ilan.kategori] || '📋';
      grad.appendChild(ico);
      banner.appendChild(grad);
    }

    const overlay = document.createElement('div');
    overlay.className = 'card-banner-overlay';
    banner.appendChild(overlay);

    // Kalan ilan süresi
    const remainingEl = document.createElement('div');
    remainingEl.className = 'card-remaining';
    remainingEl.textContent = formatRemainingTime(ilan.created_at);
    banner.appendChild(remainingEl);

    const badges = document.createElement('div');
    badges.className = 'card-badges';

    const catBadge = document.createElement('span');
    const catMap = { PvP: 'b-pvp', 'İçerik': 'b-icerik', Developer: 'b-developer', Builder: 'b-builder', Sunucu: 'b-yonetici-cat' };
    catBadge.className = 'badge b-cat ' + (catMap[ilan.kategori] || 'b-diger');
    catBadge.textContent = (CAT_ICONS[ilan.kategori] || '') + ' ' + (ilan.kategori || '');
    badges.appendChild(catBadge);

    if (ilan.one_cikan) {
      const ocBadge = document.createElement('span');
      ocBadge.className = 'badge b-gold';
      ocBadge.textContent = '⭐ Öne Çıkan';
      badges.appendChild(ocBadge);
    }
    banner.appendChild(badges);
    card.appendChild(banner);

    const userData = usersMap[ilan.kullanici_id];

    // Body
    const body = document.createElement('div');
    body.className = 'card-body';

    // Inline Author Bar (No banner overlap)
    const authorBar = document.createElement('div');
    authorBar.className = 'card-author-bar';

    const avatar = document.createElement('img');
    avatar.className = 'card-author-avatar';
    avatar.src = (userData && userData.avatar_url) ? userData.avatar_url : ('https://api.dicebear.com/7.x/minecraft/svg?seed=' + (ilan.kullanici_nick || 'user'));
    avatar.alt = ilan.kullanici_nick;
    authorBar.appendChild(avatar);

    const authorInfo = document.createElement('div');
    authorInfo.className = 'card-author-info';

    const authorNick = document.createElement('div');
    authorNick.className = 'card-author-nick';
    authorNick.textContent = ilan.kullanici_nick || 'Anonim';

    if (userData && userData.dogrulama_rozeti) {
      const verifyBadge = document.createElement('img');
      verifyBadge.className = 'profile-verify-badge';
      verifyBadge.src = 'https://i.imgur.com/VDpHaPy.png';
      verifyBadge.title = 'Doğrulanmış';
      authorNick.appendChild(verifyBadge);
    }

    const authorTime = document.createElement('div');
    authorTime.className = 'card-author-time';
    authorTime.textContent = relativeTime(ilan.created_at);

    authorInfo.appendChild(authorNick);
    authorInfo.appendChild(authorTime);
    authorBar.appendChild(authorInfo);
    
    body.appendChild(authorBar);

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = ilan.baslik || 'İsimsiz İlan';
    body.appendChild(title);

    const sub = document.createElement('div');
    sub.className = 'card-subtitle';
    sub.textContent = `${ilan.kategori} • ${ilan.alt_kategori || 'Genel'}`;
    if (CAT_COLORS[ilan.kategori]) {
      sub.style.color = CAT_COLORS[ilan.kategori];
    }
    body.appendChild(sub);

    const desc = document.createElement('div');
    desc.className = 'card-desc';
    desc.textContent = ilan.aciklama || '';
    body.appendChild(desc);

    const priceWrap = document.createElement('div');
    priceWrap.className = 'card-price';
    const priceBadge = document.createElement('span');
    if (!ilan.fiyat || ilan.fiyat == 0 || ilan.fiyat === 'Ücretsiz') {
      priceBadge.className = 'price-badge free';
      priceBadge.textContent = '✅ Ücretsiz';
    } else if (ilan.fiyat === 'Anlaşmalı' || ilan.fiyat === 'Anlasmalı') {
      priceBadge.className = 'price-badge anlasmali';
      priceBadge.textContent = '🤝 Anlaşmalı';
    } else {
      priceBadge.className = 'price-badge paid';
      priceBadge.textContent = '💰 ' + ilan.fiyat + ' ₺';
    }
    priceWrap.appendChild(priceBadge);
    body.appendChild(priceWrap);
    card.appendChild(body);

    // Footer (Clean button shelf)
    const footer = document.createElement('div');
    footer.className = 'card-footer';

    const contactWrap = document.createElement('div');
    contactWrap.className = 'card-contact';
    contactWrap.style.width = '100%';
    contactWrap.style.justifyContent = 'space-between';
    
    if (ilan.kullanici_nick) {
      const pBtn = document.createElement('a');
      pBtn.className = 'card-contact-btn btn mc-gold mc-sm';
      pBtn.href = 'profil.html?nick=' + ilan.kullanici_nick;
      pBtn.innerHTML = `👤 Profil`;
      pBtn.title = 'Profili Ziyaret Et';
      pBtn.addEventListener('click', e => e.stopPropagation());
      contactWrap.appendChild(pBtn);
    }
    if (ilan.discord) {
      const dBtn = document.createElement('a');
      dBtn.className = 'card-contact-btn btn discord-gradient mc-sm';
      dBtn.href = 'https://discord.com/users/' + ilan.discord;
      dBtn.target = '_blank';
      dBtn.rel = 'noopener';
      dBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 127.14 96.36" fill="currentColor" style="vertical-align: middle; display: inline-block; margin-right: 4px;"><path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a77.7,77.7,0,0,0,6.63-10.85,68.43,68.43,0,0,1-10.5-5c1-.73,2-1.5,2.92-2.3a75.46,75.46,0,0,0,75.12,0c.91.8,1.91,1.57,2.92,2.3a68.43,68.43,0,0,1-10.5,5,77.7,77.7,0,0,0,6.63,10.85,105.73,105.73,0,0,0,31-18.83C129.87,50.7,123.82,27.82,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/></svg> Discord`;
      dBtn.title = 'Discord: ' + ilan.discord;
      dBtn.addEventListener('click', e => e.stopPropagation());
      contactWrap.appendChild(dBtn);
    }
    if (ilan.email) {
      const eBtn = document.createElement('a');
      eBtn.className = 'card-contact-btn btn mc-blue mc-sm';
      eBtn.href = 'mailto:' + ilan.email;
      eBtn.textContent = '✉️ E-posta';
      eBtn.title = 'E-posta: ' + ilan.email;
      eBtn.addEventListener('click', e => e.stopPropagation());
      contactWrap.appendChild(eBtn);
    }
    footer.appendChild(contactWrap);
    card.appendChild(footer);

    wrapper.appendChild(card);

    wrapper.addEventListener('click', (e) => {
      if (e.target.closest('.card-contact-btn')) return;
      window.location.href = `ilan-detay.html?id=${ilan.id}`;
    });

    setTimeout(() => wrapper.classList.add('visible'), 50);
    return wrapper;
  }

  function formatRemainingTime(createdDateStr) {
    if (!createdDateStr) return "Süre doldu";
    const createdDate = new Date(createdDateStr);
    const expiryDate = new Date(createdDate.getTime() + 30 * 24 * 60 * 60 * 1000);
    const now = new Date();
    const diffMs = expiryDate - now;
    if (diffMs <= 0) return "Süre doldu";
    const diffDays = Math.floor(diffMs / (24 * 60 * 60 * 1000));
    const diffHours = Math.floor((diffMs % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
    return `⏳ ${diffDays}g ${diffHours}sa kaldı`;
  }

  function relativeTime(createdDateStr) {
    if (!createdDateStr) return "Yakında";
    const now = new Date();
    const date = new Date(createdDateStr);
    const diff = Math.floor((now - date) / 1000);
    if (diff < 60) return `${diff}s önce`;
    if (diff < 3600) return `${Math.floor(diff / 60)}dk önce`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}sa önce`;
    return `${Math.floor(diff / 86400)} gün önce`;
  }

  // ─── RENDER FEATURED ──────────────────────────────────────────────────────
  function renderFeatured() {
    const grid = document.getElementById('featuredGrid');
    const section = document.getElementById('featuredSection');
    grid.innerHTML = '';

    if (featuredListings.length === 0) {
      section.style.display = 'none';
      return;
    }
    section.style.display = 'block';
    document.getElementById('featuredCountBadge').textContent = featuredListings.length;

    featuredListings.slice(0, 3).forEach((ilan, i) => {
      const card = createCard(ilan, true);
      card.style.transitionDelay = (i * 80) + 'ms';
      grid.appendChild(card);
    });
  }

  // ─── RENDER LISTINGS ──────────────────────────────────────────────────────
  function renderListings() {
    const grid = document.getElementById('listingsGrid');
    const filtered = getFiltered();
    const sliced = filtered.slice(0, displayedCount);

    grid.innerHTML = '';
    document.getElementById('allCountBadge').textContent = filtered.length;
    document.getElementById('resultsCount').textContent = filtered.length + ' ilan bulundu';

    if (filtered.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.style.gridColumn = '1/-1';
      const ico = document.createElement('div');
      ico.className = 'empty-state-icon';
      ico.textContent = '📭';
      const title = document.createElement('div');
      title.className = 'empty-state-title';
      title.textContent = 'İlan bulunamadı';
      const txt = document.createElement('div');
      txt.className = 'empty-state-text';
      txt.textContent = 'Farklı filtreler deneyin veya ilk ilanı siz verin!';
      empty.appendChild(ico);
      empty.appendChild(title);
      empty.appendChild(txt);
      grid.appendChild(empty);
      document.getElementById('loadMoreBtn').style.display = 'none';
      return;
    }

    sliced.forEach((ilan, i) => {
      const card = createCard(ilan, ilan.one_cikan);
      card.style.transitionDelay = (i * 50) + 'ms';
      grid.appendChild(card);
    });

    const loadMoreBtn = document.getElementById('loadMoreBtn');
    if (filtered.length > displayedCount) {
      loadMoreBtn.style.display = 'inline-block';
      loadMoreBtn.textContent = `Daha fazla yükle ↓ (${filtered.length - displayedCount} daha)`;
    } else {
      loadMoreBtn.style.display = 'none';
    }
  }

  // ─── SKELETONS ────────────────────────────────────────────────────────────
  function showSkeletons() {
    const grid = document.getElementById('listingsGrid');
    grid.innerHTML = '';
    for (let i = 0; i < 8; i++) {
      const sk = document.createElement('div');
      sk.className = 'skeleton-card';
      const banner = document.createElement('div');
      banner.className = 'skeleton skeleton-banner';
      sk.appendChild(banner);
      const body = document.createElement('div');
      body.className = 'skeleton-body';
      ['medium', 'medium', 'short'].forEach(cls => {
        const line = document.createElement('div');
        line.className = 'skeleton skeleton-line ' + cls;
        body.appendChild(line);
      });
      sk.appendChild(body);
      grid.appendChild(sk);
    }
  }

  // ─── LOAD MORE ────────────────────────────────────────────────────────────
  document.getElementById('loadMoreBtn').addEventListener('click', () => {
    displayedCount += 12;
    renderListings();
    window.scrollBy({ top: 400, behavior: 'smooth' });
  });

  // ─── TOAST ────────────────────────────────────────────────────────────────
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '') + ' show';
    setTimeout(() => { t.classList.remove('show'); }, 3500);
  }

  // ─── URL PARAMS ───────────────────────────────────────────────────────────
  function handleUrlParams() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('success') === '1') {
      showToast('✅ İlanın admin onayı bekliyor!');
    }
  }

  // ─── INIT ─────────────────────────────────────────────────────────────────
  async function init() {
    buildFilters();
    await buildNav();
    handleUrlParams();
    await fetchListings();
  }

  init();
</script>
</body>
