<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İlanlar - LOBBY.GG</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050505;color:#ccc;font-family:'Montserrat',sans-serif;min-height:100vh;}
svg.icon{display:inline;width:1em;height:1em;vertical-align:middle;}
.nav{background:#050505;border-bottom:2px solid #111;padding:0 5%;display:flex;justify-content:space-between;align-items:center;height:56px;position:sticky;top:0;z-index:100;}
.nav-logo{font-size:20px;font-weight:900;color:#fff;text-decoration:none;}
.nav-logo span{color:#39ff14;}
.mc-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:#3a3a3a;color:#ccc!important;padding:9px 16px;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:900;text-transform:uppercase;cursor:pointer;border-top:2px solid #555;border-left:2px solid #555;border-right:2px solid #111;border-bottom:3px solid #111;text-decoration:none;transition:.1s;}
.mc-btn:hover{filter:brightness(1.2);}
.mc-btn-green{background:#3a7d1e;color:#fff!important;border-top-color:#5cb832;border-left-color:#4a9e25;border-right-color:#1e4a09;border-bottom-color:#1e4a09;}
.wrap{background:#050505;min-height:100vh;padding:36px 2% 60px;width:100%;}
.inner{max-width:1400px;margin:0 auto;}
/* KONTROL PANEL */
.ctrl-header{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:10px;padding:20px 28px;margin-bottom:28px;display:flex;flex-direction:column;gap:18px;box-shadow:0 10px 30px rgba(0,0,0,.4);}
.tabs-row{display:flex;gap:12px;border-bottom:2px solid #111;padding-bottom:14px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;}
.tabs-row::-webkit-scrollbar{display:none;}
.tab-btn{background:transparent;color:#666;border:none;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;text-transform:uppercase;cursor:pointer;padding:10px 20px;border-radius:6px;transition:.2s;white-space:nowrap;}
.tab-btn:hover{color:#fff;background:#111;}
.tab-btn.active{background:rgba(255,215,0,.1);color:#FFD700;border:1px solid #FFD700;}
.filter-row{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;}
.search-box{flex:1;min-width:240px;position:relative;}
.search-box input{width:100%;background:#111;border:1px solid #222;color:#fff;padding:14px 18px 14px 44px;border-radius:8px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;transition:.2s;outline:none;}
.search-box input:focus{border-color:#FFD700;box-shadow:0 0 14px rgba(255,215,0,.18);}
.search-box input::placeholder{color:#333;}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#555;font-size:16px;}
.sort-box select{background:#111;border:1px solid #222;color:#fff;padding:14px 18px;border-radius:8px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;cursor:pointer;outline:none;transition:.2s;-webkit-appearance:none;min-width:210px;}
.sort-box select:focus{border-color:#39ff14;}
.sort-box select option{background:#0a0a0a;}
/* GRID */
.ilan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px;}
.ilan-card{background:linear-gradient(180deg,#111 0%,#0a0a0a 100%);border:1px solid #1a1a1a;border-radius:10px;padding:18px;display:flex;flex-direction:column;gap:14px;transition:.2s;position:relative;box-shadow:0 4px 14px rgba(0,0,0,.4);cursor:pointer;}
.ilan-card:hover{transform:translateY(-4px);border-color:#2a2a2a;box-shadow:0 8px 24px rgba(0,0,0,.7);}
.ilan-card.vip{border-color:rgba(255,215,0,.4)!important;background:linear-gradient(180deg,rgba(26,23,0,.9),#0a0a0a);}
.ilan-card.vip:hover{border-color:#FFD700!important;box-shadow:0 8px 24px rgba(255,215,0,.12);}
.vip-badge{position:absolute;top:-9px;left:12px;background:linear-gradient(135deg,#FFD700,#B8860B);color:#000;padding:2px 10px;border-radius:3px;font-size:8px;font-weight:900;text-transform:uppercase;box-shadow:0 0 8px rgba(255,215,0,.35);}
.card-head{display:flex;align-items:flex-start;gap:13px;}
.card-av{width:52px;height:52px;border-radius:7px;object-fit:cover;border:2px solid #222;flex-shrink:0;}
.vip .card-av{border-color:#FFD700;box-shadow:0 0 10px rgba(255,215,0,.35);}
.card-info{flex:1;min-width:0;}
.card-tag{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;display:block;}
.card-name{color:#fff;font-size:15px;font-weight:900;margin:0 0 3px;display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-name .vtick{fill:#FFD700;width:13px;height:13px;flex-shrink:0;}
.card-stars{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:800;color:#FFD700;margin-top:2px;}
.card-stars span{color:#555;font-size:10px;font-weight:600;}
.card-banner{width:100%;height:80px;object-fit:cover;border-radius:4px;border:1px solid #1a1a1a;}
.card-desc{color:#888;font-size:12px;font-weight:600;line-height:1.6;margin:0;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.card-foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid #1a1a1a;padding-top:14px;margin-top:auto;}
.card-price{font-size:18px;font-weight:900;color:#39ff14;}
.card-btn{padding:8px 18px;border-radius:4px;text-decoration:none;font-family:'Montserrat',sans-serif;font-weight:900;font-size:11px;text-transform:uppercase;transition:.1s;border:none;cursor:pointer;color:#fff;}
.card-btn:hover{transform:translateY(1px);filter:brightness(1.1);}
.cb-green{background:linear-gradient(180deg,#39ff14,#29bf0d);color:#000!important;border-bottom:3px solid #1a8009;}
.cb-red{background:linear-gradient(180deg,#ff2222,#cc0000);border-bottom:3px solid #660000;}
.cb-pink{background:linear-gradient(180deg,#e1306c,#b02554);border-bottom:3px solid #8a1d41;}
.cb-kick{background:linear-gradient(180deg,#53fc18,#3ba80b);color:#000!important;border-bottom:3px solid #257005;}
.cb-twitch{background:linear-gradient(180deg,#9146ff,#5c20b8);border-bottom:3px solid #3b107a;}
.cb-cyan{background:linear-gradient(180deg,#00f2fe,#0098a6);color:#000!important;border-bottom:3px solid #005f6b;}
.cb-gold{background:linear-gradient(180deg,#FFD700,#B8860B);color:#000!important;border-bottom:3px solid #665000;}
.no-results{grid-column:1/-1;text-align:center;padding:50px 20px;color:#333;}
.no-results i{font-size:48px;margin-bottom:16px;display:block;}
#loading{position:fixed;inset:0;background:#050505;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;}
.ld-logo{font-size:26px;font-weight:900;color:#fff;}
.ld-logo span{color:#39ff14;}
.ld-bar{width:180px;height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden;}
.ld-fill{height:100%;background:#39ff14;animation:ld 1.5s ease infinite;}
@keyframes ld{0%{width:0%}50%{width:70%}100%{width:100%}}
@media(max-width:768px){.filter-row{flex-direction:column;align-items:stretch;}.sort-box select,.search-box{width:100%;}.ilan-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<svg style="display:none;">
  <symbol id="icon-star" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></symbol>
  <symbol id="icon-verified" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></symbol>
</svg>

<div id="loading"><div class="ld-logo">LOBBY<span>.GG</span></div><div class="ld-bar"><div class="ld-fill"></div></div></div>

<nav class="nav">
  <a href="/lobbygg/index.html" class="nav-logo">LOBBY<span>.GG</span></a>
  <div style="display:flex;gap:8px;">
    <a href="/lobbygg/ilan-ver.html" class="mc-btn mc-btn-green"><i class="fa-solid fa-plus"></i> İlan Ver</a>
    <a href="/lobbygg/panel.html" class="mc-btn"><i class="fa-solid fa-gauge-high"></i> Panel</a>
  </div>
</nav>

<div class="wrap">
  <div class="inner">
    <div class="ctrl-header">
      <div class="tabs-row" id="tabs-row">
        <button class="tab-btn active" data-kat="hepsi">🔥 Tüm İlanlar</button>
        <button class="tab-btn" data-kat="is">💼 Yetenek İlanları</button>
        <button class="tab-btn" data-kat="yetkili">🛡️ Yetkili İlanları</button>
        <button class="tab-btn" data-kat="medya">🎬 Yayıncı & Medya</button>
        <button class="tab-btn" data-kat="reklam">📣 Reklam İlanları</button>
      </div>
      <div class="filter-row">
        <div class="search-box">
          <i class="fa-solid fa-search search-icon"></i>
          <input type="text" id="search-input" placeholder="İlan, kullanıcı veya pozisyon ara...">
        </div>
        <div class="sort-box">
          <select id="sort-select">
            <option value="yeni">Sıralama: En Yeni</option>
            <option value="one">Öne Çıkanlar Önce</option>
            <option value="fiyat-az">Fiyat: Düşükten Yükseğe</option>
            <option value="fiyat-cok">Fiyat: Yüksekten Düşüğe</option>
            <option value="puan">Puan: En Yüksek</option>
          </select>
        </div>
      </div>
    </div>
    <div class="ilan-grid" id="ilan-grid"><div class="no-results"><i class="fa-solid fa-spinner fa-spin"></i></div></div>
  </div>
</div>

<script>
const SB=window.supabase.createClient('https://hmkeedyqmzblnmkhdste.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhta2VlZHlxbXpibG5ta2hkc3RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODE3MzYsImV4cCI6MjA5NDM1NzczNn0.5HUInmQs_LsXYovJgI7Ir9q8M9aPlQW6jM5C43aYmqA');
let tumIlanlar=[],aktifKat='hepsi';

const KAT_RENK={is:'#39ff14',yetkili:'#FFD700',medya:'#d966ff',reklam:'#FFD700'};
const KAT_AD={is:'Yetenek İlanı',yetkili:'Yetkili İlanı',medya:'Medya İlanı',reklam:'Reklam İlanı'};
const MED_BTN={kick:'cb-kick',tiktok:'cb-cyan',instagram:'cb-pink',youtube:'cb-red',twitch:'cb-twitch'};
const MED_LBL={kick:'Kick',tiktok:'TikTok',instagram:'Instagram',youtube:'YouTube',twitch:'Twitch'};

async function init(){
  const{data}=await SB.from('ilanlar').select('*').eq('durum','aktif').order('one_cikan',{ascending:false}).order('created_at',{ascending:false});
  tumIlanlar=data||[];
  render();
  document.getElementById('loading').style.display='none';

  // Tab eventler
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      aktifKat=btn.dataset.kat;
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });
  document.getElementById('search-input').addEventListener('input',render);
  document.getElementById('sort-select').addEventListener('change',render);
}

function render(){
  const q=document.getElementById('search-input').value.toLowerCase().trim();
  const sira=document.getElementById('sort-select').value;
  let liste=aktifKat==='hepsi'?[...tumIlanlar]:tumIlanlar.filter(i=>i.kategori===aktifKat);
  if(q)liste=liste.filter(i=>(i.kullanici_nick||'').toLowerCase().includes(q)||(i.alt_kategori||'').toLowerCase().includes(q)||(i.aciklama||'').toLowerCase().includes(q));
  if(sira==='one')liste.sort((a,b)=>(b.one_cikan?1:0)-(a.one_cikan?1:0));
  else if(sira==='fiyat-az')liste.sort((a,b)=>(a.fiyat||0)-(b.fiyat||0));
  else if(sira==='fiyat-cok')liste.sort((a,b)=>(b.fiyat||0)-(a.fiyat||0));
  else if(sira==='puan')liste.sort((a,b)=>(b.seviye||0)-(a.seviye||0));
  const grid=document.getElementById('ilan-grid');
  if(!liste.length){grid.innerHTML='<div class="no-results"><i class="fa-solid fa-bullhorn"></i><div style="font-size:14px;font-weight:800;text-transform:uppercase;">Uygun ilan bulunamadı</div></div>';return;}
  grid.innerHTML=liste.map(i=>{
    const nick=i.kullanici_nick||'Oyuncu';
    const vip=i.one_cikan;
    const puan=i.seviye||0;
    const yildiz=puan>0?Math.min(5,Math.round(puan/2)):0;
    const renkTag=KAT_RENK[i.kategori]||'#aaa';
    const katAd=KAT_AD[i.kategori]||i.kategori;
    // Medya buton ve alt kategori
    const isMediaCat=i.kategori==='medya';
    const platKey=(i.alt_kategori||'').toLowerCase();
    const btnCls=isMediaCat?(MED_BTN[platKey]||'cb-green'):(i.kategori==='reklam'?'cb-gold':(i.kategori==='yetkili'?'cb-red':'cb-green'));
    const btnText=isMediaCat?'Kanala Git':'İncele';
    const displayTag=isMediaCat?(MED_LBL[platKey]||'Medya'):(i.alt_kategori||katAd);
    return`<div class="ilan-card ${vip?'vip':''}" onclick="window.location.href='/lobbygg/profil.html?id=${i.kullanici_id}'">
      ${vip?'<div class="vip-badge">VİP İLAN</div>':''}
      ${i.kategori==='reklam'&&i.banner_url?`<img src="${i.banner_url}" class="card-banner" alt="">`:''}
      <div class="card-head">
        <img src="${i.avatar_url||`https://minotar.net/helm/${nick}/52.png`}" class="card-av" onerror="this.src='https://minotar.net/helm/Steve/52.png'" alt="">
        <div class="card-info">
          <span class="card-tag" style="color:${renkTag};">${displayTag.toUpperCase()}</span>
          <h4 class="card-name">${nick}<svg class="icon"><use href="#icon-verified"/></svg></h4>
          ${yildiz>0?`<div class="card-stars">${'★'.repeat(yildiz)}${'☆'.repeat(5-yildiz)} <span>(${puan}/10)</span></div>`:''}
        </div>
      </div>
      <p class="card-desc">${i.aciklama||'Açıklama eklenmemiş.'}</p>
      <div class="card-foot">
        <div class="card-price">${i.fiyat&&i.fiyat>0?i.fiyat.toLocaleString('tr-TR')+' TL':'Görüşülür'}</div>
        <a class="card-btn ${btnCls}" href="/lobbygg/profil.html?id=${i.kullanici_id}" onclick="event.stopPropagation()">${btnText}</a>
      </div>
    </div>`;
  }).join('');
}
init();
</script>
</body>
</html>
