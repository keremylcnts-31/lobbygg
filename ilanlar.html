    .nav-lcoin:hover { border-color: #FFD700; }
    .nav-lcoin span { font-size: 16px; }

    .hero-title { font-size: clamp(36px, 5vw, 64px); font-weight: 900; line-height: 1; color: #fff; margin-bottom: 16px; }

    .card-contact-btn.discord:hover { background: rgba(114,137,218,0.25); border-color: #7289da; }
    .card-contact-btn.email { background: rgba(100,100,100,0.12); border-color: rgba(100,100,100,0.4); color: #aaa; }
    .card-contact-btn.email:hover { background: rgba(100,100,100,0.25); border-color: #aaa; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 80px 24px; }
    .empty-state-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.4; }
    .empty-state-title { font-size: 20px; font-weight: 800; color: #555; margin-bottom: 8px; }
    .empty-state-text { font-size: 14px; color: #444; }

    /* LOAD MORE */
    .load-more-wrap { text-align: center; margin-top: 40px; }
    .load-more-btn { background: #111; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 36px; font-size: 14px; font-weight: 700; color: #aaa; cursor: pointer; font-family: 'Montserrat', sans-serif; transition: all 0.2s; }
    .load-more-btn:hover { border-color: #39ff14; color: #39ff14; background: rgba(57,255,20,0.06); }
    .load-more-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .results-count { font-size: 13px; color: #555; margin-bottom: 16px; }

    /* LOADING */
    .skeleton-card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 16px; overflow: hidden; }
    .skeleton { background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skeleton-banner { height: 180px; border-radius: 0; }
    .skeleton-body { padding: 16px; }
    .skeleton-line { height: 12px; margin-bottom: 10px; }
    .skeleton-line.short { width: 60%; }
    .skeleton-line.medium { width: 80%; }

    /* TOAST */
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; background: #0d0d0d; border: 1px solid #39ff14; border-radius: 12px; padding: 14px 20px; font-size: 14px; font-weight: 700; color: #39ff14; box-shadow: 0 8px 32px rgba(57,255,20,0.2); transform: translateY(80px); opacity: 0; transition: all 0.35s; max-width: 320px; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-color: #ff1a3c; color: #ff1a3c; box-shadow: 0 8px 32px rgba(255,26,60,0.2); }

    /* SCROLL ANIMATION */
    .fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>

<script>
  const SUPABASE_URL = 'https://hmkeedyqmzblnmkhdste.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhta2VlZHlxbXpibG5ta2hkc3RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODE3MzYsImV4cCI6MjA5NDM1NzczNn0.5HUInmQs_LsXYovJgI7Ir9q8M9aPlQW6jM5C43aYmqA';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ─── CANVAS ───────────────────────────────────────────────────────────────
  (function() {
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, beams = [], logos = [], logoImg = new Image();
    logoImg.src = 'https://i.imgur.com/6l08Y4k.png';

    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

    function makeBeam() {
      return { x: Math.random() * W, y: -200, len: 150 + Math.random() * 200, speed: 0.4 + Math.random() * 0.6, alpha: 0.03 + Math.random() * 0.07, width: 1 + Math.random() * 2 };
    }
    function makeLogo() {
      return { x: Math.random() * W, y: Math.random() * H, vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3, alpha: 0.02 + Math.random() * 0.05, size: 60 + Math.random() * 80 };
    }

    function init() {
      resize();
      beams = Array.from({length: 12}, makeBeam);
      logos = Array.from({length: 6}, makeLogo);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      beams.forEach(b => {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(Math.PI / 4);
        const g = ctx.createLinearGradient(0, 0, 0, b.len);
        g.addColorStop(0, `rgba(57,255,20,0)`);
        g.addColorStop(0.5, `rgba(57,255,20,${b.alpha})`);
        g.addColorStop(1, `rgba(57,255,20,0)`);
        ctx.fillStyle = g;
        ctx.fillRect(-b.width / 2, 0, b.width, b.len);
        ctx.restore();
        b.y += b.speed;
        if (b.y > H + 300) { Object.assign(b, makeBeam()); b.y = -200; }
      });
      logos.forEach(l => {
        if (logoImg.complete) {
          ctx.save();
          ctx.globalAlpha = l.alpha;
          ctx.drawImage(logoImg, l.x - l.size / 2, l.y - l.size / 4, l.size, l.size / 2);
          ctx.restore();
        }
        l.x += l.vx; l.y += l.vy;
        if (l.x < -100) l.x = W + 100;
        if (l.x > W + 100) l.x = -100;
        if (l.y < -100) l.y = H + 100;
        if (l.y > H + 100) l.y = -100;
      });
      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); beams = Array.from({length: 12}, makeBeam); });
    init();
    draw();
  })();

  // ─── STATE ────────────────────────────────────────────────────────────────
  let currentUser = null;
  let allListings = [];
  let featuredListings = [];
  let displayedCount = 12;
  let activeCategory = 'all';
  let activePrice = 'all';
  let activeSort = 'yeni';
  let searchQuery = '';

  const CATS = [
    { id: 'all', label: 'Tümü', cls: '' },
    { id: 'PvP', label: '⚔️ PvP', cls: 'cat-pvp' },
    { id: 'İçerik', label: '🎬 İçerik', cls: 'cat-icerik' },
    { id: 'Developer', label: '💻 Developer', cls: 'cat-dev' },
    { id: 'Builder', label: '🏗️ Builder', cls: 'cat-builder' },
    { id: 'Yönetici', label: '👑 Yönetici', cls: 'cat-yonetici' },
  ];
  const PRICES = [
    { id: 'all', label: 'Tümü' },
    { id: 'free', label: '🟢 Ücretsiz' },
    { id: 'paid', label: '🟡 Ücretli' },
  ];

  const CAT_COLORS = { PvP: '#ff1a3c', 'İçerik': '#b933ff', Developer: '#00d4ff', Builder: '#ffa500', 'Yönetici': '#FFD700' };
  const CAT_ICONS = { PvP: '⚔️', 'İçerik': '🎬', Developer: '💻', Builder: '🏗️', 'Yönetici': '👑' };
  const CAT_GRADIENT = {
    PvP: 'linear-gradient(135deg, #1a0008, #3d0015)',
    'İçerik': 'linear-gradient(135deg, #140020, #2d0050)',
    Developer: 'linear-gradient(135deg, #001a20, #003040)',
    Builder: 'linear-gradient(135deg, #1a1000, #3d2800)',
    'Yönetici': 'linear-gradient(135deg, #1a1500, #3d3000)',
  };

  // ─── NAV ──────────────────────────────────────────────────────────────────
  async function buildNav() {
    const { data: { session } } = await sb.auth.getSession();
    currentUser = session ? session.user : null;
    let kuProfile = null;
    if (currentUser) {
      const { data: ku } = await sb.from('kullanicilar').select('id, lcoin, avatar_url').eq('email', currentUser.email).maybeSingle();
      if (ku) {
        currentUser = { ...session.user, id: ku.id };
        kuProfile = ku;
      }
    }

    const navRight = document.getElementById('navRight');
    navRight.innerHTML = '';

    const bell = document.createElement('a');
    bell.href = 'bildirimler.html';
    bell.title = 'Bildirimler';
    bell.className = 'nav-bell';
    bell.textContent = '🔔';
    const dot = document.createElement('span');
    dot.className = 'notif-dot';
    bell.appendChild(dot);
    navRight.appendChild(bell);

    if (currentUser) {
      const lcoin = document.createElement('div');
      lcoin.className = 'nav-lcoin';
      const coinSpan = document.createElement('span');
      coinSpan.className = 'nav-lcoin-icon';
      lcoin.appendChild(coinSpan);
      const coinText = document.createTextNode(kuProfile ? (kuProfile.lcoin || 0).toLocaleString('tr-TR') : '—');
      lcoin.appendChild(coinText);
      navRight.appendChild(lcoin);

      const avatar = document.createElement('img');
      avatar.className = 'nav-avatar';
      avatar.src = (kuProfile && kuProfile.avatar_url) ? kuProfile.avatar_url : (currentUser.user_metadata?.avatar_url || 'https://api.dicebear.com/7.x/minecraft/svg?seed=' + currentUser.id);
      avatar.alt = 'Profil';
      avatar.addEventListener('click', () => { window.location.href = 'profil.html'; });
      navRight.appendChild(avatar);
    } else {
      const loginBtn = document.createElement('button');
      loginBtn.className = 'nav-login-btn';
      loginBtn.textContent = 'Giriş Yap';
      loginBtn.addEventListener('click', () => { window.location.href = 'giris.html'; });
      navRight.appendChild(loginBtn);
    }
  }

  // ─── FILTER TABS ──────────────────────────────────────────────────────────
  function buildFilters() {
    const catTabs = document.getElementById('catTabs');
    CATS.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-tab ' + cat.cls + (cat.id === activeCategory ? ' active' : '');
      btn.dataset.cat = cat.id;
      btn.textContent = cat.label;
      btn.addEventListener('click', () => {
        activeCategory = cat.id;
        document.querySelectorAll('#catTabs .filter-tab').forEach(b => {
          b.classList.remove('active');
          if (b.dataset.cat === activeCategory) b.classList.add('active');
        });
        displayedCount = 12;
        renderListings();
      });
      catTabs.appendChild(btn);
    });

    const priceTabs = document.getElementById('priceTabs');
    PRICES.forEach(pr => {
      const btn = document.createElement('button');
      btn.className = 'filter-tab' + (pr.id === activePrice ? ' active' : '');
      btn.dataset.price = pr.id;
      btn.textContent = pr.label;
      btn.addEventListener('click', () => {
        activePrice = pr.id;
        document.querySelectorAll('#priceTabs .filter-tab').forEach(b => {
          b.classList.remove('active');
          if (b.dataset.price === activePrice) b.classList.add('active');
        });
        displayedCount = 12;
        renderListings();
      });
      priceTabs.appendChild(btn);
    });

    document.getElementById('sortSelect').addEventListener('change', e => {
      activeSort = e.target.value;
      displayedCount = 12;
      renderListings();
    });

    let searchTimer;
    document.getElementById('searchInput').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        searchQuery = e.target.value.toLowerCase().trim();
        displayedCount = 12;
        renderListings();
      }, 300);
    });
  }

  // ─── FETCH ────────────────────────────────────────────────────────────────
  async function fetchListings() {
    showSkeletons();
    const { data, error } = await sb.from('ilanlar').select('*').eq('durum', 'onaylandi').order('id', { ascending: false });
    if (error) { console.error(error); showToast('İlanlar yüklenemedi', true); return; }
    allListings = data || [];
    featuredListings = allListings.filter(i => i.one_cikan);

    document.getElementById('totalCount').textContent = allListings.length;
    document.getElementById('featuredCount').textContent = featuredListings.length;
    document.getElementById('freeCount').textContent = allListings.filter(i => !i.fiyat || i.fiyat == 0).length;

    renderFeatured();
    renderListings();
  }

  // ─── FILTER & SORT ────────────────────────────────────────────────────────
  function getFiltered() {
    let list = [...allListings];

    if (activeCategory !== 'all') list = list.filter(i => i.kategori === activeCategory);
    if (activePrice === 'free') list = list.filter(i => !i.fiyat || i.fiyat == 0 || i.fiyat === 'Ücretsiz');
    if (activePrice === 'paid') list = list.filter(i => i.fiyat && i.fiyat != 0 && i.fiyat !== 'Ücretsiz');
    if (searchQuery) list = list.filter(i =>
      (i.baslik || '').toLowerCase().includes(searchQuery) ||
      (i.aciklama || '').toLowerCase().includes(searchQuery) ||
      (i.kullanici_nick || '').toLowerCase().includes(searchQuery)
    );

    if (activeSort === 'yeni') list.sort((a, b) => b.id - a.id);
    else if (activeSort === 'eski') list.sort((a, b) => a.id - b.id);
    else if (activeSort === 'one_cikan') list.sort((a, b) => (b.one_cikan ? 1 : 0) - (a.one_cikan ? 1 : 0));

    return list;
  }

  // ─── RENDER CARD ──────────────────────────────────────────────────────────
  function createCard(ilan, isFeatured = false) {
    const card = document.createElement('div');
    card.className = 'ilan-card fade-in' + (isFeatured ? ' featured' : '');

    // Banner
    const banner = document.createElement('div');
    banner.className = 'card-banner';

    if (ilan.banner_url) {
      const img = document.createElement('img');
      img.src = ilan.banner_url;
      img.alt = ilan.baslik;
      img.loading = 'lazy';
      banner.appendChild(img);
    } else {
      const grad = document.createElement('div');
      grad.className = 'card-banner-gradient';
      grad.style.background = CAT_GRADIENT[ilan.kategori] || 'linear-gradient(135deg, #0d0d0d, #1a1a1a)';
      const ico = document.createElement('div');
      ico.className = 'card-banner-icon';
      ico.textContent = CAT_ICONS[ilan.kategori] || '📋';
      grad.appendChild(ico);
      banner.appendChild(grad);
    }

    const overlay = document.createElement('div');
    overlay.className = 'card-banner-overlay';
    banner.appendChild(overlay);

    const badges = document.createElement('div');
    badges.className = 'card-badges';

    const catBadge = document.createElement('span');
    catBadge.className = 'cat-badge ' + (ilan.kategori || '').toLowerCase().replace(/[^a-z]/g, '');
    const catMap = { PvP: 'pvp', 'İçerik': 'icerik', Developer: 'developer', Builder: 'builder', 'Yönetici': 'yonetici' };
    catBadge.className = 'cat-badge ' + (catMap[ilan.kategori] || '');
    catBadge.textContent = (CAT_ICONS[ilan.kategori] || '') + ' ' + (ilan.kategori || '');
    badges.appendChild(catBadge);

    if (ilan.one_cikan) {
      const ocBadge = document.createElement('span');
      ocBadge.className = 'one-cikan-badge';
      ocBadge.textContent = '⭐ Öne Çıkan';
      badges.appendChild(ocBadge);
    }
    banner.appendChild(badges);
    card.appendChild(banner);

    // Body
    const body = document.createElement('div');
    body.className = 'card-body';

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = ilan.baslik || 'İsimsiz İlan';
    body.appendChild(title);

    const desc = document.createElement('div');
    desc.className = 'card-desc';
    desc.textContent = ilan.aciklama || '';
    body.appendChild(desc);

    const priceWrap = document.createElement('div');
    priceWrap.className = 'card-price';
    const priceBadge = document.createElement('span');
    if (!ilan.fiyat || ilan.fiyat == 0 || ilan.fiyat === 'Ücretsiz') {
      priceBadge.className = 'price-badge free';
      priceBadge.textContent = '✅ Ücretsiz';
    } else if (ilan.fiyat === 'Anlaşmalı' || ilan.fiyat === 'Anlasmalı') {
      priceBadge.className = 'price-badge anlasmali';
      priceBadge.textContent = '🤝 Anlaşmalı';
    } else {
      priceBadge.className = 'price-badge paid';
      priceBadge.textContent = '💰 ' + ilan.fiyat + ' ₺';
    }
    priceWrap.appendChild(priceBadge);
    body.appendChild(priceWrap);
    card.appendChild(body);

    // Footer
    const footer = document.createElement('div');
    footer.className = 'card-footer';

    const userWrap = document.createElement('div');
    userWrap.className = 'card-user';

    const avatar = document.createElement('img');
    avatar.className = 'card-avatar';
    avatar.src = 'https://api.dicebear.com/7.x/minecraft/svg?seed=' + (ilan.kullanici_nick || 'user');
    avatar.alt = ilan.kullanici_nick;
    userWrap.appendChild(avatar);

    const userInfo = document.createElement('div');
    const nick = document.createElement('div');
    nick.className = 'card-nick';
    nick.textContent = ilan.kullanici_nick || 'Anonim';
    userInfo.appendChild(nick);
    const timeEl = document.createElement('div');
    timeEl.className = 'card-time';
    timeEl.textContent = formatTime(ilan.id);
    userInfo.appendChild(timeEl);
    userWrap.appendChild(userInfo);
    footer.appendChild(userWrap);

    const contactWrap = document.createElement('div');
    contactWrap.className = 'card-contact';
    if (ilan.discord) {
      const dBtn = document.createElement('a');
      dBtn.className = 'card-contact-btn discord';
      dBtn.href = 'https://discord.com/users/' + ilan.discord;
      dBtn.target = '_blank';
      dBtn.rel = 'noopener';
      dBtn.innerHTML = '💬';
      dBtn.title = 'Discord';
      dBtn.addEventListener('click', e => e.stopPropagation());
      contactWrap.appendChild(dBtn);
    }
    if (ilan.email) {
      const eBtn = document.createElement('a');
      eBtn.className = 'card-contact-btn email';
      eBtn.href = 'mailto:' + ilan.email;
      eBtn.innerHTML = '✉️';
      eBtn.title = 'E-posta';
      eBtn.addEventListener('click', e => e.stopPropagation());
      contactWrap.appendChild(eBtn);
    }
    footer.appendChild(contactWrap);
    card.appendChild(footer);

    card.addEventListener('click', (e) => {
      if (e.target.closest('.card-contact-btn')) return;
      window.location.href = `ilan-detay.html?id=${ilan.id}`;
    });

    setTimeout(() => card.classList.add('visible'), 50);
    return card;
  }

  function formatTime(id) {
    // Approximate time from id - show placeholder
    return 'Yakında';
  }

  // ─── RENDER FEATURED ──────────────────────────────────────────────────────
  function renderFeatured() {
    const grid = document.getElementById('featuredGrid');
    const section = document.getElementById('featuredSection');
    grid.innerHTML = '';

    if (featuredListings.length === 0) {
      section.style.display = 'none';
      return;
    }
    section.style.display = 'block';
    document.getElementById('featuredCountBadge').textContent = featuredListings.length;

    featuredListings.slice(0, 3).forEach((ilan, i) => {
      const card = createCard(ilan, true);
      card.style.transitionDelay = (i * 80) + 'ms';
      grid.appendChild(card);
    });
  }

  // ─── RENDER LISTINGS ──────────────────────────────────────────────────────
  function renderListings() {
    const grid = document.getElementById('listingsGrid');
    const filtered = getFiltered();
    const sliced = filtered.slice(0, displayedCount);

    grid.innerHTML = '';
    document.getElementById('allCountBadge').textContent = filtered.length;
    document.getElementById('resultsCount').textContent = filtered.length + ' ilan bulundu';

    if (filtered.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.style.gridColumn = '1/-1';
      const ico = document.createElement('div');
      ico.className = 'empty-state-icon';
      ico.textContent = '📭';
      const title = document.createElement('div');
      title.className = 'empty-state-title';
      title.textContent = 'İlan bulunamadı';
      const txt = document.createElement('div');
      txt.className = 'empty-state-text';
      txt.textContent = 'Farklı filtreler deneyin veya ilk ilanı siz verin!';
      empty.appendChild(ico);
      empty.appendChild(title);
      empty.appendChild(txt);
      grid.appendChild(empty);
      document.getElementById('loadMoreBtn').style.display = 'none';
      return;
    }

    sliced.forEach((ilan, i) => {
      const card = createCard(ilan, false);
      card.style.transitionDelay = (i * 50) + 'ms';
      grid.appendChild(card);
    });

    const loadMoreBtn = document.getElementById('loadMoreBtn');
    if (filtered.length > displayedCount) {
      loadMoreBtn.style.display = 'inline-block';
      loadMoreBtn.textContent = `Daha fazla yükle ↓ (${filtered.length - displayedCount} daha)`;
    } else {
      loadMoreBtn.style.display = 'none';
    }
  }

  // ─── SKELETONS ────────────────────────────────────────────────────────────
  function showSkeletons() {
    const grid = document.getElementById('listingsGrid');
    grid.innerHTML = '';
    for (let i = 0; i < 8; i++) {
      const sk = document.createElement('div');
      sk.className = 'skeleton-card';
      const banner = document.createElement('div');
      banner.className = 'skeleton skeleton-banner';
      sk.appendChild(banner);
      const body = document.createElement('div');
      body.className = 'skeleton-body';
      ['medium', 'medium', 'short'].forEach(cls => {
        const line = document.createElement('div');
        line.className = 'skeleton skeleton-line ' + cls;
        body.appendChild(line);
      });
      sk.appendChild(body);
      grid.appendChild(sk);
    }
  }

  // ─── LOAD MORE ────────────────────────────────────────────────────────────
  document.getElementById('loadMoreBtn').addEventListener('click', () => {
    displayedCount += 12;
    renderListings();
    window.scrollBy({ top: 400, behavior: 'smooth' });
  });

  // ─── TOAST ────────────────────────────────────────────────────────────────
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '') + ' show';
    setTimeout(() => { t.classList.remove('show'); }, 3500);
  }

  // ─── URL PARAMS ───────────────────────────────────────────────────────────
  function handleUrlParams() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('success') === '1') {
      showToast('✅ İlanın admin onayı bekliyor!');
    }
  }

  // ─── INIT ─────────────────────────────────────────────────────────────────
  async function init() {
    buildFilters();
    await buildNav();
    handleUrlParams();
    await fetchListings();
  }

  init();
</script>
</body>
</html>
