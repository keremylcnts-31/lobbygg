<!DOCTYPE html>
<html lang="tr">
<head>

<title>Profil - LOBBY.GG</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050505;color:#ccc;font-family:'Montserrat',sans-serif;min-height:100vh;}

/* ── NAV ── */
.nav{background:#050505;border-bottom:2px solid #111;padding:0 5%;display:flex;justify-content:space-between;align-items:center;height:56px;position:sticky;top:0;z-index:200;}
.nav a img{height:42px;object-fit:contain;}

/* ── MİNECRAFT BUTONLAR ── */
.mc-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;text-decoration:none;transition:.1s;border:none;}
.mc-btn:active{transform:translateY(1px);}
.mc-gray{background:#3c3c3c;color:#ddd;border-top:2px solid #6b6b6b;border-left:2px solid #555;border-right:2px solid #111;border-bottom:3px solid #111;}
.mc-gray:hover{background:#4a4a4a;color:#fff;}
.mc-green{background:#3a7d1e;color:#fff;border-top:2px solid #5cb832;border-left:2px solid #4a9e25;border-right:2px solid #1e4a09;border-bottom:3px solid #1e4a09;}
.mc-green:hover{filter:brightness(1.1);}
.mc-gold{background:#b38600;color:#fff;border-top:2px solid #FFD700;border-left:2px solid #e6a800;border-right:2px solid #5a4000;border-bottom:3px solid #5a4000;}
.mc-gold:hover{filter:brightness(1.1);}
.mc-red{background:#7d1e1e;color:#ffaaaa;border-top:2px solid #b83232;border-left:2px solid #9e2525;border-right:2px solid #3a0909;border-bottom:3px solid #3a0909;}
.mc-red:hover{filter:brightness(1.1);}
.mc-blue{background:#1a4a8a;color:#aad4ff;border-top:2px solid #3270b8;border-left:2px solid #2560a0;border-right:2px solid #091e3a;border-bottom:3px solid #091e3a;}
.mc-discord{background:#5865F2;color:#fff;border-top:2px solid #7289da;border-left:2px solid #6070d0;border-right:2px solid #2c2e5a;border-bottom:3px solid #2c2e5a;}

/* ── BANNER ── */
.banner-wrap{width:100%;position:relative;overflow:hidden;aspect-ratio:851/315;max-height:315px;}
.banner-img{width:100%;height:100%;object-fit:cover;display:block;}
.banner-gradient{width:100%;height:100%;display:block;}
.banner-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(5,5,5,.7) 100%);pointer-events:none;}

/* ── PROFİL HEADER ── */
.profil-wrap{max-width:960px;margin:0 auto;padding:0 16px;}
.profil-header{background:#0d0d0d;border:1px solid #1a1a1a;border-top:none;border-radius:0 0 8px 8px;margin-bottom:14px;}
.profil-av-row{display:flex;align-items:flex-end;gap:14px;padding:0 20px 14px;margin-top:5px;position:relative;z-index:10;}

/* PP ŞEKİLLERİ */
.pp-wrap{position:relative;cursor:pointer;flex-shrink:0;}
.pp-img{width:200px;height:200px;object-fit:cover;border:8px solid #0d0d0d;}
.pp-circle{border-radius:50%;}
.pp-rounded{border-radius:14px;}
.pp-wrap:hover .pp-img{filter:brightness(.85);}

/* ROZETİ */
.verified-badge svg{width:20px;height:20px;vertical-align:middle;}

.profil-info{flex:1;min-width:0;padding-bottom:30px;}
.nick-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:70px;}
.profil-nick{font-size:40px;font-weight:900;color:#fff;}
.profil-badge{font-size:9px;font-weight:900;text-transform:uppercase;padding:2px 8px;border-radius:3px;white-space:nowrap;}
.b-uye{background:#1a1a1a;color:#666;border:1px solid #2a2a2a;}
.b-abone{background:#0d1f00;color:#39ff14;border:1px solid #2a5000;}
.b-premium{background:#1a1200;color:#FFD700;border:1px solid #4a3500;}
.b-admin{background:#1a0d2a;color:#b933ff;border:1px solid #4a1e7d;}
.klan-badge{font-size:10px;font-weight:900;padding:2px 10px;border-radius:3px;border:1px solid;}

.profil-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:10px;color:#555;margin-bottom:6px;}
.profil-meta span{display:flex;align-items:center;gap:4px;}
.profil-bio{font-size:12px;color:#666;line-height:1.7;margin-bottom:8px;}
.profil-actions{display:flex;gap:7px;flex-wrap:wrap;}

/* KATEGORİ TAG */
.kat-tag{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;padding:3px 10px;border-radius:3px;}
.kat-pvp{background:#1f0d0d;color:#ff4444;border:1px solid #4a1515;}
.kat-icerik{background:#1f0d2a;color:#b933ff;border:1px solid #4a1e7d;}
.kat-developer{background:#1a1200;color:#FFD700;border:1px solid #4a3500;}
.kat-builder{background:#0d1a00;color:#39ff14;border:1px solid #2a5000;}

/* STATS */


/* SEKMELER */
.sekmeler{display:flex;border-top:1px solid #1a1a1a;overflow-x:auto;}
.sekmeler::-webkit-scrollbar{display:none;}
.sekme{padding:11px 14px;font-size:10px;font-weight:900;color:#555;cursor:pointer;border-bottom:3px solid transparent;text-transform:uppercase;white-space:nowrap;transition:.15s;}
.sekme:hover{color:#ccc;}
.sekme.active{color:#39ff14;border-bottom-color:#39ff14;}
.sekme.gold{color:#FFD700 !important;border-bottom-color:#FFD700 !important;}

/* BODY */
.profil-body{max-width:960px;margin:0 auto 40px;padding:0 16px;display:grid;grid-template-columns:1fr 280px;gap:14px;align-items:start;}
.sekme-icerik{display:none;}
.sekme-icerik.active{display:block;}

/* KUTU */
.box{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;padding:14px;margin-bottom:12px;}
.box-title{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#444;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.box-title::before{content:'';width:3px;height:10px;background:#39ff14;border-radius:1px;flex-shrink:0;}

/* DROP */
.drop-kart{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;padding:14px;margin-bottom:10px;}
.drop-kart:hover{border-color:#222;}
.drop-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.drop-av{width:34px;height:34px;border-radius:50%;overflow:hidden;border:2px solid #1a1a1a;flex-shrink:0;}
.drop-av img{width:100%;height:100%;object-fit:cover;}
.drop-nick{font-size:12px;font-weight:900;color:#fff;}
.drop-zaman{font-size:9px;color:#444;margin-top:1px;}
.drop-icerik{font-size:13px;color:#bbb;line-height:1.8;margin-bottom:10px;word-break:break-word;}
.drop-gorsel{width:100%;border-radius:6px;max-height:400px;object-fit:cover;margin-bottom:10px;cursor:pointer;display:block;}
.drop-aksiyon{display:flex;gap:12px;border-top:1px solid #1a1a1a;padding-top:10px;}
.drop-btn{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:800;color:#444;cursor:pointer;background:none;border:none;font-family:'Montserrat',sans-serif;text-transform:uppercase;padding:4px 8px;border-radius:3px;transition:.15s;}
.drop-btn:hover{color:#ccc;background:#111;}
.drop-btn.begendi{color:#ff1493;}
.drop-yaz-box{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;padding:14px;margin-bottom:12px;}
.drop-ta{width:100%;background:#111;border:1px solid #222;color:#bbb;padding:10px;border-radius:4px;font-family:'Montserrat',sans-serif;font-size:13px;outline:none;resize:none;min-height:70px;margin-bottom:10px;transition:.15s;}
.drop-ta:focus{border-color:#39ff14;}
.drop-ta::placeholder{color:#333;}

/* YORUM */
.yorum-wrap{margin-top:10px;border-top:1px solid #1a1a1a;padding-top:10px;display:none;}
.yorum-in{flex:1;background:#111;border:1px solid #222;color:#bbb;padding:7px 10px;border-radius:4px;font-family:'Montserrat',sans-serif;font-size:11px;outline:none;}

/* İLAN */
.ilan-kart{background:#111;border:1px solid #1a1a1a;border-radius:6px;padding:12px;margin-bottom:8px;cursor:pointer;transition:.15s;}
.ilan-kart:hover{border-color:#2a2a2a;}
.ilan-tag{font-size:9px;font-weight:900;text-transform:uppercase;padding:2px 7px;border-radius:3px;display:inline-block;margin-bottom:6px;}

/* TAKİPÇİ */
.tkart{display:flex;align-items:center;gap:10px;padding:10px;border-radius:4px;cursor:pointer;transition:.15s;}
.tkart:hover{background:#111;}
.tkav{width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid #1a1a1a;flex-shrink:0;}
.tkav img{width:100%;height:100%;object-fit:cover;}

/* SUNUCU KARTI */
.sunucu-kart{display:flex;align-items:center;gap:10px;background:#111;border:1px solid #1a1a1a;border-radius:6px;padding:8px 10px;margin-bottom:6px;transition:.15s;}
.sunucu-kart:hover{border-color:#2a2a2a;}
.sunucu-logo{width:32px;height:32px;border-radius:5px;object-fit:cover;image-rendering:pixelated;flex-shrink:0;}
.sunucu-logo-ico{width:32px;height:32px;border-radius:5px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}

/* ── AYARLAR ── */
.ayar-bolum{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #1a1a1a;}
.ayar-baslik{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#444;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.ayar-baslik::before{content:'';width:3px;height:10px;background:#FFD700;border-radius:1px;}
.ayar-input{width:100%;background:#111;border:1px solid #222;color:#ccc;padding:11px 12px;border-radius:4px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;outline:none;transition:.15s;margin-bottom:8px;}
.ayar-input:focus{border-color:#39ff14;color:#fff;}
.ayar-input::placeholder{color:#333;}

/* BANNER RENK SEÇİCİ */
.renk-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px;}
.renk-btn{height:44px;border-radius:4px;border:2px solid transparent;cursor:pointer;transition:.15s;}
.renk-btn:hover{transform:scale(1.05);}
.renk-btn.on{border-color:#39ff14;}

/* ÇERÇEVE SEÇİCİ */
.cerceve-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.cerceve-btn{background:#111;border:2px solid #1a1a1a;border-radius:6px;padding:12px 8px;cursor:pointer;text-align:center;transition:.15s;}
.cerceve-btn:hover{border-color:#2a2a2a;}
.cerceve-btn.on{border-color:#FFD700;}
.cerceve-btn.on .cerceve-ad{color:#FFD700;}
.cerceve-demo{width:40px;height:40px;margin:0 auto 6px;background:linear-gradient(135deg,#39ff14,#00aa00);border:2px solid #333;}
.cerceve-ad{font-size:9px;font-weight:900;text-transform:uppercase;color:#444;}

/* PP ŞEKİL SEÇİCİ */
.sekil-grid{display:flex;gap:10px;margin-bottom:12px;}
.sekil-btn{flex:1;background:#111;border:2px solid #1a1a1a;border-radius:6px;padding:12px;cursor:pointer;text-align:center;transition:.15s;}
.sekil-btn:hover{border-color:#2a2a2a;}
.sekil-btn.on{border-color:#39ff14;}

/* SUNUCU DÜZENLEME */
.s-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-height:220px;overflow-y:auto;margin-bottom:10px;}
.s-grid::-webkit-scrollbar{width:3px;}
.s-grid::-webkit-scrollbar-thumb{background:#2a2a2a;}
.s-item{background:#111;border:1px solid #1a1a1a;border-radius:5px;padding:8px 5px;cursor:pointer;text-align:center;transition:.15s;}
.s-item:hover{border-color:#2a2a2a;}
.s-item.on{border-color:rgba(57,255,20,.4);background:rgba(57,255,20,.05);}
.s-item.on-tek{border-color:rgba(255,215,0,.5);background:rgba(255,215,0,.05);}
.s-isim-sm{font-size:8px;font-weight:800;color:#444;text-transform:uppercase;margin-top:4px;line-height:1.2;}
.s-item.on .s-isim-sm{color:#39ff14;}
.s-item.on-tek .s-isim-sm{color:#FFD700;}

/* KATEGORİ SEÇİCİ (ayarlar) */
.kat-sec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.kat-sec-btn{background:#111;border:1px solid #1a1a1a;border-radius:5px;padding:12px 8px;cursor:pointer;text-align:center;transition:.15s;}
.kat-sec-btn:hover{border-color:#2a2a2a;}
.kat-sec-btn.on{border-color:rgba(57,255,20,.4);background:rgba(57,255,20,.05);}
.kat-sec-btn .kat-ico{font-size:24px;margin-bottom:5px;}
.kat-sec-btn .kat-lbl{font-size:9px;font-weight:800;color:#555;text-transform:uppercase;}
.kat-sec-btn.on .kat-lbl{color:#39ff14;}
.alt-sec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.alt-btn{background:#111;border:1px solid #1a1a1a;border-radius:4px;padding:8px 5px;cursor:pointer;text-align:center;font-size:9px;font-weight:800;color:#444;text-transform:uppercase;transition:.15s;}
.alt-btn:hover{border-color:#2a2a2a;color:#ccc;}
.alt-btn.on{border-color:rgba(57,255,20,.4);color:#39ff14;background:rgba(57,255,20,.05);}

/* PP ZOOM */
.zoom-modal{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:999;cursor:pointer;}
.zoom-modal.active{display:flex;}
.zoom-modal img{max-width:88vw;max-height:88vh;border-radius:50%;border:3px solid #FFD700;}

/* DM MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:500;padding:20px;}
.modal-bg.active{display:flex;}
.modal{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:20px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:11px;font-weight:900;color:#fff;text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.modal-x{background:none;border:none;color:#444;font-size:18px;cursor:pointer;}

/* LOADING */
#loading{position:fixed;inset:0;background:#050505;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;}
.ld-bar{width:160px;height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden;}
.ld-fill{height:100%;background:#39ff14;animation:ld 1.5s ease infinite;}
@keyframes ld{0%{width:0}50%{width:70%}100%{width:100%}}

/* PP ÇERÇEVE ANİMASYONLARI */
@keyframes neonPulse{0%,100%{box-shadow:0 0 0 3px var(--fc),0 0 8px var(--fc);}50%{box-shadow:0 0 0 3px var(--fc),0 0 20px var(--fc),0 0 35px var(--fc);}}
@keyframes glassSweep{0%{left:-100%;}100%{left:200%;}}
@keyframes rainbowRot{0%{border-color:#ff0000;}17%{border-color:#ffaa00;}33%{border-color:#ffff00;}50%{border-color:#00ff00;}67%{border-color:#00aaff;}83%{border-color:#aa00ff;}100%{border-color:#ff0000;}}

.pp-frame-wrap{position:relative;display:inline-block;}
.pp-frame-wrap .pp-img{border:3px solid transparent;}

/* Renk çerçeveleri - border shorthand ile kesin override */
.frame-none .pp-img{border:8px solid #1a1a1a !important;}
.frame-green .pp-img{border:8px solid #39ff14 !important;}
.frame-red .pp-img{border:8px solid #ff1a3c !important;}
.frame-blue .pp-img{border:8px solid #00d4ff !important;}
.frame-gold .pp-img{border:8px solid #FFD700 !important;}
.frame-purple .pp-img{border:8px solid #b933ff !important;}
.frame-white .pp-img{border:8px solid #ffffff !important;}
.frame-dark .pp-img{border:8px solid #444 !important;}
.frame-cyan .pp-img{border:8px solid #00ffcc !important;}

/* Animasyonlu çerçeveler (abone) */
.frame-neon-green .pp-img{border:8px solid #39ff14 !important;--fc:#39ff14;animation:neonPulse 2s ease-in-out infinite;}
.frame-neon-red .pp-img{border:8px solid #ff1a3c !important;--fc:#ff1a3c;animation:neonPulse 2s ease-in-out infinite;}
.frame-neon-blue .pp-img{border:8px solid #00d4ff !important;--fc:#00d4ff;animation:neonPulse 2s ease-in-out infinite;}
.frame-neon-gold .pp-img{border:8px solid #FFD700 !important;--fc:#FFD700;animation:neonPulse 2s ease-in-out infinite;}
.frame-rainbow .pp-img{border:8px solid #ff0000 !important;animation:rainbowRot 3s linear infinite;}
.frame-glass .pp-img{border:8px solid rgba(255,255,255,.3) !important;}
.frame-glass{overflow:hidden;}
.frame-glass::after{content:'';position:absolute;top:-10%;left:-100%;width:50%;height:120%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:glassSweep 3s ease-in-out infinite;border-radius:inherit;pointer-events:none;}

/* ÇERÇEVE SEÇİCİ */
.cerceve-sec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.cerceve-sec-btn{background:#111;border:1px solid #1a1a1a;border-radius:6px;padding:10px 6px;cursor:pointer;text-align:center;transition:.15s;}
.cerceve-sec-btn:hover{border-color:#2a2a2a;}
.cerceve-sec-btn.on{border-color:#39ff14;}
.cerceve-sec-btn.premium-frame{opacity:.7;}
.cerceve-sec-btn.premium-frame.on{border-color:#FFD700;opacity:1;}
.cerceve-demo-img{width:36px;height:36px;border-radius:50%;border:3px solid;margin:0 auto 5px;background:linear-gradient(135deg,#1a1a1a,#333);}
.cerceve-lbl{font-size:8px;font-weight:800;color:#444;text-transform:uppercase;}

.abone-gerek{background:#1a1200;border:1px solid #4a3500;border-radius:6px;padding:10px 14px;font-size:10px;color:#FFD700;font-weight:700;text-align:center;margin-bottom:8px;}

@media(max-width:768px){.profil-body{grid-template-columns:1fr;}.pp-img{width:72px;height:72px;}.profil-nick{font-size:16px;}.profil-av-row{margin-top:-32px;}}
</style>
</head>

function sunucuLogoHTML(isim,sz=32){
  const ip=SUNUCU_IPS[isim];

  return`<div class="sunucu-logo-ico" style="width:${sz}px;height:${sz}px;">🖥️</div>`;
}

function verifiedSVG(){return`<img src="https://i.imgur.com/VDpHaPy.png" style="width:22px;height:22px;vertical-align:middle;" title="Doğrulanmış Hesap">`;}

function bannerCSS(kul){
  if(kul.banner_url)return null;
  if(kul.banner_renk==='canvas')return 'canvas'; // özel durum
  const renk=BANNER_RENKLER.find(r=>r.id===(kul.banner_renk||'default'));
  return renk?renk.css:BANNER_RENKLER[0].css;
}

function abone(kul){return kul&&(kul.abonelik==='abone'||kul.abonelik==='premium'||kul.abonelik==='admin'||kul.abonelik==='yonetici');}

setTimeout(()=>document.getElementById('loading').style.display='none',5000);

async function init(){
  try{
    const{data:{session}}=await Promise.race([SB.auth.getSession(),new Promise(r=>setTimeout(()=>r({data:{session:null}}),3000))]);
    if(session){const{data}=await SB.from('kullanicilar').select('*').eq('email',session.user.email);if(data?.length)benKim=data[0];}
  }catch(e){}

  const p=new URLSearchParams(location.search);
  const id=p.get('id'),nick=p.get('nick');
  try{
    if(id){const{data}=await SB.from('kullanicilar').select('*').eq('id',parseInt(id));if(data?.length)profil=data[0];}
    else if(nick){const{data}=await SB.from('kullanicilar').select('*').ilike('kullanici_adi',nick);if(data?.length)profil=data[0];}
    else if(benKim)profil=benKim;
  }catch(e){}

  if(!profil){
    document.getElementById('profil-wrap').innerHTML='<div style="text-align:center;padding:80px;color:#333;"><i class="fa-solid fa-user-slash" style="font-size:48px;display:block;margin-bottom:16px;"></i><div style="font-size:14px;font-weight:900;text-transform:uppercase;">Kullanıcı Bulunamadı</div><a href="/lobbygg/index.html" class="mc-btn mc-green" style="margin-top:16px;"><i class="fa-solid fa-house"></i> Ana Sayfa</a></div>';
    document.getElementById('loading').style.display='none';return;
  }

  if(benKim&&benKim.id!==profil.id){
    const{data:t}=await SB.from('takipler').select('id').eq('takip_eden_id',parseInt(benKim.id)).eq('takip_edilen_id',parseInt(profil.id));
    takipEdiyorMu=!!(t?.length);
  }

  const [ilanR,dropR,klanR]=await Promise.allSettled([
    SB.from('ilanlar').select('*').eq('kullanici_id',parseInt(profil.id)).eq('durum','aktif'),
    SB.from('droplar').select('*').eq('kullanici_id',parseInt(profil.id)).order('created_at',{ascending:false}).limit(30),
    profil.klan_tag?SB.from('klanlar').select('*').eq('tag',profil.klan_tag):Promise.resolve({data:[]}),
  ]);

  const ilanlar=ilanR.value?.data||[];
  const droplar=dropR.value?.data||[];
  const klan=klanR.value?.data?.[0]||null;

  render(ilanlar,droplar,klan);
  document.getElementById('loading').style.display='none';
}

let ppBase64=null,bannerBase64=null;

function ppZoom(src){document.getElementById('zoom-img').src=src;document.getElementById('zoom-modal').classList.add('active');}

function ppYukle(inp){
  const f=inp.files[0];if(!f)return;
  if(f.size>3*1024*1024){alert('Maks 3MB!');return;}
  const r=new FileReader();
  r.onload=e=>{ppBase64=e.target.result;document.getElementById('ayar-pp-oniz').src=e.target.result;};
  r.readAsDataURL(f);
}

function bannerYukle(inp){
  const f=inp.files[0];if(!f)return;
  if(f.size>5*1024*1024){alert('Maks 5MB!');return;}
  const r=new FileReader();
  r.onload=e=>{
    bannerBase64=e.target.result;
    // Önizleme
    let oniz=document.getElementById('banner-oniz');
    if(!oniz){
      oniz=document.createElement('div');oniz.id='banner-oniz';
      oniz.style.cssText='margin-top:8px;border-radius:4px;overflow:hidden;border:1px solid #2a2a2a;aspect-ratio:851/315;';
      inp.parentElement.appendChild(oniz);
    }
    oniz.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;display:block;">`;
  };
  r.readAsDataURL(f);
}

async function ayarKaydet(){
  const msg=document.getElementById('ayar-msg');
  msg.style.display='block';msg.style.background='rgba(255,255,255,.05)';msg.style.border='1px solid #2a2a2a';msg.style.color='#ccc';
  msg.textContent='⏳ Kaydediliyor...';

  const guncel={};
  const bio=document.getElementById('ayar-bio')?.value?.trim();
  const discord=document.getElementById('ayar-discord')?.value?.trim();
  if(bio!==undefined)guncel.bio=bio||null;
  if(discord!==undefined)guncel.discord=discord||null;
  if(ppBase64==='__kaldir__')guncel.avatar_url=null;
  else if(ppBase64)guncel.avatar_url=ppBase64;
  if(bannerBase64==='__kaldir__')guncel.banner_url=null;
  else if(bannerBase64)guncel.banner_url=bannerBase64;
  if(secilenBannerRenk)guncel.banner_renk=secilenBannerRenk;
  if(secilenPPSekil)guncel.pp_sekil=secilenPPSekil;
  if(secilenCerceve!==null)guncel.aktif_cerceve=secilenCerceve;
  if(ayarKat)guncel.kategori=ayarKat;
  if(ayarAltKat)guncel.alt_kategori=ayarAltKat;
  if(ayarFavSecSet.size>=2)guncel.favori_sunucular=JSON.stringify([...ayarFavSecSet]);
  if(ayarAktifSecVal)guncel.desteklenen_sunucu=ayarAktifSecVal!=='Belirtmek İstemiyorum'?ayarAktifSecVal:null;

  if(!Object.keys(guncel).length){msg.textContent='⚠️ Değişiklik yok!';return;}

  const{error}=await SB.from('kullanicilar').update(guncel).eq('id',profil.id);
  if(error){
    msg.style.background='rgba(255,50,50,.08)';msg.style.border='1px solid rgba(255,50,50,.3)';msg.style.color='#ff6b6b';
    msg.textContent='❌ Hata: '+error.message;return;
  }
  msg.style.background='rgba(57,255,20,.08)';msg.style.border='1px solid rgba(57,255,20,.2)';msg.style.color='#39ff14';
  msg.textContent='✅ Kaydedildi! Sayfa yenileniyor...';
  setTimeout(()=>location.reload(),1200);
}

async function dropBegen(id){
  if(!benKim){location.href='/lobbygg/giris.html';return;}
  const{data:m}=await SB.from('drop_begeniler').select('id').eq('drop_id',id).eq('kullanici_id',benKim.id);
  const sEl=document.getElementById('bs-'+id);const btn=document.getElementById('beg-'+id);
  const s=parseInt(sEl?.textContent)||0;
  if(m?.length){
    await SB.from('drop_begeniler').delete().eq('drop_id',id).eq('kullanici_id',benKim.id);
    await SB.from('droplar').update({begeni_sayisi:Math.max(0,s-1)}).eq('id',id);
    if(sEl)sEl.textContent=Math.max(0,s-1);
    if(btn){btn.className='drop-btn';btn.innerHTML=`<i class="fa-regular fa-heart"></i>&nbsp;${Math.max(0,s-1)}`;}
  }else{
    await SB.from('drop_begeniler').insert({drop_id:id,kullanici_id:benKim.id});
    await SB.from('droplar').update({begeni_sayisi:s+1}).eq('id',id);
    if(sEl)sEl.textContent=s+1;
    if(btn){btn.className='drop-btn begendi';btn.innerHTML=`<i class="fa-solid fa-heart"></i>&nbsp;${s+1}`;}
  }
}

async function yorumToggle(id){
  const w=document.getElementById('yw-'+id);
  if(w.style.display==='block'){w.style.display='none';return;}
  w.style.display='block';if(w.dataset.loaded)return;w.dataset.loaded='1';
  const{data:yorumlar}=await SB.from('drop_yorumlar').select('*').eq('drop_id',id).order('created_at',{ascending:true}).limit(20);
  const ids=(yorumlar||[]).map(y=>y.kullanici_id);
  let km={};
  if(ids.length){const{data:kl}=await SB.from('kullanicilar').select('id,kullanici_adi,avatar_url').in('id',ids);(kl||[]).forEach(k=>km[k.id]=k);}
  w.innerHTML=`<div id="yl-${id}">${(yorumlar||[]).length
    ?(yorumlar||[]).map(y=>{const k=km[y.kullanici_id]||{};return`<div style="display:flex;gap:8px;margin-bottom:8px;cursor:pointer;" onclick="location.href='/lobbygg/profil.html?id=${k.id}'">
      <img src="${k.avatar_url||`https://minotar.net/helm/${k.kullanici_adi||'Steve'}/26.png`}" style="width:26px;height:26px;border-radius:50%;flex-shrink:0;" onerror="this.src='https://minotar.net/helm/Steve/26.png'">
      <div style="background:#111;border:1px solid #1a1a1a;padding:6px 10px;border-radius:4px;flex:1;">
        <div style="font-size:10px;font-weight:900;color:#fff;margin-bottom:2px;">${k.kullanici_adi||'?'}</div>
        <div style="font-size:11px;color:#777;">${esc(y.yorum)}</div>
      </div>
    </div>`;}).join('')
    :'<div style="font-size:10px;color:#444;text-align:center;padding:8px;">Yorum yok</div>'}
  </div>
  ${benKim?`<div style="display:flex;gap:6px;margin-top:8px;">
    <input type="text" class="yorum-in" id="yi-${id}" placeholder="Yorumunu yaz..." onkeydown="if(event.key==='Enter')yorumGonder(${id})">
    <button class="mc-btn mc-green" onclick="yorumGonder(${id})" style="padding:7px 12px;font-size:9px;white-space:nowrap;"><i class="fa-solid fa-paper-plane"></i></button>
  </div>`:''}`;
}

async function yorumGonder(id){
  if(!benKim)return;
  const inp=document.getElementById('yi-'+id);
  const y=inp?.value?.trim();if(!y)return;
  await SB.from('drop_yorumlar').insert({drop_id:id,kullanici_id:benKim.id,yorum:y});
  const{data:d}=await SB.from('droplar').select('yorum_sayisi').eq('id',id).single();
  await SB.from('droplar').update({yorum_sayisi:(d?.yorum_sayisi||0)+1}).eq('id',id);
  inp.value='';const w=document.getElementById('yw-'+id);delete w.dataset.loaded;w.style.display='none';yorumToggle(id);
}

async function dropSil(id){

  await SB.from('droplar').delete().eq('id',id);
  document.getElementById('drop-'+id)?.remove();
}

    await SB.from('takipler').delete().eq('takip_eden_id',benKim.id).eq('takip_edilen_id',profil.id);
    const yeni=Math.max(0,(profil.takipci_sayisi||1)-1);
    await Promise.all([SB.from('kullanicilar').update({takipci_sayisi:yeni}).eq('id',profil.id),SB.from('kullanicilar').update({takip_sayisi:Math.max(0,(benKim.takip_sayisi||1)-1)}).eq('id',benKim.id)]);
    profil.takipci_sayisi=yeni;takipEdiyorMu=false;
  }else{
    const{data:v}=await SB.from('takipler').select('id').eq('takip_eden_id',parseInt(benKim.id)).eq('takip_edilen_id',parseInt(profil.id));
    if(!v?.length){
      await SB.from('takipler').insert({takip_eden_id:benKim.id,takip_edilen_id:profil.id});
      const yeni=(profil.takipci_sayisi||0)+1;
      await Promise.all([SB.from('kullanicilar').update({takipci_sayisi:yeni}).eq('id',profil.id),SB.from('kullanicilar').update({takip_sayisi:(benKim.takip_sayisi||0)+1}).eq('id',benKim.id)]);
      profil.takipci_sayisi=yeni;
    }
    takipEdiyorMu=true;
  }
  if(btn){btn.className='mc-btn '+(takipEdiyorMu?'mc-red':'mc-green');btn.innerHTML=`<i class="fa-solid fa-user-${takipEdiyorMu?'minus':'plus'}"></i> ${takipEdiyorMu?'Takibi Bırak':'Takip Et'}`;}
  document.querySelectorAll('.stat-val')[2].textContent=profil.takipci_sayisi;
}

// ── DM ──
function dmAc(){
  if(!benKim){location.href='/lobbygg/giris.html';return;}
  document.getElementById('dm-baslik').textContent=profil.kullanici_adi+' ile Mesajlaşma';
  document.getElementById('dm-body').innerHTML=`
    <div id="dm-mesajlar" style="max-height:260px;overflow-y:auto;margin-bottom:12px;"></div>
    <div style="display:flex;gap:7px;">
      <input type="text" class="yorum-in" id="dm-in" placeholder="Mesaj yaz..." style="flex:1;" onkeydown="if(event.key==='Enter')dmGonder()">
      <button class="mc-btn mc-green" onclick="dmGonder()" style="padding:8px 12px;"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
    <div style="margin-top:8px;font-size:9px;color:#444;text-align:center;">Tam DM için <a href="/lobbygg/mesajlar.html" style="color:#39ff14;">mesajlar sayfasına</a> git</div>`;
  dmYukle();document.getElementById('dm-modal').classList.add('active');
}

async function dmYukle(){
  const el=document.getElementById('dm-mesajlar');if(!el)return;
  const{data}=await SB.from('mesajlar').select('*')
    .or(`and(gonderen_id.eq.${benKim.id},alici_id.eq.${profil.id}),and(gonderen_id.eq.${profil.id},alici_id.eq.${benKim.id})`)
    .order('created_at',{ascending:true}).limit(30);
  if(!data?.length){el.innerHTML='<div style="text-align:center;color:#444;font-size:11px;padding:14px;">Henüz mesaj yok</div>';return;}
  el.innerHTML=data.map(m=>{
    const ben=m.gonderen_id===benKim.id;
    return`<div style="display:flex;justify-content:${ben?'flex-end':'flex-start'};margin-bottom:8px;">
      <div style="max-width:70%;background:${ben?'#1a3a10':'#111'};border:1px solid ${ben?'#2a5a18':'#1a1a1a'};padding:7px 11px;border-radius:${ben?'10px 10px 2px 10px':'10px 10px 10px 2px'};">
        <div style="font-size:12px;color:#bbb;">${esc(m.mesaj)}</div>
        <div style="font-size:8px;color:#444;margin-top:3px;">${zaman(m.created_at)}</div>
      </div>
    </div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}

async function dmGonder(){
  const inp=document.getElementById('dm-in');const m=inp?.value?.trim();if(!m)return;
  await SB.from('mesajlar').insert({gonderen_id:benKim.id,alici_id:profil.id,mesaj:m});
  inp.value='';dmYukle();
}

// ── SEKMELER ──
function sekmeAc(id,idx){
  document.querySelectorAll('.sekme').forEach((s,i)=>s.classList.toggle('active',i===idx));
  document.querySelectorAll('.sekme-icerik').forEach(s=>s.classList.remove('active'));
  document.getElementById('sekme-'+id)?.classList.add('active');
  if(id==='takipciler')takipcileriYukle();
  if(id==='takip')takipEttikleriniYukle();
}

// ── YARDIMCI ──
function zaman(ts){if(!ts)return'';const d=Date.now()-new Date(ts).getTime();if(d<60000)return'Az önce';if(d<3600000)return Math.floor(d/60000)+'dk';if(d<86400000)return Math.floor(d/3600000)+'sa';return Math.floor(d/86400000)+'g';}
function esc(t){return t?.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')||'';}

// Mevcut favori sunucuları ayar setine yükle
function ayarFavleriBaşlat(favSunucular){
  favSunucular.forEach(s=>{
    ayarFavSecSet.add(s);
    ALL_SUNUCULAR.forEach((sun,i)=>{if(sun.n===s){document.getElementById('ays-'+i)?.classList.add('on');}});
  });
  ayarAktifSecVal=profil.desteklenen_sunucu||null;
}

function initBannerCanvas(){
  const canvas=document.getElementById('banner-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width=canvas.offsetWidth||851;
  const H=canvas.height=canvas.offsetHeight||315;
  const logo=new Image();logo.crossOrigin='anonymous';logo.src='https://i.imgur.com/6l08Y4k.png';
  const LOGOLAR=Array.from({length:6},()=>({x:Math.random()*W,y:Math.random()*H,size:Math.random()*60+30,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,alpha:Math.random()*.12+.06,rot:Math.random()*Math.PI*2,vrot:(Math.random()-.5)*.005}));
  const HUZMELER=Array.from({length:3},()=>({x:Math.random()*W,angle:(Math.random()-.5)*.5,w:Math.random()*80+40,alpha:Math.random()*.04+.02,speed:Math.random()*.3+.1,dir:Math.random()>.5?1:-1}));
  function draw(){
    ctx.fillStyle='#050505';ctx.fillRect(0,0,W,H);
    HUZMELER.forEach(h=>{ctx.save();ctx.translate(h.x,H/2);ctx.rotate(h.angle);const g=ctx.createLinearGradient(0,-H,0,H);g.addColorStop(0,'transparent');g.addColorStop(.4,`rgba(57,255,20,${h.alpha})`);g.addColorStop(.5,`rgba(100,255,80,${h.alpha*1.8})`);g.addColorStop(.6,`rgba(57,255,20,${h.alpha})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(-h.w/2,-H*1.5,h.w,H*3);ctx.restore();h.x+=h.speed*h.dir;if(h.x>W+200)h.dir=-1;if(h.x<-200)h.dir=1;});
    if(logo.complete&&logo.naturalWidth>0)LOGOLAR.forEach(l=>{ctx.save();ctx.globalAlpha=l.alpha;ctx.translate(l.x,l.y);ctx.rotate(l.rot);ctx.drawImage(logo,-l.size/2,-l.size/2,l.size,l.size);ctx.restore();l.x+=l.vx;l.y+=l.vy;l.rot+=l.vrot;if(l.x<-100)l.x=W+50;if(l.x>W+100)l.x=-50;if(l.y<-100)l.y=H+50;if(l.y>H+100)l.y=-50;});
    requestAnimationFrame(draw);
  }
  draw();
}
setTimeout(initBannerCanvas,100);

init().then(()=>{
  let fav=[];try{fav=JSON.parse(profil?.favori_sunucular||'[]');}catch(e){}
  ayarFavleriBaşlat(fav);
  // Ayar kategorisini başlat
  if(profil?.kategori){ayarKat=profil.kategori;ayarAltKat=profil.alt_kategori;}
});
