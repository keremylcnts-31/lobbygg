<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="https://i.imgur.com/6l08Y4k.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil - LOBBY.GG</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d1117;color:#c9d1d9;font-family:'Montserrat',sans-serif;min-height:100vh;}

/* NAV */
.nav{background:#050505;border-bottom:2px solid #111;padding:0 5%;display:flex;justify-content:space-between;align-items:center;height:56px;position:sticky;top:0;z-index:200;}
.mc-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:#3a3a3a;color:#ccc!important;padding:9px 16px;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:900;text-transform:uppercase;cursor:pointer;border-top:2px solid #555;border-left:2px solid #555;border-right:2px solid #111;border-bottom:3px solid #111;text-decoration:none;transition:.1s;}
.mc-btn:hover{filter:brightness(1.15);}
.mc-btn-green{background:#3a7d1e;color:#fff!important;border-top-color:#5cb832;border-left-color:#4a9e25;border-right-color:#1e4a09;border-bottom-color:#1e4a09;}
.mc-btn-blue{background:#1e4a7d;color:#aaccff!important;border-top-color:#3270b8;border-left-color:#25599e;border-right-color:#091e3a;border-bottom-color:#091e3a;}
.mc-btn-red{background:#7d1e1e;color:#ffaaaa!important;border-top-color:#b83232;border-left-color:#9e2525;border-right-color:#3a0909;border-bottom-color:#3a0909;}

/* ── KAPAK: 851x315 oranı ── */
.cover-wrap{
  width:100%;
  position:relative;
  background:#161b22;
  overflow:hidden;
  aspect-ratio:851/315;
  max-height:315px;
}
.cover-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(13,17,23,.8) 100%);pointer-events:none;z-index:1;}
.cover-img{width:100%;height:100%;object-fit:cover;display:block;}
.cover-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0d1117 0%,#1c2128 100%);}

/* ── PROFİL HEADER ── */
.fb-wrap{max-width:940px;margin:0 auto;padding:0 16px;}
.profil-header{background:#161b22;border:1px solid #30363d;border-top:none;border-radius:0 0 8px 8px;}

/* PP + İSİM SATIRI */
.profil-av-row{
  display:flex;align-items:flex-end;gap:16px;
  padding:0 24px 14px;
  margin-top:-36px;
  position:relative;z-index:10;
}
.pp-wrap{position:relative;cursor:pointer;flex-shrink:0;}
.pp-frame{
  width:96px;height:96px;
  border-radius:50%;
  border:4px solid #161b22;
  overflow:hidden;background:#0d1117;
}
.pp-frame img{width:100%;height:100%;object-fit:cover;display:block;}
/* Çerçeveler */
.frame-default .pp-frame{box-shadow:0 0 0 3px #30363d;}
.frame-neon-green .pp-frame{box-shadow:0 0 0 3px #39ff14,0 0 12px #39ff14;}
.frame-neon-blue .pp-frame{box-shadow:0 0 0 3px #00d4ff,0 0 12px #00d4ff;}
.frame-neon-purple .pp-frame{box-shadow:0 0 0 3px #b933ff,0 0 12px #b933ff;}
.frame-neon-red .pp-frame{box-shadow:0 0 0 3px #ff1a3c,0 0 12px #ff1a3c;}
.frame-neon-pink .pp-frame{box-shadow:0 0 0 3px #ff1493,0 0 12px #ff1493;}

.profil-info{flex:1;padding-bottom:4px;}
.profil-nick-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
.profil-nick{font-size:20px;font-weight:900;color:#f0f6fc;}

/* ── DOĞRULAMA ROZETİ: yuvarlak tırtıklı ── */
.verified-badge svg{width:20px;height:20px;vertical-align:middle;}

.profil-badge{font-size:9px;font-weight:900;text-transform:uppercase;padding:2px 8px;border-radius:3px;}
.badge-uye{background:#21262d;color:#8b949e;border:1px solid #30363d;}
.badge-abone{background:#0d1f00;color:#39ff14;border:1px solid #2a5000;}
.badge-premium,.badge-pro{background:#251a00;color:#FFD700;border:1px solid #4a3500;}
.badge-ultravip{background:#1a0d2a;color:#b933ff;border:1px solid #4a1e7d;}
.badge-yonetici,.badge-admin{background:#1a0d2a;color:#b933ff;border:1px solid #4a1e7d;}
.klan-badge{font-size:10px;font-weight:900;padding:2px 10px;border-radius:3px;border:1px solid;}

.profil-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:10px;color:#8b949e;margin-bottom:6px;}
.profil-meta span{display:flex;align-items:center;gap:4px;}
.profil-bio{font-size:12px;color:#8b949e;line-height:1.7;margin-bottom:8px;}
.profil-actions{display:flex;gap:8px;flex-wrap:wrap;}

/* STATS */
.stats-row{display:flex;border-top:1px solid #21262d;}
.stat-item{flex:1;padding:10px;text-align:center;cursor:pointer;transition:.15s;border-right:1px solid #21262d;}
.stat-item:last-child{border-right:none;}
.stat-item:hover{background:#21262d;}
.stat-val{font-size:16px;font-weight:900;color:#39ff14;}
.stat-lbl{font-size:8px;color:#8b949e;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

/* SEKMELER */
.sekmeler{display:flex;border-top:1px solid #21262d;overflow-x:auto;}
.sekmeler::-webkit-scrollbar{display:none;}
.sekme{padding:12px 16px;font-size:10px;font-weight:900;color:#8b949e;cursor:pointer;border-bottom:3px solid transparent;text-transform:uppercase;white-space:nowrap;}
.sekme.active{color:#39ff14;border-bottom-color:#39ff14;}

/* BODY LAYOUT */
.profil-body{max-width:940px;margin:14px auto;padding:0 16px;display:grid;grid-template-columns:1fr 300px;gap:14px;align-items:start;}
.sekme-icerik{display:none;}
.sekme-icerik.active{display:block;}

/* KUTU */
.box{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:14px;margin-bottom:12px;}
.box-title{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#8b949e;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.box-title::before{content:'';display:block;width:3px;height:12px;background:#39ff14;border-radius:2px;flex-shrink:0;}
.ibox{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:10px;margin-bottom:8px;}

/* DROP */
.drop-kart{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:14px;margin-bottom:10px;transition:.15s;}
.drop-kart:hover{border-color:#30363d;}
.drop-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.drop-av{width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid #30363d;flex-shrink:0;}
.drop-av img{width:100%;height:100%;object-fit:cover;}
.drop-nick{font-size:12px;font-weight:900;color:#f0f6fc;}
.drop-zaman{font-size:9px;color:#8b949e;margin-top:1px;}
.drop-icerik{font-size:13px;color:#c9d1d9;line-height:1.8;margin-bottom:10px;word-break:break-word;}
.drop-gorsel{width:100%;border-radius:6px;max-height:400px;object-fit:cover;margin-bottom:10px;cursor:pointer;}
.drop-aksiyon{display:flex;gap:14px;border-top:1px solid #21262d;padding-top:10px;}
.drop-btn{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:800;color:#8b949e;cursor:pointer;background:none;border:none;font-family:'Montserrat',sans-serif;text-transform:uppercase;padding:4px 8px;border-radius:4px;transition:.15s;}
.drop-btn:hover{color:#f0f6fc;background:#21262d;}
.drop-btn.begendi{color:#ff1493;}
.drop-yaz{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:14px;margin-bottom:12px;}
.drop-textarea{width:100%;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:10px;border-radius:6px;font-family:'Montserrat',sans-serif;font-size:13px;outline:none;resize:none;min-height:70px;margin-bottom:10px;transition:.15s;}
.drop-textarea:focus{border-color:#39ff14;}
.drop-textarea::placeholder{color:#484f58;}

/* İLAN */
.ilan-kart{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:12px;margin-bottom:8px;cursor:pointer;transition:.15s;}
.ilan-kart:hover{border-color:#30363d;}
.ilan-tag{font-size:9px;font-weight:900;text-transform:uppercase;padding:2px 7px;border-radius:3px;margin-bottom:6px;display:inline-block;}
.tag-is{background:#0d1f00;color:#39ff14;}
.tag-yetkili{background:#0d141f;color:#6bb3ff;}
.tag-medya{background:#1f0d1f;color:#d966ff;}
.tag-reklam{background:#1f1400;color:#FFD700;}

/* TAKİPÇİ */
.takipci-kart{display:flex;align-items:center;gap:10px;padding:10px;cursor:pointer;border-radius:6px;transition:.15s;}
.takipci-kart:hover{background:#21262d;}
.tkav{width:38px;height:38px;border-radius:50%;overflow:hidden;border:2px solid #30363d;flex-shrink:0;}
.tkav img{width:100%;height:100%;object-fit:cover;}

/* SUNUCU KARTI */
.sunucu-kart{display:flex;align-items:center;gap:10px;background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:8px 10px;margin-bottom:6px;}
.sunucu-kart img,.sunucu-kart-ico{width:30px;height:30px;border-radius:5px;object-fit:cover;image-rendering:pixelated;flex-shrink:0;}
.sunucu-kart-ico{background:#21262d;display:flex;align-items:center;justify-content:center;font-size:14px;}

/* DM & ZOOM MODAL */
.pp-zoom-modal{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:999;cursor:pointer;}
.pp-zoom-modal.active{display:flex;}
.pp-zoom-modal img{max-width:88vw;max-height:88vh;border-radius:50%;object-fit:cover;border:4px solid #FFD700;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:500;padding:20px;}
.modal-bg.active{display:flex;}
.modal{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:22px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:12px;font-weight:900;color:#f0f6fc;text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer;}
.dm-textarea{width:100%;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:10px;border-radius:6px;font-family:'Montserrat',sans-serif;font-size:12px;outline:none;resize:vertical;min-height:70px;margin-bottom:10px;}

/* YORUM */
.yorum-wrap{margin-top:10px;border-top:1px solid #21262d;padding-top:10px;display:none;}
.yorum-input{flex:1;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:7px 10px;border-radius:6px;font-family:'Montserrat',sans-serif;font-size:11px;outline:none;}

/* LOADING */
#loading{position:fixed;inset:0;background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;}
.ld-bar{width:160px;height:3px;background:#21262d;border-radius:2px;overflow:hidden;}
.ld-fill{height:100%;background:#39ff14;animation:ld 1.5s ease infinite;}
@keyframes ld{0%{width:0%}50%{width:70%}100%{width:100%}}

@media(max-width:768px){.profil-body{grid-template-columns:1fr;}.pp-frame{width:72px;height:72px;}.profil-nick{font-size:16px;}.profil-av-row{margin-top:-32px;}}
</style>
</head>
<body>
<div id="loading"><img src="https://i.imgur.com/6l08Y4k.png" style="height:48px;"><div class="ld-bar"><div class="ld-fill"></div></div></div>

    <div class="modal-title"><span id="dm-baslik">Mesajlar</span><button class="modal-close" onclick="document.getElementById('dm-modal').classList.remove('active')">✕</button></div>
    <div id="dm-body"></div>
  </div>
</div>

  </div>
</nav>

<div id="profil-wrap">
  <div style="text-align:center;padding:60px;color:#8b949e;">Yükleniyor...</div>
</div>

<script>
const SB=window.supabase.createClient('https://hmkeedyqmzblnmkhdste.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhta2VlZHlxbXpibG5ta2hkc3RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODE3MzYsImV4cCI6MjA5NDM1NzczNn0.5HUInmQs_LsXYovJgI7Ir9q8M9aPlQW6jM5C43aYmqA');
let benKim=null,profilKul=null,takipEdiyorMu=false;

const BADGEMAP={uye:'badge-uye',abone:'badge-abone',klasik:'badge-abone',premium:'badge-premium',ultravip:'badge-ultravip',yonetici:'badge-yonetici',admin:'badge-admin'};
const BADGEAD={uye:'ÜYE',abone:'ABONE',klasik:'KLASİK',premium:'PREMİUM',ultravip:'UltraVIP',yonetici:'YÖNETİCİ',admin:'ADMİN'};

const SUNUCU_IPS={
  'HanedanMC':'play.hanedanmc.com','ChickenNW':'oyna.chickennw.com',
  'BLOKYA':'oyna.blokya.com','DugeCraft':'play.dugecraft.com.tr',
  'ZENITMC':'play.zenitmc.com','SENTORCRAFT':'sentorcraft.com',
  'SOULCRAFT':'soulcraft.tc','AtlasOyuncu':'play.atlasoyuncu.com',
  'AtlantikMC':'atlantikmc.com','NAVELYA':'navelya.net',
  'CRAFTLUNA':'play.craftluna.net','Melonya':'melonya.net',
  'Rush Craft':'play.rushcraft.com.tr','RebornCraft':'play.reborncraft.pw',
  'LuneCraft':'mc.lunecraft.net','SimitSMP':'simitsmp.net',
  'MC4FUN':'play.mc4fun.net','İmibiyum':'play.imibiyum.com',
};

// Yuvarlak tırtıklı doğrulama rozeti
function verifiedSVG(){
  // Yuvarlak tırtıklı sarı rozet - 16 diş
  return`<svg viewBox="0 0 100 100" width="22" height="22" title="Doğrulanmış Hesap">
    <path d="M50 5
      L55 14 L64 9 L65 19 L75 18 L72 28 L82 31 L75 40
      L83 47 L74 53 L79 63 L69 65 L70 76 L60 74
      L57 85 L48 80 L43 91 L36 84 L25 88 L24 77
      L14 73 L17 62 L7 56 L13 47 L5 40 L14 35
      L11 24 L22 24 L25 14 L34 17 L38 7 L47 13 Z"
      fill="#FFD700" stroke="#B8860B" stroke-width="1.5" stroke-linejoin="round"/>
    <polyline points="33,50 44,61 67,38"
      stroke="#000" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <polyline points="33,50 44,61 67,38"
      stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>`;
}

function sunucuLogoHTML(isim, sz=28){
  const ip=SUNUCU_IPS[isim];
  if(!ip)return`<div class="sunucu-kart-ico" style="width:${sz}px;height:${sz}px;">🖥️</div>`;
  return`<img src="https://api.mcsrvstat.us/icon/${ip}" style="width:${sz}px;height:${sz}px;border-radius:5px;object-fit:cover;image-rendering:pixelated;flex-shrink:0;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="sunucu-kart-ico" style="display:none;width:${sz}px;height:${sz}px;">🖥️</div>`;
}

setTimeout(()=>document.getElementById('loading').style.display='none',5000);

async function init(){
  try{
    const{data:{session}}=await Promise.race([SB.auth.getSession(),new Promise(r=>setTimeout(()=>r({data:{session:null}}),3000))]);
    if(session){const{data}=await SB.from('kullanicilar').select('*').eq('email',session.user.email);if(data?.length>0)benKim=data[0];}
  }catch(e){}

  const p=new URLSearchParams(location.search);
  const id=p.get('id'),nick=p.get('nick');
  try{
    if(id){const{data}=await SB.from('kullanicilar').select('*').eq('id',parseInt(id));if(data?.length>0)profilKul=data[0];}
    else if(nick){const{data}=await SB.from('kullanicilar').select('*').ilike('kullanici_adi',nick);if(data?.length>0)profilKul=data[0];}
    else if(benKim)profilKul=benKim;
  }catch(e){}

  if(!profilKul){
    document.getElementById('profil-wrap').innerHTML=`<div style="text-align:center;padding:80px;"><i class="fa-solid fa-user-slash" style="font-size:48px;color:#30363d;display:block;margin-bottom:16px;"></i><div style="color:#30363d;font-size:14px;font-weight:900;text-transform:uppercase;">Kullanıcı Bulunamadı</div><a href="/lobbygg/index.html" class="mc-btn mc-btn-green" style="margin-top:16px;"><i class="fa-solid fa-house"></i> Ana Sayfa</a></div>`;
    document.getElementById('loading').style.display='none';
    return;
  }

  if(benKim&&benKim.id!==profilKul.id){
    const{data:t}=await SB.from('takipler').select('id').eq('takip_eden_id',benKim.id).eq('takip_edilen_id',profilKul.id);
    takipEdiyorMu=!!(t?.length>0);
  }

  const results = await Promise.allSettled([
    SB.from('ilanlar').select('*').eq('kullanici_id',profilKul.id).eq('durum','aktif'),
    SB.from('droplar').select('*').eq('kullanici_id',profilKul.id).order('created_at',{ascending:false}).limit(30),
    profilKul.klan_tag ? SB.from('klanlar').select('*').eq('tag',profilKul.klan_tag) : Promise.resolve({data:[]}),
  ]);
  const ilanlar = results[0].value?.data || [];
  const droplar = results[1].value?.data || [];
  const klanData = results[2].value?.data || [];
  const klan = klanData.length ? klanData[0] : null;
  render(ilanlar,droplar,klan);
  document.getElementById('loading').style.display='none';
  takipcileriYukle();
  takipEttikleriniYukle();
}

function render(ilanlar,droplar,klan){
  const benimProfil=benKim?.id===profilKul.id;
  const nick=profilKul.kullanici_adi||'Oyuncu';
  const av=profilKul.avatar_url||`https://minotar.net/helm/${nick}/96.png`;
  const cerceve=profilKul.aktif_cerceve||'default';
  const abBadge=BADGEMAP[profilKul.abonelik]||'badge-uye';
  const abAd=BADGEAD[profilKul.abonelik]||'ÜYE';
  const katilim=profilKul.kayit_tarihi?new Date(profilKul.kayit_tarihi).toLocaleDateString('tr-TR',{month:'long',year:'numeric'}):'';
  document.title=nick+' - LOBBY.GG';

  // Favori sunucular
  let favSunucular=[];
  try{favSunucular=JSON.parse(profilKul.favori_sunucular||'[]');}catch(e){}

  // Aksiyonlar
  let aksiyonlar='';
  if(benimProfil){
    aksiyonlar=`<a href="/lobbygg/panel.html" class="mc-btn mc-btn-green"><i class="fa-solid fa-pen"></i> Profili Düzenle</a>
    <a href="/lobbygg/lobbyx.html" class="mc-btn" style="background:#1a0d2a;color:#b933ff;border-top-color:#4a1e7d;"><i class="fa-solid fa-fire-flame-curved"></i> LobbyX</a>`;
  }else if(benKim){
    aksiyonlar=`<button class="mc-btn ${takipEdiyorMu?'mc-btn-red':'mc-btn-green'}" id="takip-btn" onclick="takipToggle()">
      <i class="fa-solid fa-user-${takipEdiyorMu?'minus':'plus'}"></i> ${takipEdiyorMu?'Takibi Bırak':'Takip Et'}
    </button>
    <button class="mc-btn mc-btn-blue" onclick="dmAc()"><i class="fa-solid fa-envelope"></i> Mesaj</button>
    ${profilKul.discord?`<button class="mc-btn" onclick="navigator.clipboard.writeText('${profilKul.discord}');this.innerHTML='✓ Kopyalandı!'" style="background:#5865F2;color:#fff;border-top-color:#7289da;border-bottom-color:#2c2e5a;"><i class="fa-brands fa-discord"></i> Discord</button>`:''}`;
  }else{
    aksiyonlar=`<a href="/lobbygg/giris.html" class="mc-btn"><i class="fa-solid fa-right-to-bracket"></i> Giriş Yap</a>`;
  }

  document.getElementById('profil-wrap').innerHTML=`
    <!-- KAPAK -->
    <div class="cover-wrap">
      ${profilKul.banner_url
        ?`<img src="${profilKul.banner_url}" class="cover-img" alt="">`
        :`<div class="cover-bg"></div>`}
    </div>

    <!-- HEADER -->
    <div class="fb-wrap">
      <div class="profil-header">
        <div class="profil-av-row">
          <div class="pp-wrap frame-${cerceve}" onclick="ppZoom('${av}')">
            <div class="pp-frame">
              <img src="${av}" alt="${nick}" onerror="this.src='https://minotar.net/helm/Steve/96.png'">
            </div>

function renderDroplar(droplar, av, nick){
  const el=document.getElementById('droplar-liste');
  if(!el)return;
  if(!droplar||!droplar.length){
    el.innerHTML=`<div style="text-align:center;padding:40px;color:#8b949e;"><div style="font-size:28px;margin-bottom:10px;">💬</div>Henüz drop yok</div>`;
    return;
  }
  el.innerHTML=droplar.map(d=>`
    <div class="drop-kart" id="drop-${d.id}">
      <div class="drop-head">
        <div class="drop-av"><img src="${profilKul.avatar_url||`https://minotar.net/helm/${profilKul.kullanici_adi||'Steve'}/36.png`}" onerror="this.src='https://minotar.net/helm/Steve/36.png'"></div>
        <div><div class="drop-nick">${profilKul.kullanici_adi||'?'}</div><div class="drop-zaman">${zaman(d.created_at)}</div></div>
      </div>
      ${d.icerik?`<div class="drop-icerik">${esc(d.icerik)}</div>`:''}
      ${d.gorsel_url?`<img src="${d.gorsel_url}" class="drop-gorsel" onclick="ppZoom('${d.gorsel_url}')">`:''}
      <div class="drop-aksiyon">
        <button class="drop-btn" id="beg-${d.id}" onclick="dropBegen(${d.id})"><i class="fa-regular fa-heart"></i>&nbsp;<span id="beg-s-${d.id}">${d.begeni_sayisi||0}</span></button>
        <button class="drop-btn" onclick="yorumToggle(${d.id})"><i class="fa-regular fa-comment"></i>&nbsp;${d.yorum_sayisi||0}</button>
        ${benKim?.id===profilKul.id?`<button class="drop-btn" onclick="dropSil(${d.id})" style="margin-left:auto;color:#f85149;"><i class="fa-solid fa-trash"></i></button>`:''}
      </div>
      <div class="yorum-wrap" id="yw-${d.id}"></div>
    </div>`).join('');
}

async function takipcileriYukle(){
  const el=document.getElementById('takipciler-liste');if(!el)return;
  try{
    const{data:t}=await SB.from('takipler').select('takip_eden_id').eq('takip_edilen_id',profilKul.id).limit(30);
    if(!t?.length){el.innerHTML='<div style="text-align:center;padding:24px;color:#8b949e;font-size:11px;">Takipçi yok</div>';return;}
    const{data:kullar}=await SB.from('kullanicilar').select('id,kullanici_adi,avatar_url,abonelik').in('id',t.map(x=>x.takip_eden_id));
    el.innerHTML=(kullar||[]).map(k=>kulKartHTML(k)).join('');
  }catch(e){el.innerHTML='<div style="text-align:center;padding:24px;color:#8b949e;font-size:11px;">Yüklenemedi</div>';}
}

async function takipEttikleriniYukle(){

  try{
    const{data:t}=await SB.from('takipler').select('takip_edilen_id').eq('takip_eden_id',profilKul.id).limit(30);
    if(!t?.length){el.innerHTML='<div style="text-align:center;padding:24px;color:#8b949e;font-size:11px;">Kimseyi takip etmiyor</div>';return;}

}

function kulKartHTML(k){
  return`<div class="takipci-kart" onclick="location.href='/lobbygg/profil.html?id=${k.id}'">
    <div class="tkav"><img src="${k.avatar_url||`https://minotar.net/helm/${k.kullanici_adi||'Steve'}/38.png`}" onerror="this.src='https://minotar.net/helm/Steve/38.png'"></div>
    <div style="flex:1;"><div style="font-size:12px;font-weight:900;color:#f0f6fc;">${k.kullanici_adi||'?'}</div><div style="font-size:9px;color:#8b949e;text-transform:uppercase;">${BADGEAD[k.abonelik]||'ÜYE'}</div></div>
    <i class="fa-solid fa-chevron-right" style="font-size:10px;color:#30363d;"></i>
  </div>`;
}

async function takipToggle(){
  if(!benKim)return;
  const btn=document.getElementById('takip-btn');
  if(takipEdiyorMu){
    await SB.from('takipler').delete().eq('takip_eden_id',benKim.id).eq('takip_edilen_id',profilKul.id);
    const yeni=Math.max(0,(profilKul.takipci_sayisi||1)-1);
    await SB.from('kullanicilar').update({takipci_sayisi:yeni}).eq('id',profilKul.id);
    await SB.from('kullanicilar').update({takip_sayisi:Math.max(0,(benKim.takip_sayisi||1)-1)}).eq('id',benKim.id);
    profilKul.takipci_sayisi=yeni;takipEdiyorMu=false;
  }else{
    const{data:v}=await SB.from('takipler').select('id').eq('takip_eden_id',benKim.id).eq('takip_edilen_id',profilKul.id);
    if(!v?.length){
      await SB.from('takipler').insert({takip_eden_id:benKim.id,takip_edilen_id:profilKul.id});
      const yeni=(profilKul.takipci_sayisi||0)+1;
      await SB.from('kullanicilar').update({takipci_sayisi:yeni}).eq('id',profilKul.id);
      await SB.from('kullanicilar').update({takip_sayisi:(benKim.takip_sayisi||0)+1}).eq('id',benKim.id);
      profilKul.takipci_sayisi=yeni;
    }
    takipEdiyorMu=true;
  }
  if(btn){
    btn.className='mc-btn '+(takipEdiyorMu?'mc-btn-red':'mc-btn-green');
    btn.innerHTML=`<i class="fa-solid fa-user-${takipEdiyorMu?'minus':'plus'}"></i> ${takipEdiyorMu?'Takibi Bırak':'Takip Et'}`;
  }
  document.querySelectorAll('.stat-val')[2].textContent=profilKul.takipci_sayisi;
}

function ppZoom(src){document.getElementById('pp-zoom-img').src=src;document.getElementById('pp-zoom').classList.add('active');}

let dropGorselBase64=null;
function dropGorselSec(inp){
  const f=inp.files[0];if(!f||f.size>2097152){alert('Maks 2MB!');return;}
  const r=new FileReader();r.onload=e=>{dropGorselBase64=e.target.result;document.getElementById('drop-gorsel-img').src=e.target.result;document.getElementById('drop-gorsel-oniz').style.display='block';};r.readAsDataURL(f);
}
function dropGorselTemizle(){dropGorselBase64=null;document.getElementById('drop-gorsel-oniz').style.display='none';}

async function dropPaylas(){
  if(!benKim)return;
  const icerik=document.getElementById('drop-yazi')?.value?.trim()||'';
  if(!icerik&&!dropGorselBase64){alert('Bir şeyler yaz!');return;}
  await SB.from('droplar').insert({kullanici_id:benKim.id,icerik,gorsel_url:dropGorselBase64||null,begeni_sayisi:0,yorum_sayisi:0});
  document.getElementById('drop-yazi').value='';dropGorselTemizle();location.reload();
}

async function dropBegen(id){
  if(!benKim){location.href='/lobbygg/giris.html';return;}
  const{data:m}=await SB.from('drop_begeniler').select('id').eq('drop_id',id).eq('kullanici_id',benKim.id);
  const sEl=document.getElementById('beg-s-'+id);
  const btn=document.getElementById('beg-'+id);
  const s=parseInt(sEl?.textContent)||0;
  if(m?.length){
    await SB.from('drop_begeniler').delete().eq('drop_id',id).eq('kullanici_id',benKim.id);
    await SB.from('droplar').update({begeni_sayisi:Math.max(0,s-1)}).eq('id',id);
    if(sEl)sEl.textContent=Math.max(0,s-1);
    if(btn){btn.className='drop-btn';btn.innerHTML=`<i class="fa-regular fa-heart"></i>&nbsp;${Math.max(0,s-1)}`;}
  }else{
    await SB.from('drop_begeniler').insert({drop_id:id,kullanici_id:benKim.id});
    await SB.from('droplar').update({begeni_sayisi:s+1}).eq('id',id);
    if(sEl)sEl.textContent=s+1;
    if(btn){btn.className='drop-btn begendi';btn.innerHTML=`<i class="fa-solid fa-heart"></i>&nbsp;${s+1}`;}
  }
}

async function yorumToggle(id){
  const w=document.getElementById('yw-'+id);
  if(w.style.display==='block'){w.style.display='none';return;}
  w.style.display='block';
  if(w.dataset.loaded)return;
  w.dataset.loaded='1';
  const{data:yorumlar}=await SB.from('drop_yorumlar').select('*').eq('drop_id',id).order('created_at',{ascending:true}).limit(20);
  const ids=(yorumlar||[]).map(y=>y.kullanici_id);
  let km={};
  if(ids.length){const{data:kl}=await SB.from('kullanicilar').select('id,kullanici_adi,avatar_url').in('id',ids);(kl||[]).forEach(k=>km[k.id]=k);}
  w.innerHTML=`<div id="yl-${id}">${(yorumlar||[]).length
    ?(yorumlar||[]).map(y=>{const k=km[y.kullanici_id]||{};return`<div style="display:flex;gap:8px;margin-bottom:8px;cursor:pointer;" onclick="location.href='/lobbygg/profil.html?id=${k.id||''}'">
      <img src="${k.avatar_url||`https://minotar.net/helm/${k.kullanici_adi||'Steve'}/28.png`}" style="width:28px;height:28px;border-radius:50%;flex-shrink:0;" onerror="this.src='https://minotar.net/helm/Steve/28.png'">
      <div style="background:#0d1117;border:1px solid #21262d;padding:7px 10px;border-radius:6px;flex:1;">
        <div style="font-size:10px;font-weight:900;color:#f0f6fc;margin-bottom:2px;">${k.kullanici_adi||'?'}</div>
        <div style="font-size:11px;color:#8b949e;">${esc(y.yorum)}</div>
      </div>
    </div>`;}).join('')
    :'<div style="font-size:10px;color:#8b949e;text-align:center;padding:8px;">Yorum yok</div>'}
  </div>
  ${benKim?.dogrulama_rozeti?`<div style="display:flex;gap:6px;margin-top:8px;">
    <input type="text" class="yorum-input" id="yi-${id}" placeholder="Yorumunu yaz..." onkeydown="if(event.key==='Enter')yorumGonder(${id})">
    <button class="mc-btn mc-btn-green" onclick="yorumGonder(${id})" style="padding:7px 12px;font-size:9px;white-space:nowrap;"><i class="fa-solid fa-paper-plane"></i></button>
  </div>`:'<div style="font-size:9px;color:#8b949e;padding:6px;text-align:center;">Yorum için Gmail doğrulaması gerekli.</div>'}`;
}

async function yorumGonder(id){
  if(!benKim?.dogrulama_rozeti)return;
  const inp=document.getElementById('yi-'+id);
  const y=inp?.value?.trim();if(!y)return;
  await SB.from('drop_yorumlar').insert({drop_id:id,kullanici_id:benKim.id,yorum:y});
  const{data:d}=await SB.from('droplar').select('yorum_sayisi').eq('id',id).single();
  await SB.from('droplar').update({yorum_sayisi:(d?.yorum_sayisi||0)+1}).eq('id',id);
  inp.value='';
  const w=document.getElementById('yw-'+id);delete w.dataset.loaded;w.style.display='none';yorumToggle(id);
}

async function dropSil(id){
  if(!confirm('Bu dropu silmek istediğine emin misin?'))return;
  await SB.from('droplar').delete().eq('id',id);
  document.getElementById('drop-'+id)?.remove();
}

function dmAc(){
  if(!benKim){location.href='/lobbygg/giris.html';return;}
  if(!benKim.dogrulama_rozeti){alert('Mesaj göndermek için Gmail doğrulaması gerekli!');return;}
  document.getElementById('dm-baslik').textContent=profilKul.kullanici_adi+' ile Mesajlaşma';
  document.getElementById('dm-body').innerHTML=`
    <div id="dm-mesajlar" style="max-height:280px;overflow-y:auto;margin-bottom:12px;"></div>
    <textarea class="dm-textarea" id="dm-yaz" placeholder="Mesajını yaz..."></textarea>
    <div style="display:flex;gap:8px;">
      <button class="mc-btn mc-btn-green" onclick="dmGonder()" style="flex:1;justify-content:center;"><i class="fa-solid fa-paper-plane"></i> Gönder</button>
      <button class="mc-btn" onclick="document.getElementById('dm-modal').classList.remove('active')">İptal</button>
    </div>`;
  dmMesajlariYukle();
  document.getElementById('dm-modal').classList.add('active');
}

async function dmMesajlariYukle(){
  const el=document.getElementById('dm-mesajlar');if(!el)return;
  const{data}=await SB.from('mesajlar').select('*')
    .or(`and(gonderen_id.eq.${benKim.id},alici_id.eq.${profilKul.id}),and(gonderen_id.eq.${profilKul.id},alici_id.eq.${benKim.id})`)
    .order('created_at',{ascending:true}).limit(50);
  if(!data?.length){el.innerHTML='<div style="text-align:center;color:#8b949e;font-size:11px;padding:16px;">Henüz mesaj yok</div>';return;}
  el.innerHTML=data.map(m=>{
    const ben=m.gonderen_id===benKim.id;
    return`<div style="display:flex;justify-content:${ben?'flex-end':'flex-start'};margin-bottom:8px;">
      <div style="max-width:70%;background:${ben?'#1a4a2e':'#1c2128'};border:1px solid ${ben?'#2a7042':'#30363d'};padding:8px 12px;border-radius:${ben?'12px 12px 2px 12px':'12px 12px 12px 2px'};">
        <div style="font-size:12px;color:#c9d1d9;">${esc(m.mesaj)}</div>
        <div style="font-size:8px;color:#8b949e;margin-top:3px;">${zaman(m.created_at)}</div>
      </div>
    </div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}

async function dmGonder(){
  const m=document.getElementById('dm-yaz')?.value?.trim();if(!m)return;
  await SB.from('mesajlar').insert({gonderen_id:benKim.id,alici_id:profilKul.id,mesaj:m});
  document.getElementById('dm-yaz').value='';dmMesajlariYukle();
}

function sekmeAc(id,el){
  document.querySelectorAll('.sekme').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.sekme-icerik').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('sekme-'+id)?.classList.add('active');
  if(id==='takipciler')takipcileriYukle();
  if(id==='takip')takipEttikleriniYukle();
}

function zaman(ts){if(!ts)return'';const d=Date.now()-new Date(ts).getTime();if(d<60000)return'Az önce';if(d<3600000)return Math.floor(d/60000)+'dk';if(d<86400000)return Math.floor(d/3600000)+'sa';return Math.floor(d/86400000)+'g';}
function esc(t){return t?.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')||'';}

init();
</script>
