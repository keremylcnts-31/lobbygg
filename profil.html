<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil — LOBBY.GG</title>
  <link rel="stylesheet" href="style.css?v=3.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ===== PROFILE PAGE SPECIFIC ===== */
    .profile-outer {
      padding-top: var(--nav-h);
    }

    /* Banner */
    .banner-wrap {
      border-radius: var(--radius-lg);
      overflow: hidden;
      width: 100%;
      max-width: 960px;
      margin: 24px auto 0;
      height: 240px;
      max-height: 240px;
    }
    .banner-canvas-mini { width: 100%; height: 100%; display: block; object-fit: cover; }

    /* Profile Container */
    .profile-container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }

    /* Profile Header Card */
    .profile-header-card {
      background: var(--bg-card);
      border: 1px solid var(--border-thin);
      border-radius: var(--radius-lg);
      margin-top: -50px;
      position: relative;
      z-index: 10;
      padding: 20px 24px 20px;
    }

    .profile-header-inner {
      display: flex;
      align-items: flex-start;
      gap: 18px;
    }

    /* PP */
    .profile-pp-wrap {
      position: relative;
      flex-shrink: 0;
      cursor: pointer;
    }
    .profile-pp-wrap .pp-wrap {
      width: 96px;
      height: 96px;
    }
    .profile-pp-wrap .pp-img {
      width: 96px;
      height: 96px;
      border-width: 3px;
    }
    .profile-pp-zoom-hint {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s;
    }
    .profile-pp-wrap:hover .profile-pp-zoom-hint {
      opacity: 1;
      background: rgba(0,0,0,0.5);
    }
    .profile-pp-wrap .pp-img.shape-rounded ~ .profile-pp-zoom-hint {
      border-radius: 20%;
    }

    /* Info */
    .profile-info {
      flex: 1;
      min-width: 0;
    }
    .profile-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 5px;
    }
    .profile-nick {
      font-size: 22px;
      font-weight: 900;
      color: var(--text-1);
      line-height: 1.1;
    }
    .profile-verify-badge {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }
    .profile-badges-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .profile-klan-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: rgba(57,255,20,0.08);
      border: 1px solid rgba(57,255,20,0.2);
      color: var(--accent);
      cursor: pointer;
      transition: background 0.2s;
    }
    .profile-klan-tag:hover { background: rgba(57,255,20,0.15); }

    .profile-bio {
      font-size: 13px;
      color: var(--text-2);
      margin-bottom: 10px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .profile-stats-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .profile-stat {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-2);
      cursor: pointer;
    }
    .profile-stat strong {
      font-weight: 900;
      color: var(--text-1);
    }
    .profile-stat:hover strong { color: var(--accent); }
    .profile-stat-sep {
      color: var(--text-dim);
      font-size: 10px;
    }
    .profile-lcoin-stat {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--gold);
      font-weight: 800;
    }

    /* Action Buttons */
    .profile-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }
    .profile-actions-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .profile-follows-me {
      font-size: 11px;
      color: var(--accent);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .follow-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse-dot 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 4px var(--accent-glow); }
      50% { box-shadow: 0 0 10px rgba(57,255,20,0.5); }
    }

    /* More Dropdown */
    .more-btn {
      width: 34px; height: 34px;
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .more-btn:hover { color: var(--text-1); border-color: var(--border-hover); }

    /* Request Buttons */
    .req-btn-wrap {
      display: flex;
      gap: 6px;
    }

    /* Locked Msg Btn */
    .msg-locked-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      background: var(--border-thin);
      border: 1px solid var(--border);
      border-radius: 2px;
      font-size: 10px;
      font-weight: 900;
      color: var(--text-dim);
      cursor: not-allowed;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Tabs */
    .profile-tabs-wrap {
      margin-top: 16px;
    }

    /* Two Column Layout */
    .profile-body {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 16px;
      margin-top: 16px;
    }
    @media (max-width: 768px) {
      .profile-body { grid-template-columns: 1fr; }
      .profile-right { order: -1; }
    }

    /* Private Overlay */
    .private-overlay {
      background: var(--bg-card);
      border: 1px solid var(--border-thin);
      border-radius: var(--radius-lg);
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
    }
    .private-overlay-icon { font-size: 48px; opacity: 0.5; }
    .private-overlay-title {
      font-size: 16px;
      font-weight: 900;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .private-overlay-sub {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* Drop Composer */
    .drop-composer {
      background: var(--bg-card);
      border: 1px solid var(--border-thin);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 16px;
    }
    .drop-composer-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .drop-composer-pp {
      width: 40px; height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid var(--border);
    }
    .drop-composer-right { flex: 1; }
    .drop-textarea {
      width: 100%;
      background: var(--bg-card2);
      border: 1px solid var(--border-thin);
      border-radius: var(--radius);
      color: var(--text-1);
      font-family: var(--font);
      font-size: 13px;
      padding: 12px;
      resize: none;
      min-height: 80px;
      transition: border-color 0.2s;
    }
    .drop-textarea:focus { border-color: var(--accent); outline: none; }
    .drop-textarea::placeholder { color: var(--text-dim); }
    .drop-composer-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .drop-char-count {
      font-size: 11px;
      color: var(--text-dim);
    }
    .drop-char-count.warn { color: var(--gold); }
    .drop-char-count.danger { color: var(--red); }
    .drop-composer-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .drop-img-label {
      width: 32px; height: 32px;
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      cursor: pointer;
      color: var(--text-2);
      transition: all 0.2s;
    }
    .drop-img-label:hover { color: var(--text-1); border-color: var(--border-hover); }
    .drop-img-preview {
      position: relative;
      margin-top: 10px;
      display: none;
    }
    .drop-img-preview img {
      max-height: 160px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .drop-img-remove {
      position: absolute;
      top: 4px; right: 4px;
      width: 22px; height: 22px;
      background: rgba(0,0,0,0.7);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-1);
      border: 1px solid var(--border);
    }

    /* Drop Card */
    .drop-card {
      background: var(--bg-card);
      border: 1px solid var(--border-thin);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .drop-card:hover { border-color: var(--border); }
    .drop-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .drop-card-user {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .drop-card-pp {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .drop-card-nick {
      font-size: 13px;
      font-weight: 800;
      color: var(--text-1);
    }
    .drop-card-time {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .drop-card-content {
      font-size: 13px;
      color: var(--text-1);
      line-height: 1.6;
      margin-bottom: 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .drop-card-img {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: var(--radius);
      border: 1px solid var(--border-thin);
      margin-bottom: 10px;
      cursor: pointer;
    }
    .drop-card-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .drop-action-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }
    .drop-action-btn:hover { color: var(--text-1); background: var(--border-thin); }
    .drop-action-btn.liked { color: var(--red); }
    .drop-action-btn.liked:hover { color: #ff6b85; }
    .drop-menu-btn {
      margin-left: auto;
      width: 28px; height: 28px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
    }
    .drop-menu-btn:hover { color: var(--text-1); background: var(--border-thin); }

    /* Comment Panel */
    .comment-panel {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border-thin);
    }
    .comment-panel.open { display: block; }
    .comment-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 10px;
    }
    .comment-pp {
      width: 28px; height: 28px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .comment-bubble {
      background: var(--bg-card2);
      border: 1px solid var(--border-thin);
      border-radius: var(--radius);
      padding: 8px 12px;
      flex: 1;
    }
    .comment-nick { font-size: 11px; font-weight: 800; color: var(--text-1); margin-bottom: 2px; }
    .comment-text { font-size: 12px; color: var(--text-2); line-height: 1.5; }
    .comment-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .comment-input {
      flex: 1;
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-1);
      font-family: var(--font);
      font-size: 12px;
      padding: 8px 14px;
      transition: border-color 0.2s;
    }
    .comment-input:focus { border-color: var(--accent); outline: none; }
    .comment-input::placeholder { color: var(--text-dim); }
    .comment-send-btn {
      width: 32px; height: 32px;
      background: var(--accent-dim);
      border: none;
      border-radius: 50%;
      color: #050505;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .comment-send-btn:hover { background: var(--accent); }

    /* Listing card styles are loaded from global style.css */


    /* Follow List */
    .follow-list { display: flex; flex-direction: column; gap: 8px; }
    .follow-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-thin);
      border-radius: var(--radius);
      padding: 10px 14px;
      transition: border-color 0.2s;
    }
    .follow-item:hover { border-color: var(--border); }
    .follow-item-pp {
      width: 40px; height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .follow-item-info { flex: 1; min-width: 0; }
    .follow-item-nick {
      font-size: 13px;
      font-weight: 800;
      color: var(--text-1);
      truncate: true;
    }
    .follow-item-sub { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

    /* Customize Tab */
    .customize-section {
      background: var(--bg-card);
      border: 1px solid var(--border-thin);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 14px;
    }
    .customize-section-title {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-2);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .customize-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-thin);
    }

    .pp-shape-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pp-shape-opt {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .pp-shape-preview {
      width: 50px; height: 50px;
      background: var(--border);
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }
    .pp-shape-preview.circle { border-radius: 50%; }
    .pp-shape-preview.rounded { border-radius: 10px; }
    .pp-shape-opt.selected .pp-shape-preview { border-color: var(--accent); }
    .pp-shape-label { font-size: 10px; font-weight: 700; color: var(--text-2); }
    .pp-shape-opt.selected .pp-shape-label { color: var(--accent); }

    /* Frame Grid */
    .frame-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    @media (max-width: 600px) {
      .frame-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .frame-opt {
      background: var(--bg-card2);
      border: 1px solid var(--border-thin);
      border-radius: var(--radius);
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .frame-opt:hover { border-color: var(--border-hover); background: var(--border-thin); }
    .frame-opt.selected { border-color: var(--accent); background: rgba(57,255,20,0.05); }
    .frame-opt-pp {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 3px solid var(--border);
      object-fit: cover;
    }
    .frame-opt-label {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-2);
      text-align: center;
    }
    .frame-opt.selected .frame-opt-label { color: var(--accent); }
    .frame-lock-badge {
      position: absolute;
      top: 6px; right: 6px;
      font-size: 10px;
    }

    /* Banner color dots */
    .banner-color-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .banner-color-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
    }
    .banner-color-dot:hover { transform: scale(1.1); }
    .banner-color-dot.selected { border-color: white; transform: scale(1.1); }

    .banner-preview {
      width: 100%;
      height: 80px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-top: 10px;
    }

    /* Settings Tab */
    .settings-section {
      background: var(--bg-card);
      border: 1px solid var(--border-thin);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 14px;
    }
    .settings-section-title {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-2);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .settings-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-thin);
    }
    .radio-group { display: flex; flex-direction: column; gap: 10px; }
    .radio-opt {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 10px 14px;
      background: var(--bg-card2);
      border: 1px solid var(--border-thin);
      border-radius: var(--radius);
      transition: border-color 0.2s;
    }
    .radio-opt:hover { border-color: var(--border); }
    .radio-opt.selected { border-color: var(--accent); background: rgba(57,255,20,0.03); }
    .radio-circle {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s;
    }
    .radio-opt.selected .radio-circle { border-color: var(--accent); }
    .radio-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      display: none;
    }
    .radio-opt.selected .radio-dot { display: block; }
    .radio-text { font-size: 12px; font-weight: 600; color: var(--text-2); }
    .radio-opt.selected .radio-text { color: var(--text-1); }

    /* Takip İsteği Item */
    .req-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card2);
      border: 1px solid var(--border-thin);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 8px;
    }
    .req-item-pp {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
    }
    .req-item-info { flex: 1; min-width: 0; }
    .req-item-nick { font-size: 13px; font-weight: 800; color: var(--text-1); }
    .req-item-sub { font-size: 10px; color: var(--text-dim); }
    .req-item-actions { display: flex; gap: 6px; }

    /* Right Panel */
    .right-card {
      background: var(--bg-card);
      border: 1px solid var(--border-thin);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 12px;
    }
    .right-card-title {
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-dim);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .right-info-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--text-2);
    }
    .right-info-item span:first-child { flex-shrink: 0; }
    .right-info-item strong { color: var(--text-1); }

    .klan-card-inner {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      padding: 8px;
      border-radius: var(--radius);
      transition: background 0.2s;
    }
    .klan-card-inner:hover { background: var(--border-thin); }
    .klan-logo {
      width: 44px; height: 44px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      border: 1px solid var(--border);
    }

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str);
  return d.toLocaleDateString('tr-TR', {day:'2-digit', month:'long', year:'numeric'});
}

function timeAgo(str) {
  if (!str) return '';
  const diff = (Date.now() - new Date(str).getTime()) / 1000;
  if (diff < 60) return 'az önce';
  if (diff < 3600) return Math.floor(diff/60) + ' dk önce';
  if (diff < 86400) return Math.floor(diff/3600) + ' sa önce';
  return Math.floor(diff/86400) + ' gün önce';
}

function el(tag, opts={}) {

  if (opts.style) Object.assign(e.style, opts.style);
  if (opts.attrs) Object.entries(opts.attrs).forEach(([k,v]) => e.setAttribute(k,v));
  return e;
}

// ===== CANVAS BG =====
(function initCanvasBg() {
  const canvas = document.getElementById('canvas-bg');
  const ctx = canvas.getContext('2d');
  let W, H, beams=[], logos=[];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  for(let i=0;i<6;i++) beams.push({
    x: Math.random()*W, y: Math.random()*H,
    angle: Math.PI/4 + (Math.random()-0.5)*0.3,
    speed: 0.3+Math.random()*0.4,
    width: 60+Math.random()*80,
    alpha: 0.03+Math.random()*0.04
  });

  const logoTexts = ['LOBBY.GG'];
  for(let i=0;i<5;i++) logos.push({
    x: Math.random()*W, y: Math.random()*H,
    vx: (Math.random()-0.5)*0.2,
    vy: (Math.random()-0.5)*0.2,
    alpha: 0.02+Math.random()*0.03,
    size: 22+Math.random()*28,
    rot: Math.random()*Math.PI*2,
    rotSpeed: (Math.random()-0.5)*0.002
  });

  function draw() {
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#050505';
    ctx.fillRect(0,0,W,H);

    beams.forEach(b => {
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(b.angle);
      const grad = ctx.createLinearGradient(-b.width/2,0,b.width/2,0);
      grad.addColorStop(0,'transparent');
      grad.addColorStop(0.5,`rgba(57,255,20,${b.alpha})`);
      grad.addColorStop(1,'transparent');
      ctx.fillStyle=grad;
      ctx.fillRect(-b.width/2,-2000,b.width,4000);
      ctx.restore();
      b.x += Math.cos(b.angle)*b.speed;
      b.y += Math.sin(b.angle)*b.speed;
      if(b.x>W+200) b.x=-200;
      if(b.y>H+200) b.y=-200;
    });

    logos.forEach(l => {
      ctx.save();
      ctx.translate(l.x, l.y);
      ctx.rotate(l.rot);
      ctx.globalAlpha = l.alpha;
      ctx.font = `900 ${l.size}px Montserrat, sans-serif`;
      ctx.fillStyle = '#39ff14';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('LOBBY.GG', 0, 0);
      ctx.restore();
      l.x += l.vx; l.y += l.vy; l.rot += l.rotSpeed;
      if(l.x<-100) l.x=W+100;
      if(l.x>W+100) l.x=-100;
      if(l.y<-50) l.y=H+50;
      if(l.y>H+50) l.y=-50;
    });

    requestAnimationFrame(draw);
  }
  draw();
})();

function initBannerCanvas() {

  });

    if (!bc.offsetParent && !bc.closest('.banner-wrap')) return;
    ctx.clearRect(0,0,W2||bc.offsetWidth||940,H2||bc.offsetHeight||280);
    ctx.fillStyle='#050505';

    bms.forEach(b => {
      ctx.save();
      ctx.translate(b.x,b.y);
      ctx.rotate(b.angle);
      const g = ctx.createLinearGradient(-b.width/2,0,b.width/2,0);
      g.addColorStop(0,'transparent');
      g.addColorStop(0.5,`rgba(57,255,20,${b.alpha})`);
      g.addColorStop(1,'transparent');
      ctx.fillStyle=g;
      ctx.fillRect(-b.width/2,-H2,b.width,H2*2);
      ctx.restore();
      b.x+=Math.cos(b.angle)*b.speed;
      b.y+=Math.sin(b.angle)*b.speed;
      if(b.x>W2+200)b.x=-200;
      if(b.y>H2+200)b.y=-200;
    });

}

    document.getElementById('profileHeaderInner').innerHTML = '';
    const er = el('div', {className:'empty-state', style:{flexDirection:'column', padding:'40px 20px', textAlign:'center', display:'flex', alignItems:'center', justifyContent:'center'}});
    
    if (!currentUser && !paramId && !paramNick) {
      const ico = el('div', {className:'empty-state-icon', textContent:'🔒', style:{fontSize:'40px', marginBottom:'10px'}});
      const tit = el('div', {className:'empty-state-title', textContent:'Giriş Yapmalısınız', style:{fontSize:'18px', fontWeight:'900', color:'var(--text-1)', marginBottom:'8px'}});
      const sub = el('div', {style:{fontSize:'13px', color:'var(--text-2)', marginBottom:'20px', maxWidth:'300px'}}, 'Kendi profilinizi görmek ve özelleştirmek için lütfen giriş yapın veya kayıt olun.');
      const btn = el('button', {className:'btn mc-green', textContent:'Giriş Yap / Kayıt Ol'});
      btn.addEventListener('click', () => { window.location.href = 'giris.html'; });
      er.appendChild(ico); er.appendChild(tit); er.appendChild(sub); er.appendChild(btn);
    } else {
      const ico = el('div', {className:'empty-state-icon', textContent:'😕', style:{fontSize:'40px', marginBottom:'10px'}});
      const tit = el('div', {className:'empty-state-title', textContent:'Kullanıcı Bulunamadı', style:{fontSize:'18px', fontWeight:'900', color:'var(--text-1)', marginBottom:'8px'}});
      const sub = el('div', {style:{fontSize:'13px', color:'var(--text-2)', marginBottom:'20px', maxWidth:'300px'}}, 'Aradığınız oyuncu sistemde kayıtlı olmayabilir.');
      const btn = el('button', {className:'btn mc-gray', textContent:'Keşfet\'e Git'});
      btn.addEventListener('click', () => { window.location.href = 'kesfet.html'; });
      er.appendChild(ico); er.appendChild(tit); er.appendChild(sub); er.appendChild(btn);
    }
    
    document.getElementById('profileHeaderInner').appendChild(er);
    return;
  }

  profileUser = targetUser;
  if (profileUser) {
    if (typeof profileUser.favori_sunucular === 'string') {
      try {
        profileUser.favori_sunucular = JSON.parse(profileUser.favori_sunucular);
      } catch(e) {
        profileUser.favori_sunucular = [];
      }
    }
    if (!profileUser.favori_sunucular) {
      profileUser.favori_sunucular = [];
    }
  }
  isOwnProfile = currentUser && currentUser.id === profileUser.id;

  // Track visitor
  if (!isOwnProfile && currentUser) {
    sb.from('profil_ziyaretciler').insert({
      profil_id: profileUser.id,
      ziyaretci_id: currentUser.id,
      ziyaret_tarihi: new Date().toISOString()
    }).then(() => {});
  }

  // Check follow status
  if (!isOwnProfile && currentUser) {
    const { data: fw } = await sb.from('takipler')
      .select('id')
      .eq('takip_eden_id', currentUser.id)
      .eq('takip_edilen_id', profileUser.id)
      .single();

    const { data: pending } = await sb.from('takip_istekleri')
      .select('id, durum')
      .eq('gonderen_id', currentUser.id)
      .eq('alici_id', profileUser.id)
      .eq('durum', 'bekliyor')
      .single();

    const { data: theyFollowMe } = await sb.from('takipler')
      .select('id')
      .eq('takip_eden_id', profileUser.id)
      .eq('takip_edilen_id', currentUser.id)
      .single();

    const { data: theyRequested } = await sb.from('takip_istekleri')
      .select('id')
      .eq('gonderen_id', profileUser.id)
      .eq('alici_id', currentUser.id)
      .eq('durum', 'bekliyor')
      .single();

    if (fw) followStatus = 'following';
    else if (pending) followStatus = 'pending';
    else if (theyRequested) followStatus = 'received';
    else followStatus = null;

    isFollower = !!fw || (followStatus === 'following');

    // are they following me?
    if (theyFollowMe) isFollower = true; // they follow the viewer
    // correction: isFollower = viewer follows profile
    isFollower = !!fw;
  }

  renderBanner();
  renderProfileHeader();
  renderTabs();
  renderBody();
}

// ===== PROFILE HEADER =====

  // Badges row

  const abonelikLabel = {uye:'Üye',abone:'Abone',premium:'Premium',admin:'Admin',yonetici:'Yönetici',kurucu:'Kurucu',moderator:'Moderatör',rehber:'Rehber'};
  const ab = profileUser.abonelik || 'uye';

  if (profileUser.kategori) {

    if (['Sunucu Sahibi', 'Diğer'].includes(profileUser.kategori) && profileUser.alt_kategori) {
      catBadge.title = profileUser.alt_kategori;
    }
    badgesRow.appendChild(catBadge);
  }
  if (profileUser.alt_kategori && !['Sunucu Sahibi', 'Diğer'].includes(profileUser.kategori)) {
    const isContentCreator = profileUser.kategori === 'İçerik Üretici' || profileUser.kategori === 'İçerik';
    const altLower = profileUser.alt_kategori.toLowerCase();
    const isPlatform = ['youtube', 'kick', 'twitch', 'tiktok', 'instagram'].includes(altLower);
    
    let badgeClass = 'badge b-diger';
    if (isContentCreator && isPlatform) {
      badgeClass = `badge b-${altLower}`;
    }
    
    const altBadge = el('span', {className: badgeClass, textContent:profileUser.alt_kategori});
    if (profileUser.kategori === 'PvP' && PVP_TIERS_HELP[profileUser.alt_kategori]) {
      altBadge.title = PVP_TIERS_HELP[profileUser.alt_kategori];
    }
    badgesRow.appendChild(altBadge);
  }
  if (profileUser.klan_tag) {
    const klanTag = el('span', {className:'profile-klan-tag', textContent:'['+profileUser.klan_tag+']'});
    klanTag.addEventListener('click', (e) => {
      e.stopPropagation();
      window.location.href=`klanlar.html?tag=${profileUser.klan_tag}`;
    });
    badgesRow.appendChild(klanTag);
  }
  info.appendChild(badgesRow);

  if (profileUser.bio) {

  // Stats row
  const statsRow = el('div', {className:'profile-stats-row'});

  const takipciStat = el('div', {className:'profile-stat'});
  const takipciVal = el('strong', {textContent:(profileUser.takipci_sayisi||0).toLocaleString()});
  takipciStat.appendChild(takipciVal);
  takipciStat.appendChild(document.createTextNode(' Takipçi'));
  takipciStat.addEventListener('click', () => switchTab('takipciler'));
  statsRow.appendChild(takipciStat);

  const sep1 = el('span', {className:'profile-stat-sep', textContent:'·'});
  statsRow.appendChild(sep1);

  const takipStat = el('div', {className:'profile-stat'});
  const takipVal = el('strong', {textContent:(profileUser.takip_sayisi||0).toLocaleString()});
  takipStat.appendChild(takipVal);
  takipStat.appendChild(document.createTextNode(' Takip'));
  takipStat.addEventListener('click', () => switchTab('takip'));

  statsRow.appendChild(sep2);

  const lcoinStat = el('div', {className:'profile-lcoin-stat'});
  const lcoinIcon = el('span', {className:'nav-lcoin-icon'});
  lcoinStat.appendChild(lcoinIcon);
  lcoinStat.appendChild(el('strong', {textContent:(profileUser.lcoin||0).toLocaleString()}));
  lcoinStat.appendChild(document.createTextNode(' LCoin'));

    editBtn.addEventListener('click', () => switchTab('ozellestir'));
    
    const boostProfileBtn = el('button', {className:'btn mc-gold', textContent:'🚀 Profili Öne Çıkar'});
    boostProfileBtn.addEventListener('click', () => handleProfileBoost(boostProfileBtn));
    
    row.appendChild(editBtn);
    row.appendChild(boostProfileBtn);
    
    // YETKİLİ PANELİ
    const staffRoles = ['yonetici', 'admin', 'moderator', 'rehber', 'kurucu'];
    if (staffRoles.includes(profileUser.abonelik)) {
      const adminBtn = el('a', {className:'btn mc-green', textContent: profileUser.abonelik === 'yonetici' || profileUser.abonelik === 'kurucu' ? '👑 YÖNETİCİ PANELİ' : '🛡️ YETKİLİ PANELİ', attrs:{href:'admin.html'}});
      row.appendChild(adminBtn);
    }
    
    // ÇIKIŞ YAP
    const logoutBtn = el('button', {className:'btn mc-red', textContent:'🚪 Çıkış Yap'});
    logoutBtn.addEventListener('click', async () => {
      await sb.auth.signOut();
      window.location.href = 'giris.html';
    });
    row.appendChild(logoutBtn);
    
    actions.appendChild(row);
  } else if (currentUser) {
    const row = el('div', {className:'profile-actions-row'});

    // Follow button
    const followBtn = buildFollowBtn();
    row.appendChild(followBtn);

    // Message button
    const msgRow = buildMsgBtn();
    row.appendChild(msgRow);

    // More button
    const moreBtn = el('button', {className:'more-btn', textContent:'⋯', attrs:{title:'Daha Fazla'}});
    moreBtn.addEventListener('click', (e) => showMoreMenu(e, moreBtn));

    actions.appendChild(row);

    // "Follows me" indicator
    // Check if they follow the current user
    checkIfTheyFollowMe(actions);
  }

  container.appendChild(actions);

  document.getElementById('profileTabsWrap').style.display = 'block';

async function checkIfTheyFollowMe(actionsEl) {
  if (!currentUser || !profileUser) return;
  const { data } = await sb.from('takipler')
    .select('id')
    .eq('takip_eden_id', profileUser.id)
    .eq('takip_edilen_id', currentUser.id)
    .single();
  if (data) {
    const followsMeRow = el('div', {className:'profile-follows-me'});
    const dot = el('span', {className:'follow-dot'});
    followsMeRow.appendChild(dot);
    followsMeRow.appendChild(document.createTextNode('Seni takip ediyor'));
    actionsEl.appendChild(followsMeRow);
  }
}

function buildFollowBtn() {
  const btn = el('button', {className:'btn'});

  if (followStatus === 'following') {
    btn.className = 'btn mc-gray';
    btn.textContent = 'Takibi Bırak';
    btn.addEventListener('click', () => unfollowUser(btn));
  } else if (followStatus === 'pending') {
    btn.className = 'btn mc-gold';
    btn.textContent = '⏳ İstek Bekliyor';
    btn.disabled = true;
  } else if (followStatus === 'received') {
    // They sent me a request
    btn.className = 'btn mc-blue';
    btn.textContent = '👁 Takip İsteğin Var';
    btn.addEventListener('click', () => { switchTab('hesap'); });
  } else {
    if (profileUser.profil_gizli) {
      btn.className = 'btn mc-blue';
      btn.textContent = '🔒 İstek Gönder';
      btn.addEventListener('click', () => sendFollowRequest(btn));
    } else {
      btn.className = 'btn mc-green';
      btn.textContent = '+ Takip Et';
      btn.addEventListener('click', () => followUser(btn));
    }
  }
  return btn;
}

function buildMsgBtn() {
  const ma = profileUser.mesaj_ayar || 'herkes';

  if (ma === 'hic') {
    const lb = el('div', {className:'msg-locked-btn'});
    lb.textContent = '🚫 Mesaj Almıyor';
    return lb;
  }

  if (ma === 'takipciler' && !isFollower) {
    const lb = el('div', {className:'msg-locked-btn', attrs:{title:'Sadece takipçilerine mesaj gönderebilir'}});
    lb.textContent = '🔒 Kilitli';
    return lb;
  }

  const btn = el('button', {className:'btn mc-blue', textContent:'💬 Mesaj'});
  btn.addEventListener('click', () => {
    window.location.href = `mesajlar.html?user=${profileUser.id}`;
  });
  return btn;
}

function showMoreMenu(e, anchorBtn) {
  // Remove existing
  document.querySelectorAll('.ctx-menu').forEach(m => m.remove());

  const menu = el('div', {className:'ctx-menu'});
  const rect = anchorBtn.getBoundingClientRect();
  menu.style.top = (rect.bottom + 4) + 'px';
  menu.style.right = (window.innerWidth - rect.right) + 'px';

  const blockItem = el('div', {className:'ctx-item danger'});
  blockItem.textContent = '🚫 Engelle';
  blockItem.addEventListener('click', async () => {
    menu.remove();
    if (!confirm('Bu kullanıcıyı engellemek istediğinize emin misiniz?')) return;
    await sb.from('engellemeler').insert({engelleyen_id:currentUser.id, engellened_id:profileUser.id});
    toast('Kullanıcı engellendi.', 'info');
  });

  const reportItem = el('div', {className:'ctx-item danger'});
  reportItem.textContent = '⚠️ Şikayet Et';
  reportItem.addEventListener('click', () => {
    menu.remove();
    toast('Şikayet alındı, incelenecek.', 'info');
  });

  menu.appendChild(blockItem);
  menu.appendChild(reportItem);
  document.body.appendChild(menu);

  const close = (ev) => {
    if (!menu.contains(ev.target) && ev.target !== anchorBtn) {
      menu.remove();
      document.removeEventListener('click', close);
    }
  };
  setTimeout(() => document.addEventListener('click', close), 50);
}

async function followUser(btn) {
  if (!currentUser) return;
  btn.disabled = true;
  btn.textContent = '...';
  await sb.from('takipler').insert({takip_eden_id:currentUser.id, takip_edilen_id:profileUser.id});
  await sb.from('kullanicilar').update({takipci_sayisi:(profileUser.takipci_sayisi||0)+1}).eq('id', profileUser.id);
  await sb.from('kullanicilar').update({takip_sayisi:(currentUser.takip_sayisi||0)+1}).eq('id', currentUser.id);
  await sb.from('bildirimler').insert({alici_id:profileUser.id, gonderen_id:currentUser.id, tip:'takip', icerik:currentUser.kullanici_adi+' sizi takip etmeye başladı.', link:`profil.html?id=${currentUser.id}`});
  followStatus = 'following';
  btn.className = 'btn mc-gray';
  btn.textContent = 'Takibi Bırak';
  btn.disabled = false;
  btn.removeEventListener('click', ()=>{});
  btn.addEventListener('click', () => unfollowUser(btn));
  toast('Takip edildi!', 'success');
  profileUser.takipci_sayisi = (profileUser.takipci_sayisi||0)+1;
  updateStatDisplay();
}

async function unfollowUser(btn) {
  if (!currentUser) return;
  btn.disabled = true;
  await sb.from('takipler').delete().eq('takip_eden_id', currentUser.id).eq('takip_edilen_id', profileUser.id);
  await sb.from('kullanicilar').update({takipci_sayisi:Math.max(0,(profileUser.takipci_sayisi||1)-1)}).eq('id', profileUser.id);
  await sb.from('kullanicilar').update({takip_sayisi:Math.max(0,(currentUser.takip_sayisi||1)-1)}).eq('id', currentUser.id);
  followStatus = null;
  profileUser.takipci_sayisi = Math.max(0,(profileUser.takipci_sayisi||1)-1);

  if (profileUser.profil_gizli) {
    btn.className = 'btn mc-blue';
    btn.textContent = '🔒 İstek Gönder';
    btn.disabled = false;
    btn.addEventListener('click', () => sendFollowRequest(btn));
  } else {
    btn.className = 'btn mc-green';
    btn.textContent = '+ Takip Et';
    btn.disabled = false;
    btn.addEventListener('click', () => followUser(btn));
  }
  toast('Takipten çıkıldı.', 'info');
  updateStatDisplay();
}

async function sendFollowRequest(btn) {
  if (!currentUser) return;
  btn.disabled = true;
  await sb.from('takip_istekleri').insert({gonderen_id:currentUser.id, alici_id:profileUser.id, durum:'bekliyor'});
  await sb.from('bildirimler').insert({alici_id:profileUser.id, gonderen_id:currentUser.id, tip:'takip_istegi', icerik:currentUser.kullanici_adi+' takip isteği gönderdi.', link:`profil.html?id=${currentUser.id}`});
  followStatus = 'pending';
  btn.className = 'btn mc-gold';
  btn.textContent = '⏳ İstek Bekliyor';
  btn.disabled = true;
  toast('Takip isteği gönderildi!', 'gold');
}

function updateStatDisplay() {
  const statEl = document.querySelector('.profile-stat strong');
  if (statEl) statEl.textContent = (profileUser.takipci_sayisi||0).toLocaleString();
}

function openPPZoom() {
  const overlay = document.getElementById('ppZoomOverlay');
  const img = document.getElementById('ppZoomImg');
  img.src = ppSrc(profileUser);
  if (profileUser.pp_sekil === 'rounded') img.classList.add('shape-rounded');
  else img.classList.remove('shape-rounded');
  overlay.classList.add('open');
}
document.getElementById('ppZoomOverlay').addEventListener('click', () => {
  document.getElementById('ppZoomOverlay').classList.remove('open');
});

// ===== TABS =====
const TAB_DEFS = [
  {id:'droplar',    icon:'💬', label:'Droplar'},
  {id:'ilanlar',   icon:'📣', label:'İlanlar'},
  {id:'takipciler',icon:'👥', label:'Takipçiler'},
  {id:'takip',     icon:'👤', label:'Takip Edilen'},
  {id:'favoriler', icon:'⭐', label:'Favoriler'},
];
const OWN_TABS = [
  {id:'hediyeler', icon:'🎁', label:'Hediyelerim'},
  {id:'ozellestir',icon:'🎨', label:'Özelleştir'},
  {id:'hesap',     icon:'⚙️', label:'Hesap'},
];

function renderTabs() {
  const bar = document.getElementById('tabsBar');
  bar.innerHTML = '';

  const tabs = [...TAB_DEFS, ...(isOwnProfile ? OWN_TABS : [])];
  tabs.forEach(t => {
    const btn = el('button', {className:'tab-btn' + (t.id===activeTab?' active':'')});
    btn.setAttribute('data-tab', t.id);
    const ico = el('span', {textContent:t.icon});
    const lb = el('span', {textContent:t.label});
    btn.appendChild(ico);
    btn.appendChild(lb);
    btn.addEventListener('click', () => switchTab(t.id));
    bar.appendChild(btn);
  });
}

function switchTab(tabId) {
  activeTab = tabId;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-tab') === tabId);
  });
  renderMainContent();
}

// ===== BODY RENDER =====
function renderBody() {
  renderMainContent();
  renderRightPanel();
}

function renderMainContent() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '';

  // Private overlay logic
  const isPrivate = profileUser.profil_gizli && !isOwnProfile && !isFollower;

  if (isPrivate && (activeTab==='droplar'||activeTab==='ilanlar'||activeTab==='takipciler'||activeTab==='takip'||activeTab==='favoriler')) {
    const overlay = el('div', {className:'private-overlay fade-in-up'});
    const ico = el('div', {className:'private-overlay-icon', textContent:'🔒'});
    const tit = el('div', {className:'private-overlay-title', textContent:'Bu hesap gizli'});
    const sub = el('div', {className:'private-overlay-sub', textContent:'Takip ederek içeriklerini görebilirsin.'});

    let reqBtn;
    if (currentUser) {
      if (followStatus === 'pending') {
        reqBtn = el('button', {className:'btn mc-gold', textContent:'⏳ İstek Bekliyor'});
        reqBtn.disabled = true;
      } else {
        reqBtn = el('button', {className:'btn mc-green', textContent:'🔒 Takip İsteği Gönder'});
        reqBtn.addEventListener('click', () => sendFollowRequest(reqBtn));
      }
    }

    overlay.appendChild(ico);
    overlay.appendChild(tit);
    overlay.appendChild(sub);
    if (reqBtn) overlay.appendChild(reqBtn);
    mc.appendChild(overlay);
    return;
  }

  if (activeTab === 'droplar') renderDropsTab(mc);
  else if (activeTab === 'ilanlar') renderIlanlarTab(mc);
  else if (activeTab === 'takipciler') renderFollowList(mc, 'takipciler');
  else if (activeTab === 'takip') renderFollowList(mc, 'takip');
  else if (activeTab === 'favoriler') renderFavorilerTab(mc);
  else if (activeTab === 'ozellestir') renderOzellestirTab(mc);
  else if (activeTab === 'hesap') renderHesapTab(mc);
  else if (activeTab === 'hediyeler') renderHediyelerTab(mc);
}



async function renderFavorilerTab(container) {
  const wrap = el('div', {className:'fade-in-up'});
  const favIps = profileUser.favori_sunucular || [];
  const favServers = SERVERS.filter(s => favIps.includes(s.ip));

  if (!favServers.length) {
    const es = el('div', {className:'empty-state'});
    es.appendChild(el('div', {className:'empty-state-icon', textContent:'⭐'}));
    es.appendChild(el('div', {className:'empty-state-title', textContent:'Favori Yok'}));
    es.appendChild(el('div', {className:'empty-state-sub', textContent:'Bu kullanıcının favori sunucusu bulunmuyor.'}));
    wrap.appendChild(es);
    container.appendChild(wrap);
    return;
  }

  const grid = el('div', {style:{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:'20px'}});
  favServers.forEach(srv => {
    const card = el('div', {className:'server-card', style:{display:'flex', alignItems:'center', gap:'16px', padding:'16px'}});
    
    const logo = el('img', {className:'shape-rounded', attrs:{src:`https://api.mcsrvstat.us/icon/${srv.ip}`, alt:srv.name}, style:{width:'48px', height:'48px', objectFit:'cover'}});
    card.appendChild(logo);
    
    const info = el('div', {style:{flex:1}});
    const nameEl = el('div', {style:{fontWeight:'900', fontSize:'16px', color:'var(--text-1)'}, textContent:srv.name});
    const ipEl = el('div', {style:{fontSize:'12px', color:'var(--gold)', fontWeight:'800', marginTop:'4px'}, textContent:srv.ip});
    info.appendChild(nameEl);
    info.appendChild(ipEl);
    
    card.appendChild(info);
    grid.appendChild(card);
  });

  wrap.appendChild(grid);
  container.appendChild(wrap);
}

// ===== HEDİYELERİM TAB =====
async function renderHediyelerTab(container) {
  const wrap = el('div', {className:'fade-in-up', style:{display:'flex', flexDirection:'column', gap:'16px'}});
  
  const title = el('h2', {style:{color:'#fff', fontWeight:'900', fontSize:'20px', marginBottom:'10px'}});
  title.textContent = '🎁 Çark Hediyelerim';
  wrap.appendChild(title);

  const list = el('div', {style:{display:'flex', flexDirection:'column', gap:'12px'}});
  
  // Load LCoin gifts from notifications
  const { data: giftsData } = await sb.from('bildirimler')
    .select('*')
    .eq('alici_id', currentUser.id)
    .eq('tip', 'cark_hediyesi')
    .eq('okundu', false)
    .order('created_at', {ascending:false});
  
  const gifts = giftsData || [];
  const kalanOne = currentUser.kalan_one_cikarma || 0;
  
  if (kalanOne <= 0 && gifts.length === 0) {
    const es = el('div', {className:'empty-state'});
    const ico = el('div', {className:'empty-state-icon', textContent:'😔'});
    const tit = el('div', {className:'empty-state-title', textContent:'Hiç Hediyeniz Yok'});
    const sub = el('div', {className:'empty-state-sub', textContent:'Günlük çarkı çevirerek ücretsiz hediyeler kazanabilirsiniz.'});
    const carkBtn = el('button', {className:'btn mc-gold', style:{marginTop:'16px'}, textContent:'🎡 Çarkı Çevir'});
    carkBtn.addEventListener('click', () => window.location.href='cark.html');
    es.appendChild(ico); es.appendChild(tit); es.appendChild(sub); es.appendChild(carkBtn);
    list.appendChild(es);
  } else {
    // 1. Show highlights if any
    if (kalanOne > 0) {
      const item = el('div', {style:{background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:'var(--radius)', padding:'16px', display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:'12px'}});
      const left = el('div', {style:{display:'flex', alignItems:'center', gap:'16px'}});
      const ico = el('div', {style:{fontSize:'32px'}}); ico.textContent = '🚀';
      const info = el('div');
      const h = el('div', {style:{color:'#fff', fontWeight:'800', fontSize:'16px', marginBottom:'4px'}}); h.textContent = 'İlan Öne Çıkarma Hakkı';
      const sub = el('div', {style:{color:'var(--text-2)', fontSize:'12px'}}); sub.textContent = `Toplam ${kalanOne} adet öne çıkarma hakkınız bulunuyor.`;
      info.appendChild(h); info.appendChild(sub);
      left.appendChild(ico); left.appendChild(info);
      
      const right = el('div');
      const useBtn = el('button', {className:'btn mc-gold', textContent:'İlanlarımda Kullan'});
      useBtn.addEventListener('click', () => switchTab('ilanlar'));
      right.appendChild(useBtn);
      
      item.appendChild(left);
      item.appendChild(right);
      list.appendChild(item);
    }
    
    // 2. Show LCoin gifts
    gifts.forEach(g => {
      const amount = parseInt(g.icerik) || 0;
      const item = el('div', {style:{background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:'var(--radius)', padding:'16px', display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:'12px'}});
      const left = el('div', {style:{display:'flex', alignItems:'center', gap:'16px'}});
      
      const ico = el('span', {className:'nav-lcoin-icon', style:{transform:'scale(1.8)', margin:'0 10px'}});
      const info = el('div');
      const h = el('div', {style:{color:'#fff', fontWeight:'800', fontSize:'16px', marginBottom:'4px'}}); h.textContent = `${amount} LCoin Hediye`;
      const sub = el('div', {style:{color:'var(--text-2)', fontSize:'12px'}}); sub.textContent = `Çarkı çevirerek kazandığın ${amount} LCoin ödülü.`;
      info.appendChild(h); info.appendChild(sub);
      left.appendChild(ico); left.appendChild(info);
      
      const right = el('div');
      const claimBtn = el('button', {className:'btn mc-green', textContent:'Hesaba Aktar'});
      claimBtn.addEventListener('click', async () => {
        claimBtn.disabled = true;
        claimBtn.textContent = 'Aktarılıyor...';
        
        try {
          const newBal = (currentUser.lcoin || 0) + amount;
          // Update database
          const { error: dbErr } = await sb.from('kullanicilar').update({ lcoin: newBal }).eq('id', currentUser.id);
          if (dbErr) throw dbErr;
          
          // Mark notification as read (claimed)
          const { error: notifErr } = await sb.from('bildirimler').update({ okundu: true }).eq('id', g.id);
          if (notifErr) throw notifErr;
          
          // Success
          currentUser.lcoin = newBal;
          const navL = document.getElementById('navLcoin');
          if (navL) navL.textContent = newBal.toLocaleString();
          
          toast(`${amount} LCoin hesabınıza aktarıldı!`, 'success');
          renderHediyelerTab(container);
        } catch (err) {
          toast('Aktarım başarısız: ' + err.message, 'error');
          claimBtn.disabled = false;
          claimBtn.textContent = 'Hesaba Aktar';
        }
      });
      right.appendChild(claimBtn);
      
      item.appendChild(left);
      item.appendChild(right);
      list.appendChild(item);
    });
  }
  
  wrap.appendChild(list);
  container.appendChild(wrap);
}

// ===== DROPS TAB =====
async function renderDropsTab(container) {
  container.innerHTML = '';
  const wrap = el('div', {className:'fade-in-up'});

  if (isOwnProfile) {
    wrap.appendChild(buildDropComposer());
  }

  const loadWrap = el('div');
  loadWrap.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';
  wrap.appendChild(loadWrap);
  container.appendChild(wrap);

  const { data: dropsData } = await sb.from('droplar')
    .select('*')
    .eq('kullanici_id', profileUser.id)
    .order('created_at', {ascending:false})
    .limit(20);

  loadWrap.innerHTML = '';
  drops = dropsData || [];

  if (!drops.length) {
    const es = el('div', {className:'empty-state'});
    const ico = el('div', {className:'empty-state-icon', textContent:'💬'});
    const tit = el('div', {className:'empty-state-title', textContent:'Henüz Drop Yok'});
    const sub = el('div', {className:'empty-state-sub', textContent:isOwnProfile?'İlk dropunu paylaş!':'Bu kullanıcı henüz bir drop paylaşmamış.'});
    es.appendChild(ico); es.appendChild(tit); es.appendChild(sub);
    loadWrap.appendChild(es);
    return;
  }

  let myLikes = new Set();
  if (currentUser) {
    const { data: lkd } = await sb.from('drop_begeniler').select('drop_id').eq('kullanici_id', currentUser.id).in('drop_id', drops.map(d=>d.id));
    if (lkd) lkd.forEach(l => myLikes.add(l.drop_id));
  }

  drops.forEach(d => {
    const card = buildDropCard(d, myLikes.has(d.id));
    loadWrap.appendChild(card);
  });
}

function buildDropComposer() {
  const comp = el('div', {className:'drop-composer'});
  const header = el('div', {className:'drop-composer-header'});

  const ppImg = el('img', {className:'drop-composer-pp', attrs:{src:ppSrc(currentUser), alt:'PP'}});
  header.appendChild(ppImg);

  const right = el('div', {className:'drop-composer-right'});
  const ta = el('textarea', {className:'drop-textarea', attrs:{placeholder:'Ne düşünüyorsun?', maxlength:'280'}});
  right.appendChild(ta);

  const footer = el('div', {className:'drop-composer-footer'});
  const charCount = el('span', {className:'drop-char-count', textContent:'0/280'});
  ta.addEventListener('input', () => {
    const len = ta.value.length;
    charCount.textContent = `${len}/280`;
    charCount.className = 'drop-char-count' + (len>250?' warn':'') + (len>270?' danger':'');
  });

  const imgFile = el('input', {attrs:{type:'file', accept:'image/*', id:'dropImgFile', style:'display:none'}});
  const imgLabel = el('label', {className:'drop-img-label', attrs:{for:'dropImgFile', title:'Fotoğraf Ekle'}});
  imgLabel.textContent = '🖼️';

  const imgPreview = el('div', {className:'drop-img-preview', id:'dropImgPreview'});
  const prevImg = el('img', {attrs:{id:'dropPrevImg', alt:'Preview'}});
  const removeImg = el('div', {className:'drop-img-remove', textContent:'✕'});
  imgPreview.appendChild(prevImg);
  imgPreview.appendChild(removeImg);

  let selectedImgFile = null;
  imgFile.addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (!f) return;
    selectedImgFile = f;
    const reader = new FileReader();
    reader.onload = (ev) => {
      prevImg.src = ev.target.result;
      imgPreview.style.display = 'block';
    };
    reader.readAsDataURL(f);
  });
  removeImg.addEventListener('click', () => {
    selectedImgFile = null;
    imgFile.value = '';
    imgPreview.style.display = 'none';
  });

  const postBtn = el('button', {className:'btn mc-green', textContent:'📤 Paylaş'});
  postBtn.addEventListener('click', async () => {
    const text = ta.value.trim();
    if (!text && !selectedImgFile) { toast('Bir şeyler yaz!', 'error'); return; }
    postBtn.disabled = true;
    postBtn.textContent = '...';

    let imgUrl = null;
    if (selectedImgFile) {
      const path = `drops/${currentUser.id}/${Date.now()}`;
      const { data: upData, error: upErr } = await sb.storage.from('media').upload(path, selectedImgFile);
      if (!upErr) {
        const { data: { publicUrl } } = sb.storage.from('media').getPublicUrl(path);
        imgUrl = publicUrl;
      }
    }

    await sb.from('droplar').insert({
      kullanici_id: currentUser.id,
      icerik: text,
      gorsel_url: imgUrl,
      begeni_sayisi: 0,
      yorum_sayisi: 0,
      created_at: new Date().toISOString()
    });

    ta.value = '';
    charCount.textContent = '0/280';
    selectedImgFile = null;
    imgFile.value = '';
    imgPreview.style.display = 'none';
    postBtn.disabled = false;
    postBtn.textContent = '📤 Paylaş';
    toast('Drop paylaşıldı!', 'success');
    // Reload drops
    renderDropsTab(document.getElementById('mainContent'));
  });

  const actionsDiv = el('div', {className:'drop-composer-actions'});
  actionsDiv.appendChild(imgFile);
  actionsDiv.appendChild(imgLabel);
  actionsDiv.appendChild(postBtn);

  footer.appendChild(charCount);
  footer.appendChild(actionsDiv);
  right.appendChild(footer);
  right.appendChild(imgPreview);

  header.appendChild(right);
  comp.appendChild(header);
  return comp;
}

function buildDropCard(drop, isLiked) {
  const card = el('div', {className:'drop-card', id:`drop-${drop.id}`});

  const header = el('div', {className:'drop-card-header'});
  const userDiv = el('div', {className:'drop-card-user'});
  const ppImg = el('img', {className:'drop-card-pp', attrs:{src:ppSrc(profileUser), alt:'PP'}});
  const userInfo = el('div');
  const nick = el('div', {className:'drop-card-nick', textContent:profileUser.kullanici_adi});
  const time = el('div', {className:'drop-card-time', textContent:timeAgo(drop.created_at)});
  userInfo.appendChild(nick);
  userInfo.appendChild(time);
  userDiv.appendChild(ppImg);
  userDiv.appendChild(userInfo);
  header.appendChild(userDiv);

  // 3-dot menu for own drops
  if (isOwnProfile) {
    const menuBtn = el('button', {className:'drop-menu-btn', textContent:'⋯'});
    menuBtn.addEventListener('click', (e) => showDropMenu(e, menuBtn, drop.id));
    header.appendChild(menuBtn);
  }

  card.appendChild(header);

  // --- Content ---
  let isReDrop = false;
  let redropData = null;
  let contentText = drop.icerik;

  if (drop.icerik) {
    try {
      if (drop.icerik.trim().startsWith('{') && drop.icerik.includes('"is_redrop"')) {
        redropData = JSON.parse(drop.icerik);
        if (redropData.is_redrop) {
          isReDrop = true;
          contentText = '';
        }
      }
    } catch (e) {}
  }

  if (isReDrop && redropData) {
    const rdHeader = el('div', {className:'redrop-info-header'});
    rdHeader.style.cssText = 'font-size:11px;color:var(--accent);font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:4px;';
    rdHeader.innerHTML = `🔁 <strong>${profileUser.kullanici_adi || 'Anonim'}</strong> ReDropladı`;
    card.appendChild(rdHeader);

    const nestedCard = el('div', {className:'nested-drop-card'});
    nestedCard.style.cssText = 'border: 1px solid var(--border); background: rgba(255,255,255,0.015); border-radius: 8px; padding: 12px; margin-bottom: 10px; cursor: pointer; display: flex; flex-direction: column; gap: 8px;';
    nestedCard.addEventListener('click', (e) => {
      e.stopPropagation();
      const isProfileClick = e.target.closest('.orig-av, .orig-nick');
      if (isProfileClick) {
        window.location.href = `profil.html?id=${redropData.original_author_id}`;
      } else {
        window.location.href = `drop.html?id=${redropData.original_drop_id}`;
      }
    });

    const origHeader = el('div', {className:'orig-header'});
    origHeader.style.cssText = 'display:flex;align-items:center;gap:8px;';
    
    const origAv = el('img', {className:'orig-av', attrs:{src:redropData.original_author_avatar || 'https://i.imgur.com/6l08Y4k.png'}, style:{width:'24px',height:'24px',borderRadius:'50%',objectFit:'cover',cursor:'pointer'}});
    const origNick = el('span', {className:'orig-nick'});
    origNick.style.cssText = 'font-size:12px;font-weight:800;color:var(--text-1);cursor:pointer;';
    origNick.textContent = redropData.original_author_nick;

    origHeader.appendChild(origAv);
    origHeader.appendChild(origNick);
    nestedCard.appendChild(origHeader);

    if (redropData.original_content) {
      const origContent = el('div');
      origContent.style.cssText = 'font-size:13px;color:var(--text-2);word-break:break-word;';
      origContent.textContent = redropData.original_content;
      nestedCard.appendChild(origContent);
    }

    if (redropData.original_gorsel_url) {
      const origImg = el('img', {attrs:{src:redropData.original_gorsel_url}});
      origImg.style.cssText = 'width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-top:8px;';
      nestedCard.appendChild(origImg);
    }

    card.appendChild(nestedCard);
  } else if (contentText) {
    const content = el('div', {className:'drop-card-content', textContent:contentText});
    card.appendChild(content);
  }

  if (!isReDrop && drop.gorsel_url) {
    const dImg = el('img', {className:'drop-card-img', attrs:{src:drop.gorsel_url, alt:'Drop Görseli'}});
    dImg.addEventListener('click', () => openImgModal(drop.gorsel_url));
    card.appendChild(dImg);
  }

  // Actions
  const actDiv = el('div', {className:'drop-card-actions'});

  // Like button
  const likeBtn = el('button', {className:'drop-action-btn' + (isLiked?' liked':'')});
  const likeIco = el('span', {textContent:isLiked?'❤️':'🤍'});
  const likeCnt = el('span', {textContent:drop.begeni_sayisi||0});
  likeBtn.appendChild(likeIco);
  likeBtn.appendChild(likeCnt);
  let liked = isLiked;
  likeBtn.addEventListener('click', async () => {
    if (!currentUser) { toast('Giriş yapmalısın!', 'error'); return; }
    if (liked) {
      // Can only unlike own like
      await sb.from('drop_begeniler').delete().eq('drop_id', drop.id).eq('kullanici_id', currentUser.id);
      await sb.from('droplar').update({begeni_sayisi:Math.max(0,(drop.begeni_sayisi||1)-1)}).eq('id', drop.id);
      drop.begeni_sayisi = Math.max(0,(drop.begeni_sayisi||1)-1);
      liked = false;
      likeIco.textContent = '🤍';
      likeCnt.textContent = drop.begeni_sayisi;
      likeBtn.classList.remove('liked');
    } else {
      await sb.from('drop_begeniler').insert({drop_id:drop.id, kullanici_id:currentUser.id});
      await sb.from('droplar').update({begeni_sayisi:(drop.begeni_sayisi||0)+1}).eq('id', drop.id);
      drop.begeni_sayisi = (drop.begeni_sayisi||0)+1;
      liked = true;
      likeIco.textContent = '❤️';
      likeCnt.textContent = drop.begeni_sayisi;
      likeBtn.classList.add('liked');
      if (profileUser.id !== currentUser.id) {
        await sb.from('bildirimler').insert({alici_id:profileUser.id, gonderen_id:currentUser.id, tip:'begeni', icerik:currentUser.kullanici_adi+' dropunu beğendi.', link:`profil.html?id=${profileUser.id}`});
      }
    }
  });
  actDiv.appendChild(likeBtn);

  // Comment button
  const commentBtn = el('button', {className:'drop-action-btn'});
  const cmtIco = el('span', {textContent:'💬'});
  const cmtCnt = el('span', {textContent:drop.yorum_sayisi||0});
  commentBtn.appendChild(cmtIco);
  commentBtn.appendChild(cmtCnt);

  // Comment panel
  const cmtPanel = el('div', {className:'comment-panel', id:`cmt-${drop.id}`});
  commentBtn.addEventListener('click', () => {
    const open = cmtPanel.classList.toggle('open');
    if (open) loadComments(drop.id, cmtPanel, cmtCnt, drop);
  });
  actDiv.appendChild(commentBtn);
  card.appendChild(actDiv);
  card.appendChild(cmtPanel);

  // Navigate to drop details on card background click
  card.style.cursor = 'pointer';
  card.addEventListener('click', (e) => {
    const interactive = e.target.closest('button, a, img, input, .nested-drop-card, .drop-card-pp, .drop-card-nick, .drop-card-actions, .comment-panel');
    if (interactive) return;
    window.location.href = `drop.html?id=${drop.id}`;
  });

  return card;
}

async function loadComments(dropId, panel, cntEl, drop) {
  panel.innerHTML = '';
  const { data: comments } = await sb.from('drop_yorumlar')
    .select('*')
    .eq('drop_id', dropId)
    .order('created_at', {ascending:true})
    .limit(20);

  if (comments && comments.length > 0) {
    const userIds = [...new Set(comments.map(c => c.kullanici_id).filter(id => id !== null))];
    if (userIds.length > 0) {
      const { data: users } = await sb.from('kullanicilar')
        .select('id, kullanici_adi, avatar_url')
        .in('id', userIds);
      if (users) {
        const userMap = {};
        users.forEach(u => { userMap[u.id] = u; });
        comments.forEach(c => {
          c.kullanicilar = userMap[c.kullanici_id] || null;
        });
      }
    }
  }

  if (comments && comments.length) {
    comments.forEach(c => {
      const item = el('div', {className:'comment-item'});
      const pp = el('img', {className:'comment-pp', attrs:{src:ppSrc(c.kullanicilar), alt:'PP'}});
      if (c.kullanici_id) {
        pp.style.cursor = 'pointer';
        pp.addEventListener('click', () => { window.location.href = `profil.html?id=${c.kullanici_id}`; });
      }

      const bubble = el('div', {className:'comment-bubble'});
      const nick = el('div', {className:'comment-nick', textContent:c.kullanicilar?.kullanici_adi||'Anonim'});
      if (c.kullanici_id) {
        nick.style.cursor = 'pointer';
        nick.addEventListener('click', () => { window.location.href = `profil.html?id=${c.kullanici_id}`; });
      }

      const txt = el('div', {className:'comment-text', textContent:c.yorum});
      bubble.appendChild(nick);
      bubble.appendChild(txt);

      // Actions row (Like, Reply, Delete)
      const actionRow = el('div', {style:{display:'flex', alignItems:'center', gap:'8px', marginTop:'4px'}});

      // --- Like Button ---
      const likeBtn = el('button', {className:'comment-like-btn'});
      const likeKey = `comment_liked_${c.id}`;
      const countKey = `comment_like_count_${c.id}`;

      let isLiked = localStorage.getItem(likeKey) === 'true';
      let likeCountVal = parseInt(localStorage.getItem(countKey));
      if (isNaN(likeCountVal)) {
        likeCountVal = c.begeni_sayisi || 0;
        localStorage.setItem(countKey, likeCountVal);
      }
      if (isLiked) {
        likeBtn.classList.add('liked');
      }
      likeBtn.innerHTML = `❤️ ${likeCountVal}`;

      likeBtn.addEventListener('click', async () => {
        if (!currentUser) { toast('Beğenmek için giriş yap!', 'error'); return; }
        isLiked = !isLiked;
        if (isLiked) {
          likeBtn.classList.add('liked');
          likeCountVal++;
          localStorage.setItem(likeKey, 'true');
        } else {
          likeBtn.classList.remove('liked');
          likeCountVal = Math.max(0, likeCountVal - 1);
          localStorage.removeItem(likeKey);
        }
        localStorage.setItem(countKey, likeCountVal);
        likeBtn.innerHTML = `❤️ ${likeCountVal}`;
        try {
          await sb.from('drop_yorumlar').update({ begeni_sayisi: likeCountVal }).eq('id', c.id);
        } catch(err) { console.error(err); }
      });
      actionRow.appendChild(likeBtn);

      // --- Reply Button ---
      if (currentUser) {
        const replyBtn = el('button', {className:'comment-del-btn', textContent:'💬 Yanıtla'});
        replyBtn.addEventListener('click', () => {
          const inputEl = panel.querySelector('.comment-input');
          if (inputEl) {
            inputEl.value = `@${c.kullanicilar?.kullanici_adi || 'Anonim'} ` + inputEl.value;
            inputEl.focus();
          }
        });
        actionRow.appendChild(replyBtn);
      }

      // --- Delete Button ---
      if (currentUser && (c.kullanici_id === currentUser.id || drop.kullanici_id === currentUser.id)) {
        const delBtn = el('button', {className:'comment-del-btn', textContent:'🗑️ Sil'});
        delBtn.addEventListener('click', async () => {
          try {
            await sb.from('drop_yorumlar').delete().eq('id', c.id);
            // Update comments count in UI and DB
            const newCount = Math.max(0, (drop.yorum_sayisi || 0) - 1);
            drop.yorum_sayisi = newCount;
            if (cntEl) cntEl.textContent = newCount;
            await sb.from('droplar').update({ yorum_sayisi: newCount }).eq('id', dropId);
            
            item.style.opacity = '0';
            item.style.transition = 'opacity 0.3s';
            setTimeout(() => {
              item.remove();
              if (panel.querySelectorAll('.comment-item').length === 0) {
                panel.innerHTML = '';
                const noC = el('div', {className:'text-dim', style:{fontSize:'12px', marginBottom:'8px'}, textContent:'Henüz yorum yok.'});
                panel.appendChild(noC);
                // rebuild input row
                if (currentUser) {
                  loadComments(dropId, panel, cntEl, drop);
                }
              }
            }, 300);
            toast('Yorum silindi', 'success');
          } catch(err) { toast('Silinemedi', 'error'); }
        });
        actionRow.appendChild(delBtn);
      }

      bubble.appendChild(actionRow);

      item.appendChild(pp);
      item.appendChild(bubble);
      panel.appendChild(item);
    });
  } else {
    const noC = el('div', {className:'text-dim', style:{fontSize:'12px', marginBottom:'8px'}});
    noC.textContent = 'Henüz yorum yok.';
    panel.appendChild(noC);
  }

  if (currentUser) {
    const inputRow = el('div', {className:'comment-input-row'});
    const myPp = el('img', {className:'comment-pp', attrs:{src:ppSrc(currentUser), alt:'PP'}});
    const input = el('input', {className:'comment-input', attrs:{type:'text', placeholder:'Yorum yaz...', maxlength:'200'}});
    const sendBtn = el('button', {className:'comment-send-btn', textContent:'➤'});
    const submitComment = async () => {
      const txt2 = input.value.trim();
      if (!txt2) return;
      await sb.from('drop_yorumlar').insert({drop_id:dropId, kullanici_id:currentUser.id, yorum:txt2, begeni_sayisi:0, created_at:new Date().toISOString()});
      await sb.from('droplar').update({yorum_sayisi:(drop.yorum_sayisi||0)+1}).eq('id', dropId);
      drop.yorum_sayisi = (drop.yorum_sayisi||0)+1;
      if (cntEl) cntEl.textContent = drop.yorum_sayisi;
      input.value = '';
      if (profileUser.id !== currentUser.id) {
        await sb.from('bildirimler').insert({alici_id:profileUser.id, gonderen_id:currentUser.id, tip:'yorum', icerik:currentUser.kullanici_adi+' dropuna yorum yaptı.', link:`profil.html?id=${profileUser.id}`});
      }
      loadComments(dropId, panel, cntEl, drop);
    };
    input.addEventListener('keydown', (e) => { if (e.key==='Enter') submitComment(); });
    sendBtn.addEventListener('click', submitComment);
    inputRow.appendChild(myPp);
    inputRow.appendChild(input);
    inputRow.appendChild(sendBtn);
    panel.appendChild(inputRow);
  }
}

function showDropMenu(e, btn, dropId) {
  document.querySelectorAll('.ctx-menu').forEach(m => m.remove());
  const menu = el('div', {className:'ctx-menu'});
  const rect = btn.getBoundingClientRect();
  menu.style.top = (rect.bottom+4)+'px';
  menu.style.right = (window.innerWidth-rect.right)+'px';

  const delItem = el('div', {className:'ctx-item danger', textContent:'🗑️ Sil'});
  delItem.addEventListener('click', async () => {
    menu.remove();
    if (!confirm('Bu dropu silmek istiyor musun?')) return;
    await sb.from('droplar').delete().eq('id', dropId);
    const card = document.getElementById(`drop-${dropId}`);
    if (card) card.remove();
    toast('Drop silindi.', 'info');
  });
  menu.appendChild(delItem);
  document.body.appendChild(menu);

  const close = (ev) => {
    if (!menu.contains(ev.target)) { menu.remove(); document.removeEventListener('click', close); }
  };
  setTimeout(() => document.addEventListener('click', close), 50);
}
