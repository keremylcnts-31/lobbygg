<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil - LOBBY.GG</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; color:#ccc; font-family:'Montserrat',sans-serif; min-height:100vh; }
.nav { background:#080808; border-bottom:2px solid #111; padding:0 5%; display:flex; justify-content:space-between; align-items:center; height:56px; position:sticky; top:0; z-index:100; }
.nav-logo { font-size:20px; font-weight:900; color:#fff; text-decoration:none; }
.nav-logo span { color:#39ff14; }
.mc-btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; background:#3a3a3a; color:#ccc !important; padding:9px 16px; border-radius:2px; font-family:'Montserrat',sans-serif; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:0.5px; cursor:pointer; border-top:2px solid #555; border-left:2px solid #555; border-right:2px solid #111; border-bottom:3px solid #111; text-decoration:none; transition:0.1s; }
.mc-btn:hover { filter:brightness(1.2); }
.mc-btn-green { background:#3a7d1e; color:#fff !important; border-top-color:#5cb832; border-left-color:#4a9e25; border-right-color:#1e4a09; border-bottom-color:#1e4a09; }

.wrap { max-width:900px; margin:0 auto; padding:32px 20px; }

/* PROFİL KART */
.profil-kart { background:#111; border-top:2px solid #1a1a1a; border-left:2px solid #1a1a1a; border-right:2px solid #050505; border-bottom:3px solid #050505; border-radius:2px; padding:28px; margin-bottom:20px; }
.profil-header { display:flex; gap:20px; align-items:flex-start; flex-wrap:wrap; }
.profil-avatar-wrap { width:90px; height:90px; position:relative; flex-shrink:0; }
.profil-avatar { width:80px; height:80px; margin:5px; border-radius:4px; object-fit:cover; background:#1a1a1a; }
.profil-frame { position:absolute; inset:0; border-radius:6px; pointer-events:none; }
.frame-default { border:2px solid #333; border-radius:6px; }
.frame-neon-green { border:3px solid #39ff14; box-shadow:0 0 8px #39ff14,0 0 18px #1a8009; animation:pg 1.8s ease-in-out infinite; border-radius:6px; }
.frame-neon-blue { border:3px solid #00d4ff; box-shadow:0 0 8px #00d4ff,0 0 18px #0066cc; animation:pb 1.6s ease-in-out infinite; border-radius:6px; }
.frame-neon-purple { border:3px solid #b933ff; box-shadow:0 0 8px #b933ff,0 0 18px #6600cc; animation:pp 2s ease-in-out infinite; border-radius:6px; }
.frame-neon-red { border:3px solid #ff1a3c; box-shadow:0 0 8px #ff1a3c,0 0 18px #990022; animation:pr 1.5s ease-in-out infinite; border-radius:6px; }
.frame-neon-yellow { border:3px solid #ffea00; box-shadow:0 0 8px #ffea00,0 0 18px #998800; animation:py 2.2s ease-in-out infinite; border-radius:6px; }
.frame-neon-orange { border:3px solid #ff6600; box-shadow:0 0 8px #ff6600,0 0 18px #cc3300; animation:po 1.7s ease-in-out infinite; border-radius:6px; }
.frame-neon-pink { border:3px solid #ff1493; box-shadow:0 0 8px #ff1493,0 0 18px #99095a; animation:ppk 1.9s ease-in-out infinite; border-radius:6px; }
.frame-neon-cyan { border:3px solid #00ffcc; box-shadow:0 0 8px #00ffcc,0 0 18px #00997a; animation:pc 2.1s ease-in-out infinite; border-radius:6px; }
@keyframes pg{0%,100%{box-shadow:0 0 8px #39ff14,0 0 18px #1a8009;}50%{box-shadow:0 0 16px #55ff30,0 0 32px #39ff14;}}
@keyframes pb{0%,100%{box-shadow:0 0 8px #00d4ff,0 0 18px #0066cc;}50%{box-shadow:0 0 16px #44e0ff,0 0 32px #00aaff;}}
@keyframes pp{0%,100%{box-shadow:0 0 8px #b933ff,0 0 18px #6600cc;}50%{box-shadow:0 0 16px #d966ff,0 0 32px #b933ff;}}
@keyframes pr{0%,100%{box-shadow:0 0 8px #ff1a3c,0 0 18px #990022;}50%{box-shadow:0 0 16px #ff4d6a,0 0 32px #ff1a3c;}}
@keyframes py{0%,100%{box-shadow:0 0 8px #ffea00,0 0 18px #998800;}50%{box-shadow:0 0 16px #fff04d,0 0 32px #ffea00;}}
@keyframes po{0%,100%{box-shadow:0 0 8px #ff6600,0 0 18px #cc3300;}50%{box-shadow:0 0 16px #ff8833,0 0 32px #ff6600;}}
@keyframes ppk{0%,100%{box-shadow:0 0 8px #ff1493,0 0 18px #99095a;}50%{box-shadow:0 0 16px #ff4dab,0 0 32px #ff1493;}}
@keyframes pc{0%,100%{box-shadow:0 0 8px #00ffcc,0 0 18px #00997a;}50%{box-shadow:0 0 16px #4dffd9,0 0 32px #00ffcc;}}

.profil-bilgi { flex:1; }
.profil-nick-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.profil-nick { font-size:22px; font-weight:900; color:#fff; text-transform:uppercase; }
.verified { width:20px; height:20px; background:#1da1f2; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:12px; color:#fff; font-weight:900; flex-shrink:0; }
.profil-badge { display:inline-block; font-size:9px; font-weight:900; text-transform:uppercase; padding:3px 12px; border-radius:2px; margin-bottom:10px; }
.badge-uye { background:#222; color:#666; border:1px solid #333; }
.badge-abone { background:#152800; color:#39ff14; border:1px solid #2a5000; }
.badge-pro { background:#251a00; color:#FFD700; border:1px solid #4a3500; }
.badge-yonetici { background:#1a0d2a; color:#b933ff; border:1px solid #4a1e7d; }
.profil-meta { font-size:11px; color:#444; font-weight:600; line-height:1.8; }
.profil-stats { display:flex; gap:20px; margin-top:14px; flex-wrap:wrap; }
.profil-stat { text-align:center; }
.profil-stat-val { font-size:20px; font-weight:900; color:#39ff14; }
.profil-stat-lbl { font-size:9px; color:#444; text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }
.profil-iletisim { display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; }
.iletisim-btn { display:inline-flex; align-items:center; gap:6px; padding:9px 14px; border-radius:2px; font-family:'Montserrat',sans-serif; font-size:10px; font-weight:800; text-decoration:none; border:none; cursor:pointer; transition:0.1s; }
.iletisim-btn:hover { filter:brightness(1.1); }

/* İLAN KARTLARI */
.box { background:#111; border-top:2px solid #1a1a1a; border-left:2px solid #1a1a1a; border-right:2px solid #050505; border-bottom:3px solid #050505; border-radius:2px; padding:18px; margin-bottom:14px; }
.sec-title { font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:2px; color:#555; margin-bottom:14px; display:flex; align-items:center; gap:10px; }
.sec-title::after { content:''; flex:1; height:1px; background:#1a1a1a; }
.ilan-kart { background:#1a1a1a; border-top:2px solid #2a2a2a; border-left:2px solid #2a2a2a; border-right:2px solid #060606; border-bottom:2px solid #060606; border-radius:2px; padding:14px; margin-bottom:8px; cursor:pointer; transition:0.15s; }
.ilan-kart:hover { background:#222; }
.ilan-tag { display:inline-block; font-size:9px; font-weight:900; text-transform:uppercase; padding:2px 8px; border-radius:1px; margin-bottom:6px; }
.tag-is { background:#0d1f00; color:#39ff14; }
.tag-yetkili { background:#0d141f; color:#6bb3ff; }
.tag-medya { background:#1f0d1f; color:#d966ff; }
.tag-reklam { background:#1f1400; color:#FFD700; }

#loading { position:fixed; inset:0; background:#0a0a0a; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; z-index:9999; }
.ld-logo { font-size:28px; font-weight:900; color:#fff; }
.ld-logo span { color:#39ff14; }
.ld-bar { width:180px; height:4px; background:#1a1a1a; border-radius:2px; overflow:hidden; }
.ld-fill { height:100%; background:#39ff14; animation:ld 1.5s ease infinite; }
@keyframes ld { 0%{width:0%} 50%{width:70%} 100%{width:100%} }

.not-found { text-align:center; padding:80px 20px; }
.not-found i { font-size:50px; color:#222; margin-bottom:16px; display:block; }
.not-found h2 { font-size:16px; color:#333; font-weight:900; text-transform:uppercase; }
</style>
</head>
<body>

<div id="loading">
  <div class="ld-logo">LOBBY<span>.GG</span></div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<nav class="nav">
  <a href="/lobbygg/index.html" class="nav-logo">LOBBY<span>.GG</span></a>
  <div style="display:flex;gap:8px;">
    <a href="/lobbygg/ilanlar.html" class="mc-btn"><i class="fa-solid fa-bullhorn"></i> İlanlar</a>
    <a href="/lobbygg/panel.html" class="mc-btn mc-btn-green"><i class="fa-solid fa-gauge-high"></i> Panel</a>
  </div>
</nav>

<div class="wrap">
  <div id="profil-wrap">
    <div style="text-align:center;padding:40px;color:#333;font-size:11px;">Yükleniyor...</div>
  </div>
</div>

<script>
const SB_URL='https://hmkeedyqmzblnmkhdste.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhta2VlZHlxbXpibG5ta2hkc3RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODE3MzYsImV4cCI6MjA5NDM1NzczNn0.5HUInmQs_LsXYovJgI7Ir9q8M9aPlQW6jM5C43aYmqA';
const sb=window.supabase.createClient(SB_URL,SB_KEY);

async function init(){
  const params=new URLSearchParams(window.location.search);
  const nick=params.get('nick');
  const id=params.get('id');

  let kul=null;
  if(id){
    const{data}=await sb.from('kullanicilar').select('*').eq('id',id).single();
    kul=data;
  }else if(nick){
    // Önce tam eşleşme dene
    const{data}=await sb.from('kullanicilar').select('*').eq('kullanici_adi',nick);
    if(data&&data.length>0){
      kul=data[0];
    }else{
      // Büyük/küçük harf farklılığı için ilike dene
      const{data:data2}=await sb.from('kullanicilar').select('*').ilike('kullanici_adi',nick);
      if(data2&&data2.length>0)kul=data2[0];
    }
  }

  if(!kul){
    document.getElementById('profil-wrap').innerHTML=`
      <div class="not-found">
        <i class="fa-solid fa-user-slash"></i>
        <h2>Kullanıcı Bulunamadı</h2>
      </div>`;
    document.getElementById('loading').style.display='none';
    return;
  }

  // Oturum kontrolü (iletişim için)
  let oturumVar=false;
  const{data:{session}}=await sb.auth.getSession();
  if(session)oturumVar=true;

  // İlanları yükle
  const{data:ilanlar}=await sb.from('ilanlar').select('*').eq('kullanici_id',kul.id).eq('durum','aktif');

  const cerceve=kul.aktif_cerceve||'default';
  const badgeClass={uye:'badge-uye',abone:'badge-abone',pro:'badge-pro',yonetici:'badge-yonetici'}[kul.abonelik]||'badge-uye';
  const badgeAd={uye:'Üye',abone:'Abone',pro:'Pro',yonetici:'Yönetici',admin:'Admin',moderator:'Moderatör'}[kul.abonelik]||'Üye';

  const iletisimHTML=oturumVar?`
    <div class="profil-iletisim">
      ${kul.discord?`<a href="https://discord.com/users/${kul.discord}" target="_blank" class="iletisim-btn" style="background:#5865F2;color:#fff;"><i class="fa-brands fa-discord"></i> ${kul.discord}</a>`:''}
    </div>`:`
    <div style="background:#0d1f00;border:1px solid #1e4a00;border-radius:2px;padding:12px 14px;margin-top:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span style="font-size:11px;color:#555;font-weight:700;">İletişim bilgilerini görmek için giriş yap.</span>
      <a href="/lobbygg/giris.html" class="mc-btn mc-btn-green" style="padding:7px 14px;font-size:10px;"><i class="fa-solid fa-right-to-bracket"></i> Giriş Yap</a>
    </div>`;

  const tagAd={is:'İş İlanı',yetkili:'Yetkili İlanı',medya:'Medya İlanı',reklam:'Reklam İlanı'};
  const tagClass={is:'tag-is',yetkili:'tag-yetkili',medya:'tag-medya',reklam:'tag-reklam'};

  document.title=`${kul.kullanici_adi} - LOBBY.GG`;
  document.getElementById('profil-wrap').innerHTML=`
    <div class="profil-kart">
      <div class="profil-header">
        <div class="profil-avatar-wrap">
          <div class="profil-frame frame-${cerceve}"></div>
          <img src="${kul.avatar_url||`https://minotar.net/helm/${kul.kullanici_adi}/80.png`}" class="profil-avatar" onerror="this.src='https://minotar.net/helm/Steve/80.png'">
        </div>
        <div class="profil-bilgi">
          <div class="profil-nick-row">
            <div class="profil-nick">${kul.kullanici_adi}</div>
            ${kul.dogrulama_rozeti?'<div class="verified">✓</div>':''}
          </div>
          <div class="profil-badge ${badgeClass}">${badgeAd}</div>
          <div class="profil-meta">
            ${kul.yas?`<span>${kul.yas} yaş</span> · `:''}
            ${kul.cinsiyet?`<span>${kul.cinsiyet}</span> · `:''}
            ${kul.kayit_tarihi?`Katılım: ${new Date(kul.kayit_tarihi).toLocaleDateString('tr-TR')}`:''}
          </div>
          <div class="profil-stats">
            <div class="profil-stat">
              <div class="profil-stat-val">${ilanlar?ilanlar.length:0}</div>
              <div class="profil-stat-lbl">Aktif İlan</div>
            </div>
          </div>
          ${iletisimHTML}
        </div>
      </div>
    </div>

    ${ilanlar&&ilanlar.length?`
    <div class="box">
      <div class="sec-title">Aktif İlanları</div>
      ${ilanlar.map(i=>`
        <div class="ilan-kart" onclick="window.location.href='/lobbygg/ilanlar.html'">
          <span class="ilan-tag ${tagClass[i.kategori]||'tag-is'}">${tagAd[i.kategori]||i.kategori}</span>
          <div style="font-size:12px;font-weight:900;color:#ccc;margin-bottom:4px;">${i.alt_kategori||'-'}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div style="font-size:11px;color:#555;">${i.aciklama?i.aciklama.substring(0,60)+'...':'-'}</div>
            <div style="font-size:12px;font-weight:900;color:#39ff14;flex-shrink:0;margin-left:10px;">${i.fiyat&&i.fiyat>0?i.fiyat+' TL':'Görüşülür'}</div>
          </div>
        </div>`).join('')}
    </div>`:''}
  `;
  document.getElementById('loading').style.display='none';
}

init();
</script>
</body>
</html>
