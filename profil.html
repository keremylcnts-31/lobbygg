*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050505;color:#ccc;font-family:'Montserrat',sans-serif;min-height:100vh;}

/* NAV */
.nav{background:#050505;border-bottom:1px solid #111;padding:0 3%;display:flex;justify-content:space-between;align-items:center;height:60px;position:sticky;top:0;z-index:200;}
.nav-logo img{height:52px;object-fit:contain;}
.nav-sag{display:flex;align-items:center;gap:8px;}
.mc-btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 13px;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:900;text-transform:uppercase;cursor:pointer;text-decoration:none;border:none;transition:.1s;letter-spacing:.3px;}
.mc-btn:active{transform:translateY(1px);}
.mc-gray{background:#3c3c3c;color:#ddd;border-top:2px solid #6b6b6b;border-left:2px solid #555;border-right:2px solid #111;border-bottom:3px solid #111;}
.mc-green{background:#3a7d1e;color:#fff;border-top:2px solid #5cb832;border-left:2px solid #4a9e25;border-right:2px solid #1e4a09;border-bottom:3px solid #1e4a09;}
.mc-red{background:#7d1e1e;color:#ffaaaa;border-top:2px solid #b83232;border-left:2px solid #9e2525;border-right:2px solid #3a0909;border-bottom:3px solid #3a0909;}
.mc-blue{background:#1a4a8a;color:#aad4ff;border-top:2px solid #3270b8;border-left:2px solid #2560a0;border-right:2px solid #091e3a;border-bottom:3px solid #091e3a;}
.mc-gold{background:#b38600;color:#fff;border-top:2px solid #FFD700;border-left:2px solid #e6a800;border-right:2px solid #5a4000;border-bottom:3px solid #5a4000;}
.mc-discord{background:#5865F2;color:#fff;border-top:2px solid #7289da;border-left:2px solid #6070d0;border-right:2px solid #2c2e5a;border-bottom:3px solid #2c2e5a;}
.nav-zil{position:relative;color:#555;font-size:18px;text-decoration:none;padding:6px;transition:.15s;}
.nav-zil:hover{color:#ccc;}
.nav-zil-badge{position:absolute;top:-2px;right:-2px;background:#39ff14;color:#000;font-size:8px;font-weight:900;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px;}
.nav-av{width:30px;height:30px;border-radius:50%;border:2px solid #2a2a2a;cursor:pointer;object-fit:cover;}
.nav-lcoin{font-size:10px;font-weight:900;color:#FFD700;}

/* BANNER */
.banner-wrap{width:100%;max-width:940px;margin:0 auto;aspect-ratio:851/315;max-height:315px;overflow:hidden;background:#111;position:relative;}
.banner-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.banner-canvas{width:100%;height:100%;display:block;}
.banner-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(5,5,5,.8) 100%);pointer-events:none;}

/* PROFİL HEADER */
.profil-wrap{max-width:940px;margin:0 auto;padding:0 16px;}
.profil-header{background:#0d0d0d;border:1px solid #1a1a1a;border-top:none;border-radius:0 0 8px 8px;margin-bottom:14px;}
.profil-avrow{display:flex;align-items:flex-end;gap:16px;padding:0 20px 16px;margin-top:-48px;position:relative;z-index:10;}
.pp-wrap{flex-shrink:0;cursor:pointer;position:relative;}
.pp-img{width:96px;height:96px;object-fit:cover;border:3px solid #0d0d0d;display:block;}
.pp-circle{border-radius:50%;}
.pp-rounded{border-radius:12px;}

/* ÇERÇEVE */
[data-frame="green"] .pp-img{border:3px solid #39ff14!important;}
[data-frame="red"] .pp-img{border:3px solid #ff1a3c!important;}
[data-frame="blue"] .pp-img{border:3px solid #00d4ff!important;}
[data-frame="gold"] .pp-img{border:3px solid #FFD700!important;}
[data-frame="purple"] .pp-img{border:3px solid #b933ff!important;}
[data-frame="white"] .pp-img{border:3px solid #fff!important;}
[data-frame="cyan"] .pp-img{border:3px solid #00ffcc!important;}
@keyframes neonPulse{0%,100%{box-shadow:0 0 0 0 var(--fc);}50%{box-shadow:0 0 12px 3px var(--fc);}}
[data-frame="neon-green"] .pp-img{border:3px solid #39ff14!important;--fc:#39ff14;animation:neonPulse 2s infinite;}
[data-frame="neon-blue"] .pp-img{border:3px solid #00d4ff!important;--fc:#00d4ff;animation:neonPulse 2s infinite;}
@keyframes rainbowRot{0%{border-color:#f00;}33%{border-color:#0f0;}66%{border-color:#00f;}100%{border-color:#f00;}}
[data-frame="rainbow"] .pp-img{border:3px solid #f00!important;animation:rainbowRot 2s linear infinite;}

.profil-info{flex:1;min-width:0;padding-bottom:4px;}
.nick-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
.profil-nick{font-size:22px;font-weight:900;color:#fff;}
.profil-badge{font-size:9px;font-weight:900;text-transform:uppercase;padding:2px 8px;border-radius:3px;}
.b-uye{background:#1a1a1a;color:#666;border:1px solid #2a2a2a;}
.b-abone{background:#0d1f00;color:#39ff14;border:1px solid #2a5000;}
.b-premium{background:#1a1200;color:#FFD700;border:1px solid #4a3500;}
.b-admin,.b-yonetici{background:#1a0d2a;color:#b933ff;border:1px solid #4a1e7d;}
.kat-tag{font-size:9px;font-weight:900;text-transform:uppercase;padding:3px 10px;border-radius:3px;}
.kat-pvp{background:#1f0d0d;color:#ff4444;border:1px solid #4a1515;}
.kat-icerik{background:#1f0d2a;color:#b933ff;border:1px solid #4a1e7d;}
.kat-developer{background:#1a1200;color:#FFD700;border:1px solid #4a3500;}
.kat-builder{background:#0d1a00;color:#39ff14;border:1px solid #2a5000;}
.klan-badge{font-size:9px;font-weight:900;padding:2px 10px;border-radius:3px;border:1px solid;}

.meta-row{display:flex;gap:10px;flex-wrap:wrap;font-size:10px;color:#555;margin-bottom:8px;}
.profil-bio{font-size:12px;color:#666;line-height:1.7;margin-bottom:10px;}
.aksiyon-row{display:flex;gap:7px;flex-wrap:wrap;}

/* SEKMELER */
.sekmeler{display:flex;border-top:1px solid #1a1a1a;overflow-x:auto;}
.sekmeler::-webkit-scrollbar{display:none;}
.sekme{padding:11px 14px;font-size:10px;font-weight:900;color:#555;cursor:pointer;border-bottom:3px solid transparent;text-transform:uppercase;white-space:nowrap;transition:.15s;}
.sekme:hover{color:#ccc;}
.sekme.active{color:#39ff14;border-bottom-color:#39ff14;}

/* BODY */
.profil-body{max-width:940px;margin:0 auto;padding:0 16px 40px;display:grid;grid-template-columns:1fr 280px;gap:14px;align-items:start;}
.sekme-icerik{display:none;}
.sekme-icerik.active{display:block;}

/* BOX */
.box{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;padding:14px;margin-bottom:12px;}
.box-title{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#444;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.box-title::before{content:'';width:3px;height:10px;background:#39ff14;border-radius:1px;flex-shrink:0;}

/* DROPLAR */
.drop-yaz-box{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;padding:14px;margin-bottom:12px;}
.drop-ta{width:100%;background:#111;border:1px solid #222;color:#bbb;padding:10px;border-radius:4px;font-family:'Montserrat',sans-serif;font-size:13px;outline:none;resize:none;min-height:70px;margin-bottom:10px;}
.drop-ta:focus{border-color:#39ff14;}
.drop-ta::placeholder{color:#333;}
.drop-kart{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;padding:14px;margin-bottom:10px;}
.drop-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.drop-av{width:34px;height:34px;border-radius:50%;overflow:hidden;border:2px solid #1a1a1a;flex-shrink:0;}
.drop-av img{width:100%;height:100%;object-fit:cover;}
.drop-nick{font-size:12px;font-weight:900;color:#fff;}
.drop-zaman{font-size:9px;color:#444;}
.drop-icerik{font-size:13px;color:#bbb;line-height:1.8;margin-bottom:10px;word-break:break-word;}
.drop-gorsel{width:100%;border-radius:6px;max-height:400px;object-fit:cover;margin-bottom:10px;cursor:pointer;display:block;}
.drop-aksiyon{display:flex;gap:12px;border-top:1px solid #1a1a1a;padding-top:10px;}
.drop-btn{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:800;color:#444;cursor:pointer;background:none;border:none;font-family:'Montserrat',sans-serif;text-transform:uppercase;padding:4px 8px;border-radius:3px;}
.drop-btn:hover{color:#ccc;background:#111;}
.drop-btn.begendi{color:#ff1493!important;}
.yorum-wrap{margin-top:10px;border-top:1px solid #1a1a1a;padding-top:10px;}
.yorum-in{background:#111;border:1px solid #222;color:#bbb;padding:7px 10px;border-radius:4px;font-family:'Montserrat',sans-serif;font-size:11px;outline:none;flex:1;}

/* TAKİPÇİ */
.tkart{display:flex;align-items:center;gap:10px;padding:10px;border-radius:4px;cursor:pointer;}
.tkart:hover{background:#111;}
.tkav{width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid #1a1a1a;flex-shrink:0;}
.tkav img{width:100%;height:100%;object-fit:cover;}

/* SUNUCU */
.sunucu-kart{display:flex;align-items:center;gap:10px;background:#111;border:1px solid #1a1a1a;border-radius:6px;padding:8px 10px;margin-bottom:6px;}
.s-logo{width:32px;height:32px;border-radius:5px;object-fit:cover;image-rendering:pixelated;flex-shrink:0;}

/* ZOOM */
.zoom-modal{position:fixed;inset:0;background:rgba(0,0,0,.97);display:none;align-items:center;justify-content:center;z-index:9999;cursor:zoom-out;}
.zoom-modal.active{display:flex;}
.zoom-modal img{max-width:95vw;max-height:95vh;object-fit:contain;}
.zoom-x{position:fixed;top:16px;right:20px;background:rgba(0,0,0,.7);border:1px solid #333;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:#fff;z-index:10000;}

@media(max-width:768px){.profil-body{grid-template-columns:1fr;}}
</style>
</head>

<script>
const SB = window.supabase.createClient(
  'https://hmkeedyqmzblnmkhdste.supabase.co',

);

const SUPABASE_URL = 'https://hmkeedyqmzblnmkhdste.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhta2VlZHlxbXpibG5ta2hkc3RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3ODE3MzYsImV4cCI6MjA5NDM1NzczNn0.5HUInmQs_LsXYovJgI7Ir9q8M9aPlQW6jM5C43aYmqA';

let benKim = null, profil = null;
let takipEdiyorMu = false, takipIstegiVar = false;

const BADGEMAP = {uye:'b-uye',abone:'b-abone',premium:'b-premium',admin:'b-admin',yonetici:'b-yonetici'};
const BADGEAD  = {uye:'ÜYE',abone:'ABONE',premium:'PREMİUM',admin:'ADMİN',yonetici:'YÖNETİCİ'};
const KAT_RENK = {pvp:'kat-pvp',icerik:'kat-icerik',developer:'kat-developer',builder:'kat-builder'};
const KAT_IKON = {pvp:'⚔️',icerik:'🎬',developer:'⚙️',builder:'🔨'};
const SUNUCU_IPS = {
  'HanedanMC':'play.hanedanmc.com','ChickenNW':'oyna.chickennw.com','BLOKYA':'oyna.blokya.com',
  'DugeCraft':'play.dugecraft.com.tr','ZENITMC':'play.zenitmc.com','SENTORCRAFT':'sentorcraft.com',
  'SOULCRAFT':'soulcraft.tc','AtlasOyuncu':'play.atlasoyuncu.com','AtlantikMC':'atlantikmc.com',
  'NAVELYA':'navelya.net','CRAFTLUNA':'play.craftluna.net','Melonya':'melonya.net',
  'Rush Craft':'play.rushcraft.com.tr','RebornCraft':'play.reborncraft.pw','LuneCraft':'mc.lunecraft.net',
  'SimitSMP':'simitsmp.net','MC4FUN':'play.mc4fun.net','İmibiyum':'play.imibiyum.com',
};

function slogo(isim, sz) {
  sz = sz || 32;
  const ip = SUNUCU_IPS[isim];
  if (!ip) return '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:5px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">🖥️</div>';
  return '<img src="https://api.mcsrvstat.us/icon/'+ip+'" class="s-logo" style="width:'+sz+'px;height:'+sz+'px;" onerror="this.style.display=\'none\'">';
}
function esc(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function zaman(ts) {
  if (!ts) return '';
  const d = Date.now() - new Date(ts).getTime();
  if (d < 60000) return 'Az önce';
  if (d < 3600000) return Math.floor(d/60000)+'dk';
  if (d < 86400000) return Math.floor(d/3600000)+'sa';
  return Math.floor(d/86400000)+'g';
}
function ppZoom() {
  if (!profil) return;
  const av = profil.avatar_url || ('https://minotar.net/helm/'+(profil.kullanici_adi||'Steve')+'/200.png');
  document.getElementById('zoom-img').src = av;
  document.getElementById('zoom-modal').classList.add('active');
}
function gorselZoom(src) {
  document.getElementById('zoom-img').src = src;
  document.getElementById('zoom-modal').classList.add('active');
}
function abone(kul) {
  return kul && ['abone','premium','admin','yonetici'].includes(kul.abonelik);
}

// ── INIT ──
async function init() {
  // Session
  try {
    const { data: { session } } = await Promise.race([
      SB.auth.getSession(),
      new Promise(r => setTimeout(() => r({data:{session:null}}), 4000))
    ]);
    if (session) {
      const { data } = await SB.from('kullanicilar').select('*').eq('email', session.user.email);
      if (data && data.length) benKim = data[0];
    }
  } catch(e) { console.warn('Session:', e); }

  // Profil bul
  const p = new URLSearchParams(location.search);
  const id = p.get('id'), nick = p.get('nick');
  try {
    if (id) {
      const { data } = await SB.from('kullanicilar').select('*').eq('id', parseInt(id));
      if (data && data.length) profil = data[0];
    } else if (nick) {
      const { data } = await SB.from('kullanicilar').select('*').ilike('kullanici_adi', nick);
      if (data && data.length) profil = data[0];
    } else if (benKim) {
      profil = benKim;
    }
  } catch(e) { console.warn('Profil:', e); }

  if (!profil) {
    document.getElementById('yukle-msg').innerHTML = '<i class="fa-solid fa-user-slash" style="font-size:48px;display:block;margin-bottom:14px;color:#333;"></i><div style="font-size:14px;font-weight:900;color:#ccc;margin-bottom:16px;">Kullanıcı Bulunamadı</div><a href="/lobbygg/index.html" class="mc-btn mc-green">Ana Sayfa</a>';
    return;
  }

  // Takip durumu
  if (benKim && Number(benKim.id) !== Number(profil.id)) {
    const bid = Number(benKim.id), pid = Number(profil.id);
    const [tr, ir] = await Promise.all([
      SB.from('takipler').select('*',{count:'exact',head:true}).eq('takip_eden_id',bid).eq('takip_edilen_id',pid),
      SB.from('takip_istekleri').select('id').eq('gonderen_id',bid).eq('alici_id',pid).eq('durum','beklemede')
    ]);
    takipEdiyorMu = (tr.count||0) > 0;
    takipIstegiVar = (ir.data||[]).length > 0;
  }

  // Veri çek
  const [iR, dR, kR] = await Promise.all([
    SB.from('ilanlar').select('*').eq('kullanici_id', Number(profil.id)).eq('durum','aktif'),
    SB.from('droplar').select('*').eq('kullanici_id', Number(profil.id)).order('created_at',{ascending:false}).limit(30),
    profil.klan_tag ? SB.from('klanlar').select('*').eq('tag', profil.klan_tag) : Promise.resolve({data:[]})
  ]);

  const ilanlar = iR.data || [];
  const droplar = dR.data || [];
  const klan    = (kR.data||[])[0] || null;

  // Render
  renderProfil(ilanlar, droplar, klan);
  renderDroplar(droplar);
  renderIlanlar(ilanlar);
  renderSagPanel(klan);
  navYukle();

  // Göster
  document.getElementById('yukle-msg').style.display = 'none';
  document.getElementById('ana-icerik').style.display = 'block';
}

// ── PROFIL HEADER ──
function renderProfil(ilanlar, droplar, klan) {
  const ben = benKim && Number(benKim.id) === Number(profil.id);
  const nick = profil.kullanici_adi || 'Oyuncu';
  const av   = profil.avatar_url || ('https://minotar.net/helm/'+nick+'/200.png');
  const cerceve = profil.aktif_cerceve || 'none';
  const ppSekil = profil.pp_sekil || 'circle';

  document.title = nick + ' — LOBBY.GG';

  // Banner
  const bannerWrap = document.getElementById('banner-wrap');
  if (profil.banner_url) {
    const img = document.createElement('img');
    img.src = profil.banner_url;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
    bannerWrap.insertBefore(img, bannerWrap.firstChild);
  } else {
    const bgMap = {
      kirmizi:'linear-gradient(135deg,#4a0000,#1a0000)',altin:'linear-gradient(135deg,#3a2800,#1a1000)',
      yesil:'linear-gradient(135deg,#003a00,#001a00)',mavi:'linear-gradient(135deg,#00003a,#00001a)',
      mor:'linear-gradient(135deg,#1a003a,#0a001a)',siyah:'#050505',
      cyan:'linear-gradient(135deg,#003a3a,#001a1a)',ates:'linear-gradient(135deg,#3a1000,#1a0500)',
    };
    const renk = profil.banner_renk || 'canvas';
    if (bgMap[renk]) {
      bannerWrap.style.background = bgMap[renk];
    } else {
      // Canvas animasyon
      const canvas = document.createElement('canvas');
      canvas.className = 'banner-canvas';
      canvas.id = 'banner-canvas';
      bannerWrap.insertBefore(canvas, bannerWrap.firstChild);
      setTimeout(initCanvas, 100);
    }
  }

  // PP
  const ppImg = document.getElementById('pp-img');
  ppImg.src = av;
  ppImg.className = 'pp-img ' + (ppSekil === 'rounded' ? 'pp-rounded' : 'pp-circle');
  document.getElementById('pp-wrap').dataset.frame = cerceve;

  // Nick row
  const nickRow = document.getElementById('nick-row');
  nickRow.innerHTML = '';

  const nickSpan = document.createElement('span');
  nickSpan.className = 'profil-nick';
  nickSpan.textContent = nick;
  nickRow.appendChild(nickSpan);

  if (profil.dogrulama_rozeti) {
    const roz = document.createElement('img');
    roz.src = 'https://i.imgur.com/VDpHaPy.png';
    roz.style.cssText = 'width:22px;height:22px;vertical-align:middle;';
    roz.title = 'Doğrulanmış';
    nickRow.appendChild(roz);
  }

  const badge = document.createElement('span');
  badge.className = 'profil-badge ' + (BADGEMAP[profil.abonelik] || 'b-uye');
  badge.textContent = BADGEAD[profil.abonelik] || 'ÜYE';
  nickRow.appendChild(badge);

  if (profil.kategori) {
    const kat = document.createElement('span');
    kat.className = 'kat-tag ' + (KAT_RENK[profil.kategori] || '');
    kat.textContent = (KAT_IKON[profil.kategori] || '') + ' ' + (profil.alt_kategori || profil.kategori);
    nickRow.appendChild(kat);
  }

  if (klan) {
    const kb = document.createElement('a');
    kb.href = '/lobbygg/klanlar.html';
    kb.className = 'klan-badge';
    kb.style.cssText = 'background:'+( klan.renk||'#FFD700')+'18;border-color:'+(klan.renk||'#FFD700')+';color:'+(klan.renk||'#FFD700')+';text-decoration:none;';
    kb.textContent = klan.tag + ' — ' + klan.isim;
    nickRow.appendChild(kb);
  }

  // Meta
  const metaRow = document.getElementById('meta-row');
  let metaHTML = '';
  if (profil.kayit_tarihi) {
    const t = new Date(profil.kayit_tarihi).toLocaleDateString('tr-TR',{month:'long',year:'numeric'});
    metaHTML += '<span><i class="fa-solid fa-calendar-days"></i> '+t+'</span>';
  }
  if (profil.yas) metaHTML += '<span><i class="fa-solid fa-cake-candles"></i> '+profil.yas+'</span>';
  if (profil.discord) metaHTML += '<span><i class="fa-brands fa-discord" style="color:#5865F2;"></i> '+esc(profil.discord)+'</span>';
  if (profil.desteklened_sunucu && profil.desteklened_sunucu !== 'Belirtmek İstemiyorum') {
    metaHTML += '<span style="color:#39ff14;"><i class="fa-solid fa-gamepad"></i> '+esc(profil.desteklened_sunucu)+'</span>';
  }
  metaRow.innerHTML = metaHTML;

  // Bio
  if (profil.bio) {
    const bioEl = document.getElementById('profil-bio');
    bioEl.innerHTML = esc(profil.bio);
    bioEl.style.display = 'block';
  }

  // Aksiyonlar
  const aksRow = document.getElementById('aksiyon-row');
  aksRow.innerHTML = '';

  if (ben) {
    aksRow.innerHTML = '<a href="/lobbygg/ilan-ver.html" class="mc-btn mc-green"><i class="fa-solid fa-plus"></i> İlan Ver</a>'
      +'<a href="/lobbygg/mesajlar.html" class="mc-btn mc-blue"><i class="fa-solid fa-envelope"></i> Mesajlarım</a>';
  } else if (benKim) {
    // Takip butonu
    let takipBtn = '';
    if (takipEdiyorMu) {
      takipBtn = '<button class="mc-btn mc-red" id="takip-btn" onclick="takipBirak()"><i class="fa-solid fa-user-minus"></i> Takibi Bırak</button>';
    } else if (takipIstegiVar) {
      takipBtn = '<button class="mc-btn mc-gray" id="takip-btn" onclick="istekGeriAl()"><i class="fa-solid fa-clock"></i> İstek Gönderildi</button>';
    } else if (profil.profil_gizli) {
      takipBtn = '<button class="mc-btn mc-green" id="takip-btn" onclick="istekGonder()"><i class="fa-solid fa-user-plus"></i> Takip İsteği Gönder</button>';
    } else {
      takipBtn = '<button class="mc-btn mc-green" id="takip-btn" onclick="takipEt()"><i class="fa-solid fa-user-plus"></i> Takip Et</button>';
    }
    // Mesaj butonu
    const ma = profil.mesaj_ayar || 'herkes';
    let mesajBtn = '';
    if (ma === 'hic') mesajBtn = '<span style="font-size:9px;color:#444;font-weight:700;padding:8px;">🚫 Mesaj almıyor</span>';
    else if (ma === 'takipciler' && !takipEdiyorMu) mesajBtn = '<span class="mc-btn mc-gray" style="opacity:.5;cursor:not-allowed;"><i class="fa-solid fa-lock"></i> Mesaj</span>';
    else mesajBtn = '<a href="/lobbygg/mesajlar.html?hedef='+profil.id+'" class="mc-btn mc-blue"><i class="fa-solid fa-envelope"></i> Mesaj</a>';

    aksRow.innerHTML = takipBtn + mesajBtn;
    if (profil.discord) {
      const dBtn = document.createElement('button');
      dBtn.className = 'mc-btn mc-discord';
      dBtn.innerHTML = '<i class="fa-brands fa-discord"></i> Discord';
      dBtn.onclick = function() { navigator.clipboard.writeText(profil.discord); this.textContent = '✓ Kopyalandı!'; };
      aksRow.appendChild(dBtn);
    }
  } else {
    aksRow.innerHTML = '<a href="/lobbygg/giris.html" class="mc-btn mc-green"><i class="fa-solid fa-right-to-bracket"></i> Giriş Yap</a>';
  }

  // Sekmeler
  const sekmelerEl = document.getElementById('sekmeler');
  const tabs = [
    {id:'droplar', lbl:'💬 Droplar ('+droplar.length+')'},
    {id:'ilanlar', lbl:'📣 İlanlar ('+ilanlar.length+')'},
    {id:'takipciler', lbl:'👥 Takipçiler ('+(profil.takipci_sayisi||0)+')'},
    {id:'takip', lbl:'👤 Takip ('+(profil.takip_sayisi||0)+')'},
  ];
  tabs.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'sekme' + (i === 0 ? ' active' : '');
    el.textContent = t.lbl;
    el.onclick = () => sekmeAc(t.id, el);
    sekmelerEl.appendChild(el);
  });
}

// ── DROPLAR ──
async function renderDroplar(droplar) {
  const el = document.getElementById('droplar-icerik');
  el.innerHTML = '';
  const ben = benKim && Number(benKim.id) === Number(profil.id);
  const av = profil.avatar_url || ('https://minotar.net/helm/'+(profil.kullanici_adi||'Steve')+'/34.png');

  // Yaz kutusu
  if (ben) {
    const yazBox = document.createElement('div');
    yazBox.className = 'drop-yaz-box';
    yazBox.innerHTML = '<div style="display:flex;gap:10px;align-items:flex-start;">'
      +'<img src="'+av+'" style="width:34px;height:34px;border-radius:50%;border:2px solid #1a1a1a;flex-shrink:0;">'
      +'<textarea class="drop-ta" id="drop-yazi" placeholder="Ne düşünüyorsun?" rows="2" maxlength="280"></textarea></div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">'
      +'<span style="font-size:9px;color:#333;" id="drop-sayac">0/280</span>'
      +'<button class="mc-btn mc-green" id="drop-btn" onclick="dropPaylas()"><i class="fa-solid fa-paper-plane"></i> Paylaş</button></div>';
    el.appendChild(yazBox);
    document.getElementById('drop-yazi')?.addEventListener('input', e => {
      document.getElementById('drop-sayac').textContent = e.target.value.length + '/280';
    });
  }

  if (!droplar || !droplar.length) {
    const bos = document.createElement('div');
    bos.style.cssText = 'text-align:center;padding:40px;color:#333;';
    bos.innerHTML = '<div style="font-size:28px;margin-bottom:8px;">💬</div>Henüz drop yok';
    el.appendChild(bos);
    return;
  }

  // Beğenilenleri çek
  let benilenler = new Set();
  if (benKim && droplar.length) {
    const { data: beg } = await SB.from('drop_begeniler').select('drop_id').eq('kullanici_id', Number(benKim.id)).in('drop_id', droplar.map(d => d.id));
    (beg||[]).forEach(b => benilenler.add(b.drop_id));
  }

  droplar.forEach(d => {
    const kart = document.createElement('div');
    kart.className = 'drop-kart';
    kart.id = 'drop-' + d.id;
    const begen = benilenler.has(d.id);

    kart.innerHTML = '<div class="drop-head">'
      +'<div class="drop-av"><img src="'+av+'"></div>'
      +'<div><div class="drop-nick">'+esc(profil.kullanici_adi||'?')+'</div><div class="drop-zaman">'+zaman(d.created_at)+'</div></div></div>'
      +(d.icerik ? '<div class="drop-icerik">'+esc(d.icerik)+'</div>' : '')
      +(d.gorsel_url ? '<img src="'+d.gorsel_url+'" class="drop-gorsel">' : '')
      +'<div class="drop-aksiyon">'
      +'<button class="drop-btn'+(begen?' begendi':'')+'" id="beg-'+d.id+'" style="color:'+(begen?'#ff1493':'')+';"><i class="'+(begen?'fa-solid':'fa-regular')+' fa-heart"></i>&nbsp;<span id="bs-'+d.id+'">'+(d.begeni_sayisi||0)+'</span></button>'
      +'<button class="drop-btn" onclick="yorumAc('+d.id+')"><i class="fa-regular fa-comment"></i>&nbsp;'+(d.yorum_sayisi||0)+'</button>'
      +(ben ? '<button class="drop-btn" style="margin-left:auto;color:#f85149;" onclick="dropSil('+d.id+')"><i class="fa-solid fa-trash"></i></button>' : '')
      +'</div><div id="yw-'+d.id+'"></div>';

    // Event listeners
    const begBtn = kart.querySelector('#beg-'+d.id);
    begBtn.addEventListener('click', () => dropBegen(d.id));
    if (d.gorsel_url) {
      const gorselEl = kart.querySelector('.drop-gorsel');
      gorselEl.addEventListener('click', () => gorselZoom(d.gorsel_url));
    }
    el.appendChild(kart);
  });
}

async function dropPaylas() {
  if (!benKim) return;
  const icerik = document.getElementById('drop-yazi')?.value?.trim() || '';
  if (!icerik) { alert('Bir şeyler yaz!'); return; }
  const btn = document.getElementById('drop-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳...'; }
  const { error } = await SB.from('droplar').insert({kullanici_id: Number(benKim.id), icerik, begeni_sayisi:0, yorum_sayisi:0});
  if (error) { alert('Hata: '+error.message); if(btn){btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> Paylaş';} return; }
  const pid = new URLSearchParams(location.search).get('id');
  location.href = '/lobbygg/profil.html?id=' + (pid || Number(benKim.id));
}

async function dropBegen(id) {
  if (!benKim) { location.href = '/lobbygg/giris.html'; return; }
  const sEl = document.getElementById('bs-'+id);
  const btn = document.getElementById('beg-'+id);
  const { data: m } = await SB.from('drop_begeniler').select('id').eq('drop_id',id).eq('kullanici_id',Number(benKim.id));
  if (m?.length) {
    await SB.from('drop_begeniler').delete().eq('id',m[0].id).eq('kullanici_id',Number(benKim.id));
    await SB.rpc('begeni_azalt', {p_id: id});
  } else {
    await SB.from('drop_begeniler').insert({drop_id:id, kullanici_id:Number(benKim.id)});
    await SB.rpc('begeni_artir', {p_id: id});
  }
  const { data: gd } = await SB.from('droplar').select('begeni_sayisi').eq('id',id).single();
  const yeniS = gd?.begeni_sayisi || 0;
  const liked = !m?.length;
  if (sEl) sEl.textContent = yeniS;
  if (btn) { btn.className = 'drop-btn' + (liked?' begendi':''); btn.style.color = liked?'#ff1493':''; btn.innerHTML = '<i class="'+(liked?'fa-solid':'fa-regular')+' fa-heart"></i>&nbsp;'+yeniS; }
}

async function dropSil(id) {
  if (!confirm('Dropu silmek istediğine emin misin?')) return;
  await SB.from('droplar').delete().eq('id',id);
  document.getElementById('drop-'+id)?.remove();
}

async function yorumAc(id) {
  const w = document.getElementById('yw-'+id);
  if (!w) return;
  if (w.style.display === 'block') { w.style.display = 'none'; return; }
  w.style.display = 'block';
  if (w.dataset.loaded) return;
  w.dataset.loaded = '1';
  const { data: yorumlar } = await SB.from('drop_yorumlar').select('*').eq('drop_id',id).order('created_at',{ascending:true}).limit(5);
  const ids = (yorumlar||[]).map(y=>y.kullanici_id);
  let km = {};
  if (ids.length) { const {data:kl}=await SB.from('kullanicilar').select('id,kullanici_adi,avatar_url').in('id',ids); (kl||[]).forEach(k=>km[k.id]=k); }
  w.innerHTML = '';
  (yorumlar||[]).forEach(y => {
    const k = km[y.kullanici_id] || {};
    const d = document.createElement('div');
    d.style.cssText = 'display:flex;gap:8px;margin-bottom:10px;';
    const kav = k.avatar_url || ('https://minotar.net/helm/'+(k.kullanici_adi||'Steve')+'/26.png');
    d.innerHTML = '<img src="'+kav+'" style="width:26px;height:26px;border-radius:50%;cursor:pointer;" onclick="location.href=\'/lobbygg/profil.html?id='+k.id+'\'">'
      +'<div style="flex:1;background:#111;border:1px solid #1a1a1a;padding:7px 10px;border-radius:4px;">'
      +'<div style="font-size:10px;font-weight:900;color:#fff;margin-bottom:2px;cursor:pointer;" onclick="location.href=\'/lobbygg/profil.html?id='+k.id+'\'">'+esc(k.kullanici_adi||'?')+'</div>'
      +'<div style="font-size:12px;color:#aaa;">'+esc(y.yorum)+'</div></div>';
    w.appendChild(d);
  });
  if (!yorumlar?.length) w.innerHTML = '<div style="text-align:center;font-size:10px;color:#444;padding:8px;">Yorum yok</div>';
  if (benKim) {
    const yazDiv = document.createElement('div');
    yazDiv.style.cssText = 'display:flex;gap:6px;margin-top:10px;';
    yazDiv.innerHTML = '<input type="text" class="yorum-in" id="yi-'+id+'" placeholder="Yorum yaz...">'
      +'<button class="mc-btn mc-green" style="padding:7px 12px;font-size:9px;"><i class="fa-solid fa-paper-plane"></i></button>';
    yazDiv.querySelector('input').addEventListener('keydown', e => { if(e.key==='Enter') yorumGonder(id); });
    yazDiv.querySelector('button').addEventListener('click', () => yorumGonder(id));
    w.appendChild(yazDiv);
  }
}

async function yorumGonder(id) {
  const inp = document.getElementById('yi-'+id);
  const y = inp?.value?.trim();
  if (!y) return;
  await SB.from('drop_yorumlar').insert({drop_id:id, kullanici_id:Number(benKim.id), yorum:y});
  const { data: d } = await SB.from('droplar').select('yorum_sayisi').eq('id',id).single();
  await SB.from('droplar').update({yorum_sayisi:(d?.yorum_sayisi||0)+1}).eq('id',id);
  inp.value = '';
  const w = document.getElementById('yw-'+id);
  if (w) { delete w.dataset.loaded; w.style.display='none'; }
  yorumAc(id);
}

      +'</a></div>';
  }

  const aktifS = profil.desteklened_sunucu && profil.desteklened_sunucu !== 'Belirtmek İstemiyorum';
  const favList = favSunucular.filter(s => s !== 'Belirtmek İstemiyorum');
  if (aktifS || favList.length) {
    html += '<div class="box"><div class="box-title">Sunucular</div>';
    if (aktifS) {
      html += '<div style="font-size:8px;color:#39ff14;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">🎮 Aktif Sunucu</div>'

// ── TAKİPÇİLER ──
function sekmeAc(id, el) {
  document.querySelectorAll('.sekme').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.sekme-icerik').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+id)?.classList.add('active');
  if (id === 'takipciler') takipcileriYukle();
  if (id === 'takip') takipListesiYukle();
}

async function takipcileriYukle() {
  const el = document.getElementById('takipciler-icerik');
  el.innerHTML = '<div style="text-align:center;padding:20px;color:#444;font-size:11px;"><i class="fa-solid fa-spinner fa-spin"></i></div>';
  const { data: t } = await SB.from('takipler').select('takip_eden_id').eq('takip_edilen_id', Number(profil.id));
  if (!t?.length) { el.innerHTML = '<div style="text-align:center;padding:20px;color:#444;font-size:11px;">Henüz takipçi yok</div>'; return; }
  const ids = [...new Set(t.map(x => Number(x.takip_eden_id)))];
  const { data: kullar } = await SB.from('kullanicilar').select('id,kullanici_adi,avatar_url,abonelik').in('id', ids);
  el.innerHTML = (kullar||[]).map(k => kulKartHTML(k)).join('');
}

async function takipListesiYukle() {
  const el = document.getElementById('takip-icerik');
  el.innerHTML = '<div style="text-align:center;padding:20px;color:#444;font-size:11px;"><i class="fa-solid fa-spinner fa-spin"></i></div>';
  const { data: t } = await SB.from('takipler').select('takip_edilen_id').eq('takip_eden_id', Number(profil.id));
  if (!t?.length) { el.innerHTML = '<div style="text-align:center;padding:20px;color:#444;font-size:11px;">Kimseyi takip etmiyor</div>'; return; }
  const ids = [...new Set(t.map(x => Number(x.takip_edilen_id)))];
  const { data: kullar } = await SB.from('kullanicilar').select('id,kullanici_adi,avatar_url,abonelik').in('id', ids);
  el.innerHTML = (kullar||[]).map(k => kulKartHTML(k)).join('');
}

function kulKartHTML(k) {

// ── TAKİP SİSTEMİ ──
async function takipEt() {
  if (!benKim) { location.href='/lobbygg/giris.html'; return; }
  const btn = document.getElementById('takip-btn');
  if (btn) { btn.disabled=true; btn.style.opacity='.5'; }
  const bid=Number(benKim.id), pid=Number(profil.id);
  const { error } = await SB.from('takipler').insert({takip_eden_id:bid, takip_edilen_id:pid});
  if (error) { alert('Hata: '+error.message); if(btn){btn.disabled=false;btn.style.opacity='1';} return; }
  await Promise.all([
    SB.from('kullanicilar').update({takipci_sayisi:(profil.takipci_sayisi||0)+1}).eq('id',pid),
    SB.from('kullanicilar').update({takip_sayisi:(benKim.takip_sayisi||0)+1}).eq('id',bid),
    SB.from('bildirimler').insert({alici_id:pid,gonderen_id:bid,tip:'takip',icerik:'Seni takip etmeye başladı.',link:'/lobbygg/profil.html?id='+bid,okundu:false})
  ]);
  takipEdiyorMu = true;
  if (btn) { btn.disabled=false; btn.style.opacity='1'; btn.className='mc-btn mc-red'; btn.setAttribute('onclick','takipBirak()'); btn.innerHTML='<i class="fa-solid fa-user-minus"></i> Takibi Bırak'; }
}

async function takipBirak() {
  if (!benKim) return;
  const btn = document.getElementById('takip-btn');
  if (btn) { btn.disabled=true; btn.style.opacity='.5'; }
  const bid=Number(benKim.id), pid=Number(profil.id);
  await SB.from('takipler').delete().eq('takip_eden_id',bid).eq('takip_edilen_id',pid);
  await Promise.all([
    SB.from('kullanicilar').update({takipci_sayisi:Math.max(0,(profil.takipci_sayisi||1)-1)}).eq('id',pid),
    SB.from('kullanicilar').update({takip_sayisi:Math.max(0,(benKim.takip_sayisi||1)-1)}).eq('id',bid)
  ]);
  takipEdiyorMu = false;
  if (btn) { btn.disabled=false; btn.style.opacity='1'; btn.className='mc-btn mc-green'; btn.setAttribute('onclick','takipEt()'); btn.innerHTML='<i class="fa-solid fa-user-plus"></i> Takip Et'; }
}

async function istekGonder() {

  if (btn) { btn.disabled=false; btn.style.opacity='1'; btn.className='mc-btn mc-gray'; btn.setAttribute('onclick','istekGeriAl()'); btn.innerHTML='<i class="fa-solid fa-clock"></i> İstek Gönderildi'; }

async function istekGeriAl() {
  if (!benKim) return;

// ── NAV ──
async function navYukle() {
  const navGiris = document.getElementById('nav-giris');
  const navAv    = document.getElementById('nav-av');
  const navLcoin = document.getElementById('nav-lcoin');
  if (!benKim) return;
  if (navGiris) navGiris.style.display = 'none';
  if (navAv) { navAv.src = benKim.avatar_url||('https://minotar.net/helm/'+(benKim.kullanici_adi||'Steve')+'/30.png'); navAv.style.display='block'; navAv.onclick=()=>location.href='/lobbygg/profil.html?id='+benKim.id; }
  if (navLcoin) { navLcoin.textContent=(benKim.lcoin||0)+' LC'; navLcoin.style.display='block'; }
  try {
    const { count } = await SB.from('bildirimler').select('*',{count:'exact',head:true}).eq('alici_id',Number(benKim.id)).eq('okundu',false);
    const badge = document.getElementById('nav-badge');
    if (badge && count > 0) { badge.textContent=count>9?'9+':count; badge.style.display='flex'; }
  } catch(e) {}
}

// ── CANVAS BANNER ──
function initCanvas() {
  const canvas = document.getElementById('banner-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const wrap = canvas.parentElement;
  const W = canvas.width  = wrap.offsetWidth  || 940;
  const H = canvas.height = wrap.offsetHeight || 315;
  if (!W || !H) { setTimeout(initCanvas, 300); return; }
  const logo = new Image(); logo.crossOrigin='anonymous'; logo.src='https://i.imgur.com/6l08Y4k.png';
  const LOGS = Array.from({length:6},()=>({x:Math.random()*W,y:Math.random()*H,sz:Math.random()*60+30,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,a:Math.random()*.1+.05,r:Math.random()*Math.PI*2,vr:(Math.random()-.5)*.005}));
  const HUZ  = Array.from({length:3},()=>({x:Math.random()*W,ang:(Math.random()-.5)*.5,w:Math.random()*80+40,a:Math.random()*.04+.02,sp:Math.random()*.3+.1,dir:Math.random()>.5?1:-1}));
  function draw(){
    ctx.fillStyle='#050505'; ctx.fillRect(0,0,W,H);
    HUZ.forEach(h=>{ctx.save();ctx.translate(h.x,H/2);ctx.rotate(h.ang);const g=ctx.createLinearGradient(0,-H,0,H);g.addColorStop(0,'transparent');g.addColorStop(.4,'rgba(57,255,20,'+h.a+')');g.addColorStop(.6,'rgba(57,255,20,'+h.a+')');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(-h.w/2,-H*1.5,h.w,H*3);ctx.restore();h.x+=h.sp*h.dir;if(h.x>W+200)h.dir=-1;if(h.x<-200)h.dir=1;});
    if(logo.complete&&logo.naturalWidth>0)LOGS.forEach(l=>{ctx.save();ctx.globalAlpha=l.a;ctx.translate(l.x,l.y);ctx.rotate(l.r);ctx.drawImage(logo,-l.sz/2,-l.sz/2,l.sz,l.sz);ctx.restore();l.x+=l.vx;l.y+=l.vy;l.r+=l.vr;if(l.x<-100)l.x=W+50;if(l.x>W+100)l.x=-50;if(l.y<-100)l.y=H+50;if(l.y>H+100)l.y=-50;});
    requestAnimationFrame(draw);
  }
  draw();
}

init();
