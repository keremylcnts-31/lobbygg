<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="https://i.imgur.com/6l08Y4k.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil - LOBBY.GG</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050505;color:#ccc;font-family:'Montserrat',sans-serif;min-height:100vh;}

/* ── NAV ── */
.nav{background:#050505;border-bottom:2px solid #111;padding:0 5%;display:flex;justify-content:space-between;align-items:center;height:56px;position:sticky;top:0;z-index:200;}
.nav a img{height:42px;object-fit:contain;}

/* ── MİNECRAFT BUTONLAR ── */
.mc-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:2px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;text-decoration:none;transition:.1s;border:none;}
.mc-btn:active{transform:translateY(1px);}
.mc-gray{background:#3c3c3c;color:#ddd;border-top:2px solid #6b6b6b;border-left:2px solid #555;border-right:2px solid #111;border-bottom:3px solid #111;}
.mc-gray:hover{background:#4a4a4a;color:#fff;}
.mc-green{background:#3a7d1e;color:#fff;border-top:2px solid #5cb832;border-left:2px solid #4a9e25;border-right:2px solid #1e4a09;border-bottom:3px solid #1e4a09;}
.mc-green:hover{filter:brightness(1.1);}
.mc-gold{background:#b38600;color:#fff;border-top:2px solid #FFD700;border-left:2px solid #e6a800;border-right:2px solid #5a4000;border-bottom:3px solid #5a4000;}
.mc-gold:hover{filter:brightness(1.1);}
.mc-red{background:#7d1e1e;color:#ffaaaa;border-top:2px solid #b83232;border-left:2px solid #9e2525;border-right:2px solid #3a0909;border-bottom:3px solid #3a0909;}
.mc-red:hover{filter:brightness(1.1);}
.mc-blue{background:#1a4a8a;color:#aad4ff;border-top:2px solid #3270b8;border-left:2px solid #2560a0;border-right:2px solid #091e3a;border-bottom:3px solid #091e3a;}
.mc-discord{background:#5865F2;color:#fff;border-top:2px solid #7289da;border-left:2px solid #6070d0;border-right:2px solid #2c2e5a;border-bottom:3px solid #2c2e5a;}

/* ── BANNER ── */
.banner-wrap{width:100%;position:relative;overflow:hidden;aspect-ratio:851/315;max-height:315px;background:#050505;}
.banner-img{width:100%;height:100%;object-fit:cover;display:block;}
.banner-gradient{width:100%;height:100%;display:block;}
.banner-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(5,5,5,.7) 100%);pointer-events:none;}

/* ── PROFİL HEADER ── */
.profil-wrap{max-width:960px;margin:0 auto;padding:0 16px;}
.profil-header{background:#0d0d0d;border:1px solid #1a1a1a;border-top:none;border-radius:0 0 8px 8px;margin-bottom:14px;}
.profil-av-row{display:flex;align-items:flex-end;gap:14px;padding:0 20px 14px;margin-top:5px;position:relative;z-index:10;}

/* PP ŞEKİLLERİ */
.pp-wrap{position:relative;cursor:pointer;flex-shrink:0;}
.pp-img{width:200px;height:200px;object-fit:cover;border:3px solid #0d0d0d;}
.pp-circle{border-radius:50%;}
.pp-rounded{border-radius:14px;}
.pp-wrap:hover .pp-img{filter:brightness(.85);}

/* ROZETİ */
.verified-badge svg{width:20px;height:20px;vertical-align:middle;}

.profil-info{flex:1;min-width:0;padding-bottom:30px;}
.nick-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.profil-nick{font-size:40px;font-weight:900;color:#fff;}
.profil-badge{font-size:9px;font-weight:900;text-transform:uppercase;padding:2px 8px;border-radius:3px;white-space:nowrap;}
.b-uye{background:#1a1a1a;color:#666;border:1px solid #2a2a2a;}
.b-abone{background:#0d1f00;color:#39ff14;border:1px solid #2a5000;}
.b-premium{background:#1a1200;color:#FFD700;border:1px solid #4a3500;}
.b-admin{background:#1a0d2a;color:#b933ff;border:1px solid #4a1e7d;}
.klan-badge{font-size:10px;font-weight:900;padding:2px 10px;border-radius:3px;border:1px solid;}

.profil-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:10px;color:#555;margin-bottom:6px;}
.profil-meta span{display:flex;align-items:center;gap:4px;}
.profil-bio{font-size:12px;color:#666;line-height:1.7;margin-bottom:8px;}
.profil-actions{display:flex;gap:7px;flex-wrap:wrap;}

/* KATEGORİ TAG */
.kat-tag{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;padding:3px 10px;border-radius:3px;}
.kat-pvp{background:#1f0d0d;color:#ff4444;border:1px solid #4a1515;}
.kat-icerik{background:#1f0d2a;color:#b933ff;border:1px solid #4a1e7d;}
.kat-developer{background:#1a1200;color:#FFD700;border:1px solid #4a3500;}
.kat-builder{background:#0d1a00;color:#39ff14;border:1px solid #2a5000;}

/* STATS */


/* SEKMELER */
.sekmeler{display:flex;border-top:1px solid #1a1a1a;overflow-x:auto;}
.sekmeler::-webkit-scrollbar{display:none;}
.sekme{padding:11px 14px;font-size:10px;font-weight:900;color:#555;cursor:pointer;border-bottom:3px solid transparent;text-transform:uppercase;white-space:nowrap;transition:.15s;}
.sekme:hover{color:#ccc;}
.sekme.active{color:#39ff14;border-bottom-color:#39ff14;}
.sekme.gold{color:#FFD700 !important;border-bottom-color:#FFD700 !important;}

/* BODY */
.profil-body{width:100%;max-width:1360px;margin:0 auto 40px;padding:0 16px;display:grid;grid-template-columns:130px 1fr 280px 130px;gap:0;align-items:start;}
.reklam-panel{display:flex;flex-direction:column;gap:10px;padding:0 12px;}
.reklam-kart{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;overflow:hidden;cursor:pointer;transition:.15s;}
.reklam-kart:hover{border-color:#2a2a2a;}
.reklam-kart img{width:100%;display:block;}
.reklam-kart-icerik{padding:8px;}
.reklam-kart-isim{font-size:9px;font-weight:900;color:#ccc;text-transform:uppercase;letter-spacing:.3px;}
.reklam-kart-tip{font-size:8px;color:#444;margin-top:2px;}
.sekme-icerik{display:none;}
.sekme-icerik.active{display:block;}

/* KUTU */
.box{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;padding:14px;margin-bottom:12px;}
.box-title{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#444;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.box-title::before{content:'';width:3px;height:10px;background:#39ff14;border-radius:1px;flex-shrink:0;}

/* DROP */
.drop-kart{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;padding:14px;margin-bottom:10px;}
.drop-kart:hover{border-color:#222;}
.drop-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.drop-av{width:34px;height:34px;border-radius:50%;overflow:hidden;border:2px solid #1a1a1a;flex-shrink:0;}
.drop-av img{width:100%;height:100%;object-fit:cover;}
.drop-nick{font-size:12px;font-weight:900;color:#fff;}
.drop-zaman{font-size:9px;color:#444;margin-top:1px;}
.drop-icerik{font-size:13px;color:#bbb;line-height:1.8;margin-bottom:10px;word-break:break-word;}
.drop-gorsel{width:100%;border-radius:6px;max-height:400px;object-fit:cover;margin-bottom:10px;cursor:pointer;display:block;}
.drop-aksiyon{display:flex;gap:12px;border-top:1px solid #1a1a1a;padding-top:10px;}
.drop-btn{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:800;color:#444;cursor:pointer;background:none;border:none;font-family:'Montserrat',sans-serif;text-transform:uppercase;padding:4px 8px;border-radius:3px;transition:.15s;}
.drop-btn:hover{color:#ccc;background:#111;}
.drop-btn.begendi{color:#ff1493;}
.drop-yaz-box{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;padding:14px;margin-bottom:12px;}
.drop-ta{width:100%;background:#111;border:1px solid #222;color:#bbb;padding:10px;border-radius:4px;font-family:'Montserrat',sans-serif;font-size:13px;outline:none;resize:none;min-height:70px;margin-bottom:10px;transition:.15s;}
.drop-ta:focus{border-color:#39ff14;}
.drop-ta::placeholder{color:#333;}

/* YORUM */
.yorum-wrap{margin-top:10px;border-top:1px solid #1a1a1a;padding-top:10px;display:none;}
.yorum-in{flex:1;background:#111;border:1px solid #222;color:#bbb;padding:7px 10px;border-radius:4px;font-family:'Montserrat',sans-serif;font-size:11px;outline:none;}

/* İLAN */
.ilan-kart{background:#111;border:1px solid #1a1a1a;border-radius:6px;padding:12px;margin-bottom:8px;cursor:pointer;transition:.15s;}
.ilan-kart:hover{border-color:#2a2a2a;}
.ilan-tag{font-size:9px;font-weight:900;text-transform:uppercase;padding:2px 7px;border-radius:3px;display:inline-block;margin-bottom:6px;}

/* TAKİPÇİ */
.tkart{display:flex;align-items:center;gap:10px;padding:10px;border-radius:4px;cursor:pointer;transition:.15s;}
.tkart:hover{background:#111;}
.tkav{width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid #1a1a1a;flex-shrink:0;}
.tkav img{width:100%;height:100%;object-fit:cover;}

/* SUNUCU KARTI */
.sunucu-kart{display:flex;align-items:center;gap:10px;background:#111;border:1px solid #1a1a1a;border-radius:6px;padding:8px 10px;margin-bottom:6px;transition:.15s;}
.sunucu-kart:hover{border-color:#2a2a2a;}
.sunucu-logo{width:32px;height:32px;border-radius:5px;object-fit:cover;image-rendering:pixelated;flex-shrink:0;}
.sunucu-logo-ico{width:32px;height:32px;border-radius:5px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}

/* ── AYARLAR ── */
.ayar-bolum{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #1a1a1a;}
.ayar-baslik{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#444;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.ayar-baslik::before{content:'';width:3px;height:10px;background:#FFD700;border-radius:1px;}
.ayar-input{width:100%;background:#111;border:1px solid #222;color:#ccc;padding:11px 12px;border-radius:4px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:600;outline:none;transition:.15s;margin-bottom:8px;}
.ayar-input:focus{border-color:#39ff14;color:#fff;}
.ayar-input::placeholder{color:#333;}

/* BANNER RENK SEÇİCİ */
.renk-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px;}
.renk-btn{height:44px;border-radius:4px;border:2px solid transparent;cursor:pointer;transition:.15s;}
.renk-btn:hover{transform:scale(1.05);}
.renk-btn.on{border-color:#39ff14;}

/* ÇERÇEVE SEÇİCİ */
.cerceve-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.cerceve-btn{background:#111;border:2px solid #1a1a1a;border-radius:6px;padding:12px 8px;cursor:pointer;text-align:center;transition:.15s;}
.cerceve-btn:hover{border-color:#2a2a2a;}
.cerceve-btn.on{border-color:#FFD700;}
.cerceve-btn.on .cerceve-ad{color:#FFD700;}
.cerceve-demo{width:40px;height:40px;margin:0 auto 6px;background:linear-gradient(135deg,#39ff14,#00aa00);border:2px solid #333;}
.cerceve-ad{font-size:9px;font-weight:900;text-transform:uppercase;color:#444;}

/* PP ŞEKİL SEÇİCİ */
.sekil-grid{display:flex;gap:10px;margin-bottom:12px;}
.sekil-btn{flex:1;background:#111;border:2px solid #1a1a1a;border-radius:6px;padding:12px;cursor:pointer;text-align:center;transition:.15s;}
.sekil-btn:hover{border-color:#2a2a2a;}
.sekil-btn.on{border-color:#39ff14;}

/* SUNUCU DÜZENLEME */
.s-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-height:220px;overflow-y:auto;margin-bottom:10px;}
.s-grid::-webkit-scrollbar{width:3px;}
.s-grid::-webkit-scrollbar-thumb{background:#2a2a2a;}
.s-item{background:#111;border:1px solid #1a1a1a;border-radius:5px;padding:8px 5px;cursor:pointer;text-align:center;transition:.15s;}
.s-item:hover{border-color:#2a2a2a;}
.s-item.on{border-color:rgba(57,255,20,.4);background:rgba(57,255,20,.05);}
.s-item.on-tek{border-color:rgba(255,215,0,.5);background:rgba(255,215,0,.05);}
.s-isim-sm{font-size:8px;font-weight:800;color:#444;text-transform:uppercase;margin-top:4px;line-height:1.2;}
.s-item.on .s-isim-sm{color:#39ff14;}
.s-item.on-tek .s-isim-sm{color:#FFD700;}

/* KATEGORİ SEÇİCİ (ayarlar) */
.kat-sec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.kat-sec-btn{background:#111;border:1px solid #1a1a1a;border-radius:5px;padding:12px 8px;cursor:pointer;text-align:center;transition:.15s;}
.kat-sec-btn:hover{border-color:#2a2a2a;}
.kat-sec-btn.on{border-color:rgba(57,255,20,.4);background:rgba(57,255,20,.05);}
.kat-sec-btn .kat-ico{font-size:24px;margin-bottom:5px;}
.kat-sec-btn .kat-lbl{font-size:9px;font-weight:800;color:#555;text-transform:uppercase;}
.kat-sec-btn.on .kat-lbl{color:#39ff14;}
.alt-sec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.alt-btn{background:#111;border:1px solid #1a1a1a;border-radius:4px;padding:8px 5px;cursor:pointer;text-align:center;font-size:9px;font-weight:800;color:#444;text-transform:uppercase;transition:.15s;}
.alt-btn:hover{border-color:#2a2a2a;color:#ccc;}
.alt-btn.on{border-color:rgba(57,255,20,.4);color:#39ff14;background:rgba(57,255,20,.05);}

/* PP ZOOM */
.zoom-modal{position:fixed;inset:0;background:rgba(0,0,0,.97);display:none;align-items:center;justify-content:center;z-index:9999;cursor:zoom-out;}
.zoom-modal.active{display:flex;}
.zoom-modal img{max-width:100vw;max-height:100vh;object-fit:contain;border-radius:0;display:block;}
.zoom-kapat{position:fixed;top:16px;right:20px;background:rgba(0,0,0,.6);border:1px solid #333;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:#fff;z-index:10000;}

/* DM MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:500;padding:20px;}
.modal-bg.active{display:flex;}
.modal{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:20px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:11px;font-weight:900;color:#fff;text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.modal-x{background:none;border:none;color:#444;font-size:18px;cursor:pointer;}

/* LOADING */
#loading{position:fixed;inset:0;background:#050505;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;}
.ld-bar{width:160px;height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden;}
.ld-fill{height:100%;background:#39ff14;animation:ld 1.5s ease infinite;}
@keyframes ld{0%{width:0}50%{width:70%}100%{width:100%}}

/* PP ÇERÇEVE ANİMASYONLARI */
@keyframes neonPulse{0%,100%{box-shadow:0 0 0 3px var(--fc),0 0 8px var(--fc);}50%{box-shadow:0 0 0 3px var(--fc),0 0 20px var(--fc),0 0 35px var(--fc);}}
@keyframes glassSweep{0%{left:-100%;}100%{left:200%;}}
@keyframes rainbowRot{0%{border-color:#ff0000;}17%{border-color:#ffaa00;}33%{border-color:#ffff00;}50%{border-color:#00ff00;}67%{border-color:#00aaff;}83%{border-color:#aa00ff;}100%{border-color:#ff0000;}}

.pp-frame-wrap{position:relative;display:inline-block;}
.pp-frame-wrap .pp-img{border:3px solid transparent;}

/* Çerçeve renkleri - data-frame attribute ile */
[data-frame="none"]{border:3px solid #1a1a1a !important;}
[data-frame="green"]{border:3px solid #39ff14 !important;}
[data-frame="red"]{border:3px solid #ff1a3c !important;}
[data-frame="blue"]{border:3px solid #00d4ff !important;}
[data-frame="gold"]{border:3px solid #FFD700 !important;}
[data-frame="purple"]{border:3px solid #b933ff !important;}
[data-frame="white"]{border:3px solid #ffffff !important;}
[data-frame="dark"]{border:3px solid #444444 !important;}
[data-frame="cyan"]{border:3px solid #00ffcc !important;}
[data-frame="neon-green"]{border:3px solid #39ff14 !important;box-shadow:0 0 0 0 #39ff14;animation:neonPulse 2s ease-in-out infinite;--fc:#39ff14;}
[data-frame="neon-red"]{border:3px solid #ff1a3c !important;animation:neonPulse 2s ease-in-out infinite;--fc:#ff1a3c;}
[data-frame="neon-blue"]{border:3px solid #00d4ff !important;animation:neonPulse 2s ease-in-out infinite;--fc:#00d4ff;}
[data-frame="neon-gold"]{border:3px solid #FFD700 !important;animation:neonPulse 2s ease-in-out infinite;--fc:#FFD700;}
[data-frame="rainbow"]{animation:rainbowRot 3s linear infinite;}
[data-frame="glass"]{border:8px solid rgba(255,255,255,.2) !important;}
.frame-glass-anim{overflow:hidden;position:relative;}
.frame-glass-anim::after{content:'';position:absolute;top:-10%;left:-100%;width:40%;height:120%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);animation:glassSweep 3s ease-in-out infinite;pointer-events:none;}

/* ÇERÇEVE SEÇİCİ */
.cerceve-sec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.cerceve-sec-btn{background:#111;border:1px solid #1a1a1a;border-radius:6px;padding:10px 6px;cursor:pointer;text-align:center;transition:.15s;}
.cerceve-sec-btn:hover{border-color:#2a2a2a;}
.cerceve-sec-btn.on{border-color:#39ff14;}
.cerceve-sec-btn.premium-frame{opacity:.7;}
.cerceve-sec-btn.premium-frame.on{border-color:#FFD700;opacity:1;}
.cerceve-demo-img{width:36px;height:36px;border-radius:50%;border:3px solid;margin:0 auto 5px;background:linear-gradient(135deg,#1a1a1a,#333);}
.cerceve-lbl{font-size:8px;font-weight:800;color:#444;text-transform:uppercase;}

.abone-gerek{background:#1a1200;border:1px solid #4a3500;border-radius:6px;padding:10px 14px;font-size:10px;color:#FFD700;font-weight:700;text-align:center;margin-bottom:8px;}

.profil-body>div:nth-child(2){padding:0 8px;}.profil-body>div:nth-child(3){padding:0 8px;}
@media(max-width:1100px){.profil-body{grid-template-columns:1fr 280px;}.reklam-panel{display:none;}}
@media(max-width:768px){.profil-body{grid-template-columns:1fr;}.pp-img{width:100px;height:100px;}.profil-nick{font-size:24px;}}

/* BİLDİRİM ZİLİ */
.nav-zil{position:relative;cursor:pointer;color:#555;font-size:18px;transition:.15s;text-decoration:none;display:flex;align-items:center;padding:6px;}
.nav-zil:hover{color:#ccc;}
.nav-zil .badge{position:absolute;top:0;right:0;background:#39ff14;color:#000;font-size:8px;font-weight:900;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px;}
.nav-zil .badge.var{display:flex;}
</style>
</head>
<body>
<div id="loading"><img src="https://i.imgur.com/6l08Y4k.png" style="height:48px;"><div class="ld-bar"><div class="ld-fill"></div></div></div>

<div class="zoom-modal" id="zoom-modal" onclick="if(event.target===this||event.target===document.getElementById('zoom-img'))this.classList.remove('active')">
  <div class="zoom-kapat" onclick="document.getElementById('zoom-modal').classList.remove('active')">✕</div>
  <img id="zoom-img" src="" alt="">
</div>
<div class="modal-bg" id="dm-modal" onclick="if(event.target===this)this.classList.remove('active')">
  <div class="modal">
    <div class="modal-title"><span id="dm-baslik">Mesaj</span><button class="modal-x" onclick="document.getElementById('dm-modal').classList.remove('active')">✕</button></div>
    <div id="dm-body"></div>
  </div>
</div>

  +(profil.dogrulama_rozeti?verifiedSVG():'')

  +(profil.yas?'<span><i class="fa-solid fa-cake-candles"></i> '+profil.yas+'</span>':'')
  +(profil.discord?'<span><i class="fa-brands fa-discord" style="color:#5865F2;"></i> '+profil.discord+'</span>':'')

  +'</div>'
  // Bio
  +(profil.bio?'<div style="font-size:12px;color:#777;line-height:1.7;margin-bottom:10px;">'+esc(profil.bio)+'</div>':'')
  // Aksiyonlar
  +'<div style="display:flex;gap:7px;flex-wrap:wrap;">'+takipBtn+'</div>'
  +'</div></div>'
  // SEKMELER
  +'<div class="sekmeler" id="sekmeler">'+sekmelerHTML+'</div>'
  +'</div></div>'

  // BODY
  +'<div style="max-width:940px;margin:0 auto;padding:0 16px 40px;display:grid;grid-template-columns:1fr 280px;gap:14px;align-items:start;">'

  +'<div>'
  +'<div class="sekme-icerik active" id="sekme-droplar">'+gizliHTML+'<div id="droplar-liste"></div></div>'

  +'<div class="sekme-icerik" id="sekme-takip"><div id="takip-liste"><div style="text-align:center;padding:20px;color:#444;font-size:11px;">Sekmeye tıkla</div></div></div>'

  +(ben?'<div class="sekme-icerik" id="sekme-hesapayar">'+hesapAyarHTML2+'</div>':'')
  +'</div>'
  // SAĞ
  +'<div>'
  +'<div class="box"><div class="box-title">Hakkında</div>'
  +(katilim?'<div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #111;font-size:11px;"><span style="color:#444;">📅</span><span style="color:#999;">'+katilim+"'dan beri üye</span></div>":'')
  +(profil.yas?'<div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #111;font-size:11px;"><span style="color:#444;">🎂</span><span style="color:#999;">'+profil.yas+' yaşında</span></div>':'')
  +(profil.discord?'<div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #111;font-size:11px;"><span style="color:#5865F2;"><i class="fa-brands fa-discord"></i></span><span style="color:#999;">'+profil.discord+'</span></div>':'')
  +(profil.kategori?'<div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #111;font-size:11px;"><span style="color:#444;">'+(KAT_IKON[profil.kategori]||'🎮')+'</span><span style="color:#999;">'+(profil.alt_kategori||profil.kategori).toUpperCase()+'</span></div>':'')
  +'</div>'
  +klanHTML+sunucuHTML
  +'</div>'
  +'</div>';

  if(!gizliVeTakipciDegil) renderDroplar(droplar,av,nick);
  requestAnimationFrame(()=>initBannerCanvas());
  reklamlariYukle();
  navYukle();
}


// ── TAKİP SİSTEMİ ──
async function takipIstegiGonder(){
  if(!benKim){location.href='/lobbygg/giris.html';return;}
  const btn=document.getElementById('takip-btn');
  if(btn){btn.disabled=true;btn.style.opacity='.6';}
  const bid=Number(benKim.id),pid=Number(profil.id);
  try{
    const{error}=await SB.from('takip_istekleri').upsert(
      {gonderen_id:bid,alici_id:pid,durum:'beklemede'},
      {onConflict:'gonderen_id,alici_id'}
    );
    if(error)throw error;
    bildirimGonder(pid,bid,'takip_istegi','Sana takip isteği gönderdi.','/lobbygg/profil.html?id='+bid);
    takipIstegiVar=true;
    if(btn){btn.disabled=false;btn.style.opacity='1';btn.className='mc-btn mc-gray';btn.onclick=takipIstegiGeriAl;btn.innerHTML='<i class="fa-solid fa-clock"></i> İstek Gönderildi';}
  }catch(e){if(btn){btn.disabled=false;btn.style.opacity='1';}alert('Hata: '+e.message);}
}

async function takipIstegiGeriAl(){
  if(!benKim)return;
  const btn=document.getElementById('takip-btn');
  if(btn){btn.disabled=true;btn.style.opacity='.6';}
  try{
    await SB.from('takip_istekleri').delete().eq('gonderen_id',Number(benKim.id)).eq('alici_id',Number(profil.id));
    takipIstegiVar=false;
    if(btn){btn.disabled=false;btn.style.opacity='1';btn.className='mc-btn mc-green';btn.onclick=takipIstegiGonder;btn.innerHTML='<i class="fa-solid fa-user-plus"></i> Takip İsteği Gönder';}
  }catch(e){if(btn){btn.disabled=false;btn.style.opacity='1';}alert('Hata: '+e.message);}
}

async function takipToggle(){
  if(!benKim){location.href='/lobbygg/giris.html';return;}
  const btn=document.getElementById('takip-btn');
  if(btn){btn.disabled=true;btn.style.opacity='.6';}
  const bid=Number(benKim.id),pid=Number(profil.id);
  try{
    if(takipEdiyorMu){
      const{error}=await SB.from('takipler').delete().eq('takip_eden_id',bid).eq('takip_edilen_id',pid);
      if(error)throw error;
      await Promise.all([
        SB.from('kullanicilar').update({takipci_sayisi:Math.max(0,(profil.takipci_sayisi||1)-1)}).eq('id',pid),
        SB.from('kullanicilar').update({takip_sayisi:Math.max(0,(benKim.takip_sayisi||1)-1)}).eq('id',bid)
      ]);
      profil.takipci_sayisi=Math.max(0,(profil.takipci_sayisi||1)-1);
      takipEdiyorMu=false;
      if(btn){btn.disabled=false;btn.style.opacity='1';btn.className='mc-btn mc-green';btn.innerHTML='<i class="fa-solid fa-user-plus"></i> Takip Et';}
    }else{
      const{count}=await SB.from('takipler').select('*',{count:'exact',head:true}).eq('takip_eden_id',bid).eq('takip_edilen_id',pid);
      if(!count){
        const{error}=await SB.from('takipler').insert({takip_eden_id:bid,takip_edilen_id:pid});
        if(error)throw error;
        await Promise.all([
          SB.from('kullanicilar').update({takipci_sayisi:(profil.takipci_sayisi||0)+1}).eq('id',pid),
          SB.from('kullanicilar').update({takip_sayisi:(benKim.takip_sayisi||0)+1}).eq('id',bid)
        ]);
        profil.takipci_sayisi=(profil.takipci_sayisi||0)+1;
        bildirimGonder(pid,bid,'takip','Seni takip etmeye başladı.','/lobbygg/profil.html?id='+bid);
      }
      takipEdiyorMu=true;
      if(btn){btn.disabled=false;btn.style.opacity='1';btn.className='mc-btn mc-red';btn.innerHTML='<i class="fa-solid fa-user-minus"></i> Takibi Bırak';}
    }
  }catch(e){if(btn){btn.disabled=false;btn.style.opacity='1';}alert('Hata: '+e.message);}
}

// Profil sahibinin BENİMLE ilgili isteği
async function gelerekIstekKabul(){
  if(!benKim||!window.__banaIstekData?.length)return;
  const istek=window.__banaIstekData[0];
  await SB.from('takip_istekleri').update({durum:'kabul'}).eq('id',istek.id);
  await SB.from('takipler').insert({takip_eden_id:Number(profil.id),takip_edilen_id:Number(benKim.id)});
  const{data:bd}=await SB.from('kullanicilar').select('takipci_sayisi').eq('id',Number(benKim.id)).single();
  await SB.from('kullanicilar').update({takipci_sayisi:(bd?.takipci_sayisi||0)+1}).eq('id',Number(benKim.id));
  await SB.from('bildirimler').insert({alici_id:Number(profil.id),gonderen_id:Number(benKim.id),tip:'takip_kabul',icerik:'Takip isteğini kabul etti.',link:'/lobbygg/profil.html?id='+benKim.id,okundu:false});
  window.__beniTakipEtmekIstiyor=false;
  alert('Takip isteği kabul edildi!');
  location.reload();
}
async function gelerekIstekReddet(){
  if(!benKim||!window.__banaIstekData?.length)return;
  const istek=window.__banaIstekData[0];
  await SB.from('takip_istekleri').update({durum:'red'}).eq('id',istek.id);
  window.__beniTakipEtmekIstiyor=false;
  alert('Takip isteği reddedildi.');
  location.reload();
}

// ── NAV ──
async function navYukle(){
  try{
    if(!benKim)return;
    window.__benId=benKim.id;
    const navAv=document.getElementById('nav-av');
    const navKul=document.getElementById('nav-kullanici');
    const navGiris=document.getElementById('nav-giris');
    if(navAv)navAv.src=benKim.avatar_url||'https://minotar.net/helm/'+(benKim.kullanici_adi||'Steve')+'/30.png';
    if(navKul)navKul.style.display='flex';
    if(navGiris)navGiris.style.display='none';
    const lc=document.getElementById('nav-lcoin');
    if(lc)lc.textContent=(benKim.lcoin||0)+' LC';
    const{count}=await SB.from('bildirimler').select('*',{count:'exact',head:true}).eq('alici_id',Number(benKim.id)).eq('okundu',false);
    const badge=document.getElementById('nav-zil-badge');
    if(badge&&count>0){badge.textContent=count>9?'9+':count;badge.style.display='flex';}
  }catch(e){}
}
