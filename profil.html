async function handleProfileBoost(btn) {
  if (!currentUser) return;

  const modalId = 'modal-boost';
  let overlay = document.getElementById(modalId);
  if (overlay) overlay.remove();

  overlay = el('div', {className:'modal-overlay open', id:modalId, style:{display:'flex'}});
  const inner = el('div', {className:'modal', style:{maxWidth:'400px'}});

  const header = el('div', {className:'modal-header'});
  const title = el('div', {className:'modal-title', textContent:'🚀 Profili Öne Çıkar'});
  const closeBtn = el('button', {className:'modal-close', textContent:'✕'});
  closeBtn.addEventListener('click', () => overlay.remove());
  header.appendChild(title);
  header.appendChild(closeBtn);
  inner.appendChild(header);

  const body = el('div', {className:'modal-body', style:{padding:'20px'}});
  const infoTxt = el('p', {style:{color:'var(--text-2)', fontSize:'14px', marginBottom:'15px'}, textContent:'Profilinizi öne çıkararak Keşfet ve diğer alanlarda üst sıralarda görünün.'});
  body.appendChild(infoTxt);

  const costInfo = el('p', {style:{color:'var(--accent)', fontWeight:'800', marginBottom:'15px'}, textContent:'Maliyet: Günlük 5 LCoin'});
  body.appendChild(costInfo);

  const group = el('div', {className:'input-group'});
  const label = el('label', {className:'input-label', textContent:'Kaç gün öne çıkarmak istiyorsunuz? (Max: 15)'});
  const input = el('input', {className:'input-field', attrs:{type:'number', min:'1', max:'15', value:'3'}});
  group.appendChild(label);
  group.appendChild(input);
  body.appendChild(group);

  const totalCost = el('div', {style:{marginTop:'10px', fontSize:'16px', fontWeight:'900', color:'var(--text-1)'}, textContent:'Toplam: 15 LCoin'});
  input.addEventListener('input', () => {
    let d = parseInt(input.value) || 0;
    if (d > 15) { d = 15; input.value = 15; }
    if (d < 1) { d = 1; input.value = 1; }
    totalCost.textContent = `Toplam: ${d * 5} LCoin`;
  });
  body.appendChild(totalCost);
  inner.appendChild(body);

  const footer = el('div', {className:'modal-footer'});
  const cancelBtn = el('button', {className:'btn mc-gray', textContent:'İptal'});
  cancelBtn.addEventListener('click', () => overlay.remove());
  const confirmBtn = el('button', {className:'btn mc-gold', textContent:'🚀 Onayla'});
  
  confirmBtn.addEventListener('click', async () => {
    const days = parseInt(input.value);
    if (isNaN(days) || days <= 0 || days > 15) {
      toast('Lütfen 1 ile 15 arasında bir gün sayısı girin.', 'error');
      return;
    }
    const cost = days * 5;
    if ((currentUser.lcoin || 0) < cost) {
      toast(`Yetersiz bakiye! ${cost} LCoin gerekiyor.`, 'error');
      return;
    }

    confirmBtn.disabled = true;
    confirmBtn.textContent = '⏳ İşleniyor...';

    try {
      const bitisDate = new Date(Date.now() + days * 24 * 60 * 60 * 1000).toISOString();
      currentUser.lcoin -= cost;
      currentUser.profil_one_cikan_bitis = bitisDate;
      profileUser.lcoin = currentUser.lcoin;
      profileUser.profil_one_cikan_bitis = currentUser.profil_one_cikan_bitis;

      if (sb) {
        await sb.from('kullanicilar').update({
          lcoin: currentUser.lcoin,
          profil_one_cikan_bitis: currentUser.profil_one_cikan_bitis
        }).eq('id', currentUser.id);
      }
      
      try {
        const localUsers = localStorage.getItem('lobby_kullanicilar');
        if (localUsers) {
          const users = JSON.parse(localUsers);
          const uIdx = users.findIndex(u => u.id === currentUser.id);
          if (uIdx !== -1) {
            users[uIdx] = { ...users[uIdx], ...currentUser };
            localStorage.setItem('lobby_kullanicilar', JSON.stringify(users));
          }
        }
      } catch(e) {}
      
      toast(`Profiliniz başarıyla ${days} gün öne çıkarıldı!`, 'success');
      renderProfileHeader();
      overlay.remove();
    } catch(err) {
      console.error(err);
      toast('Bir hata oluştu.', 'error');
      confirmBtn.disabled = false;
      confirmBtn.textContent = '🚀 Onayla';
    }
  });

  footer.appendChild(cancelBtn);
  footer.appendChild(confirmBtn);
  inner.appendChild(footer);

  overlay.appendChild(inner);
  document.body.appendChild(overlay);
}

async function handleBoostClick(ilan, btn) {
  if (!currentUser) {
    showToast('Lütfen giriş yapın.', true);
    return;
  }

  btn.disabled = true;
  const originalText = btn.textContent;
  btn.textContent = '⏳ ...';

  try {
    const settings = await window.dbHelper.getSiteSettings();
    const role = currentUser.abonelik || 'uye';
    
    // Determine free rights count
    let freeRights = currentUser.kalan_one_cikarma;
    if (freeRights === undefined || freeRights === null) {
      if (role === 'abone') freeRights = 3;
      else if (['premium', 'yonetici', 'admin', 'moderator', 'rehber'].includes(role)) freeRights = 10;
      else freeRights = 0;
    }

    let useFreeRight = false;
    let cost = 0;

    if (freeRights > 0) {
      useFreeRight = true;
      cost = 0;
    } else {
      if (role === 'uye') cost = settings.boost_cost_uye || 15;
      else if (role === 'abone') cost = settings.boost_cost_abone || 10;
      else cost = settings.boost_cost_premium || 5;
    }

    let confirmMsg = '';
    if (useFreeRight) {
      confirmMsg = `Bu ilanı ücretsiz öne çıkarma hakkınızı kullanarak öne çıkarmak istiyor musunuz?\n(Kalan Ücretsiz Hak: ${freeRights})`;
    } else {
      confirmMsg = `Bu ilanı öne çıkarmak için ${cost} LCoin harcanacaktır.\n(Mevcut LCoininiz: ${currentUser.lcoin || 0})\n\nDevam etmek istiyor musunuz?`;
    }

    if (!confirm(confirmMsg)) {
      btn.disabled = false;
      btn.textContent = originalText;
      return;
    }

    if (!useFreeRight && (currentUser.lcoin || 0) < cost) {
      if (confirm('Yetersiz LCoin! Mağazaya gidip LCoin satın almak ister misiniz?')) {
        window.location.href = 'market.html';
      }
      btn.disabled = false;
      btn.textContent = originalText;
      return;
    }

    const newFreeRights = useFreeRight ? freeRights - 1 : freeRights;
    const newLcoins = useFreeRight ? (currentUser.lcoin || 0) : (currentUser.lcoin || 0) - cost;

    // Supabase update
    if (sb) {
      const userUpdate = {};
      if (useFreeRight) {
        userUpdate.kalan_one_cikarma = newFreeRights;
      } else {
        userUpdate.lcoin = newLcoins;
      }
      
      const { error: userErr } = await sb.from('kullanicilar').update(userUpdate).eq('id', currentUser.id);
      if (userErr) throw userErr;

      const { error: ilanErr } = await sb.from('ilanlar').update({ one_cikan: true }).eq('id', ilan.id);
      if (ilanErr) throw ilanErr;
    }

    // Update state & LocalStorage fallback
    if (useFreeRight) {
      currentUser.kalan_one_cikarma = newFreeRights;
    } else {
      currentUser.lcoin = newLcoins;
      const navL = document.getElementById('navLcoin');
      if (navL) navL.textContent = newLcoins.toLocaleString();
    }

    // Sync localStorage for listings
    try {
      const local = localStorage.getItem('lobby_ilanlar');
      if (local) {
        const arr = JSON.parse(local);
        const idx = arr.findIndex(i => i.id === ilan.id);
        if (idx !== -1) {
          arr[idx].one_cikan = true;
          localStorage.setItem('lobby_ilanlar', JSON.stringify(arr));
        }
      }
    } catch(e) {}

    // Sync localStorage for users
    try {
      const localUsers = localStorage.getItem('lobby_kullanicilar');
      if (localUsers) {
        const users = JSON.parse(localUsers);
        const uIdx = users.findIndex(u => u.id === currentUser.id);
        if (uIdx !== -1) {
          users[uIdx] = { ...users[uIdx], ...currentUser };
          localStorage.setItem('lobby_kullanicilar', JSON.stringify(users));
        }
      }
    } catch(e) {}

    showToast('🚀 İlan başarıyla öne çıkarıldı!');
    
    // Re-render tab
    const tabContent = document.getElementById('tabContent');
    if (tabContent) {
      tabContent.innerHTML = '';
      await renderIlanlarTab(tabContent);
    }
  } catch (err) {
    console.error(err);
    showToast('Bir hata oluştu: ' + err.message, true);
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

async function renderIlanlarTab(container) {
  const wrap = el('div', {className:'fade-in-up'});
  const spinner = el('div', {className:'empty-state'});
  spinner.appendChild(el('div', {className:'spinner'}));
  wrap.appendChild(spinner);
  container.appendChild(wrap);

  let ilanlar = [];

  if (sb) {
    try {
      const { data } = await sb.from('ilanlar')
        .select('*')
        .eq('kullanici_id', profileUser.id)
        .order('one_cikan', {ascending:false})
        .order('id', {ascending:false});
      if (data) {
        ilanlar = data.filter(ilan => {
          if (isOwnProfile) return ['aktif', 'onaylandi', 'beklemede'].includes(ilan.durum);
          return ['aktif', 'onaylandi'].includes(ilan.durum);
        });
      }
    } catch (err) {
      console.warn("Supabase listings load failed in profile, checking localStorage");
    }
  }

  if (!ilanlar || !ilanlar.length) {
    try {
      const local = localStorage.getItem('lobby_ilanlar');
      if (local) {
        const arr = JSON.parse(local);
        ilanlar = arr.filter(ilan => {
          if (ilan.kullanici_id !== profileUser.id) return false;
          if (isOwnProfile) return ['aktif', 'onaylandi', 'beklemede'].includes(ilan.durum);
          return ['aktif', 'onaylandi'].includes(ilan.durum);
        });
        ilanlar.sort((a, b) => {
          if (a.one_cikan !== b.one_cikan) return b.one_cikan ? 1 : -1;
          return b.id - a.id;
        });
      }
    } catch(e) {}
  }

  spinner.remove();

  if (!ilanlar || !ilanlar.length) {
    const es = el('div', {className:'empty-state'});
    es.appendChild(el('div', {className:'empty-state-icon', textContent:'📣'}));
    es.appendChild(el('div', {className:'empty-state-title', textContent:'İlan Yok'}));
    es.appendChild(el('div', {className:'empty-state-sub', textContent:'Bu kullanıcının aktif ilanı bulunmuyor.'}));
    wrap.appendChild(es);
    return;
  }

  const CAT_COLORS = { PvP: '#ff1a3c', 'İçerik': '#b933ff', Developer: '#00d4ff', Builder: '#ffa500', Sunucu: '#FFD700' };
  const CAT_ICONS = { PvP: '⚔️', 'İçerik': '🎬', Developer: '💻', Builder: '🏗️', Sunucu: '👑' };
  const CAT_GRADIENT = {
    PvP: 'linear-gradient(135deg, #1a0008, #3d0015)',
    'İçerik': 'linear-gradient(135deg, #140020, #2d0050)',
    Developer: 'linear-gradient(135deg, #001a20, #003040)',
    Builder: 'linear-gradient(135deg, #1a1000, #3d2800)',
    Sunucu: 'linear-gradient(135deg, #1a1500, #3d3000)',
  };
  const CAT_BADGE_MAP_LOCAL = { PvP: 'b-pvp', 'İçerik': 'b-icerik', Developer: 'b-developer', Builder: 'b-builder', Sunucu: 'b-yonetici-cat' };

  function formatRemainingTimeLocal(createdDateStr) {
    if (!createdDateStr) return "Süre doldu";
    const createdDate = new Date(createdDateStr);
    const expiryDate = new Date(createdDate.getTime() + 30 * 24 * 60 * 60 * 1000);
    const now = new Date();
    const diffMs = expiryDate - now;
    if (diffMs <= 0) return "Süre doldu";
    const diffDays = Math.floor(diffMs / (24 * 60 * 60 * 1000));
    const diffHours = Math.floor((diffMs % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
    return `⏳ ${diffDays}g ${diffHours}sa kaldı`;
  }

  const grid = el('div', {className:'ilan-grid'});
  ilanlar.forEach(ilan => {
    const wrapper = el('div', {className: 'ilan-card-wrapper' + (ilan.one_cikan ? ' featured' : '')});
    const card = el('div', {className: 'ilan-card' + (ilan.one_cikan ? ' featured' : '')});

    // Banner
    const banner = el('div', {className: 'card-banner'});
    const bannerSrc = ilan.banner_url || ilan.gorsel_url || ilan.resim_url;
    if (bannerSrc) {
      const img = el('img', {attrs: {src: bannerSrc, alt: ilan.baslik, loading: 'lazy'}});
      banner.appendChild(img);
    } else {
      const grad = el('div', {className: 'card-banner-gradient', style: {background: CAT_GRADIENT[ilan.kategori] || 'linear-gradient(135deg, #0d0d0d, #1a1a1a)'}});
      const ico = el('div', {className: 'card-banner-icon', textContent: CAT_ICONS[ilan.kategori] || '📋'});

    }

    banner.appendChild(remainingEl);

    const badges = el('div', {className: 'card-badges'});
    const catBadge = el('span', {className: 'badge b-cat ' + (CAT_BADGE_MAP_LOCAL[ilan.kategori] || 'b-diger'), textContent: (CAT_ICONS[ilan.kategori] || '') + ' ' + (ilan.kategori || '')});
    badges.appendChild(catBadge);

    if (ilan.one_cikan) {
      const ocBadge = el('span', {className: 'badge b-gold', textContent: '⭐ Öne Çıkan'});
      badges.appendChild(ocBadge);

    userIds = (data||[]).map(r=>r.takip_edilen_id);
  }

  spinner.remove();

  if (!userIds.length) {
    const es = el('div', {className:'empty-state'});
    es.appendChild(el('div', {className:'empty-state-icon', textContent: type==='takipciler'?'👥':'👤'}));
    es.appendChild(el('div', {className:'empty-state-title', textContent:type==='takipciler'?'Takipçi Yok':'Takip Edilmiyor'}));
    wrap.appendChild(es);
    return;
  }

  const { data: users } = await sb.from('kullanicilar').select('id,kullanici_adi,avatar_url,abonelik,aktif_cerceve').in('id', userIds);

  let myFollowingIds = new Set();
  if (currentUser) {
    const { data: mf } = await sb.from('takipler').select('takip_edilen_id').eq('takip_eden_id', currentUser.id);
    if (mf) mf.forEach(r => myFollowingIds.add(r.takip_edilen_id));
  }

  const list = el('div', {className:'follow-list'});
  (users||[]).forEach(u => {
    const item = el('div', {className:'follow-item'});
    const pp = el('img', {className:'follow-item-pp', attrs:{src:ppSrc(u), alt:u.kullanici_adi}});
    pp.addEventListener('click', () => { window.location.href=`profil.html?id=${u.id}`; });

    const info = el('div', {className:'follow-item-info'});
    const nick = el('div', {className:'follow-item-nick', textContent:u.kullanici_adi});
    const abMap2 = {uye:'Üye',abone:'Abone',premium:'Premium',admin:'Admin',yonetici:'Yönetici',kurucu:'Kurucu',moderator:'Moderatör',rehber:'Rehber'};
    const sub = el('div', {className:'follow-item-sub', textContent:abMap2[u.abonelik||'uye']||'Üye'});
    info.appendChild(nick);
    info.appendChild(sub);

    item.appendChild(pp);
    item.appendChild(info);

    if (currentUser && u.id !== currentUser.id) {
      const isFollowingU = myFollowingIds.has(u.id);
      const fBtn = el('button', {className:`btn mc-sm ${isFollowingU?'mc-gray':'mc-green'}`, textContent:isFollowingU?'Takip Ediliyor':'Takip Et'});
      let fw = isFollowingU;
      fBtn.addEventListener('click', async () => {
        fBtn.disabled = true;
        if (fw) {
          await sb.from('takipler').delete().eq('takip_eden_id',currentUser.id).eq('takip_edilen_id',u.id);
          fBtn.className = 'btn mc-sm mc-green';
          fBtn.textContent = 'Takip Et';
          fw = false;
          myFollowingIds.delete(u.id);
        } else {
          await sb.from('takipler').insert({takip_eden_id:currentUser.id, takip_edilen_id:u.id});
          fBtn.className = 'btn mc-sm mc-gray';
          fBtn.textContent = 'Takip Ediliyor';
          fw = true;
          myFollowingIds.add(u.id);
        }
        fBtn.disabled = false;
      });
      item.appendChild(fBtn);
    }

    list.appendChild(item);
  });
  wrap.appendChild(list);
}

    const item = el('div', {className:'server-picker-item' + (selectedDestServer===srv.ip?' selected':'')});

    const name = el('div', {className:'server-picker-name', textContent:srv.name});
    item.appendChild(logo);
    item.appendChild(name);
    item.addEventListener('click', () => {
      selectedDestServer = srv.ip;
      destGrid.querySelectorAll('.server-picker-item').forEach(i=>i.classList.remove('selected'));
      item.classList.add('selected');
    });
    destGrid.appendChild(item);
  });
  sunucuSec.appendChild(destGrid);

  const favLabel = el('div', {className:'input-label', style:{margin:'14px 0 8px'}});
  favLabel.textContent = 'FAVORİ SUNUCULAR (maks 5)';
  sunucuSec.appendChild(favLabel);

  selectedFavServers = Array.isArray(profileUser.favori_sunucular) ? [...profileUser.favori_sunucular] : [];
  const favGrid = el('div', {className:'server-picker-grid', id:'favServerGrid'});

  SERVERS.forEach(srv => {
    const item = el('div', {className:'server-picker-item' + (selectedFavServers.includes(srv.ip)?' selected':'')});
    const logo = el('img', {className:'server-picker-logo', attrs:{src:serverLogo(srv.ip), alt:srv.name}});
    logo.onerror = function() { this.src='https://ui-avatars.com/api/?name=MC&background=1a1a1a&color=39ff14&size=36'; };
    const name = el('div', {className:'server-picker-name', textContent:srv.name});
    item.appendChild(logo);
    item.appendChild(name);
    item.addEventListener('click', () => {
      const idx = selectedFavServers.indexOf(srv.ip);
      if (idx > -1) {
        selectedFavServers.splice(idx, 1);
        item.classList.remove('selected');
      } else {
        if (selectedFavServers.length >= 5) { toast('En fazla 5 favori sunucu seçebilirsin!', 'error'); return; }
        selectedFavServers.push(srv.ip);
        item.classList.add('selected');
      }
    });
    favGrid.appendChild(item);
  });
  sunucuSec.appendChild(favGrid);
  wrap.appendChild(sunucuSec);

  // Save Button
  const saveBtn = el('button', {className:'btn mc-green mc-lg', style:{width:'100%', marginTop:'8px'}});
  saveBtn.textContent = '💾 Değişiklikleri Kaydet';
  saveBtn.addEventListener('click', async () => {
    saveBtn.disabled = true;
    saveBtn.textContent = '...';

    const updates = {
      bio: bioTa.value.trim(),
      discord: document.getElementById('discordInput').value.trim(),
      kategori: katSelect.value,
      alt_kategori: document.getElementById('altKategoriInput') ? document.getElementById('altKategoriInput').value.trim() : '',
      aktif_cerceve: selectedFrame || profileUser.aktif_cerceve,
      pp_sekil: selectedShape || profileUser.pp_sekil,
      banner_renk: savedBannerColor || profileUser.banner_renk,
      desteklenen_sunucu: selectedDestServer,
      favori_sunucular: selectedFavServers
    };

    // Upload PP
    if (newPPFile) {
      const path = `avatars/${currentUser.id}/${Date.now()}`;
      const { error } = await sb.storage.from('media').upload(path, newPPFile);
      if (!error) {
        const { data: { publicUrl } } = sb.storage.from('media').getPublicUrl(path);
        updates.avatar_url = publicUrl;
      }
    }

    // Upload Banner
    if (newBannerFile) {
      const path2 = `banners/${currentUser.id}/${Date.now()}`;
      const { error: be } = await sb.storage.from('media').upload(path2, newBannerFile);
      if (!be) {
        const { data: { publicUrl: bUrl } } = sb.storage.from('media').getPublicUrl(path2);
        updates.banner_url = bUrl;
        updates.banner_renk = null;
      }
    }

    const { error: saveErr } = await sb.from('kullanicilar').update(updates).eq('id', currentUser.id);
    if (saveErr) {
      toast('Kayıt sırasında hata oluştu: ' + saveErr.message, 'error');
    } else {
      // Update local
      Object.assign(profileUser, updates);
      Object.assign(currentUser, updates);
      renderBanner();
      renderProfileHeader();
      toast('Profil güncellendi! ✓', 'success');
    }

    saveBtn.disabled = false;
    saveBtn.textContent = '💾 Değişiklikleri Kaydet';
  });
  wrap.appendChild(saveBtn);

  container.appendChild(wrap);
}

  const privTitle = el('div', {className:'settings-section-title', textContent:'🔒 Gizlilik'});
  privSec.appendChild(privTitle);

  const toggleWrap = el('div', {className:'toggle-wrap', style:{marginBottom:'16px'}});
  const toggle = el('div', {className:'toggle' + (profileUser.profil_gizli?' on':'')});
  let privToggle = !!profileUser.profil_gizli;
  toggle.addEventListener('click', () => {
    privToggle = !privToggle;
    toggle.classList.toggle('on', privToggle);
  });
  const toggleLabel = el('span', {style:{fontSize:'13px',color:'var(--text-2)',fontWeight:'600'}});
  toggleLabel.textContent = 'Gizli Hesap (sadece takipçiler görebilir)';
  toggleWrap.appendChild(toggle);
  toggleWrap.appendChild(toggleLabel);
  privSec.appendChild(toggleWrap);

  // Mesaj ayar
  const msgTitle = el('div', {style:{fontSize:'11px',fontWeight:'900',textTransform:'uppercase',letterSpacing:'0.5px',color:'var(--text-2)',marginBottom:'10px'}});
  msgTitle.textContent = 'Mesaj Gönderebilecekler';
  privSec.appendChild(msgTitle);

  const msgOpts = [
    {val:'herkes', label:'Herkes'},
    {val:'takipciler', label:'Sadece Takipçilerim'},
    {val:'hic', label:'Kimse (Mesajları Kapat)'}
  ];
  let selectedMsg = profileUser.mesaj_ayar || 'herkes';
  const radioGroup = el('div', {className:'radio-group'});
  msgOpts.forEach(o => {
    const opt = el('div', {className:'radio-opt' + (selectedMsg===o.val?' selected':'')});
    const circle = el('div', {className:'radio-circle'});
    const dot = el('div', {className:'radio-dot'});
    circle.appendChild(dot);
    const txt = el('div', {className:'radio-text', textContent:o.label});
    opt.appendChild(circle);
    opt.appendChild(txt);
    opt.addEventListener('click', () => {
      selectedMsg = o.val;
      radioGroup.querySelectorAll('.radio-opt').forEach(r=>r.classList.remove('selected'));
      opt.classList.add('selected');
    });
    radioGroup.appendChild(opt);
  });
  privSec.appendChild(radioGroup);

  const savePrivBtn = el('button', {className:'btn mc-green', style:{marginTop:'14px'}});
  savePrivBtn.textContent = '💾 Gizlilik Kaydet';
  savePrivBtn.addEventListener('click', async () => {
    savePrivBtn.disabled = true;
    await sb.from('kullanicilar').update({profil_gizli:privToggle, mesaj_ayar:selectedMsg}).eq('id', currentUser.id);
    profileUser.profil_gizli = privToggle;
    profileUser.mesaj_ayar = selectedMsg;
    currentUser.profil_gizli = privToggle;
    currentUser.mesaj_ayar = selectedMsg;
    toast('Gizlilik ayarları kaydedildi!', 'success');
    savePrivBtn.disabled = false;
  });
  privSec.appendChild(savePrivBtn);
  wrap.appendChild(privSec);

  // — Takip İstekleri —
  const reqSec = el('div', {className:'settings-section'});
  const reqTitle = el('div', {className:'settings-section-title', textContent:'👋 Takip İstekleri'});
  reqSec.appendChild(reqTitle);

  const reqLoading = el('div', {className:'empty-state'});
  reqLoading.appendChild(el('div', {className:'spinner'}));
  reqSec.appendChild(reqLoading);
  wrap.appendChild(reqSec);

  const { data: requests } = await sb.from('takip_istekleri')
    .select('*')
    .eq('alici_id', currentUser.id)
    .eq('durum', 'bekliyor');

  if (requests && requests.length) {
    const gonderenIds = [...new Set(requests.map(r => r.gonderen_id))];
    const { data: uList } = await sb.from('kullanicilar')
      .select('id, kullanici_adi, avatar_url')
      .in('id', gonderenIds);
    const senderProfiles = {};
    if (uList) {
      uList.forEach(u => { senderProfiles[u.id] = u; });
    }
    requests.forEach(req => {
      req.kullanicilar = senderProfiles[req.gonderen_id] || null;
    });
  }

  reqLoading.remove();

  if (!requests || !requests.length) {
    const noReq = el('div', {style:{fontSize:'12px',color:'var(--text-dim)',padding:'12px 0'}});
    noReq.textContent = 'Bekleyen takip isteği yok.';
    reqSec.appendChild(noReq);
  } else {
    requests.forEach(req => {
      const item = el('div', {className:'req-item', id:`req-${req.id}`});
      const pp = el('img', {className:'req-item-pp', attrs:{src:ppSrc(req.kullanicilar), alt:'PP'}});
      const info = el('div', {className:'req-item-info'});
      const nick = el('div', {className:'req-item-nick', textContent:req.kullanicilar?.kullanici_adi||'Bilinmiyor'});
      info.appendChild(nick);
      const actDiv = el('div', {className:'req-item-actions'});

      const acceptBtn = el('button', {className:'btn mc-green mc-sm', textContent:'Kabul'});
      acceptBtn.addEventListener('click', async () => {
        acceptBtn.disabled = true;
        const senderId = req.kullanicilar?.id;
        if (!senderId) return;
        // Insert into takipler
        await sb.from('takipler').insert({takip_eden_id:senderId, takip_edilen_id:currentUser.id});
        // Update counts
        await sb.from('kullanicilar').update({takipci_sayisi:(currentUser.takipci_sayisi||0)+1}).eq('id', currentUser.id);
        await sb.from('kullanicilar').update({takip_sayisi:(req.kullanicilar?.takip_sayisi||0)+1}).eq('id', senderId);
        // Delete request
        await sb.from('takip_istekleri').delete().eq('id', req.id);
        // Notify sender
        await sb.from('bildirimler').insert({alici_id:senderId, gonderen_id:currentUser.id, tip:'takip_kabul', icerik:currentUser.kullanici_adi+' takip isteğini kabul etti.', link:`profil.html?id=${currentUser.id}`});
        document.getElementById(`req-${req.id}`)?.remove();
        toast('Takip isteği kabul edildi!', 'success');
      });

      const rejectBtn = el('button', {className:'btn mc-red mc-sm', textContent:'Reddet'});
      rejectBtn.addEventListener('click', async () => {
        await sb.from('takip_istekleri').delete().eq('id', req.id);
        document.getElementById(`req-${req.id}`)?.remove();
        toast('İstek reddedildi.', 'info');
      });

      actDiv.appendChild(acceptBtn);
      actDiv.appendChild(rejectBtn);
      item.appendChild(pp);
      item.appendChild(info);
      item.appendChild(actDiv);
      reqSec.appendChild(item);
    });
  }

  // — Profil Ziyaretçileri —
  const visSec = el('div', {className:'settings-section'});
  const visTitle = el('div', {className:'settings-section-title', textContent:'👁️ Profil Ziyaretçileri'});
  visSec.appendChild(visTitle);

  if (['abone','premium'].includes(profileUser.abonelik)) {
    const { data: visitors } = await sb.from('profil_ziyaretciler')
      .select('*')
      .eq('profil_id', currentUser.id)
      .order('ziyaret_tarihi', {ascending:false})
      .limit(10);

    if (visitors && visitors.length) {
      const ziyaretciIds = [...new Set(visitors.map(v => v.ziyaretci_id))];
      const { data: uList } = await sb.from('kullanicilar')
        .select('id, kullanici_adi, avatar_url')
        .in('id', ziyaretciIds);
      const visitorProfiles = {};
      if (uList) {
        uList.forEach(u => { visitorProfiles[u.id] = u; });
      }
      visitors.forEach(v => {
        v.kullanicilar = visitorProfiles[v.ziyaretci_id] || null;
      });
    }

    if (!visitors || !visitors.length) {
      const noV = el('div', {style:{fontSize:'12px',color:'var(--text-dim)',padding:'12px 0'}});
      noV.textContent = 'Henüz ziyaretçi yok.';
      visSec.appendChild(noV);
    } else {
      visitors.forEach(v => {
        const item = el('div', {className:'visitor-item'});
        const pp = el('img', {className:'visitor-pp', attrs:{src:ppSrc(v.kullanicilar), alt:'PP'}});
        const nick = el('div', {className:'visitor-nick', textContent:v.kullanicilar?.kullanici_adi||'Anonim'}); 
        const time = el('div', {className:'visitor-time', textContent:timeAgo(v.ziyaret_tarihi)});
        item.appendChild(pp);
        item.appendChild(nick);
        item.appendChild(time);
        visSec.appendChild(item);
      });
    }
  } else {
    const locked = el('div', {className:'visitors-locked'});
    locked.appendChild(el('div', {className:'visitors-locked-icon', textContent:'👑'}));
    locked.appendChild(el('div', {className:'visitors-locked-text', textContent:'Profil ziyaretçilerini görmek için Abone veya Premium olun.'}));
    const upgBtn = el('button', {className:'btn mc-gold mc-sm', textContent:'Abone Ol'});
    locked.appendChild(upgBtn);
    visSec.appendChild(locked);
  }
  wrap.appendChild(visSec);

  container.appendChild(wrap);
}

// ===== RIGHT PANEL =====
async function renderRightPanel() {
  const rp = document.getElementById('rightPanel');
  rp.innerHTML = '';

  // Hakkında
  const aboutCard = el('div', {className:'right-card'});
  const aboutTitle = el('div', {className:'right-card-title', textContent:'ℹ️ Hakkında'});
  aboutCard.appendChild(aboutTitle);

  const infos = [
    {icon:'📅', label:'Katıldı', val:formatDate(profileUser.kayit_tarihi)},
    {icon:'🎂', label:'Yaş', val:profileUser.yas?profileUser.yas+' yaş':null},
    {icon:'⚔️', label:'Kategori', val:profileUser.kategori?(profileUser.kategori + (profileUser.alt_kategori?' / '+profileUser.alt_kategori:'')):null},
    {icon:'💬', label:'Discord', val:profileUser.discord||null},
  ];

  infos.forEach(i => {
    if (!i.val) return;
    const row = el('div', {className:'right-info-item'});
    const ico = el('span', {textContent:i.icon});
    const txt = el('span');
    txt.innerHTML = `${i.label}: <strong>${i.val}</strong>`;
    row.appendChild(ico);
    row.appendChild(txt);
    aboutCard.appendChild(row);
  });

  if (profileUser.profil_gizli) {
    const privRow = el('div', {className:'right-info-item'});
    privRow.appendChild(el('span', {textContent:'🔒'}));
    const pt = el('span', {style:{color:'var(--text-dim)'}});
    pt.textContent = 'Gizli Hesap';
    privRow.appendChild(pt);
    aboutCard.appendChild(privRow);
  }
  rp.appendChild(aboutCard);

  // Klan Card
  if (profileUser.klan_tag) {
    const { data: klan } = await sb.from('klanlar').select('*').eq('tag', profileUser.klan_tag).single();
    if (klan) {
      const klanCard = el('div', {className:'right-card'});
      const klanTitle = el('div', {className:'right-card-title', textContent:'🛡️ Klan'});
      klanCard.appendChild(klanTitle);

      const inner = el('div', {className:'klan-card-inner'});
      inner.addEventListener('click', () => { window.location.href=`klanlar.html?tag=${klan.tag}`; });

      const logo = el('img', {className:'klan-logo', attrs:{src:klan.logo_url||'https://ui-avatars.com/api/?name='+encodeURIComponent(klan.isim)+'&background=1a1a1a&color=39ff14', alt:klan.isim}});
      const kInfo = el('div');
      const kName = el('div', {className:'klan-name', textContent:klan.isim});
      const kTag = el('div', {className:'klan-tag-small', textContent:'['+klan.tag+']'});
      const kUye = el('div', {className:'klan-uye', textContent:(klan.uye_sayisi||0)+' üye'});
      kInfo.appendChild(kName);
      kInfo.appendChild(kTag);
      kInfo.appendChild(kUye);
      inner.appendChild(logo);
      inner.appendChild(kInfo);
      klanCard.appendChild(inner);
      rp.appendChild(klanCard);
    }
  }

  // Sunucular Card
  const hasServers = profileUser.desteklenen_sunucu || (Array.isArray(profileUser.favori_sunucular) && profileUser.favori_sunucular.length);
  if (hasServers) {
    const srvCard = el('div', {className:'right-card'});
    const srvTitle = el('div', {className:'right-card-title', textContent:'🖥️ Sunucular'});
    srvCard.appendChild(srvTitle);

    const srvList = el('div', {className:'server-list'});

    if (profileUser.desteklenen_sunucu) {
      const srv = SERVERS.find(s => s.ip === profileUser.desteklenen_sunucu);
      const item = el('div', {className:'server-item'});
      const logo = el('img', {className:'server-logo', attrs:{src:serverLogo(profileUser.desteklenen_sunucu), alt:srv?.name||profileUser.desteklenen_sunucu}});
      logo.onerror = function() { this.src='https://ui-avatars.com/api/?name=MC&background=1a1a1a&color=39ff14&size=24'; };
      const name = el('span', {className:'server-name', textContent:srv?.name||profileUser.desteklenen_sunucu});
      const activeLbl = el('span', {className:'server-active-label', textContent:'Aktif'});
      item.appendChild(logo);
      item.appendChild(name);
      item.appendChild(activeLbl);
      srvList.appendChild(item);
    }

    if (Array.isArray(profileUser.favori_sunucular)) {
      profileUser.favori_sunucular.forEach(ip => {
        if (ip === profileUser.desteklenen_sunucu) return;
        const srv2 = SERVERS.find(s => s.ip === ip);
        const item2 = el('div', {className:'server-item'});
        const logo2 = el('img', {className:'server-logo', attrs:{src:serverLogo(ip), alt:srv2?.name||ip}});
        logo2.onerror = function() { this.src='https://ui-avatars.com/api/?name=MC&background=1a1a1a&color=39ff14&size=24'; };
        const name2 = el('span', {className:'server-name', textContent:srv2?.name||ip});
        item2.appendChild(logo2);
        item2.appendChild(name2);
        srvList.appendChild(item2);
      });
    }

    srvCard.appendChild(srvList);
    rp.appendChild(srvCard);
  }
}

// Start
init();
</script>
